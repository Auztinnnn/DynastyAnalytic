name: Update KTC Snapshot

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  update-ktc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch KTC values via headless browser
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-US',
            });
            const page = await context.newPage();

            let captured = null;

            // Intercept any response that looks like the player array
            page.on('response', async response => {
              const url = response.url();
              if (captured) return;
              if (!url.includes('keeptradecut.com')) return;
              const ct = response.headers()['content-type'] || '';
              if (!ct.includes('json')) return;
              try {
                const body = await response.json();
                if (Array.isArray(body) && body.length > 50 && body[0].sleeperId !== undefined) {
                  captured = body;
                  console.log(`Captured ${body.length} players from ${url}`);
                }
              } catch (_) {}
            });

            console.log('Loading KTC rankings page...');
            await page.goto('https://keeptradecut.com/dynasty-rankings', {
              waitUntil: 'networkidle',
              timeout: 45000,
            });

            await browser.close();

            if (!captured || captured.length < 50) {
              console.error('No valid KTC player array captured — aborting');
              process.exit(1);
            }

            const snapshot = {
              source: 'ktc-snapshot',
              fetchedAt: new Date().toISOString(),
              playerCount: captured.length,
              data: captured,
            };

            fs.writeFileSync('ktc-latest.json', JSON.stringify(snapshot));
            console.log(`Wrote ktc-latest.json: ${captured.length} players`);
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ktc-latest.json
          git diff --staged --quiet \
            && echo "No changes to KTC snapshot." \
            || (git commit -m "chore: update KTC snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
