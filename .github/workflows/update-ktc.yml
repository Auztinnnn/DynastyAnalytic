name: Update KTC Snapshot

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  update-ktc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch KTC values via headless browser
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          // Check whether an array looks like real player data (has names or sleeper IDs).
          // The /histories endpoint returns arrays of encoded value-history objects with
          // no playerName or sleeperId — we must reject those.
          function looksLikePlayers(arr) {
            if (!Array.isArray(arr) || arr.length < 10) return false;
            const sample = arr.slice(0, 5);
            return sample.some(p =>
              p && typeof p === 'object' &&
              (p.playerName || p.name || p.player || p.sleeperId || p.sleeper_id || p.sleeperID)
            );
          }

          // Pull an array of player objects out of whatever shape KTC returns.
          // Accepts: bare array, { players: [...] }, or Next.js __NEXT_DATA__ blobs.
          function extractPlayers(obj) {
            if (!obj) return null;

            // Bare array with real player data
            if (Array.isArray(obj) && obj.length > 50 && looksLikePlayers(obj)) return obj;

            // { players: [...] }
            if (obj.players && Array.isArray(obj.players) && obj.players.length > 50 && looksLikePlayers(obj.players))
              return obj.players;

            // Next.js page props: walk common paths
            const pageProps = obj?.props?.pageProps;
            if (pageProps) {
              for (const key of Object.keys(pageProps)) {
                const v = pageProps[key];
                if (Array.isArray(v) && v.length > 50 && looksLikePlayers(v)) return v;
              }
            }

            // Deep-search: find any array of 50+ player-like objects
            function deepFind(node, depth) {
              if (depth > 8 || !node || typeof node !== 'object') return null;
              if (Array.isArray(node) && node.length > 50 && looksLikePlayers(node)) return node;
              for (const val of Object.values(node)) {
                const found = deepFind(val, depth + 1);
                if (found) return found;
              }
              return null;
            }
            return deepFind(obj, 0);
          }

          // Normalise a player object to { sleeperId, playerName, value }
          // KTC field names vary; we accept several known aliases.
          function normalise(raw) {
            return raw.map(p => ({
              sleeperId:  p.sleeperId  ?? p.sleeper_id ?? p.sleeperID ?? null,
              playerName: p.playerName ?? p.name       ?? p.player    ?? '',
              value:      p.value      ?? p.sf_value   ?? p.ktcValue  ?? 0,
              // pass through everything else so the frontend can use original fields
              ...p,
            }));
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-US',
              extraHTTPHeaders: {
                'Accept-Language': 'en-US,en;q=0.9',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
              },
            });
            const page = await context.newPage();

            let xhrCaptured = null;

            // ── Method 1: XHR intercept ───────────────────────────────
            // Skip /histories — it returns encoded value-history arrays with no player
            // names or sleeper IDs. Only capture endpoints with real player metadata.
            page.on('response', async response => {
              const url = response.url();
              if (!url.includes('keeptradecut.com')) return;
              if (url.includes('/histories')) return;          // ← skip history-only endpoint
              const ct = response.headers()['content-type'] || '';
              if (!ct.includes('json')) return;
              try {
                const body = await response.json();
                console.log(`[xhr] ${url} → type=${Array.isArray(body)?'array':'object'} len=${Array.isArray(body)?body.length:Object.keys(body).length}`);
                if (!xhrCaptured) {
                  const players = extractPlayers(body);
                  if (players && players.length > 50) {
                    xhrCaptured = players;
                    console.log(`[xhr] Captured ${players.length} players from ${url}`);
                  }
                }
              } catch (_) {}
            });

            // Navigate; use domcontentloaded (ad networks fire forever, networkidle never settles).
            // Wait for /histories so the page fully initialises before we try other methods.
            const historiesPromise = page.waitForResponse(
              resp => resp.url().includes('dynasty-rankings/histories') && resp.status() === 200,
              { timeout: 30000 }
            ).catch(() => null);

            console.log('Loading KTC dynasty rankings page...');
            await page.goto('https://keeptradecut.com/dynasty-rankings', {
              waitUntil: 'domcontentloaded',
              timeout: 30000,
            });
            await historiesPromise;

            // ── Method 2: same-origin in-browser fetch ────────────────
            // Since we're already on keeptradecut.com, fetch the JSON API directly
            // from within the page — no CORS issue.
            let apiFetched = null;
            if (!xhrCaptured) {
              console.log('XHR intercept found nothing — trying in-browser API fetch...');
              try {
                apiFetched = await page.evaluate(async () => {
                  const paths = [
                    '/dynasty-rankings?filters=QB|WR|RB|TE|RDP&format=2',
                    '/dynasty-rankings?filters=QB|WR|RB|TE|RDP&format=1',
                    '/api/dynasty-rankings',
                  ];
                  for (const path of paths) {
                    try {
                      const r = await fetch(path, {
                        headers: { Accept: 'application/json', 'X-Requested-With': 'XMLHttpRequest' }
                      });
                      if (!r.ok) continue;
                      const ct = r.headers.get('content-type') || '';
                      if (ct.includes('json')) {
                        const data = await r.json();
                        console.log('[api] fetched', path, Array.isArray(data) ? data.length + ' items' : Object.keys(data));
                        return data;
                      }
                    } catch(e) { console.log('[api] error on', path, e.message); }
                  }
                  return null;
                });
                if (apiFetched) {
                  const players = extractPlayers(apiFetched);
                  if (players && players.length > 50) {
                    xhrCaptured = players;
                    console.log(`[api] Captured ${players.length} players via in-browser fetch`);
                  } else {
                    console.log('[api] Response did not contain player array:', JSON.stringify(apiFetched).slice(0, 300));
                  }
                }
              } catch (e) {
                console.log('[api] Error:', e.message);
              }
            }

            // ── Method 3: __NEXT_DATA__ embedded in page HTML ─────────
            let nextDataCaptured = null;
            if (!xhrCaptured) {
              console.log('Trying __NEXT_DATA__...');
              try {
                const raw = await page.$eval('#__NEXT_DATA__', el => el.textContent);
                const json = JSON.parse(raw);
                const pageProps = json?.props?.pageProps || {};
                console.log('[next_data] pageProps keys:', Object.keys(pageProps).join(', '));
                const players = extractPlayers(json);
                if (players && players.length > 50) {
                  nextDataCaptured = players;
                  console.log(`[next_data] Captured ${players.length} players`);
                } else {
                  // Log top-level structure to help diagnose
                  console.log('[next_data] No player array found. Top keys:', Object.keys(json).join(', '));
                  for (const [k, v] of Object.entries(pageProps)) {
                    console.log(`  pageProps.${k}: ${Array.isArray(v) ? 'array['+v.length+']' : typeof v}`);
                  }
                }
              } catch (e) {
                console.log('[next_data] Not found or parse error:', e.message);
              }
            }

            // ── Method 4: window globals ──────────────────────────────
            let globalCaptured = null;
            if (!xhrCaptured && !nextDataCaptured) {
              console.log('Trying window globals...');
              try {
                const globals = await page.evaluate(() => {
                  const candidates = ['__INITIAL_STATE__', '__REDUX_STATE__', '__APP_DATA__', 'playerValues', 'rankingData', 'players'];
                  const out = {};
                  for (const k of candidates) {
                    if (window[k]) out[k] = window[k];
                  }
                  return out;
                });
                for (const [key, val] of Object.entries(globals)) {
                  const players = extractPlayers(val);
                  if (players && players.length > 50) {
                    globalCaptured = players;
                    console.log(`[global:${key}] Captured ${players.length} players`);
                    break;
                  }
                }
              } catch (e) {
                console.log('[globals] Error:', e.message);
              }
            }

            await browser.close();

            const final = xhrCaptured || nextDataCaptured || globalCaptured;

            if (!final || final.length < 50) {
              console.error('All capture methods failed — cannot write snapshot.');
              console.error('Check the [xhr] log lines above for clues about the actual response shape.');
              process.exit(1);
            }

            const normalised = normalise(final);
            const snapshot = {
              source: 'ktc-snapshot',
              fetchedAt: new Date().toISOString(),
              playerCount: normalised.length,
              data: normalised,
            };

            fs.writeFileSync('ktc-latest.json', JSON.stringify(snapshot));
            console.log(`Wrote ktc-latest.json: ${normalised.length} players`);
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ktc-latest.json
          git diff --staged --quiet \
            && echo "No changes to KTC snapshot." \
            || (git commit -m "chore: update KTC snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
