name: Update KTC Snapshot

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  update-ktc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch KTC values via headless browser
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const https = require('https');

          // Simple HTTPS GET returning parsed JSON
          function fetchJson(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'dynasty-analytic-bot/1.0' } }, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(new Error('JSON parse failed: ' + e.message)); }
                });
              }).on('error', reject);
            });
          }

          (async () => {
            // ── Step 1: Load KTC page and extract window.playersArray ──
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-US',
            });
            const page = await context.newPage();

            console.log('Loading KTC dynasty rankings page...');
            await page.goto('https://keeptradecut.com/dynasty-rankings', {
              waitUntil: 'domcontentloaded',
              timeout: 30000,
            });

            // playersArray is a window global set by KTC's inline script.
            // Wait up to 15s for it to be populated (it's usually immediate).
            let ktcPlayers = null;
            try {
              await page.waitForFunction(
                () => window.playersArray && window.playersArray.length > 100,
                { timeout: 15000 }
              );
              ktcPlayers = await page.evaluate(() =>
                (window.playersArray || []).map(p => ({
                  playerID:     p.playerID,
                  playerName:   p.playerName  || '',
                  position:     p.position    || '',
                  team:         p.team        || '',
                  age:          p.age         || null,
                  mflid:        p.mflid       || null,
                  // Prefer SF value for dynasty; fall back to 1QB
                  value:        (p.superflexValues  && p.superflexValues.value)  ||
                                (p.oneQBValues      && p.oneQBValues.value)      || 0,
                  sf_value:     (p.superflexValues  && p.superflexValues.value)  || 0,
                  one_qb_value: (p.oneQBValues      && p.oneQBValues.value)      || 0,
                }))
              );
              console.log(`[ktc] Captured ${ktcPlayers.length} players from window.playersArray`);
            } catch(e) {
              console.log('[ktc] window.playersArray not found or timed out:', e.message);
            }

            await browser.close();

            if (!ktcPlayers || ktcPlayers.length < 50) {
              console.error('Failed to capture player data from window.playersArray.');
              process.exit(1);
            }

            // ── Step 2: Fetch Sleeper player DB to map name → sleeperId ──
            // KTC does not expose sleeperId; we join by player name.
            console.log('Fetching Sleeper player database...');
            let nameToSleeperId = {};
            try {
              const sleeperPlayers = await fetchJson('https://api.sleeper.app/v1/players/nfl');
              Object.entries(sleeperPlayers).forEach(([id, p]) => {
                if (p.full_name) {
                  nameToSleeperId[p.full_name.toLowerCase().trim()] = id;
                }
                // Also index "First Last" from separate fields as a fallback
                if (p.first_name && p.last_name) {
                  const key = (p.first_name + ' ' + p.last_name).toLowerCase().trim();
                  if (!nameToSleeperId[key]) nameToSleeperId[key] = id;
                }
              });
              console.log(`[sleeper] Built name map for ${Object.keys(nameToSleeperId).length} players`);
            } catch(e) {
              console.warn('[sleeper] Could not fetch player DB:', e.message);
            }

            // ── Step 3: Join KTC data with sleeper IDs ─────────────────
            const snapshot = {
              source:      'ktc-snapshot',
              fetchedAt:   new Date().toISOString(),
              playerCount: ktcPlayers.length,
              data: ktcPlayers.map(p => {
                const sleeperId = nameToSleeperId[p.playerName.toLowerCase().trim()] || null;
                return { ...p, sleeperId };
              }),
            };

            const withId = snapshot.data.filter(p => p.sleeperId).length;
            console.log(`Matched ${withId}/${snapshot.playerCount} players to Sleeper IDs`);

            fs.writeFileSync('ktc-latest.json', JSON.stringify(snapshot));
            console.log(`Wrote ktc-latest.json: ${snapshot.playerCount} players, ${withId} with sleeperId`);
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ktc-latest.json
          git diff --staged --quiet \
            && echo "No changes to KTC snapshot." \
            || (git commit -m "chore: update KTC snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
