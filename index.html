function generateTradeProposal() {
  const out = document.getElementById('trade-proposal-output');
  if (!out) return;
  const league = ld();
  if (!league) { out.innerHTML = ''; return; }
  const ridA = S.tradeA.rosterId, ridB = S.tradeB.rosterId;
  if (!ridA || !ridB || ridA === ridB) { out.innerHTML = ''; return; }

  const profA = mveTeamProfile(ridA, league);
  const profB = mveTeamProfile(ridB, league);
  if (!profA || !profB) { out.innerHTML = ''; return; }

  const sigCls = { Cornerstone:'signal-cornerstone', Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };
  const TOLERANCE = 0.14; // within 14% = balanced

  // Weak positions for each team (tier 3+)
  function weakPositions(prof) {
    return ['QB','RB','WR','TE'].filter(pos => {
      const arr = prof.byPos[pos] || [];
      return !arr.length || arr[0].tier >= 3;
    });
  }
  const weakA = weakPositions(profA);
  const weakB = weakPositions(profB);

  // Tradeable players: Sell/Shop first, then positional surplus, then any non-Cornerstone depth
  function tradeablePlayers(prof, weakOther) {
    const result = [];
    prof.all.forEach(p => {
      if (p.actionTag === 'Cornerstone') return;
      let reason = null;
      if (p.actionTag === 'Sell' || p.actionTag === 'Shop') { reason = p.actionTag; }
      else if (weakOther.includes(p.pos)) {
        const posArr = prof.byPos[p.pos] || [];
        if (posArr.length >= 3 && p.tier <= 3) reason = 'Surplus';
        else if (posArr.length >= 2 && p.tier >= 3) reason = 'Depth';
      } else if (p.tier >= 3 && p.actionTag !== 'Cornerstone') {
        reason = 'Depth';
      }
      if (reason) result.push({ ...p, reason });
    });
    return result.sort((a, b) => {
      // Prioritize sell/shop, then surplus, then by value
      const pri = { Sell:0, Shop:1, Surplus:2, Depth:3 };
      return (pri[a.reason]||3) - (pri[b.reason]||3) || b.neutral - a.neutral;
    });
  }

  // Available picks with value
  function teamPicksWithValue(rosterId) {
    return getTeamPickList(rosterId).map(pk => {
      const bkt = getPickBucketForKey(pk.key);
      const val = getPickValue(pk.season, pk.round, bkt && bkt.bucket);
      const name = pickDisplayName(pk);
      return { ...pk, val, name, isPick: true };
    }).filter(pk => pk.val > 0).sort((a, b) => b.val - a.val);
  }

  const playersA = tradeablePlayers(profA, weakB);
  const playersB = tradeablePlayers(profB, weakA);
  const picksA   = teamPicksWithValue(ridA);
  const picksB   = teamPicksWithValue(ridB);

  // Score a proposal: lower = better
  // Rewards: value balance, needs addressed, sell signal cleared
  function scoreProposal(sideA, sideB) {
    const valA = sideA.reduce((s, x) => s + (x.isPick ? x.val : x.neutral), 0);
    const valB = sideB.reduce((s, x) => s + (x.isPick ? x.val : x.neutral), 0);
    if (!valA || !valB) return Infinity;
    const maxVal = Math.max(valA, valB);
    const imbalance = Math.abs(valA - valB) / maxVal;
    if (imbalance > 0.35) return Infinity; // too uneven to consider

    let needsScore = 0;
    // Reward filling a weak position for each side
    sideB.filter(x => !x.isPick).forEach(p => { if (weakA.includes(p.pos)) needsScore += 2; });
    sideA.filter(x => !x.isPick).forEach(p => { if (weakB.includes(p.pos)) needsScore += 2; });
    // Reward clearing sell signals
    sideA.filter(x => !x.isPick && (x.reason === 'Sell' || x.reason === 'Shop')).forEach(() => needsScore += 1);
    sideB.filter(x => !x.isPick && (x.reason === 'Sell' || x.reason === 'Shop')).forEach(() => needsScore += 1);

    return imbalance * 10 - needsScore;
  }

  // Generate candidate proposals: 1v1, 2v1, 1v2, 2v2, each with pick sweeteners
  const candidates = [];
  const maxP = 6; // max players to consider per side

  const pA = playersA.slice(0, maxP);
  const pB = playersB.slice(0, maxP);

  // Helper: try to balance a gap with picks from the given pick pool
  function pickSweetener(gap, pickPool) {
    // gap > 0 means this side needs to add value; pick from their pool
    if (gap <= 0) return [];
    const added = [];
    let remaining = gap;
    for (const pk of pickPool) {
      if (remaining <= 0) break;
      // Only add a pick if it meaningfully closes the gap (>30% of remaining)
      if (pk.val >= remaining * 0.3) {
        added.push(pk);
        remaining -= pk.val;
      }
    }
    return added;
  }

  // 1v1
  for (const a of pA) for (const b of pB) {
    const gap = b.neutral - a.neutral; // positive = A is getting more, needs to add
    const sweetsA = gap > 200 ? pickSweetener(gap * 0.7, picksA) : [];
    const sweetsB = gap < -200 ? pickSweetener(-gap * 0.7, picksB) : [];
    const sideA = [a, ...sweetsA];
    const sideB = [b, ...sweetsB];
    candidates.push({ sideA, sideB, score: scoreProposal(sideA, sideB) });
  }

  // 2v1: A sends 2, B sends 1 star
  for (let i = 0; i < Math.min(pA.length, 5); i++) for (let j = i+1; j < Math.min(pA.length, 5); j++) {
    for (const b of pB.slice(0, 4)) {
      const sideA = [pA[i], pA[j]];
      const sideB = [b];
      candidates.push({ sideA, sideB, score: scoreProposal(sideA, sideB) });
    }
  }

  // 1v2: A sends 1 star, B sends 2
  for (const a of pA.slice(0, 4)) {
    for (let i = 0; i < Math.min(pB.length, 5); i++) for (let j = i+1; j < Math.min(pB.length, 5); j++) {
      const sideA = [a];
      const sideB = [pB[i], pB[j]];
      candidates.push({ sideA, sideB, score: scoreProposal(sideA, sideB) });
    }
  }

  // 2v2
  for (let i = 0; i < Math.min(pA.length, 4); i++) for (let j = i+1; j < Math.min(pA.length, 4); j++) {
    for (let k = 0; k < Math.min(pB.length, 4); k++) for (let l = k+1; l < Math.min(pB.length, 4); l++) {
      const sideA = [pA[i], pA[j]];
      const sideB = [pB[k], pB[l]];
      candidates.push({ sideA, sideB, score: scoreProposal(sideA, sideB) });
    }
  }

  // Pick-only sweetener proposals (when player pools are thin)
  if (pA.length && picksB.length) {
    const a = pA[0];
    const sweetsB = pickSweetener(a.neutral * 0.85, picksB);
    if (sweetsB.length) candidates.push({ sideA: [a], sideB: sweetsB, score: scoreProposal([a], sweetsB) });
  }
  if (pB.length && picksA.length) {
    const b = pB[0];
    const sweetsA = pickSweetener(b.neutral * 0.85, picksA);
    if (sweetsA.length) candidates.push({ sideA: sweetsA, sideB: [b], score: scoreProposal(sweetsA, [b]) });
  }

  // Sort and dedupe (skip proposals with same players)
  candidates.sort((a, b) => a.score - b.score);

  // Pick top 3 distinct proposals
  const seen = new Set();
  const proposals = [];
  for (const c of candidates) {
    if (c.score === Infinity) continue;
    const key = [...c.sideA.map(x => x.isPick ? x.key : x.pid).sort(),
                  '|',
                  ...c.sideB.map(x => x.isPick ? x.key : x.pid).sort()].join(',');
    if (seen.has(key)) continue;
    seen.add(key);
    proposals.push(c);
    if (proposals.length >= 3) break;
  }

  if (!proposals.length) {
    out.innerHTML = `<div style="font-size:.75rem;color:var(--muted);text-align:center;padding:8px">No viable trade structure found — rosters may be too balanced or both teams lack tradeable assets.</div>`;
    return;
  }

  // Store for click-to-apply
  S.generatedProposals = proposals;

  // Render helpers
  function valOf(items) { return items.reduce((s, x) => s + (x.isPick ? x.val : x.neutral), 0); }

  function itemChip(x) {
    if (x.isPick) {
      const rc = pickRoundColor(x.round);
      return `<div style="display:flex;align-items:center;gap:5px;padding:4px 0">
        <span class="pick-badge" style="background:${hexA(rc,.13)};color:${rc};width:18px;height:18px;font-size:.58rem;flex-shrink:0">${x.round}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:.75rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.name}</div>
          <div style="font-size:.62rem;color:var(--yellow)">${x.val.toLocaleString()}</div>
        </div>
      </div>`;
    }
    return `<div style="display:flex;align-items:flex-start;gap:5px;padding:4px 0">
      ${hsImg(x.pid, 24, x.pos)}
      <span class="pos-badge pos-${x.pos}" style="font-size:.52rem;flex-shrink:0;margin-top:2px">${x.pos}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:.76rem;color:var(--text);font-weight:600;line-height:1.3;word-break:break-word">${x.name}</div>
        <div style="font-size:.62rem;color:var(--muted);margin-top:1px">${x.neutral.toLocaleString()}</div>
      </div>
    </div>`;
  }

  function proposalHtml(prop, idx) {
    const vA = valOf(prop.sideA), vB = valOf(prop.sideB);
    const maxV = Math.max(vA, vB, 1);
    const imbalance = Math.abs(vA - vB) / maxV;
    const balanced = imbalance <= 0.08;
    const favorsTxt = vA > vB * 1.06 ? `Favors ${profA.teamName}` : vB > vA * 1.06 ? `Favors ${profB.teamName}` : 'Even';
    const balColor = balanced ? 'var(--green)' : imbalance <= TOLERANCE ? 'var(--yellow)' : '#f85149';
    const label = idx === 0 ? 'Best Match' : idx === 1 ? 'Alternative' : 'Option 3';

    return `<div class="proposal-card" id="proposal-card-${idx}" onclick="applyProposal(${idx})" style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-top:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:.68rem;font-weight:700;color:var(--accent)">${label}</span>
          <span id="proposal-check-${idx}" style="display:none;font-size:.6rem;background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3);border-radius:10px;padding:1px 8px;font-weight:700">✓ Applied</span>
        </div>
        <span style="font-size:.63rem;font-weight:600;color:${balColor}">${favorsTxt} · ${vA.toLocaleString()} ↔ ${vB.toLocaleString()}</span>
      </div>
      <div class="proposal-sides">
        <div class="proposal-side">
          <div style="font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${profA.teamName} sends</div>
          ${prop.sideA.map(itemChip).join('')}
        </div>
        <div class="proposal-side">
          <div style="font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${profB.teamName} sends</div>
          ${prop.sideB.map(itemChip).join('')}
        </div>
      </div>
    </div>`;
  }

  out.innerHTML = `<div style="margin-top:4px">
    <div style="font-size:.7rem;font-weight:700;color:var(--text);margin-bottom:2px">💡 Suggested Trades</div>
    ${proposals.map((p, i) => proposalHtml(p, i)).join('')}
  </div>`;
}

// ── ARCHETYPE-BASED PROPOSAL ENGINE ──────────────────────────
// Generates one best candidate per trade archetype for a given pair.
// Diversity is enforced at the archetype level before any value-based ranking,
// so the output set always represents distinct deal structures.
function generateArchetypeProposals(ridA, ridB, league) {
  const profA = mveTeamProfile(ridA, league);
  const profB = mveTeamProfile(ridB, league);
  if (!profA || !profB) return [];

  const clsA = profA.classification?.label || 'Mid-Tier';
  const isContenderA = clsA === 'Contender' || clsA === 'Fringe';

  function weakPos(prof) {
    return ['QB','RB','WR','TE'].filter(pos => {
      const arr = prof.byPos[pos] || [];
      return !arr.length || arr[0].tier >= 3;
    });
  }
  const weakA = weakPos(profA);
  const weakB = weakPos(profB);

  // All non-Cornerstone players sorted descending by value
  function tradePool(prof) {
    return prof.all.filter(p => p.actionTag !== 'Cornerstone' && p.neutral > 0)
                   .sort((a, b) => b.neutral - a.neutral);
  }
  function teamPicks(rosterId) {
    return getTeamPickList(rosterId).map(pk => {
      const bkt = getPickBucketForKey(pk.key);
      const val = getPickValue(pk.season, pk.round, bkt?.bucket);
      return { ...pk, val, name: pickDisplayName(pk), isPick: true };
    }).filter(pk => pk.val > 0).sort((a, b) => b.val - a.val);
  }

  const poolA = tradePool(profA), poolB = tradePool(profB);
  const picksA = teamPicks(ridA),  picksB = teamPicks(ridB);

  function valOf(items) { return items.reduce((s, x) => s + (x.isPick ? x.val : x.neutral), 0); }

  // Balanced = within 20% on total value
  function isBalanced(vA, vB) {
    return Math.abs(vA - vB) / Math.max(vA, vB, 1) <= 0.20;
  }

  // Fill a value gap by pulling picks from a pool
  function sweeten(gap, pool, frac) {
    if (gap <= 0) return [];
    const out = []; let rem = gap * (frac || 0.80);
    for (const pk of pool) {
      if (rem <= 0) break;
      if (pk.val >= rem * 0.22) { out.push(pk); rem -= pk.val; }
    }
    return out;
  }

  // Score = imbalance * 10 - needsFilled (lower = better)
  function scoreOf(sA, sB) {
    const vA = valOf(sA), vB = valOf(sB);
    if (!vA || !vB) return Infinity;
    const imb = Math.abs(vA - vB) / Math.max(vA, vB);
    if (imb > 0.35) return Infinity;
    let n = 0;
    sB.filter(x => !x.isPick && weakA.includes(x.pos)).forEach(() => n += 2);
    sA.filter(x => !x.isPick && weakB.includes(x.pos)).forEach(() => n += 2);
    sA.filter(x => !x.isPick && (x.actionTag === 'Sell' || x.actionTag === 'Shop')).forEach(() => n += 1);
    return imb * 10 - n;
  }

  function anchorOf(side) {
    const pl = side.filter(x => !x.isPick).sort((a,b) => b.neutral - a.neutral);
    return pl.length ? pl[0].pid : null;
  }

  function push(archetype, label, sA, sB) {
    const sc = scoreOf(sA, sB);
    if (sc === Infinity) return false;
    proposals.push({ sideA: sA, sideB: sB, archetype, label,
      anchorOut: anchorOf(sA), anchorIn: anchorOf(sB),
      score: sc, ridA, ridB, profA, profB });
    return true;
  }

  const proposals = [];

  // ── 1. Centerpiece Swap ────────────────────────────────────
  // Best outgoing Sell/Shop for best matching incoming need-filler, ± pick sweetener
  {
    const outgoing = [...poolA.filter(p => p.actionTag==='Sell'||p.actionTag==='Shop'), ...poolA.filter(p => p.actionTag!=='Sell'&&p.actionTag!=='Shop')];
    const incoming = [...poolB.filter(p => weakA.includes(p.pos) && p.tier<=3), ...poolB];
    done:
    for (const a of outgoing.slice(0,6)) {
      for (const b of incoming.slice(0,8)) {
        if (a.pid === b.pid) continue;
        const gap = b.neutral - a.neutral;
        const swA = gap > 300 ? sweeten(gap, picksA) : [];
        const swB = gap < -300 ? sweeten(-gap, picksB) : [];
        if (push('centerpiece_swap','Best Match',[a,...swA],[b,...swB])) break done;
      }
    }
  }

  // ── 2. Consolidation (2 depth → 1 star) ───────────────────
  // A sends two non-anchor pieces for one clear upgrade from B
  {
    const existing1Anchor = proposals[0]?.anchorOut;
    const depA = poolA.filter(p => p.tier >= 3 && p.pid !== existing1Anchor);
    const starsB = poolB.filter(p => p.tier <= 3 && (weakA.includes(p.pos)||p.actionTag==='Sell'||p.actionTag==='Shop'));
    done:
    for (const star of starsB.slice(0,5)) {
      for (let i=0; i<Math.min(depA.length,6); i++) for (let j=i+1; j<Math.min(depA.length,6); j++) {
        if (push('consolidation','Consolidation Deal',[depA[i],depA[j]],[star])) break done;
      }
    }
  }

  // ── 3. Pick-Sweetened (player + picks for better player) ───
  // A attaches picks to close a gap for a meaningfully better player from B
  {
    const usedAnchors = new Set(proposals.map(p=>p.anchorOut).filter(Boolean));
    done:
    for (const a of poolA.slice(0,6)) {
      for (const b of poolB.filter(p => p.neutral > a.neutral*1.10).slice(0,6)) {
        const sw = sweeten(b.neutral - a.neutral, picksA, 0.85);
        if (!sw.length) continue;
        // require fresh anchor
        if (usedAnchors.has(a.pid) && proposals.some(p=>p.anchorIn===b.pid)) continue;
        if (push('pick_sweetened','Pick-Sweetened Deal',[a,...sw],[b])) break done;
      }
    }
  }

  // ── 4. Pure Pick Return (player for picks) ─────────────────
  // A moves a sell/aging player for a picks package — no player comes back
  if (picksB.length) {
    const sellPool = [...poolA.filter(p=>p.actionTag==='Sell'||p.actionTag==='Shop'||(parseInt(p.age)||0)>=29), ...poolA];
    const usedAnchors = new Set(proposals.map(p=>p.anchorOut).filter(Boolean));
    done:
    for (const a of sellPool.slice(0,6)) {
      if (usedAnchors.has(a.pid)) continue; // force fresh anchor
      const sw = sweeten(a.neutral, picksB, 0.90);
      if (sw.length && push('picks_return','Pick-Based Return',[a],sw)) break done;
    }
  }

  // ── 5. Win-Now Buy (contender sends picks for proven vet) ──
  if (isContenderA && picksA.length) {
    const vets = poolB.filter(p=>(parseInt(p.age)||0)>=26&&p.tier<=3);
    const usedIn = new Set(proposals.map(p=>p.anchorIn).filter(Boolean));
    for (const vet of vets.slice(0,5)) {
      if (usedIn.has(vet.pid)) continue;
      const sw = sweeten(vet.neutral, picksA, 0.90);
      if (sw.length && push('win_now','Win-Now Buy',sw,[vet])) break;
    }
  }

  // ── 6. Rebuild Version (aging/sell for youth + picks) ──────
  {
    const aging = poolA.filter(p=>(p.actionTag==='Sell'||(parseInt(p.age)||0)>=29)&&p.tier<=3);
    const usedAnchors = new Set(proposals.map(p=>p.anchorOut).filter(Boolean));
    for (const a of aging.slice(0,4)) {
      if (usedAnchors.has(a.pid)) continue;
      const young = poolB.filter(p=>(parseInt(p.age)||0)<=24||p.actionTag==='Speculative'||p.player?.years_exp===0);
      let packB = [];
      let rem = a.neutral;
      for (const y of young) { if (rem<=0||packB.length>=2) break; if (y.neutral<=a.neutral*0.75){packB.push(y);rem-=y.neutral;} }
      if (rem>0&&picksB.length) packB.push(...sweeten(rem,picksB,0.90));
      if (packB.length && push('rebuild_sell','Rebuild Version',[a],packB)) break;
    }
  }

  // ── 7. Balanced Swap (2-for-2 with fresh faces) ─────────────
  {
    const usedPids = new Set(proposals.flatMap(p=>[p.anchorOut,p.anchorIn]).filter(Boolean));
    done:
    for (let i=0; i<Math.min(poolA.length,6); i++) for (let j=i+1; j<Math.min(poolA.length,6); j++) {
      for (let k=0; k<Math.min(poolB.length,6); k++) for (let l=k+1; l<Math.min(poolB.length,6); l++) {
        // require at least one player not already in another proposal
        if (usedPids.has(poolA[i].pid)&&usedPids.has(poolA[j].pid)&&usedPids.has(poolB[k].pid)&&usedPids.has(poolB[l].pid)) continue;
        if (push('balanced_swap','Balanced Swap',[poolA[i],poolA[j]],[poolB[k],poolB[l]])) break done;
      }
    }
  }

  // ── 8. Depth Haul (multiple depth → 1 starter at weak pos) ──
  {
    const startersB = poolB.filter(p=>p.tier<=2&&weakA.includes(p.pos));
    const depthA    = poolA.filter(p=>p.tier>=3&&p.tier<=4);
    const usedIn    = new Set(proposals.map(p=>p.anchorIn).filter(Boolean));
    for (const star of startersB.slice(0,4)) {
      if (usedIn.has(star.pid)) continue;
      const pack=[]; let rem=star.neutral;
      for (const d of depthA) { if (rem<=0||pack.length>=3) break; if(d.neutral<=star.neutral*0.65){pack.push(d);rem-=d.neutral;} }
      if (pack.length>=2 && push('depth_haul','Depth Haul',pack,[star])) break;
    }
  }

  return proposals;
}

// ── PROPOSALS TAB ─────────────────────────────────────────────
function renderTradeProposalsTab() {
  const el = document.getElementById('trade-proposals-content');
  if (!el) return;
  const league = ld();
  if (!league || !S.fcValues.length) {
    el.innerHTML = `<div class="warn-banner" style="margin-top:20px">Load a league with FantasyCalc values to use Trade Proposals.</div>`;
    return;
  }

  const teams = Object.values(league.rosterMap).sort((a,b) => a.teamName.localeCompare(b.teamName));
  const myRid = el.dataset.myRid ? parseInt(el.dataset.myRid) : (S.tradeA?.rosterId || teams[0]?.rosterId);
  el.dataset.myRid = myRid;

  const teamOpts = teams.map(t => `<option value="${t.rosterId}" ${t.rosterId==myRid?'selected':''}>${t.teamName}</option>`).join('');

  // Collect archetype proposals from every other team
  const allRaw = [];
  for (const t of teams) {
    if (t.rosterId == myRid) continue;
    allRaw.push(...generateArchetypeProposals(myRid, t.rosterId, league));
  }

  // Diversity filter: max 2 per anchorOut pid, max 2 per archetype, + similarity guard
  // Similarity: if sideA of B overlaps >70% of sideA value with an already-accepted proposal, skip
  allRaw.sort((a,b) => a.score - b.score);
  const anchorCount = {}, archetypeCount = {};
  const accepted = [];
  const seenExact = new Set();

  for (const p of allRaw) {
    // Exact duplicate guard
    const exactKey = [p.ridB, ...p.sideA.map(x=>x.isPick?x.key:x.pid).sort(),'||',...p.sideB.map(x=>x.isPick?x.key:x.pid).sort()].join(',');
    if (seenExact.has(exactKey)) continue;

    // Anchor repetition cap
    const ao = p.anchorOut || '__pick__';
    if ((anchorCount[ao]||0) >= 2) continue;

    // Archetype repetition cap
    if ((archetypeCount[p.archetype]||0) >= 2) continue;

    // Similarity guard: sideA value overlap > 70% with any accepted proposal
    function valOf(items) { return items.reduce((s,x)=>s+(x.isPick?x.val:x.neutral),0); }
    const vA = valOf(p.sideA);
    const tooSimilar = accepted.some(q => {
      const sharedVal = p.sideA.reduce((s,x)=>{
        const match = q.sideA.find(y=>(x.isPick&&y.isPick&&x.key===y.key)||(!x.isPick&&!y.isPick&&x.pid===y.pid));
        return s + (match ? (x.isPick?x.val:x.neutral) : 0);
      },0);
      return vA > 0 && sharedVal/vA >= 0.70;
    });
    if (tooSimilar) continue;

    seenExact.add(exactKey);
    anchorCount[ao] = (anchorCount[ao]||0) + 1;
    archetypeCount[p.archetype] = (archetypeCount[p.archetype]||0) + 1;
    accepted.push(p);
    if (accepted.length >= 10) break;
  }

  S.finderProposals = accepted;

  function valOf(items) { return items.reduce((s,x)=>s+(x.isPick?x.val:x.neutral),0); }

  function itemLine(x) {
    if (x.isPick) {
      const rc = pickRoundColor(x.round);
      return `<div style="display:flex;align-items:center;gap:4px;margin:2px 0">
        <span class="pick-badge" style="background:${hexA(rc,.13)};color:${rc};width:16px;height:16px;font-size:.52rem;flex-shrink:0">${x.round}</span>
        <span style="font-size:.72rem;color:var(--text)">${x.name}</span>
        <span style="font-size:.6rem;color:var(--yellow);margin-left:2px">${x.val.toLocaleString()}</span>
      </div>`;
    }
    return `<div style="display:flex;align-items:center;gap:4px;margin:2px 0">
      ${hsImg(x.pid, 22, x.pos)}
      <span class="pos-badge pos-${x.pos}" style="font-size:.48rem;flex-shrink:0">${x.pos}</span>
      <span style="font-size:.73rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px">${x.name}</span>
      <span style="font-size:.6rem;color:var(--muted)">${x.neutral.toLocaleString()}</span>
    </div>`;
  }

  // Archetype label color
  const archetypeColor = {
    centerpiece_swap: 'var(--accent)', consolidation: 'var(--purple)',
    pick_sweetened: 'var(--yellow)',   picks_return: 'var(--yellow)',
    win_now: 'var(--orange)',          rebuild_sell: 'var(--muted)',
    balanced_swap: 'var(--green)',     depth_haul: '#8b949e',
  };

  const rows = accepted.map((prop, idx) => {
    const vA = valOf(prop.sideA), vB = valOf(prop.sideB);
    const imb = Math.abs(vA - vB) / Math.max(vA, vB, 1);
    const diff = vB - vA;
    const balTxt = imb <= 0.05 ? 'Even'
      : diff > 0 ? `+${Math.round(diff/vA*100)}% you`
      : `+${Math.round(-diff/vB*100)}% them`;
    const balColor = imb <= 0.08 ? 'var(--green)' : imb <= 0.16 ? 'var(--yellow)' : '#f85149';
    const labelColor = archetypeColor[prop.archetype] || 'var(--muted)';
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 10px;vertical-align:top;white-space:nowrap">
        <div style="font-size:.62rem;font-weight:700;color:var(--accent)">#${idx+1}</div>
        <div style="font-size:.6rem;font-weight:600;color:${labelColor};margin-top:2px;white-space:nowrap">${prop.label}</div>
      </td>
      <td style="padding:8px 8px;vertical-align:top">${prop.sideA.map(itemLine).join('')}</td>
      <td style="padding:8px 8px;vertical-align:top">${prop.sideB.map(itemLine).join('')}</td>
      <td style="padding:8px 10px;font-size:.73rem;color:var(--text);white-space:nowrap;vertical-align:top">${prop.profB.teamName}</td>
      <td style="padding:8px 10px;font-size:.68rem;font-weight:600;color:${balColor};white-space:nowrap;vertical-align:top">${balTxt}</td>
      <td style="padding:8px 8px;vertical-align:top">
        <button onclick="applyProposalFromFinder(${idx})" style="background:var(--accent);color:#0d1117;border:none;border-radius:5px;padding:4px 10px;font-size:.68rem;font-weight:700;cursor:pointer;white-space:nowrap">Apply</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      <span style="font-size:.8rem;font-weight:600;color:var(--text)">My Team</span>
      <select style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:.8rem"
        onchange="document.getElementById('trade-proposals-content').dataset.myRid=this.value;renderTradeProposalsTab()">${teamOpts}</select>
      <span style="font-size:.72rem;color:var(--muted)">Scans all ${teams.length-1} rosters · ${accepted.length} distinct proposals across different deal structures</span>
    </div>
    ${!accepted.length
      ? `<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:40px">No viable proposals found — rosters may be evenly balanced or lack tradeable assets.</div>`
      : `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:auto">
          <table style="width:100%;border-collapse:collapse;min-width:540px">
            <thead>
              <tr style="border-bottom:1px solid var(--border);background:var(--surface2)">
                <th style="padding:7px 10px;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">Type</th>
                <th style="padding:7px 8px;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">You Give</th>
                <th style="padding:7px 8px;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">You Get</th>
                <th style="padding:7px 10px;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">Trade With</th>
                <th style="padding:7px 10px;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left">Balance</th>
                <th style="padding:7px 8px"></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`}`;
}

function applyProposalFromFinder(idx) {
  const prop = S.finderProposals && S.finderProposals[idx];
  if (!prop) return;
  switchSubTab('trade', 'calculator');
  setTimeout(() => {
    const selA = document.getElementById('tradeTeamA');
    const selB = document.getElementById('tradeTeamB');
    if (selA) { selA.value = prop.ridA; onTradeTeam('A'); }
    if (selB) { selB.value = prop.ridB; onTradeTeam('B'); }
    setTimeout(() => {
      S.tradeA.players = prop.sideA.filter(x => !x.isPick).map(x => x.pid);
      S.tradeA.picks   = prop.sideA.filter(x =>  x.isPick).map(x => x.key);
      S.tradeB.players = prop.sideB.filter(x => !x.isPick).map(x => x.pid);
      S.tradeB.picks   = prop.sideB.filter(x =>  x.isPick).map(x => x.key);
      drawRoster('A', S.tradeA.rosterId);
      drawRoster('B', S.tradeB.rosterId);
      updateProposal();
      document.getElementById('trade-v2-footer')?.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 100);
  }, 50);
}

function applyProposal(idx) {
  const prop = S.generatedProposals && S.generatedProposals[idx];
  if (!prop) return;

  // Visual: mark active card, clear others
  document.querySelectorAll('.proposal-card').forEach((el, i) => {
    el.classList.toggle('proposal-active', i === idx);
  });
  document.querySelectorAll('[id^="proposal-check-"]').forEach((el, i) => {
    el.style.display = i === idx ? 'inline-block' : 'none';
  });

  // Apply selections
  S.tradeA.players = prop.sideA.filter(x => !x.isPick).map(x => x.pid);
  S.tradeA.picks   = prop.sideA.filter(x =>  x.isPick).map(x => x.key);
  S.tradeB.players = prop.sideB.filter(x => !x.isPick).map(x => x.pid);
  S.tradeB.picks   = prop.sideB.filter(x =>  x.isPick).map(x => x.key);

  // Redraw both roster panels to show selected checkboxes
  drawRoster('A', S.tradeA.rosterId);
  drawRoster('B', S.tradeB.rosterId);

  // Activate the value comparison footer
  updateProposal();

  // Pulse the footer and scroll it into view
  const footer = document.getElementById('trade-v2-footer');
  if (footer) {
    footer.classList.remove('comparison-active');
    void footer.offsetWidth; // force reflow to restart animation
    footer.classList.add('comparison-active');
    footer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}


function tradeContextNote(tA, tB, league) {
  const profA = mveTeamProfile(tA.rosterId, league);
  const profB = mveTeamProfile(tB.rosterId, league);
  if (!profA || !profB) return [];
  const clsA = profA.classification.label;
  const clsB = profB.classification.label;
  const notes = [];

  const youngStarsLeavingA = tA.players
    .map(pid => mvePlayer(pid, league))
    .filter(p => p && p.tier <= 2 && parseInt(p.age) <= 26);
  if (['Contender','Fringe'].includes(clsA) && youngStarsLeavingA.length > 0)
    notes.push(`\u26a0 ${profA.teamName} is trading away a young cornerstone \u2014 contenders rarely recover from this`);

  const picksLeavingA = tA.picks.length;
  if (clsA.includes('Rebuild') && picksLeavingA >= 2)
    notes.push(`\u26a0 ${profA.teamName} is trading multiple picks while rebuilding \u2014 rebuild capital depleted`);

  const youngStarsLeavingB = tB.players
    .map(pid => mvePlayer(pid, league))
    .filter(p => p && p.tier <= 2 && parseInt(p.age) <= 26);
  if (['Contender','Fringe'].includes(clsB) && youngStarsLeavingB.length > 0)
    notes.push(`\u26a0 ${profB.teamName} is trading away a young cornerstone \u2014 contenders rarely recover from this`);

  const picksLeavingB = tB.picks.length;
  if (clsB.includes('Rebuild') && picksLeavingB >= 2)
    notes.push(`\u26a0 ${profB.teamName} is trading multiple picks while rebuilding \u2014 rebuild capital depleted`);

  if (['Contender','Fringe'].includes(clsB)) {
    const incomingB = tA.players.map(pid => mvePlayer(pid, league)).filter(Boolean);
    const allBench = incomingB.every(p => p.tier >= 4);
    if (allBench && incomingB.length > 0)
      notes.push(`Note: ${profB.teamName} (${clsB}) gains bench depth \u2014 may not move the needle this season`);
  }
  if (['Contender','Fringe'].includes(clsA)) {
    const incomingA = tB.players.map(pid => mvePlayer(pid, league)).filter(Boolean);
    const allBench = incomingA.every(p => p.tier >= 4);
    if (allBench && incomingA.length > 0)
      notes.push(`Note: ${profA.teamName} (${clsA}) gains bench depth \u2014 may not move the needle this season`);
  }

  return notes;
}

function updateProposal() {
  const league = ld();
  const rA = league.rosterMap[S.tradeA.rosterId], rB = league.rosterMap[S.tradeB.rosterId];

  // Update team name labels
  const nameAEl = document.getElementById('v2-name-a');
  const nameBEl = document.getElementById('v2-name-b');
  if (nameAEl) nameAEl.textContent = rA ? rA.teamName : 'Team A';
  if (nameBEl) nameBEl.textContent = rB ? rB.teamName : 'Team B';
  const selLblA = document.getElementById('v2-sel-label-a');
  const selLblB = document.getElementById('v2-sel-label-b');
  if (selLblA) selLblA.textContent = (rA ? rA.teamName : 'Team A') + ' gives';
  if (selLblB) selLblB.textContent = (rB ? rB.teamName : 'Team B') + ' gives';

  const playerValA = S.tradeA.players.reduce((s,p)=>{ const fc=S.fcBySleeperId[String(p)]; return s+(fc?fc.value:0); }, 0);
  const playerValB = S.tradeB.players.reduce((s,p)=>{ const fc=S.fcBySleeperId[String(p)]; return s+(fc?fc.value:0); }, 0);
  const pickValA = S.tradeA.picks.reduce((s,k)=>s+getPickValueByKey(k), 0);
  const pickValB = S.tradeB.picks.reduce((s,k)=>s+getPickValueByKey(k), 0);

  // Archetype-weighted KTC blend for headline verdict
  // final = FC + clamp((KTC − FC) × archetypeWeight, −cap·FC, +cap·FC)
  const _TKW = { rookie:.22, yr12_WRQB:.22, yr12_RB:.15, prime_WR:.15, prime_QB:.12, prime_RB:.10, prime_TE:.15, vet_WR:.10, vet_RB:.07, vet_TE:.10, default:.15 };
  const _TCAP = 0.15;
  function _bpv(pid) {
    const fc = S.fcBySleeperId[String(pid)];
    if (!fc || !fc.value) return 0;
    const base = fc.value;
    if (!S.ktcAvailable) return base;
    const kv = S.ktcBySleeperId[String(pid)] || 0;
    if (!kv) return base;
    const w = _TKW[mveArchetype(fc)] || _TKW.default;
    const d = (kv - base) * w;
    return Math.round(base + Math.max(-base * _TCAP, Math.min(base * _TCAP, d)));
  }
  const blendedA = S.tradeA.players.reduce((s,p) => s + _bpv(p), 0);
  const blendedB = S.tradeB.players.reduce((s,p) => s + _bpv(p), 0);
  // vA = what Team A gives away; vB = what Team B gives away
  const vA = blendedA + pickValA, vB = blendedB + pickValB;
  const hasAny = S.tradeA.players.length || S.tradeA.picks.length || S.tradeB.players.length || S.tradeB.picks.length;

  // ── Bar + pct display ────────────────────────────────────────
  const pctAEl   = document.getElementById('v2-pct-a');
  const pctBEl   = document.getElementById('v2-pct-b');
  const arrowsEl = document.getElementById('v2-arrows');
  const favLblEl = document.getElementById('v2-favors-lbl');
  const barAEl   = document.getElementById('v2-bar-a');
  const barBEl   = document.getElementById('v2-bar-b');

  if (!hasAny) {
    if (pctAEl) { pctAEl.textContent='—'; pctAEl.style.color='var(--muted)'; }
    if (pctBEl) { pctBEl.textContent='—'; pctBEl.style.color='var(--muted)'; }
    if (arrowsEl) arrowsEl.textContent='•';
    if (favLblEl) favLblEl.textContent='Select players to compare';
    if (barAEl) barAEl.style.width='50%';
    if (barBEl) barBEl.style.width='50%';
    const selRow = document.getElementById('v2-sel-row');
    if (selRow) selRow.style.display='none';
    const detEl = document.getElementById('v2-detail');
    if (detEl) detEl.style.display='none';
    const ttEl = document.getElementById('v2-trash-talk');
    if (ttEl) ttEl.style.display='none';
    return;
  }

  const total = vA + vB || 1;
  const diff  = Math.abs(vA - vB), avg = total / 2 || 1, pct = diff / avg;

  // Team A receives vB, Team B receives vA
  // % swing: positive for the team getting more than they give
  const pctA = vB > 0 ? ((vB - vA) / ((vA + vB) / 2)) * 100 : 0;
  const pctB = -pctA;

  if (pctAEl) {
    pctAEl.textContent = pct < .04 ? '≈ Even' : (pctA >= 0 ? '+' : '') + pctA.toFixed(1) + '%';
    pctAEl.style.color = pct < .04 ? 'var(--muted)' : pctA > 0 ? 'var(--green)' : 'var(--red)';
  }
  if (pctBEl) {
    pctBEl.textContent = pct < .04 ? '≈ Even' : (pctB >= 0 ? '+' : '') + pctB.toFixed(1) + '%';
    pctBEl.style.color = pct < .04 ? 'var(--muted)' : pctB > 0 ? 'var(--green)' : 'var(--red)';
  }

  // Arrows point toward winner; "Trade Favors" label
  const trashEl = document.getElementById('v2-trash-talk');
  // Loser class label for smart trash talk context
  const _loserClsA = S.fcValues.length ? (mveTeamProfile(S.tradeA.rosterId, league)?.classification?.label || '') : '';
  const _loserClsB = S.fcValues.length ? (mveTeamProfile(S.tradeB.rosterId, league)?.classification?.label || '') : '';
  if (pct < .06) {
    if (arrowsEl) arrowsEl.textContent = '•';
    if (favLblEl) favLblEl.textContent = 'Fair Trade';
    if (trashEl) { const tt = tradeTrashTalk(pct, '', '', ''); trashEl.textContent = tt.text; trashEl.style.color = tt.color; trashEl.style.display = 'block'; }
  } else if (vB > vA) {
    if (arrowsEl) arrowsEl.innerHTML = '<span style="color:var(--green)">⟨⟨⟨</span>';
    if (favLblEl) favLblEl.textContent = 'Trade Favors';
    if (trashEl) { const tt = tradeTrashTalk(pct, rB ? rB.teamName : 'B', rA ? rA.teamName : 'A', _loserClsA); trashEl.textContent = tt.text; trashEl.style.color = tt.color; trashEl.style.display = 'block'; }
  } else {
    if (arrowsEl) arrowsEl.innerHTML = '<span style="color:var(--green)">⟩⟩⟩</span>';
    if (favLblEl) favLblEl.textContent = 'Trade Favors';
    if (trashEl) { const tt = tradeTrashTalk(pct, rA ? rA.teamName : 'A', rB ? rB.teamName : 'B', _loserClsB); trashEl.textContent = tt.text; trashEl.style.color = tt.color; trashEl.style.display = 'block'; }
  }

  // Bar: left (green) = what Team A receives / total; right (red) = what Team B receives / total
  const barAW = Math.round(vB / total * 100);
  if (barAEl) barAEl.style.width = barAW + '%';
  if (barBEl) barBEl.style.width = (100 - barAW) + '%';

  // Fair/lopsided bar state classes
  const barWrapEl = barAEl ? barAEl.closest('.trade-v2-footer') : null;
  if (barWrapEl) {
    barWrapEl.classList.remove('trade-bar-fair','trade-bar-lopsided-a','trade-bar-lopsided-b');
    if (Math.abs(barAW - 50) <= 5)  barWrapEl.classList.add('trade-bar-fair');
    else if (barAW >= 65)            barWrapEl.classList.add('trade-bar-lopsided-a');
    else if (barAW <= 35)            barWrapEl.classList.add('trade-bar-lopsided-b');
  }

  // ── Market Sentiment (KTC) ────────────────────────────────────
  let ktcNote = '';
  if (S.ktcAvailable && S.tradeA.players.length && S.tradeB.players.length) {
    const ktcA = S.tradeA.players.reduce((s,p) => s + (S.ktcBySleeperId[String(p)] || 0), 0);
    const ktcB = S.tradeB.players.reduce((s,p) => s + (S.ktcBySleeperId[String(p)] || 0), 0);
    const ktcDiff = ktcA - ktcB;
    const ktcFavors = Math.abs(ktcDiff) < 300 ? 'Even'
      : ktcDiff > 0 ? (rA ? rA.teamName : 'Team A') : (rB ? rB.teamName : 'Team B');
    const ktcLabel = Math.abs(ktcDiff) < 300 ? 'Market: Even' : `Market: Favors ${ktcFavors}`;
    ktcNote = `<div style="font-size:.72rem;color:var(--muted)">${ktcLabel}</div>`;
  }

  // ── Pick source note ──────────────────────────────────────────
  const pickCount = S.tradeA.picks.length + S.tradeB.picks.length;
  const hasBucketedPicks = [...S.tradeA.picks, ...S.tradeB.picks].some(k => {
    const bkt = getPickBucketForKey(k); return bkt && bkt.source === 'projected' && bkt.bucket !== 'Mid';
  });
  const _curYr = fantasyYear();
  const hasBoardPicks = pickCount > 0 && getRookieBoardSlots().length >= 6 &&
    [...S.tradeA.picks, ...S.tradeB.picks].some(k => parseInt(k.split('_')[0]) === _curYr && parseInt(k.split('_')[1]) === 1);
  const pickSrcNote = pickCount > 0
    ? `<div class="picks-source-note">Pick values: ${hasBoardPicks
        ? 'Rookie Board · tier-weighted + optionality'
        : Object.keys(S.fcPickValues).length > 0
          ? hasBucketedPicks ? 'FC RDP · 1st-round buckets from team strength' : 'FC RDP (mid estimate)'
          : 'tier defaults'}</div>` : '';

  // ── Lens divergence (Win-now / Dynasty) ──────────────────────
  let lensHtml = '';
  if (S.fcValues.length > 0 && (S.tradeA.players.length || S.tradeB.players.length)) {
    function mveSide(pids) {
      return pids.reduce((acc, pid) => {
        const mv = mvePlayer(pid, league);
        return {
          contender: acc.contender + (mv ? mv.contenderValue : (S.fcBySleeperId[String(pid)]?.value||0)),
          rebuilder: acc.rebuilder + (mv ? mv.rebuilderValue : (S.fcBySleeperId[String(pid)]?.value||0)),
        };
      }, { contender:0, rebuilder:0 });
    }
    const mA = mveSide(S.tradeA.players);
    const mB = mveSide(S.tradeB.players);
    mA.contender += pickValA; mA.rebuilder += pickValA;
    mB.contender += pickValB; mB.rebuilder += pickValB;

    const mainAWins = vA > vB;
    const lensItems = [];
    const cA = mB.contender, cB = mA.contender;
    if ((cA > cB) !== mainAWins && Math.abs(cA - cB) > 300) {
      lensItems.push(`Win-now: <strong>${cA > cB ? (rA?.teamName||'Team A') : (rB?.teamName||'Team B')}</strong>`);
    }
    const rA2 = mB.rebuilder, rB2 = mA.rebuilder;
    if ((rA2 > rB2) !== mainAWins && Math.abs(rA2 - rB2) > 300) {
      lensItems.push(`Dynasty: <strong>${rA2 > rB2 ? (rA?.teamName||'Team A') : (rB?.teamName||'Team B')}</strong>`);
    }
    if (lensItems.length)
      lensHtml = `<div style="font-size:.72rem;color:var(--muted);margin-bottom:4px">${lensItems.join(' &nbsp;·&nbsp; ')}</div>`;
  }

  // ── Inject into detail panel ───────────────────────────────────
  const detEl = document.getElementById('v2-detail');
  if (detEl) {
    const hasContent = lensHtml || ktcNote;
    detEl.style.display = hasContent ? 'block' : 'none';
    detEl.innerHTML = hasContent ? lensHtml + ktcNote : '';
  }
}

// ── TRADE SCOUTING REPORT ─────────────────────────────────────
function renderScoutingReport(ridA, ridB) {
  const el = document.getElementById('trade-scouting');
  if (!el) return;
  const league = ld();
  if (!ridA || !ridB || !S.fcValues.length) { el.innerHTML = ''; return; }
  const rA = league.rosterMap[ridA], rB = league.rosterMap[ridB];
  if (!rA || !rB) { el.innerHTML = ''; return; }

  const sigCls = { Cornerstone:'signal-cornerstone', Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };

  // Build MVE profiles for window/needs context
  const profA = mveTeamProfile(ridA, league);
  const profB = mveTeamProfile(ridB, league);
  const clsB  = profB?.classification?.label || 'Mid-Tier';
  const isRebuildB   = clsB.includes('Rebuild') || clsB === 'Retool';
  const isContenderB = clsB === 'Contender' || clsB === 'Fringe';

  // Team A positional need (0=solid,1=moderate,2=weak,3=critical)
  function posNeedA(pos) {
    const arr = profA?.byPos?.[pos] || [];
    if (!arr.length) return 3;
    if (arr[0].tier >= 4) return 2;
    if (!arr.some(p => p.tier <= 2)) return 1;
    return 0;
  }

  // League-wide positional demand: how many teams are weak at each position
  const leaguePosNeed = { QB: 0, RB: 0, WR: 0, TE: 0 };
  Object.values(league.rosterMap).forEach(roster => {
    const prof = mveTeamProfile(roster.rosterId, league);
    if (!prof) return;
    ['QB', 'RB', 'WR', 'TE'].forEach(pos => {
      const arr = prof.byPos?.[pos] || [];
      if (!arr.length || arr[0].tier >= 3) leaguePosNeed[pos]++;
    });
  });
  const numTeams = Object.keys(league.rosterMap).length || 1;

  // Score how realistically tradeable a Team B player is.
  // Weighs: Sell Window, Age Curve, Strategic Fit, Positional Context,
  //         Production Alignment (Team A needs), League Demand, Situation Score.
  function tradabilityScore(pid) {
    const mv = mvePlayer(pid, league);
    const fc = S.fcBySleeperId[String(pid)];
    if (!mv || !fc || mv.neutral <= 0) return null;
    const age = parseInt(fc.player.age) || 25;
    const pos = fc.player.position;
    if (!['QB','RB','WR','TE'].includes(pos)) return null;

    // Cornerstones are untouchable — never show as trade targets
    if (mv.actionTag === 'Cornerstone') return null;

    let score = 0;
    const reasons = [];

    // Sell Window
    if (mv.actionTag === 'Sell')      { score += 45; reasons.push('Sell window'); }
    else if (mv.actionTag === 'Shop') { score += 28; reasons.push('Being shopped'); }

    // Strategic Fit vs Team B's dynasty window
    const bPosArr   = profB?.byPos?.[pos] || [];
    const posCountB = bPosArr.length;
    const isOnlyStarter = posCountB === 1 && bPosArr[0] && bPosArr[0].neutral === mv.neutral;

    if (isRebuildB) {
      if (age >= 28 && mv.tier <= 3) { score += 25; reasons.push('Vet on rebuild'); }
      if (age >= 26 && mv.actionTag === 'Hold' && mv.tier >= 3) score += 10;
      if (mv.tier <= 2 && age <= 25) score -= 35; // young cornerstone, untouchable
    }
    if (isContenderB) {
      if (mv.tier >= 4)                  { score += 14; reasons.push('Roster depth'); }
      if (pos === 'RB' && age >= 29)     { score += 20; reasons.push('Aging RB'); }
      if (age >= 31 && mv.tier >= 3)     { score += 12; reasons.push('Closing window'); }
      if (mv.tier <= 2 && age < 29) score -= 40; // elite young core, not moving
    }

    // Positional Context: surplus depth
    if (isOnlyStarter) score -= 20;
    if (posCountB >= 3)                        { score += 20; reasons.push(`${pos} surplus`); }
    else if (posCountB >= 2 && mv.tier >= 3)   score += 8;

    // Age Curve: actively declining
    if (pos === 'RB' && age >= 29 && mv.actionTag !== 'Cornerstone') score += 8;

    // Situation Score: elevated risk = more likely available
    if (mv.riskScore >= 65) { score += 10; reasons.push('High risk'); }

    // Production Alignment: Team A urgently needs this position
    score += posNeedA(pos) * 8;

    // League-wide demand: scarce position across the league = more buyers = more tradeable
    const leagueDemand = leaguePosNeed[pos] || 0;
    const demandPct    = leagueDemand / numTeams;
    if (demandPct >= 0.5)       { score += 14; reasons.push('High league demand'); }
    else if (demandPct >= 0.33) { score +=  7; reasons.push('League demand');      }

    if (score < 14) return null;
    return { pid, mv, fc, score, reasons: reasons.slice(0, 2) };
  }

  // Team A sell candidates
  const sellA = (rA.players || [])
    .map(pid => { const mv = mvePlayer(pid, league); const fc = S.fcBySleeperId[String(pid)]; return (mv && fc) ? { pid, mv, fc } : null; })
    .filter(p => p && (p.mv.actionTag === 'Sell' || p.mv.actionTag === 'Shop'))
    .sort((a, b) => b.mv.neutral - a.mv.neutral)
    .slice(0, 5);

  // Context-aware targets from Team B
  const targets = (rB.players || [])
    .map(pid => tradabilityScore(pid))
    .filter(Boolean)
    .sort((a, b) => b.score - a.score || b.mv.neutral - a.mv.neutral)
    .slice(0, 5);

  function playerRow(pid, mv, fc, reasons) {
    const name = fc ? fc.player.name : 'Unknown';
    const pos  = fc ? fc.player.position : '?';
    const age  = fc && fc.player.age ? fc.player.age : '?';
    const chips = reasons && reasons.length
      ? `<div style="display:flex;gap:3px;margin-top:3px">${reasons.map(r => `<span style="font-size:.58rem;background:rgba(88,166,255,.07);color:var(--muted);border-radius:3px;padding:1px 5px">${r}</span>`).join('')}</div>`
      : '';
    const nflTeamGP = (S.playersMeta[String(pid)]?.team || (fc?.player?.team) || '').replace(/^FA$/i, '');
    return `<div style="padding:6px 10px;border-radius:6px;background:var(--surface2);margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:8px">
        ${hsImg(pid, 28, pos)}
        <span class="pos-badge pos-${pos}">${pos}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:.82rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
          ${nflTeamGP ? `<div style="font-size:.6rem;color:var(--muted)">${nflTeamGP}</div>` : ''}
        </div>
        <span style="font-size:.68rem;color:var(--muted);white-space:nowrap">age ${age}</span>
        <span style="font-size:.72rem;color:var(--accent);min-width:42px;text-align:right;white-space:nowrap">${mv.neutral.toLocaleString()}</span>
      </div>${chips}
    </div>`;
  }

  const sellHtml = sellA.length
    ? sellA.map(p => playerRow(p.pid, p.mv, p.fc, [])).join('')
    : `<div style="color:var(--muted);font-size:.8rem;padding:6px 0">No obvious sell candidates</div>`;

  const noTargetMsg = isContenderB
    ? `${rB.teamName} is in win-now mode — core pieces unlikely available`
    : isRebuildB ? `${rB.teamName} may be protective of young cornerstones`
    : 'No obvious trade candidates identified';
  const targHtml = targets.length
    ? targets.map(p => playerRow(p.pid, p.mv, p.fc, p.reasons)).join('')
    : `<div style="color:var(--muted);font-size:.8rem;padding:6px 0">${noTargetMsg}</div>`;

  const clsBadge = profB?.classification
    ? `<span style="font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:700;background:${profB.classification.bg};color:${profB.classification.color}">${clsB}</span>`
    : '';

  el.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none" onclick="toggleScouting()">
        <div style="font-size:.8rem;font-weight:700;color:var(--text)">Scouting Report</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:.7rem;color:var(--muted)">Sell candidates &amp; realistic trade targets</span>
          <span id="scouting-chevron" style="color:var(--muted);font-size:.75rem;transition:transform .15s">&#9660;</span>
        </div>
      </div>
      <div id="scouting-body" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px">
        <div>
          <div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">${rA.teamName} — Sell Candidates</div>
          ${sellHtml}
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <span style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">${rB.teamName} — Realistic Targets</span>
            ${clsBadge}
          </div>
          ${targHtml}
        </div>
      </div>
    </div>`;
}

function toggleScouting() {
  const body = document.getElementById('scouting-body');
  const chev = document.getElementById('scouting-chevron');
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'grid';
  if (chev) chev.style.transform = open ? 'rotate(-90deg)' : 'rotate(0deg)';
}

// ── LEAGUE-WIDE SCOUTING TAB ──────────────────────────────────
function renderLeagueScouting() {
  const el = document.getElementById('trade-scouting-league');
  if (!el) return;
  const league = ld();
  if (!league || !S.fcValues.length) {
    el.innerHTML = `<div class="warn-banner" style="margin-top:20px">Load a league with FantasyCalc values to see scouting data.</div>`;
    return;
  }

  const teams = Object.values(league.rosterMap).sort((a,b) => a.teamName.localeCompare(b.teamName));
  const profiles = mveClassifyTeams(teams.map(t => mveTeamProfile(t.rosterId, league)).filter(Boolean));

  const sigCls = { Cornerstone:'signal-cornerstone', Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };

  // League-wide Top Sells (Sell or Shop tagged, tier ≤ 4, sorted by value)
  const sells = [];
  profiles.forEach(prof => {
    prof.sellHighList.forEach(p => {
      if (p.tier <= 4) sells.push({ p, owner: prof.teamName });
    });
  });
  sells.sort((a,b) => b.p.neutral - a.p.neutral);

  // League-wide Top Buys (Speculative tagged, tier ≤ 3)
  const buys = [];
  profiles.forEach(prof => {
    prof.speculativeList.forEach(p => {
      if (p.tier <= 3) buys.push({ p, owner: prof.teamName });
    });
  });
  buys.sort((a,b) => b.p.neutral - a.p.neutral);

  function playerRow(item, showSignal) {
    const { p, owner } = item;
    const nflTeam = (S.playersMeta[String(p.pid)]?.team || p.team || '').replace(/^FA$/i, '');
    return `<div class="scout-player-row">
      ${hsImg(p.pid, 26, p.pos)}
      <span class="pos-badge pos-${p.pos}" style="font-size:.55rem">${p.pos}</span>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div class="scout-player-name">${p.name}</div>
        ${nflTeam ? `<div style="font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nflTeam} · ${owner}</div>` : `<div style="font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${owner}</div>`}
      </div>
      ${showSignal ? `<span class="signal-badge ${sigCls[p.actionTag]||'signal-hold'}" style="font-size:.58rem;padding:2px 5px">${p.actionTag}</span>` : ''}
      <span class="scout-player-val">${p.neutral.toLocaleString()}</span>
    </div>`;
  }

  const sellsHtml = sells.slice(0, 12).map(i => playerRow(i, true)).join('') ||
    `<div style="padding:12px;color:var(--muted);font-size:.8rem">No sell candidates found</div>`;
  const buysHtml = buys.slice(0, 12).map(i => playerRow(i, true)).join('') ||
    `<div style="padding:12px;color:var(--muted);font-size:.8rem">No buy candidates found</div>`;

  // Team needs grid — per team, which positions need attention
  function teamNeedBadges(prof) {
    const badges = [];
    ['QB','RB','WR','TE'].forEach(pos => {
      const arr = prof.byPos[pos] || [];
      if (!arr.length || arr[0].tier >= 5) { badges.push({ pos, level: 'critical' }); return; }
      if (arr[0].tier >= 4)               { badges.push({ pos, level: 'weak' });     return; }
      if (arr[0].tier >= 3)               { badges.push({ pos, level: 'mod' });      return; }
    });
    return badges;
  }

  // Buy-Low Targets: players with bullish KTC vs FC divergence (sentAdj > 0)
  // or Speculative-tagged players with real value — on other rosters
  const buyLowCandidates = [];
  profiles.forEach(prof => {
    prof.all.forEach(p => {
      if (p.actionTag === 'Cornerstone' || p.actionTag === 'Sell') return;
      const sentPct = p.fcValue > 0 ? (p.sentAdj || 0) / p.fcValue : 0;
      const isKtcBull = sentPct > 0.08;
      const isSpecVal = p.actionTag === 'Speculative' && p.neutral >= 1500;
      if (isKtcBull || isSpecVal) {
        buyLowCandidates.push({ p, owner: prof.teamName, sentPct });
      }
    });
  });
  buyLowCandidates.sort((a, b) => b.sentPct - a.sentPct || b.p.neutral - a.p.neutral);

  const buyLowRows = buyLowCandidates.slice(0, 10).map(({ p, owner, sentPct }) => {
    const ktcBadge = sentPct > 0.08
      ? `<span style="font-size:.55rem;background:rgba(163,113,247,.15);color:#a371f7;border:1px solid rgba(163,113,247,.3);border-radius:3px;padding:1px 4px">↑ KTC +${(sentPct*100).toFixed(0)}%</span>`
      : `<span style="font-size:.55rem;background:rgba(88,166,255,.1);color:var(--accent);border:1px solid rgba(88,166,255,.2);border-radius:3px;padding:1px 4px">Speculative</span>`;
    const nflTeamBL = (S.playersMeta[String(p.pid)]?.team || p.team || '').replace(/^FA$/i, '');
    return `<div class="scout-player-row">
      ${hsImg(p.pid, 26, p.pos)}
      <span class="pos-badge pos-${p.pos}" style="font-size:.55rem">${p.pos}</span>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div class="scout-player-name">${p.name}</div>
        ${nflTeamBL ? `<div style="font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nflTeamBL} · ${owner}</div>` : `<div style="font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${owner}</div>`}
      </div>
      ${ktcBadge}
      <span class="scout-player-val">${p.neutral.toLocaleString()}</span>
    </div>`;
  }).join('');

  const buyLowHtml = buyLowCandidates.length ? `
    <div class="section-title" style="margin-top:20px;margin-bottom:10px">Buy-Low Targets ${tip('Players where KTC market sentiment is bullish (>8% above FC value) or high-value Speculative-tagged players. These are potentially undervalued on the trade market right now.')}</div>
    <div class="scout-box" style="margin-bottom:20px">${buyLowRows}</div>` : '';

  const needsHtml = profiles.map(prof => {
    const badges = teamNeedBadges(prof);
    const cls = prof.classification;
    const clsBadge = cls ? `<span style="font-size:.55rem;padding:1px 5px;border-radius:3px;font-weight:700;background:${cls.bg};color:${cls.color}">${cls.label}</span>` : '';
    const needBadges = badges.length
      ? badges.map(b => `<span class="scout-need scout-need-${b.level}">${b.pos}</span>`).join('')
      : `<span style="font-size:.65rem;color:var(--green)">Solid</span>`;
    return `<div class="scout-team-card">
      <div class="scout-team-name-row">
        <span class="scout-team-name">${prof.teamName}</span>
        ${clsBadge}
      </div>
      <div class="scout-needs-row">${needBadges}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="section">
      <div class="section-title">League Scouting — Sell &amp; Buy
        <button class="capture-btn" onclick="captureSection(this)" data-label="scouting-sell-buy">📸 Share</button>
      </div>
      <div class="scout-top-grid">
        <div class="scout-box">
          <div class="scout-box-hdr">Top Sell Opportunities</div>
          ${sellsHtml}
        </div>
        <div class="scout-box">
          <div class="scout-box-hdr">Top Buy Opportunities</div>
          ${buysHtml}
        </div>
      </div>
    </div>
    ${buyLowCandidates.length ? `
    <div class="section" style="margin-top:20px">
      <div class="section-title">Buy-Low Targets ${tip('Players where KTC market sentiment is bullish (>8% above FC value) or high-value Speculative-tagged players. These are potentially undervalued on the trade market right now.')}
        <button class="capture-btn" onclick="captureSection(this)" data-label="scouting-buy-low">📸 Share</button>
      </div>
      <div class="scout-box">${buyLowRows}</div>
    </div>` : ''}
    <div class="section" style="margin-top:20px">
      <div class="section-title">Team Needs
        <button class="capture-btn" onclick="captureSection(this)" data-label="scouting-team-needs">📸 Share</button>
      </div>
      <div class="scout-needs-grid">${needsHtml}</div>
    </div>`;
}

// ── RENDER: ROOKIE BOARD ─────────────────────────────────────
function renderRookieBoard() {
  const el = document.getElementById('trade-rookie-board');
  if (!el) return;
  if (!S.fcValues.length) {
    el.innerHTML = `<div class="warn-banner" style="margin-top:20px">Load a league with FantasyCalc values to see the Rookie Board.</div>`;
    return;
  }

  const league = ld();
  const curYear = fantasyYear();

  // Rookies = years_exp === 0 (Sleeper back-fills this after loadSleeperPlayers), skill positions, positive value
  const rookies = S.fcValues
    .filter(fc => fc.player && ['QB','RB','WR','TE'].includes(fc.player.position)
      && fc.player.years_exp === 0 && (fc.value || 0) > 0)
    .sort((a, b) => (b.value || 0) - (a.value || 0));

  // 1.01 value: top rookie's FC value vs FC RDP Early 1st
  const rdpYear = String(curYear);
  const rdpEarly = S.fcPickValues[rdpYear] && S.fcPickValues[rdpYear][1]
    ? S.fcPickValues[rdpYear][1].early || S.fcPickValues[rdpYear][1].avg || 0
    : 0;
  const top1Val = rookies.length ? rookies[0].value : 0;
  const valNote = top1Val > 0 && rdpEarly > 0
    ? (top1Val > rdpEarly
        ? `<span style="color:var(--green)">1.01 (${rookies[0].player.name}) trades <strong>above</strong> Early 1st market (${top1Val.toLocaleString()} vs ${rdpEarly.toLocaleString()} RDP)</span>`
        : `<span style="color:var(--muted)">1.01 (${rookies[0].player.name}) at ${top1Val.toLocaleString()} — within Early 1st RDP range (${rdpEarly.toLocaleString()})</span>`)
    : '';

  // Team needs by position for each roster
  const teamNeeds = {};
  if (league) {
    Object.values(league.rosterMap).forEach(roster => {
      const prof = mveTeamProfile(roster.rosterId, league);
      if (!prof) return;
      const needs = [];
      ['RB','WR','QB','TE'].forEach(pos => {
        const arr = prof.byPos[pos] || [];
        if (!arr.length || arr[0].tier >= 4) needs.push(pos);
        else if (arr[0].tier >= 3) needs.push(pos);
      });
      teamNeeds[roster.rosterId] = { name: roster.teamName, needs };
    });
  }

  // Which positions have the most need across the league
  const posNeedCount = { QB:0, RB:0, WR:0, TE:0 };
  Object.values(teamNeeds).forEach(t => t.needs.forEach(p => { if (posNeedCount[p] !== undefined) posNeedCount[p]++; }));

  const posColors = { QB:'#a371f7', RB:'#3fb950', WR:'#58a6ff', TE:'#fb8500' };
  const sigCls = { Cornerstone:'signal-cornerstone', Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };

  // ── Cliff edge detection ──────────────────────────────────────
  // Find rows where the value drop to the next player is an outlier.
  const top32 = rookies.slice(0, 32);
  const vals  = top32.map(fc => fc.value || 0);
  const gaps  = vals.slice(1).map((v, i) => vals[i] - v);
  const sortedGaps = [...gaps].sort((a, b) => a - b);
  const medGap = sortedGaps[Math.floor(sortedGaps.length / 2)] || 1;
  // A cliff is a gap ≥ 2.5× the median and at least 300 pts
  const cliffAfter = new Set(gaps.map((g, i) => g >= Math.max(medGap * 2.5, 300) ? i : -1).filter(i => i >= 0));

  // ── Exact-slot lookup from current-year completed fantasy draft ─
  const knownSlots = {}; // sleeperId → { label: '1.04', pickNo: 4, exact: true }
  for (const dhData of Object.values(S.draftHistory)) {
    if (String(dhData.season) !== String(curYear)) continue;
    const numManagers = Object.keys(dhData.rosterMap).length || 12;
    dhData.picks.forEach(p => {
      if (!p.player_id) return;
      const r    = Math.ceil(p.pick_no / numManagers);
      const slot = ((p.pick_no - 1) % numManagers) + 1;
      knownSlots[String(p.player_id)] = {
        label:  `${r}.${String(slot).padStart(2, '0')}`,
        pickNo: p.pick_no,
        exact:  true,
      };
    });
  }

  const rows = top32.map((fc, i) => {
    const pid = fc.player.sleeperId;
    const known = knownSlots[String(pid)];
    const estSlot = i < 12 ? `1.${String(i+1).padStart(2,'0')}` : i < 24 ? `2.${String(i-11).padStart(2,'0')}` : `3.${String(i-23).padStart(2,'0')}`;
    const slot       = known ? known.label : estSlot;
    const isExact    = !!known;
    const isFirstRound = i < 12;
    const slotColor = i === 0 ? '#f59e0b' : i < 4 ? '#d29922' : i < 12 ? '#8b949e' : 'var(--muted)';
    const mv = league ? mvePlayer(pid, league) : null;
    const ktcVal = S.ktcBySleeperId[String(pid)] || null;
    const tag = mv ? mv.actionTag : 'Speculative';
    const age = fc.player.age ? `${fc.player.age}` : '—';
    // Demand badge
    const demandCount = posNeedCount[fc.player.position] || 0;
    const demandBadge = demandCount >= 6
      ? `<span style="font-size:.55rem;background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3);border-radius:3px;padding:1px 4px">High Demand</span>`
      : demandCount >= 3
      ? `<span style="font-size:.55rem;background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);border-radius:3px;padding:1px 4px">In Demand</span>`
      : '';
    const slotLabel = isExact
      ? `<span title="Exact slot from completed fantasy draft">${slot} <span style="font-size:.55rem;color:var(--green);opacity:.8">✓</span></span>`
      : `<span title="Estimated from value rank" style="opacity:.85">${slot}</span>`;
    const rowHtml = `<tr style="${!isFirstRound ? 'opacity:.8' : ''}${cliffAfter.has(i) ? ';border-bottom:2px solid rgba(248,81,73,.35)' : ''}">
      <td style="font-size:.7rem;font-weight:700;color:${slotColor};white-space:nowrap;padding:6px 10px">${slotLabel}</td>
      <td style="padding:6px 4px">${hsImg(pid, 28, fc.player.position)}</td>
      <td style="padding:6px 8px">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span class="pos-badge pos-${fc.player.position}">${fc.player.position}</span>
          <span style="font-size:.82rem;color:var(--text);font-weight:500">${fc.player.name}</span>
          ${demandBadge}
        </div>
        <div style="font-size:.65rem;color:var(--muted);margin-top:2px">${(S.playersMeta[String(pid)]?.team || fc.player.team || '').replace(/^FA$/i,'') || 'Unsigned'} · Age ${age}</div>
      </td>
      <td style="font-size:.75rem;color:var(--accent);text-align:right;padding:6px 8px;white-space:nowrap">${fc.value.toLocaleString()}</td>
      <td style="font-size:.72rem;color:${ktcVal ? '#a371f7' : 'var(--muted)'};text-align:right;padding:6px 8px;white-space:nowrap">${ktcVal ? ktcVal.toLocaleString() : '—'}</td>
      <td style="padding:6px 8px"><span class="signal-badge ${sigCls[tag]||'signal-hold'}">${tag}</span></td>
    </tr>`;
    // Cliff separator row inserted after this player
    const cliffRow = cliffAfter.has(i)
      ? `<tr><td colspan="6" style="padding:2px 10px 4px;font-size:.6rem;color:rgba(248,81,73,.7);letter-spacing:.06em;text-transform:uppercase;background:rgba(248,81,73,.04)">▼ Tier cliff · value drops ${Math.round(gaps[i]).toLocaleString()} pts</td></tr>`
      : '';
    return rowHtml + cliffRow;
  }).join('');

  // League needs summary
