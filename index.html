    });

    h += `<tr style="border-top:2px solid var(--border)">
      <td style="font-size:.72rem;color:var(--muted);font-style:italic">League Avg</td>
      ${columns.map(c=>`<td style="text-align:center;font-size:.78rem">${fmtP(leagueAvg[c])}</td>`).join('')}
      <td style="text-align:center;font-size:.78rem">${fmtP(columns.reduce((s,c)=>s+leagueAvg[c],0))}</td>
    </tr></tbody></table></div>`;

    // ── DD count table ──
    h += `<div class="table-wrap"><table style="font-size:.8rem">
      <thead><tr>
        <th>Team</th>
        ${columns.map(c=>`<th style="text-align:center">${c} DD</th>`).join('')}
        <th style="text-align:center">Total</th>
      </tr></thead><tbody>`;

    teams.forEach(t => {
      const stats = statsMap[t.rosterId] || {};
      let totalDD=0, totalApp=0;
      h += `<tr><td class="bold">${t.teamName}</td>`;
      columns.forEach(col => {
        const d = stats[col] || { ddCount:0, appearances:0 };
        const rate = d.appearances > 0 ? d.ddCount/d.appearances : 0;
        const style = cellColor(rate, leagueDDRate[col]);
        const display = d.appearances > 0
          ? `${d.ddCount}<span style="font-size:.68rem;color:var(--muted)"> / ${d.appearances} (${(rate*100).toFixed(0)}%)</span>`
          : '-';
        h += `<td style="text-align:center;${style}">${display}</td>`;
        totalDD  += d.ddCount;
        totalApp += d.appearances;
      });
      const totalRate = totalApp > 0 ? (totalDD/totalApp*100).toFixed(0)+'%' : '-';
      h += `<td style="text-align:center;font-weight:600">${totalDD} <span style="font-size:.68rem;color:var(--muted)">(${totalRate})</span></td></tr>`;
    });

    h += `<tr style="border-top:2px solid var(--border)">
      <td style="font-size:.72rem;color:var(--muted);font-style:italic">League Rate</td>
      ${columns.map(c=>`<td style="text-align:center;font-size:.78rem">${(leagueDDRate[c]*100).toFixed(0)}%</td>`).join('')}
      <td></td>
    </tr></tbody></table></div>`;

    return h;
  }

  // ── Bench-specific DD-first layout ──────────────────────────
  function buildBenchView(league) {
    const { result, columns } = computeBenchStats(league);
    const bTeams = Object.values(league.rosterMap)
      .sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);

    // league DD rate per pos for bench
    const leagueDDRate = {};
    columns.forEach(col => {
      const rates = bTeams.map(t => {
        const d = result[t.rosterId]?.[col];
        return d && d.appearances > 0 ? d.ddCount/d.appearances : null;
      }).filter(v=>v!==null);
      leagueDDRate[col] = rates.length ? rates.reduce((a,b)=>a+b,0)/rates.length : 0;
    });
    const leagueAvg = {};
    columns.forEach(col => {
      const avgs = bTeams.map(t => result[t.rosterId]?.[col]?.avg || 0).filter(v=>v>0);
      leagueAvg[col] = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : 0;
    });

    // DD count table — primary
    let h = `<div class="section-note" style="margin-bottom:8px">
      Bench players only (not started) · How many times each bench position hit 10+ pts ·
      <span style="color:var(--green)">Green</span> = above league bench avg · <span style="color:var(--red)">Red</span> = below
    </div>
    <div class="table-wrap" style="margin-bottom:16px"><table style="font-size:.8rem">
      <thead><tr>
        <th>Team</th>
        ${columns.map(c=>`<th style="text-align:center">${c} DD</th>`).join('')}
        <th style="text-align:center">Total DD</th>
        <th style="text-align:center">Total Spots</th>
      </tr></thead><tbody>`;

    bTeams.forEach(t => {
      const stats = result[t.rosterId] || {};
      let totalDD=0, totalApp=0;
      h += `<tr><td class="bold">${t.teamName}</td>`;
      columns.forEach(col => {
        const d = stats[col] || { ddCount:0, appearances:0 };
        const rate = d.appearances > 0 ? d.ddCount/d.appearances : 0;
        const style = cellColor(rate, leagueDDRate[col]);
        const display = d.appearances > 0
          ? `${d.ddCount}<span style="font-size:.68rem;color:var(--muted)"> / ${d.appearances} (${(rate*100).toFixed(0)}%)</span>`
          : '-';
        h += `<td style="text-align:center;${style}">${display}</td>`;
        totalDD  += d.ddCount;
        totalApp += d.appearances;
      });
      const totalRate = totalApp > 0 ? ` (${(totalDD/totalApp*100).toFixed(0)}%)` : '';
      h += `<td style="text-align:center;font-weight:600">${totalDD}${totalRate}</td>`;
      h += `<td style="text-align:center;font-size:.75rem">${totalApp}</td></tr>`;
    });
    h += `<tr style="border-top:2px solid var(--border)">
      <td style="font-size:.72rem;color:var(--muted);font-style:italic">League Rate</td>
      ${columns.map(c=>`<td style="text-align:center;font-size:.78rem">${(leagueDDRate[c]*100).toFixed(0)}%</td>`).join('')}
      <td colspan="2"></td>
    </tr></tbody></table></div>`;

    // Avg table — secondary
    h += `<div class="section-note" style="margin-bottom:6px;font-size:.75rem">Bench avg pts per player-week by position</div>
    <div class="table-wrap"><table style="font-size:.8rem">
      <thead><tr>
        <th>Team</th>
        ${columns.map(c=>`<th style="text-align:center">${c} Avg</th>`).join('')}
      </tr></thead><tbody>`;
    bTeams.forEach(t => {
      const stats = result[t.rosterId] || {};
      h += `<tr><td class="bold">${t.teamName}</td>`;
      columns.forEach(col => {
        const avg = stats[col]?.avg || 0;
        const style = cellColor(avg, leagueAvg[col]);
        h += `<td style="text-align:center;${style}">${avg>0?fmtP(avg):'-'}</td>`;
      });
      h += `</tr>`;
    });
    h += `<tr style="border-top:2px solid var(--border)">
      <td style="font-size:.72rem;color:var(--muted);font-style:italic">League Avg</td>
      ${columns.map(c=>`<td style="text-align:center;font-size:.78rem">${fmtP(leagueAvg[c])}</td>`).join('')}
    </tr></tbody></table></div>`;

    return h;
  }

  let inner = '';
  if (posStatsView === 'position') {
    const { result, columns } = computePositionStats(league);
    inner = buildTable(columns, result,
      'Starters only · All players at each position combined per week · <span style="color:var(--green)">Green</span> = above league avg · <span style="color:var(--red)">Red</span> = below');
  } else if (posStatsView === 'slot') {
    const { result, slotLabels } = computeSlotStats(league);
    inner = buildTable(slotLabels, result,
      'Starters only · Per lineup slot (RB1 = higher-rostered RB, RB2 = second, etc.) · <span style="color:var(--green)">Green</span> = above league avg');
  } else {
    inner = buildBenchView(league);
  }
  return inner;
}

// ── POSITION STATS TABLE HELPERS (split avg / DD into separate sections) ─────

// Shared stat aggregation used by both avg and DD renders
function computeColStats(columns, statsMap, teams) {
  const leagueAvg = {}, leagueDDRate = {};
  columns.forEach(col => {
    const avgs = teams.map(t => statsMap[t.rosterId]?.[col]?.avg || 0).filter(v => v > 0);
    leagueAvg[col] = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : 0;
    const rates = teams.map(t => {
      const d = statsMap[t.rosterId]?.[col];
      return d && d.appearances > 0 ? d.ddCount/d.appearances : null;
    }).filter(v => v !== null);
    leagueDDRate[col] = rates.length ? rates.reduce((a,b)=>a+b,0)/rates.length : 0;
  });
  return { leagueAvg, leagueDDRate };
}

// Relative colour helper (module-level so both new render functions can share it)
function posColor(val, avg, absoluteThreshold) {
  if (!avg || val == null) return '';
  if (absoluteThreshold) {
    const diff = val - avg;
    if (diff >  1.0) return 'color:var(--green);font-weight:600';
    if (diff < -1.0) return 'color:var(--red)';
    return '';
  }
  const diff = (val - avg) / avg;
  if (diff >  0.1) return 'color:var(--green);font-weight:600';
  if (diff < -0.1) return 'color:var(--red)';
  return '';
}

function buildAvgTableHtml(columns, statsMap, teams, leagueAvg, noteText, absoluteThreshold) {
  let h = '';
  if (noteText) h += `<div class="section-note" style="margin-bottom:8px">${noteText}</div>`;
  h += `<div class="table-wrap"><table style="font-size:.8rem">
    <thead><tr>
      <th>Team</th>
      ${columns.map(c=>`<th style="text-align:center">${c} Avg Pts</th>`).join('')}
      <th style="text-align:center">Total Avg Pts</th>
    </tr></thead><tbody>`;
  teams.forEach(t => {
    const stats = statsMap[t.rosterId] || {};
    const totalAvg = columns.reduce((s,c) => s+(stats[c]?.avg||0), 0);
    h += `<tr><td class="bold">${t.teamName}</td>`;
    columns.forEach(col => {
      const avg = stats[col]?.avg || 0;
      h += `<td style="text-align:center;${posColor(avg, leagueAvg[col], absoluteThreshold)}">${avg>0?fmtP(avg):'-'}</td>`;
    });
    h += `<td style="text-align:center;font-weight:600">${fmtP(totalAvg)}</td></tr>`;
  });
  h += `<tr style="border-top:2px solid var(--border)">
    <td style="font-size:.72rem;color:var(--muted);font-style:italic">League Avg</td>
    ${columns.map(c=>`<td style="text-align:center;font-size:.78rem">${fmtP(leagueAvg[c])}</td>`).join('')}
    <td style="text-align:center;font-size:.78rem">${fmtP(columns.reduce((s,c)=>s+leagueAvg[c],0))}</td>
  </tr></tbody></table></div>`;
  return h;
}

function buildDDTableHtml(columns, statsMap, teams, leagueDDRate, showSpots=false) {
  let h = `<div class="table-wrap"><table style="font-size:.8rem">
    <thead><tr>
      <th>Team</th>
      ${columns.map(c=>`<th style="text-align:center">${c} DD</th>`).join('')}
      <th style="text-align:center">Total DD</th>
      ${showSpots ? '<th style="text-align:center">Spots</th>' : ''}
    </tr></thead><tbody>`;
  teams.forEach(t => {
    const stats = statsMap[t.rosterId] || {};
    let totalDD=0, totalApp=0;
    h += `<tr><td class="bold">${t.teamName}</td>`;
    columns.forEach(col => {
      const d = stats[col] || { ddCount:0, appearances:0 };
      const rate = d.appearances > 0 ? d.ddCount/d.appearances : 0;
      const display = d.appearances > 0
        ? `${d.ddCount}<span style="font-size:.68rem;color:var(--muted)"> / ${d.appearances} (${(rate*100).toFixed(0)}%)</span>`
        : '-';
      h += `<td style="text-align:center;${posColor(rate, leagueDDRate[col])}">${display}</td>`;
      totalDD += d.ddCount; totalApp += d.appearances;
    });
    const totalRate = totalApp > 0 ? ` (${(totalDD/totalApp*100).toFixed(0)}%)` : '';
    h += `<td style="text-align:center;font-weight:600">${totalDD}${totalRate}</td>`;
    if (showSpots) h += `<td style="text-align:center;font-size:.75rem">${totalApp}</td>`;
    h += `</tr>`;
  });
  h += `<tr style="border-top:2px solid var(--border)">
    <td style="font-size:.72rem;color:var(--muted);font-style:italic">League Rate</td>
    ${columns.map(c=>`<td style="text-align:center;font-size:.78rem">${(leagueDDRate[c]*100).toFixed(0)}%</td>`).join('')}
    <td${showSpots?' colspan="2"':''}></td>
  </tr></tbody></table></div>`;
  return h;
}

function buildPosAvgInner(league) {
  const teams = Object.values(league.rosterMap)
    .sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);
  if (posStatsView === 'position') {
    const { result, columns } = computePositionStats(league);
    const { leagueAvg } = computeColStats(columns, result, teams);
    return buildAvgTableHtml(columns, result, teams, leagueAvg,
      'Starters only · Avg fantasy points per week at each position · <span style="color:var(--green)">Green</span> = above league avg · <span style="color:var(--red)">Red</span> = below', false);
  } else if (posStatsView === 'slot') {
    const { result, slotLabels } = computeSlotStats(league);
    const { leagueAvg } = computeColStats(slotLabels, result, teams);
    return buildAvgTableHtml(slotLabels, result, teams, leagueAvg,
      'Starters only · Avg fantasy points per lineup slot (RB1 = higher-rostered RB, etc.) · <span style="color:var(--green)">Green</span> = 1+ pt above league avg · <span style="color:var(--red)">Red</span> = 1+ pt below', true);
  } else {
    const { result, columns } = computeBenchStats(league);
    const { leagueAvg } = computeColStats(columns, result, teams);
    return buildAvgTableHtml(columns, result, teams, leagueAvg,
      'Bench players only (not started) · Avg fantasy points per player-week by position · <span style="color:var(--green)">Green</span> = above league bench avg · <span style="color:var(--red)">Red</span> = below', false);
  }
}

function buildPosDDInner(league) {
  const teams = Object.values(league.rosterMap)
    .sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);
  if (posStatsView === 'position') {
    const { result, columns } = computePositionStats(league);
    const { leagueDDRate } = computeColStats(columns, result, teams);
    return `<div class="section-note" style="margin-bottom:8px">Starters only · Times each position hit 10+ pts · <span style="color:var(--green)">Green</span> = above league rate · <span style="color:var(--red)">Red</span> = below</div>` +
      buildDDTableHtml(columns, result, teams, leagueDDRate);
  } else if (posStatsView === 'slot') {
    const { result, slotLabels } = computeSlotStats(league);
    const { leagueDDRate } = computeColStats(slotLabels, result, teams);
    return `<div class="section-note" style="margin-bottom:8px">Starters by slot · Times each slot hit 10+ pts · <span style="color:var(--green)">Green</span> = above league rate · <span style="color:var(--red)">Red</span> = below</div>` +
      buildDDTableHtml(slotLabels, result, teams, leagueDDRate);
  } else {
    const { result, columns } = computeBenchStats(league);
    const { leagueDDRate } = computeColStats(columns, result, teams);
    return `<div class="section-note" style="margin-bottom:8px">Bench players only (not started) · Times each bench position hit 10+ pts · <span style="color:var(--green)">Green</span> = above league bench rate · <span style="color:var(--red)">Red</span> = below</div>` +
      buildDDTableHtml(columns, result, teams, leagueDDRate, true);
  }
}

function renderPositionStats(league) {
  return `<div class="section">
    <div class="section-title">Positional Averages
      <span style="margin-left:8px" id="pos-stats-btns">${buildPosViewBtns()}</span>
    </div>
    <div id="pos-stats-avg-inner">${buildPosAvgInner(league)}</div>
  </div>
  <div class="section">
    <div class="section-title">Double Digit Scores</div>
    <div id="pos-stats-dd-inner">${buildPosDDInner(league)}</div>

}

// ── RENDER: POWER RANKINGS ────────────────────────────────────
function renderPowerRankings() {
  const league=ld();
  const rankings=computePowerRankings(league);
  const hasFC=S.fcValues.length>0;
  // Build score-based MVE classification map (rosterId → classification)
  const mveClassMap = {};
  if (S.fcValues.length > 0) {
    const rawProfs = Object.values(league.rosterMap).map(t => mveTeamProfile(t.rosterId, league)).filter(Boolean);
    mveClassifyTeams(rawProfs).forEach(p => { mveClassMap[p.rosterId] = p.classification; });
  }
  const total=rankings.length;
  const isSF=(league.league.roster_positions||[]).includes('SUPER_FLEX');
  const rec=(league.league.scoring_settings&&league.league.scoring_settings.rec)||0;
  const fmtLabel=`${isSF?'SuperFlex':'1QB'} | ${rec>=1?'Full PPR':rec>=0.5?'Half PPR':'Standard'}`;
  let html='';
  if (!hasFC) html+=`<div class="warn-banner">FantasyCalc values could not be loaded. Rankings use recent scoring only.</div>`;
  html+=`<div class="section"><div class="section-title">Roster Value by Position ${tip('Stacked bar showing total FantasyCalc dynasty trade value for each team, broken out by position. Taller bar = more total dynasty capital. Does not reflect age or window — use Franchise Intel for that.')} <span class="section-note">${hasFC?'FantasyCalc dynasty values | '+fmtLabel:'Recent form only'}</span></div><div class="chart-wrap power-chart-wrap"><canvas id="powerChart"></canvas></div></div>`;
  html+=`<div class="section"><div class="section-title">Team Rankings ${tip('Power Score blends recent 3-week scoring (how hot you are right now) with total roster trade value. Tier is the MVE dynasty classification — score-based, not rank-capped. Multiple teams can share a tier if they genuinely qualify.')}</div><div class="table-wrap"><table><thead><tr><th>#</th><th>Team</th><th>Tier ${tip('MVE dynasty tier: Contender, Fringe, Mid-Tier, Retool, or Rebuild. Assigned by absolute roster score thresholds — not capped by rank. If multiple teams meet Contender criteria, all are shown as Contender.')}</th>${hasFC?`<th>Total Value ${tip('Sum of all FantasyCalc dynasty values on the roster. Raw depth metric — does not penalize for age or reward for starter concentration.')}</th><th>QB ${tip('Rank pill shows where this team ranks among all league teams in QB room strength (1 = best). Green = top quarter, yellow = middle, red = bottom quarter.')}</th><th>RB</th><th>WR</th><th>TE</th>`:''}<th>Recent (3wk) ${tip('Average fantasy points scored per week over the last 3 completed weeks. Measures current form and hot/cold streaks.')}</th><th>Power Score ${tip('Composite score: 60% total roster trade value (normalized 0–100) + 40% recent 3-week scoring rate (normalized 0–100). Higher = stronger current standing.')}</th></tr></thead><tbody>`;
  const rfAvg = rankings.reduce((s,r)=>s+r.recentPts,0) / (rankings.length||1);
  rankings.forEach((r,i)=>{
    const cls = mveClassMap[r.rosterId] || { label:'—', color:'#8b949e', bg:'rgba(148,163,184,.1)' };
    const tb=`<span class="tier-badge" style="background:${cls.bg};color:${cls.color};border:1px solid ${cls.border||cls.color+'66'}">${cls.label}</span>`;
    const rfMax=Math.max(...rankings.map(x=>x.recentPts));
    const rfW=rfMax>0?(r.recentPts/rfMax*100).toFixed(1):'0';
    const recentTrend = r.recentPts > rfAvg * 1.12 ? 'hot' : r.recentPts < rfAvg * 0.88 ? 'cold' : 'mid';
    const vibe = powerRankingVibe(i+1, total, recentTrend, cls.label);
    const rowBorder = i===0 ? 'border-left:3px solid var(--gold)' : i===1 ? 'border-left:3px solid #c0c0c0' : i===2 ? 'border-left:3px solid #cd7f32' : '';
    html+=`<tr style="${rowBorder}"><td>${badge(i+1)}</td><td class="bold">${r.teamName}<br><span style="font-size:.62rem;color:var(--muted);font-weight:400;font-style:italic">${vibe}</span></td><td>${tb}</td>`;
    if (hasFC) html+=`<td class="td-r" style="color:var(--text)">${r.posTotals.total.toLocaleString()}</td><td class="td-r">${rankPill(r.posRanks.QB||'-',total)}</td><td class="td-r">${rankPill(r.posRanks.RB||'-',total)}</td><td class="td-r">${rankPill(r.posRanks.WR||'-',total)}</td><td class="td-r">${rankPill(r.posRanks.TE||'-',total)}</td>`;
    html+=`<td><div class="bar-wrap"><div style="font-size:.75rem;margin-bottom:3px;color:var(--text)">${fmtP(r.recentPts)}</div><div class="bar-bg"><div class="bar-fill" style="width:${rfW}%;background:var(--green)"></div></div></div></td><td><div class="bar-wrap"><div style="font-size:.75rem;margin-bottom:3px;color:var(--text)">${fmt(r.powerScore)}</div><div class="bar-bg"><div class="bar-fill" style="width:${r.powerScore.toFixed(1)}%;background:var(--purple)"></div></div></div></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('power-content').innerHTML=html;
  if (S.powerChart) { S.powerChart.destroy(); S.powerChart=null; }
  const ctx=document.getElementById('powerChart');
  if (!ctx) return;
  if (!hasFC) {
    S.powerChart=new Chart(ctx,{ type:'bar', data:{ labels:rankings.map(r=>r.teamName), datasets:[{ label:'Power Score', data:rankings.map(r=>r.powerScore), backgroundColor:'#6d28d9' }] }, options:chartOpts('Power Score') });
    return;
  }
  const barTotalsPlugin = {
    id: 'barTotals',
    afterDatasetsDraw(chart) {
      try {
        const { ctx, data, scales } = chart;
        const totals = new Array(data.labels.length).fill(0);
        data.datasets.forEach(ds => ds.data.forEach((v,i) => { totals[i] += (v||0); }));
        const meta = chart.getDatasetMeta(0);
        if (!meta || !meta.data || !meta.data.length) return;
        ctx.save();
        ctx.font = 'bold 11px -apple-system,BlinkMacSystemFont,sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,.82)';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        totals.forEach((total, i) => {
          if (!total || !meta.data[i]) return;
          const x = meta.data[i].x;
          const topY = scales.y.getPixelForValue(total);
          const barH = scales.y.getPixelForValue(0) - topY;
          if (barH < 22) return;
          const label = total.toLocaleString();
          ctx.save();
          ctx.translate(x, topY + 8);
          ctx.rotate(Math.PI / 2);
          ctx.fillText(label, 0, 0);
          ctx.restore();
        });
        ctx.restore();
      } catch(e) { /* don't break chart if labels fail */ }
    }
  };
  S.powerChart=new Chart(ctx,{ type:'bar', data:{ labels:rankings.map(r=>r.teamName), datasets:['QB','RB','WR','TE'].map(pos=>({ label:pos, data:rankings.map(r=>r.posTotals[pos]||0), backgroundColor:POS_COLORS[pos], stack:'stack' })) }, options:chartOpts('Total Trade Value'), plugins:[barTotalsPlugin] });
}

function chartOpts(yLabel) {
  return {
    animation: { duration: 550, easing: 'easeOutQuart' },
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ position:'left', labels:{ color:'#8b949e', font:{ size:11 }, padding:12, boxWidth:14 } },
      tooltip:{ backgroundColor:'#192338', borderColor:'#1e2d42', borderWidth:1, titleColor:'#e8edf3', bodyColor:'#8b949e', padding:10, cornerRadius:8, callbacks:{ label:ctx=>' '+ctx.dataset.label+': '+ctx.raw.toLocaleString() } }
    },
    layout:{ padding:0 },
    scales:{
      x:{ stacked:true, ticks:{ color:'#8b949e', font:{ size:window.innerWidth<768?10:11 }, maxRotation:45, minRotation:45 }, grid:{ color:'#21262d' } },
      y:{ stacked:true, ticks:{ color:'#8b949e', font:{ size:window.innerWidth<768?11:10 }, stepSize:5000, callback:v=>(v>=1000?(v/1000).toFixed(0)+'k':v.toLocaleString()) }, grid:{ color:'#21262d' }, title:{ display:true, text:yLabel, color:'#8b949e', font:{ size:11 } } }
    }
  };
}

let playersView = 'cards'; // 'cards' | 'topn' | 'stats'
let topNFilter  = 10;
const TOP_N_OPTIONS = [10,15,20,25,30,35,40,45,50];
let statsSort       = { key:'fpts_pg', dir:-1 };
let statsPosFilter  = 'ALL';
let statsRowsCache  = null; // { rows, leagueId }


function setTopN(n) {
  topNFilter = n;
  const el = document.getElementById('topn-table-wrap');
  if (el) el.innerHTML = buildTopNTable(ld());
  const btns = document.getElementById('topn-btns');
  if (btns) btns.innerHTML = buildTopNBtns();
}

function buildTopNBtns() {
  return TOP_N_OPTIONS.map(n => {
    const active = topNFilter === n;
    const s = `cursor:pointer;padding:3px 10px;border-radius:4px;font-size:.75rem;border:1px solid var(--border);margin-right:3px;` +
      (active ? 'background:var(--accent);color:#fff;border-color:var(--accent)' : 'background:var(--surface2);color:var(--muted)');
    return `<button onclick="setTopN(${n})" style="${s}">Top ${n}</button>`;
  }).join('');
}

// computeTopN: for each completed week, collect all players_points across all rosters,
// filter by position if needed, rank by score, count how many each roster has in top N.
function computeTopN(league, N, posFilter) {
  const { rosterMap, completedWeeks } = league;
  const teams = Object.values(rosterMap).sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);
  const weeks = completedWeeks.map(w => w.week);

  // Build player->rosterId map from current roster (best available; use all-season players_points for ownership)
  // Actually, use the per-week matchup data — each entry has roster_id + players_points
  // result[rosterId][week] = count
  const result = {};
  teams.forEach(t => { result[t.rosterId] = {}; weeks.forEach(w => { result[t.rosterId][w] = 0; }); });

  completedWeeks.forEach(({ week, data }) => {
    // Aggregate all player scores across all rosters this week
    const allScores = [];
    data.forEach(entry => {
      if (!entry.players_points) return;
      Object.entries(entry.players_points).forEach(([pid, score]) => {
        if (score <= 0) return;
        // Apply position filter
        if (posFilter !== 'ALL') {
          const meta = S.playersMeta[String(pid)];
          if (!meta || meta.pos !== posFilter) return;
        }
        allScores.push({ pid: String(pid), score, rosterId: entry.roster_id });
      });
    });

    // Sort descending, slice top N (handle ties: include all tied at the cutoff? No — strict top N)
    allScores.sort((a, b) => b.score - a.score);
    const topN = allScores.slice(0, N);

    topN.forEach(({ rosterId }) => {
      if (result[rosterId] !== undefined) result[rosterId][week]++;
    });
  });

  return { result, teams, weeks };
}

function buildTopNTable(league) {
  const pos = S.playersFilter.pos;
  const { result, teams, weeks } = computeTopN(league, topNFilter, pos);
  const maxPerWeek = weeks.length > 0 ? topNFilter : 1;

  // Season totals
  const totals = {};
  teams.forEach(t => { totals[t.rosterId] = weeks.reduce((s,w) => s + (result[t.rosterId][w]||0), 0); });
  const maxTotal = Math.max(...Object.values(totals), 1);

  function cellBg(count, max) {
    if (!count) return '';
    const pct = count / max;
    if (pct >= 0.5) return 'background:rgba(63,185,80,0.25);color:var(--green);font-weight:600';
    if (pct >= 0.25) return 'background:rgba(63,185,80,0.1);color:var(--text)';
    return 'color:var(--muted)';
  }

  let h = `<div class="table-wrap"><table style="font-size:.78rem">
    <thead><tr>
      <th style="min-width:130px;position:sticky;left:0;background:var(--surface);z-index:2">Team</th>
      ${weeks.map(w=>`<th style="text-align:center;min-width:44px">Wk ${w}</th>`).join('')}
      <th style="text-align:center;min-width:60px;color:var(--accent)">Season</th>
    </tr></thead><tbody>`;

  // Sort by season total desc
  const sorted = [...teams].sort((a,b) => totals[b.rosterId] - totals[a.rosterId]);
  sorted.forEach((t, i) => {
    h += `<tr><td class="bold" style="font-size:.8rem;position:sticky;left:0;background:var(--surface);z-index:1">${badge(i+1)} ${t.teamName}</td>`;
    weeks.forEach(w => {
      const count = result[t.rosterId][w] || 0;
      const style = cellBg(count, maxPerWeek * 0.5); // green if >= half the cutoff
      h += `<td style="text-align:center;${style}">${count || '-'}</td>`;
    });
    const tot = totals[t.rosterId];
    const totStyle = `text-align:center;font-weight:700;${cellBg(tot, maxTotal)}`;
    h += `<td style="${totStyle}">${tot}</td></tr>`;
  });

  h += `</tbody></table></div>`;
  return h;
}

function renderPlayersTab() {
  const league = ld();

  ).join('');

  if (playersView === 'cards') {

    if (!weeks.length && S.playersFilter.week === 1) S.playersFilter.week = 1;
    const wkOpts = fallbackWeeks.map(w=>`<option value="${w}" ${w===S.playersFilter.week?'selected':''}>Week ${w}</option>`).join('');
    controls = `<select id="weekSelect" onchange="loadPlayersWeek(parseInt(this.value))">${wkOpts}</select>
                <div class="pos-filter">${posBtns}</div>`;

      <span id="topn-btns">${buildTopNBtns()}</span>

    </div>`;
  }

  } else if (playersView === 'stats') {
    loadStatsView();
  } else {
    document.getElementById('players-grid').className = '';

      `<div class="section-note" style="margin:12px 0 8px">
         Players from all rosters ranked by points that week · <span style="color:var(--green)">Green</span> = above-average representation in top ${topNFilter}
       </div>
       <div id="topn-table-wrap">${buildTopNTable(league)}</div>`;
  }

async function loadPlayersWeek(week) {
  const league  = ld();
  S.playersFilter.week = week;
  const grid = document.getElementById('players-grid');
  if (!grid) return;
  grid.innerHTML = '<div class="inline-loading"><div class="spinner" style="margin:0 auto 8px"></div>Loading stats...</div>';

  const stats   = await fetchWeekStats(league.season, week);
  // Back-fill NFL team from Sleeper stats — FantasyCalc team data goes stale in the offseason
  if (stats) {
    Object.entries(stats).forEach(([pid, st]) => {
      if (st && st.team && S.playersMeta[pid] && !S.playersMeta[pid].team) {
        S.playersMeta[pid].team = st.team;
      }
    });
  }
  const ppr     = (league.league.scoring_settings&&league.league.scoring_settings.rec)||0;
  const ptKey   = ptsKey(ppr);

  // Build player->owner map from current rosters
  const playerOwner = {};
  Object.values(league.rosterMap).forEach(r => {
    r.players.forEach(pid => { playerOwner[String(pid)] = r; });
  });

  const SKILL_POS  = new Set(['QB','RB','WR','TE']);
  const POS_LIMIT  = 32; // top N per position shown

  // Build unified player list from weekly stats (covers owned + FA who played)
  // Also add owned players who have no stats entry (bye/injury — shown at bottom)
  const seen = new Set();
  const allPlayers = [];

  // First: all players present in stats
  Object.keys(stats).forEach(pid => {
    const meta = S.playersMeta[String(pid)];
    if (!meta || !SKILL_POS.has(meta.pos)) return;
    seen.add(String(pid));
    const st  = stats[pid];
    const pts = st ? (st[ptKey] || 0) : 0;
    // Prefer team from Sleeper stats (current for that week); FantasyCalc team may be stale
    const nflTeam = st?.team || meta.team || '';
    allPlayers.push({ pid: String(pid), meta, stats: st, pts, owner: playerOwner[String(pid)] || null, nflTeam });
  });

  // Then: owned players missing from stats (bye/IR/no data)
  Object.keys(playerOwner).forEach(pid => {
    if (seen.has(pid)) return;
    const meta = S.playersMeta[String(pid)];
    if (!meta || !SKILL_POS.has(meta.pos)) return;
    allPlayers.push({ pid, meta, stats: null, pts: 0, owner: playerOwner[pid], nflTeam: meta.team || '' });
  });

  // Group by position, sort within each group, then cap at POS_LIMIT
  const byPos = { QB:[], RB:[], WR:[], TE:[] };
  allPlayers.forEach(p => { if (byPos[p.meta.pos]) byPos[p.meta.pos].push(p); });
  const fcVal = pid => S.fcBySleeperId[pid]?.value || 0;
  Object.keys(byPos).forEach(pos => {
    byPos[pos].sort((a,b) => b.pts - a.pts || fcVal(b.pid) - fcVal(a.pid));
    byPos[pos] = byPos[pos].slice(0, POS_LIMIT);
  });

  // Collect positions to display based on filter
  const posSel = S.playersFilter.pos;
  let players = [];
  if (posSel === 'ALL') {
    // Top 32 at every skill position, then re-sort by points
    ['QB','RB','WR','TE'].forEach(pos => { players = players.concat(byPos[pos]); });
  } else {
    players = byPos[posSel] || [];
  }
  players.sort((a,b) => b.pts - a.pts || fcVal(b.pid) - fcVal(a.pid));

  if (!players.length) {
    grid.innerHTML = `<div class="inline-loading">No players found for the selected filters.</div>`;
    return;
  }

  const maxPts = players[0]?.pts || 1;
  grid.className = 'player-grid';
  grid.innerHTML = players.map((p) => {
    const { meta, stats: st, pts, owner, pid, nflTeam } = p;
    const pos   = meta.pos || '?';
    const name  = meta.name || 'Unknown';
    const sl    = statLine(st, pos);
    const ptsClass = pts >= maxPts * 0.8 ? 'top' : pts >= maxPts * 0.5 ? 'good' : '';
    const hasPts = pts > 0;
    const sf = owner ? mveStarterFlag(pid, owner.rosterId, league) : null;
    const sfBadge = sf === 'Starter'
      ? `<span style="background:rgba(63,185,80,.15);color:var(--green);font-size:.58rem;padding:1px 5px;border-radius:3px;margin-left:4px">Starter</span>`
      : sf === 'Fringe'
      ? `<span style="background:rgba(210,153,34,.15);color:var(--yellow);font-size:.58rem;padding:1px 5px;border-radius:3px;margin-left:4px">Fringe</span>`
      : '';
    const ownerLine = owner
      ? `<div class="player-card-owner" style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">&#127968; ${owner.teamName}${sfBadge}</div>`
      : `<div class="player-card-owner" style="color:var(--green);font-weight:600">✦ Free Agent</div>`;
    const teamBadge = nflTeam ? `<span class="nfl-team">${nflTeam}</span>` : '';

    // MVE dynasty intel row
    const mv = mvePlayer(pid, league);
    const sigCls = { Cornerstone:'signal-cornerstone', Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };
    const mvReasons = mv ? mveExplainPlayer(mv, league) : [];
    const weeklySig = mv && S.ktcAvailable ? mveWeeklySignal(mv, league) : null;
    const dynastyRow = mv ? `
      <div class="dynasty-line1">
        <span class="signal-badge ${sigCls[mv.actionTag]||'signal-hold'}">${mv.actionTag}</span>
        <span style="font-size:.65rem;color:var(--muted);background:var(--surface2);border-radius:3px;padding:1px 5px;flex-shrink:0">T${mv.tier}</span>
        <span style="font-size:.68rem;color:var(--accent);flex-shrink:0" title="MVE-adjusted value (FC base: ${mv.fcValue.toLocaleString()})">${mv.neutral.toLocaleString()}</span>
      </div>
      ${weeklySig ? `<div class="dynasty-line2" style="color:${weeklySig.color}">${weeklySig.label}</div>` : ''}
      ${mvReasons.length ? `<div class="explain-chips" style="margin-top:3px">${mvReasons.slice(0,3).map(r=>`<span class="explain-chip">${r}</span>`).join('')}</div>` : ''}` : '';

    const tierClass = mv ? `tier-${mv.tier}` : '';
    const ovClasses = mv ? [
      mv.actionTag === 'Cornerstone'                             ? 'ov-cornerstone' : '',
      mv.actionTag === 'Speculative'                             ? 'ov-speculative' : '',
      mv.actionTag === 'Sell' && parseInt(meta.age || 0) >= 30  ? 'ov-aging'       : '',
      weeklySig && (weeklySig.signal==='rising'||weeklySig.signal==='buy-window')   ? 'ov-rising'  : '',
      weeklySig && (weeklySig.signal==='sell-window'||weeklySig.signal==='sell-late') ? 'ov-falling' : '',
    ].filter(Boolean).join(' ') : '';

    return `<div class="player-card ${tierClass} ${ovClasses}">
      <div class="player-card-img">${hsLg(pid, pos)}</div>
      <div class="player-card-body">
        <div class="player-card-meta">
          <span class="pos-badge pos-${pos}">${pos}</span>
          ${teamBadge}
        </div>
        <div class="player-card-name">${name}</div>
        ${ownerLine}
        <div class="player-card-stats">${hasPts ? sl : '<span style="color:var(--muted);font-style:italic">Did not play / no data</span>'}</div>
        ${hasPts ? `<div class="player-card-pts ${ptsClass}">${fmtP(pts)} pts</div>` : `<div class="player-card-pts" style="color:var(--muted)">0 pts</div>`}
        ${dynastyRow}
      </div>
    </div>`;
  }).join('');
}

function setPlayersPos(pos) {
  S.playersFilter.pos = pos;
  renderPlayersTab();
}

// ── SEASON STATS VIEW ─────────────────────────────────────────
async function loadStatsView() {
  const league = ld();
  if (!league) return;
  const grid = document.getElementById('players-grid');
  if (!grid) return;

  // Use cache if same league
  if (statsRowsCache && statsRowsCache.leagueId === S.currentLeagueId) {
    renderStatsTable();
    return;
  }

  const weeks = league.completedWeeks;
  if (!weeks.length) {
    grid.className = '';
    grid.innerHTML = '<div style="color:var(--muted);padding:24px">No completed weeks yet.</div>';
    return;
  }

  grid.innerHTML = '<div class="inline-loading"><div class="spinner" style="margin:0 auto 8px"></div>Aggregating season stats…</div>';

  const allWeekStats = await Promise.all(weeks.map(w => fetchWeekStats(league.season, w.week)));
  const ppr    = (league.league.scoring_settings && league.league.scoring_settings.rec) || 0;
  const ptKey  = ppr >= 1 ? 'pts_ppr' : ppr >= 0.5 ? 'pts_half_ppr' : 'pts_std';
  const FIELDS = ['pass_att','pass_cmp','pass_yd','pass_td','pass_int','pass_air_yd',
                  'rush_att','rush_yd','rush_td','rush_fd',
                  'rec','rec_tgt','rec_yd','rec_td','rec_air_yd','rec_yac',
                  'off_snp','tm_off_snp','pts_ppr','pts_half_ppr','pts_std'];

  // Aggregate per player across all weeks
  const agg = {};
  allWeekStats.forEach(ws => {
    if (!ws) return;
    Object.entries(ws).forEach(([pid, st]) => {
      if (!st || typeof st !== 'object') return;
      const meta = S.playersMeta[String(pid)];
      if (!meta || !['QB','RB','WR','TE'].includes(meta.pos)) return;
      if (!agg[pid]) { agg[pid] = { gp:0 }; FIELDS.forEach(f => agg[pid][f] = 0); }
      const active = (st.off_snp > 0) || ((st[ptKey]||0) > 0) || (st.pass_att > 0) || (st.rush_att > 0) || (st.rec_tgt > 0);
      if (active) agg[pid].gp++;
      FIELDS.forEach(f => { if (st[f]) agg[pid][f] += st[f]; });
    });
  });

  // Roster lookup
  const playerOwner = {};
  Object.values(league.rosterMap).forEach(r => r.players.forEach(pid => { playerOwner[String(pid)] = r.teamName; }));

  // Team totals for share stats (all players in agg, not just rostered)
  const teamTot = {};
  Object.entries(agg).forEach(([pid, st]) => {
    const meta = S.playersMeta[pid];
    if (!meta || !meta.team || meta.team === 'FA') return;
    const t = meta.team;
    if (!teamTot[t]) teamTot[t] = { tgt:0, att:0, airYd:0, tmSnp:0 };
    teamTot[t].tgt   += st.rec_tgt   || 0;
    teamTot[t].att   += st.rush_att  || 0;
    teamTot[t].airYd += st.rec_air_yd|| 0;
  });

  // Build rows (rostered players only, must have played)
  const rows = Object.entries(agg)
    .filter(([pid, st]) => playerOwner[pid] && st.gp > 0)
    .map(([pid, st]) => {
      const meta = S.playersMeta[pid];
      if (!meta) return null;
      const fc   = S.fcBySleeperId[pid];
      const gp   = st.gp;
      const team = meta.team || '';
      const tt   = teamTot[team] || {};
      const fpts = st[ptKey] || 0;
      const n    = v => v || 0;
      return {
        pid, name:meta.name, pos:meta.pos, team, age:meta.age||null,
        fcVal: fc ? fc.value : 0, owner:playerOwner[pid], gp,
        // season totals
        pass_att:n(st.pass_att), pass_cmp:n(st.pass_cmp), pass_yd:n(st.pass_yd),
        pass_td:n(st.pass_td),   pass_int:n(st.pass_int),
        rush_att:n(st.rush_att), rush_yd:n(st.rush_yd),
        rush_td:n(st.rush_td),   rush_fd:n(st.rush_fd),
        rec_tgt:n(st.rec_tgt),   rec:n(st.rec),
        rec_yd:n(st.rec_yd),     rec_td:n(st.rec_td),
        rec_air_yd:n(st.rec_air_yd), rec_yac:n(st.rec_yac), fpts,
        // per-game
        fpts_pg:    fpts / gp,
        pass_yd_pg: n(st.pass_yd)  / gp,
        rush_yd_pg: n(st.rush_yd)  / gp,
        rec_yd_pg:  n(st.rec_yd)   / gp,
        tgt_pg:     n(st.rec_tgt)  / gp,
        rec_pg:     n(st.rec)      / gp,
        att_pg:     n(st.rush_att) / gp,
        air_yd_pg:  n(st.rec_air_yd)/gp,
        // advanced ratios
        cmp_pct:   st.pass_att   > 0 ? st.pass_cmp   / st.pass_att   : null,
        ypa:       st.pass_att   > 0 ? st.pass_yd    / st.pass_att   : null,
        ypc:       st.rush_att   > 0 ? st.rush_yd    / st.rush_att   : null,
        ypt:       st.rec_tgt    > 0 ? st.rec_yd     / st.rec_tgt    : null,
        ypr:       st.rec        > 0 ? st.rec_yd     / st.rec        : null,
        catch_pct: st.rec_tgt    > 0 ? st.rec        / st.rec_tgt    : null,
        racr:      st.rec_air_yd > 0 ? st.rec_yd     / st.rec_air_yd : null,
        yac_pr:    st.rec        > 0 ? st.rec_yac    / st.rec        : null,
        snap_pct:  st.tm_off_snp > 0 ? st.off_snp    / st.tm_off_snp : null,
        tgt_share: tt.tgt        > 0 ? st.rec_tgt    / tt.tgt        : null,
        opp_share: (tt.tgt+tt.att)>0 ?(n(st.rec_tgt)+n(st.rush_att))/(tt.tgt+tt.att): null,
        air_share: tt.airYd      > 0 ? st.rec_air_yd / tt.airYd      : null,
      };
    }).filter(Boolean);

  statsRowsCache = { rows, leagueId: S.currentLeagueId };
  renderStatsTable();
}

function renderStatsTable() {
  const grid = document.getElementById('players-grid');
  if (!grid || !statsRowsCache) return;

  // Save scroll position before re-render
  const prevScroll = grid.querySelector('.stats-tbl-wrap')?.scrollLeft || 0;

  const pos = statsPosFilter;
  let rows  = statsRowsCache.rows;
  if (pos !== 'ALL') rows = rows.filter(r => r.pos === pos);

  const pct = v => v != null && v > 0 ? (v*100).toFixed(1)+'%' : '—';
  const d1  = v => v != null && v > 0 ? v.toFixed(1) : '—';
  const d2  = v => v != null && v > 0 ? v.toFixed(2) : '—';
  const int = v => v != null && v > 0 ? Math.round(v).toString() : '—';
  const dyn = v => v > 0 ? v.toLocaleString() : '—';

  const COLS = {
    ALL: [
      { key:'fpts_pg',   label:'Fpts/G',      tip:'Fantasy points per game',                                    fmt:d1,  hi:1 },
      { key:'gp',        label:'GP',           tip:'Games played this season',                                   fmt:int      },

  // ── Rank-based coloring (computed pre-sort, keyed by pid) ──
  // rank 0 = best player in that column, 1 = worst
  const colorMap = {}; // colKey → Map<pid, rank 0-1>
  cols.forEach(c => {
    if (!c.hi) return;
    const items = rows
      .filter(r => r[c.key] != null && r[c.key] > 0)
      .map(r => ({ pid: r.pid, v: r[c.key] }));
    // sort best-first (low INTs = best for hi:-1, high value = best for hi:1)
    items.sort((a, b) => c.hi === -1 ? a.v - b.v : b.v - a.v);
    const n = items.length;
    const m = new Map();
    items.forEach((x, i) => m.set(x.pid, n > 1 ? i / (n - 1) : 0));
    colorMap[c.key] = m;
  });

    if (!c.hi) return '';
    const rank = colorMap[c.key]?.get(pid);

    if (rank >= 0.75) return c.hi === -1 ? 'sv-hi'  : 'sv-lo';
    return '';

    return `<tr>${playerCell}${ownerCell}${posCell}${dataCells}</tr>`;
  }).join('');

  const note = `<div style="font-size:.71rem;color:var(--muted);margin:0 0 8px">
    ${rows.length} rostered players with game action · /G = per game · Season totals labeled (season) ·
    <span style="color:#3fb950">Green</span> = top 25% · <span style="color:var(--muted)">Faded</span> = bottom 25% · Click any column to sort
  </div>`;

  const colgroup = `<colgroup>
    <col style="width:162px">
    <col style="width:100px">
    ${pos === 'ALL' ? '<col style="width:46px">' : ''}
    ${cols.map(() => '<col style="width:72px">').join('')}

  grid.className = '';
  grid.innerHTML = note + `<div class="stats-tbl-wrap"><table class="stats-tbl">${colgroup}<thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;

  // Restore scroll position after re-render
  if (prevScroll > 0) {
    const wrap = grid.querySelector('.stats-tbl-wrap');
    if (wrap) wrap.scrollLeft = prevScroll;
  }
}

// League-relative pick bucket ranking — weakest team always gets Early, strongest Late
// Uses relative rank within the league rather than absolute score thresholds
let _leaguePickBucketsCache = null;
let _leaguePickBucketsCacheId = null;
function mveLeaguePickBuckets(league) {
  const lid = S.currentLeagueId;
  if (_leaguePickBucketsCache && _leaguePickBucketsCacheId === lid) return _leaguePickBucketsCache;
  const B = PICK_BUCKET_CFG;
  const teams = Object.values(league.rosterMap);
  const scored = teams.map(r => {
    const prof = mveTeamProfile(r.rosterId, league);
    if (!prof) return { rosterId: r.rosterId, score: 50 };
    const cls = (prof.classification && prof.classification.label) || 'Mid-Tier';
    const sv  = prof.starterValue || 0;
    const age = prof.weightedAge  || 27;
    const classScore = CLASS_STRENGTH[cls] !== undefined ? CLASS_STRENGTH[cls] : 50;
    const svNorm = Math.max(0, Math.min(1, (sv - B.svMin) / (B.svMax - B.svMin))) * 100;
    const ageScore = age < 25 ? 65 : age < 27 ? 58 : age < 29 ? 48 : age < 31 ? 35 : 22;
    return { rosterId: r.rosterId, score: classScore * B.classWeight + svNorm * B.svWeight + ageScore * B.ageWeight };
  }).sort((a, b) => a.score - b.score); // ascending: weakest (best pick) first

  const n = scored.length;
  const earlyCount = Math.ceil(n / 3);
  const lateStart  = n - Math.floor(n / 3);
  const result = {};
  scored.forEach((t, i) => {
    let bucket, confidence;
    if (i < earlyCount) {
      bucket = 'Early'; confidence = i === 0 ? 'high' : 'medium';
    } else if (i >= lateStart) {
      bucket = 'Late';  confidence = i === n - 1 ? 'high' : 'medium';
    } else {
      bucket = 'Mid';   confidence = 'medium';
    }
    result[String(t.rosterId)] = { bucket, confidence, score: Math.round(t.score), rank: i + 1, source: 'projected' };
  });
  _leaguePickBucketsCache = result;
  _leaguePickBucketsCacheId = lid;
  return result;
}

function applyFutureGap(bkt, season) {
  if (!bkt) return null;
  const yearGap = Math.max(0, parseInt(season) - fantasyYear() - 1);
  if (yearGap < PICK_BUCKET_CFG.futureGapPenalty) return bkt;
  const confidence = bkt.confidence === 'high' ? 'medium' : 'low';
  return { ...bkt, confidence };
}

// Resolve pick bucket from key (season_round_origOwner) — used for accurate valuation
function getPickBucketForKey(key) {
  const pts = key.split('_');
  const season = pts[0], round = parseInt(pts[1]), origOwner = pts[2];
  if (round !== 1 || !S.fcValues.length) return null;
  const league = ld();
  if (!league) return null;
  const buckets = mveLeaguePickBuckets(league);
  return applyFutureGap(buckets[String(origOwner)] || null, season);
}

function getPickValueByKey(key) {
  const pts = key.split('_');
  const round = parseInt(pts[1]);
  // 1st-round current-year: use board-driven value when board is populated
  if (round === 1) {
    const season = pts[0], curYear = fantasyYear();
    if (parseInt(season) === curYear) {
      const slots = getRookieBoardSlots();
      if (slots.length >= 6) {
        const league = ld();
        const n = league ? Object.keys(league.rosterMap).length : 12;
        const bkt = getPickBucketForKey(key);
        const bv = _boardPickValue((bkt && bkt.bucket) || 'Mid', (bkt && bkt.confidence) || 'low', slots, n);
        if (bv && bv.neutralValue > 100) return bv.neutralValue;
      }
    }
  }
  const bkt = getPickBucketForKey(key);
  return getPickValue(pts[0], round, bkt && bkt.bucket);
}
