      .logo {
        padding: 14px 16px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid var(--border);
        font-size: 1rem; flex-shrink: 0;
      }
      nav { padding: 6px 0; overflow-x: hidden; flex: none; }
      nav button {
        padding: 13px 16px; font-size: .88rem;
        border-left: 2px solid transparent; border-bottom: none;
        justify-content: flex-start; min-height: 44px;
      }
      nav button.active {
        border-left-color: var(--accent);
        border-bottom-color: transparent;
        background: linear-gradient(90deg, rgba(74,158,255,.15), rgba(74,158,255,.04));
        color: var(--accent);
      }
      .nav-shortcut { display: none; }
      .league-controls {
        flex-direction: column; gap: 6px;
        padding: 12px 14px;
        border-top: 1px solid var(--border);
      }
      /* iOS: 16px prevents viewport zoom on input focus */
      .league-controls input { width: 100%; font-size: 16px; min-height: 44px; padding: 0 10px; }
      .btn { width: 100%; min-height: 44px; font-size: .88rem; }

      /* Data-sources: collapsible in drawer */
      #data-sources-toggle { cursor: pointer; }
      #data-sources-panel  { max-height: 0; overflow: hidden; transition: max-height .2s ease; }
      #data-sources-panel.ds-open { max-height: 220px; }
      #data-sources-toggle .ds-arrow      { transform: rotate(-90deg); }
      #data-sources-toggle.ds-open .ds-arrow { transform: rotate(0deg); }

      /* Overlay active on tap-outside */
      #mobile-overlay.active { display: block; }

      /* Main: full-width, clear topbar */
      main { margin-left: 0; padding: 20px 18px; }
      #new-season-banner { margin-left: 0; }

      /* Sub-tabs: scroll horizontally if they overflow */
      .sub-tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .sub-tab  { white-space: nowrap; }

      /* ── Tablet component layout ──────────────────────────── */

      /* Trade: single-column panels, stacked */
      .trade-layout    { grid-template-columns: 1fr; gap: 10px; }
      .trade-sides     { grid-template-columns: 1fr; gap: 10px; }
      .trade-divider   { flex-direction: row; padding-top: 0; }
      .trade-roster    { max-height: 240px; }
      .trade-v2-layout { grid-template-columns: 1fr; }
      .trade-v2-list-h { max-height: 240px; }

      /* Scouting: stay 2-col */
      .scout-top-grid   { grid-template-columns: 1fr 1fr; }
      .scout-needs-grid { grid-template-columns: repeat(2, 1fr); }

      /* Card grids: 3 columns on tablet */
      .card-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }

      /* Franchise / roster: 2-col */
      .franchise-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .rosters-grid   { grid-template-columns: repeat(2, 1fr); }
      .player-grid    { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .wrapped-grid   { grid-template-columns: repeat(2, 1fr); gap: 10px; }

      /* Rivalry, rivalry cards: 2-col */
      .rivalry-grid { grid-template-columns: repeat(2, 1fr); }

      /* Tables: touch-friendly horizontal scroll */
      .table-wrap { -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain; }

      /* Charts: taller to use freed horizontal space */
      .chart-wrap canvas { height: 400px !important; }

      /* Section spacing: more breathing room than mobile */
      .section       { margin-bottom: 24px; }
      .section-title { font-size: .92rem; }
    }

    /* ══ DESKTOP  1441px – 1920px ═════════════════════════════
       Slightly wider sidebar. Content column is centered and
       capped at --content-max. Denser, taller panels.
    ═══════════════════════════════════════════════════════════ */
    @media (min-width: 1441px) {
      :root { --sidebar-w: 224px; --content-max: 1440px; }

      /* Sidebar: 10px wider for breathing room */
      header { width: 224px; }
      main   { margin-left: 224px; }

      /* Trade panels: show more players without scrolling */
      .trade-v2-list-h { max-height: 560px; }
      .trade-roster    { max-height: 480px; }

      /* Card grids: crisper column sizing at desktop density */
      .card-grid      { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
      .franchise-grid { gap: 18px; }
      .player-grid    { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
      .wrapped-grid   { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
      .rosters-grid   { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

      /* Charts: taller at desktop */
      .chart-wrap canvas { height: 440px !important; }

      /* Spacing: more generous between sections */
      .section { margin-bottom: 36px; }

      /* Franchise stat labels: wider for readability */
      .franchise-stat-label { width: 90px; }
    }

    /* ══ ULTRA-WIDE  1921px+ ══════════════════════════════════
       Expand content cap to 1600px — prevents the 1440px column
       from becoming an island of whitespace on 27"–32" monitors.
    ═══════════════════════════════════════════════════════════ */
    @media (min-width: 1921px) {
      :root { --content-max: 1600px; }
    }
  </style>
</head>
<body>

<!-- ── MOBILE TOP BAR (hidden on desktop) ─────────────────── -->
<div id="mobile-topbar">
  <span class="m-logo"><img src="./front-office-logo.png" alt="Front Office" onclick="switchTab('league')" style="width:90px;height:auto;display:block;cursor:pointer"></span>

</div>

<div id="mobile-overlay" onclick="mobileNavClose()"></div>

<header>

    <img src="./front-office-logo.png" alt="Front Office" style="width:100%;height:auto;display:block;cursor:pointer" onclick="switchTab('league')">

  </div>

    <button data-tab="teams" onclick="switchTab('teams')">🏈 Teams <span class="nav-shortcut">2</span></button>

  <div id="sidebar-season" style="padding:8px 14px;margin-top:4px;border-top:1px solid var(--border);display:none">

  </nav>
  <div class="league-controls">

  </div>
  <div style="padding:10px 14px;border-top:1px solid var(--border)">
    <button id="data-sources-toggle" onclick="toggleDataSources()">
      <span>Data Sources</span><span class="ds-arrow">▾</span>

    <div id="data-sources-panel">
      <div style="display:flex;flex-direction:column;gap:4px">
        <div style="font-size:.7rem;color:var(--muted)">
          <span style="color:var(--accent);font-weight:600">FC</span>
          <span class="tip" data-tip="FantasyCalc dynasty trade values. Crowd-sourced market values updated daily. Reflects what the dynasty community thinks a player is worth in a trade. Used as the base for all MVE calculations." style="margin-left:2px">?</span>

<script>
// Catch any unhandled promise rejection during loading and surface it
window.addEventListener('unhandledrejection', e => {
  const loadingVisible = document.getElementById('loading')?.style.display !== 'none';
  if (loadingVisible) showError('Unexpected error: ' + (e.reason?.message || String(e.reason)));
});

// ── CONSTANTS ─────────────────────────────────────────────────
const BASE    = 'https://api.sleeper.app/v1';
const FC_BASE = 'https://api.fantasycalc.com/values/current';
const HS_URL  = pid => `https://sleepercdn.com/content/nfl/players/thumb/${pid}.jpg`;
const AV_URL  = av  => `https://sleepercdn.com/avatars/thumbs/${av}`;

const POS_COLORS = {
  QB: '#a371f7', RB: '#3fb950', WR: '#58a6ff', TE: '#fb8500', OTH: '#374151'
};
const POS_BG = {
  QB: '#3b1f6e', RB: '#4c0f1f', WR: '#6b1030', TE: '#5c2209', K: '#1f2937', DEF: '#1f2937'
};

// ── STATE ─────────────────────────────────────────────────────
let S = {
  currentLeagueId: null, leagues: {}, seasonChain: [],
  fcBySleeperId: {}, fcValues: [],
  fcPickValues: {},       // { year: { 1: {early,mid,late,avg}, 2: val, 3: val, 4: val } }
  ktcBySleeperId: {},     // ktc values keyed by sleeper ID (if CORS allows)
  ktcAvailable: false,    // whether KTC loaded successfully
  pickOwnership: {},      // { "season_round_origRosterId": { currentOwner, originalOwner, season, round } }
  knownDraftSlots: {},    // rosterId(str) → pick slot(int) for the upcoming draft (e.g. 2026)
  knownDraftSeason: null, // e.g. '2026' — season for which slots are known
  tradeA: { rosterId: null, players: [], picks: [] },
  tradeB: { rosterId: null, players: [], picks: [] },
  rostersSelected: null,
  powerChart: null,
  statsCache: {},         // `${season}_${week}` -> stats object
  playersMeta: {},        // sleeperId -> { name, pos, team, age } from FantasyCalc
  playersFilter: { pos: 'ALL', week: 1 },
  posPercentiles: {},     // { QB:{p25,p50,p75}, RB:{...}, WR:{...}, TE:{...} }
  draftHistory: {},       // { leagueId: { season, rosterMap, picks[] } }
  playoffData:  {},       // { leagueId: { bracket, matchupsByWeek, season, rosterMap, maxRound, regPPG } }
};
let draftHistoryLoaded   = false;
let draftHistoryLoading  = false;
let draftHistoryPromise  = null;
let playoffsLoaded  = false;
let playoffsLoading = false;
// Tracks an in-flight season rollforward so fo_season_accepted is only persisted
// after the new league loads successfully (avoids locking users out if load fails).
let _pendingRollforward  = null; // { srcId, year, newId }

// ── HELPERS ───────────────────────────────────────────────────
async function api(path, timeoutMs = 10000) {
  const r = await fetch(BASE + path, { signal: AbortSignal.timeout(timeoutMs) });
  if (!r.ok) throw new Error('Sleeper API ' + r.status + ': ' + path);
  return r.json();
}

function imgSrc(pid) { return HS_URL(pid); }

function imgFallback(el, pos) {
  const colors = { QB:'#6d28d9', RB:'#166534', WR:'#1d4ed8', TE:'#92400e', K:'#374151', DEF:'#374151' };
  const c = colors[pos] || '#374151';
  el.outerHTML = `<span class="hs-fallback" style="width:${el.width||36}px;height:${el.height||36}px;background:${c};font-size:${Math.round((el.width||36)*0.3)}px">${pos||'?'}</span>`;
}

function posOrder(pos) { return { QB:0, RB:1, WR:2, TE:3, K:4, DEF:5 }[pos] ?? 6; }
function fmt(n, d=1)   { return Number(n).toFixed(d); }
function fmtP(n)       { return Number(n).toFixed(2); }
// Convert #rrggbb hex to rgba() — html2canvas doesn't support 8-digit hex (#rrggbbaa)
function hexA(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function statLine(stats, pos) {
  if (!stats) return '';
  const p = [];
  if (pos === 'QB') {
    if (stats.pass_yd)  p.push(Math.round(stats.pass_yd) + ' pass yds');
    if (stats.pass_td)  p.push(stats.pass_td + ' TD');
    if (stats.pass_int) p.push(stats.pass_int + ' INT');
    if (stats.rush_yd)  p.push(Math.round(stats.rush_yd) + ' rush yds');
    if (stats.rush_td)  p.push(stats.rush_td + ' rush TD');
  } else if (pos === 'RB') {
    if (stats.rush_att) p.push(stats.rush_att + ' att');
    if (stats.rush_yd)  p.push(Math.round(stats.rush_yd) + ' rush yds');
    if (stats.rush_td)  p.push(stats.rush_td + ' rush TD');
    if (stats.rec)      p.push(stats.rec + '/' + (stats.rec_tgt||'?') + ' rec');
    if (stats.rec_yd)   p.push(Math.round(stats.rec_yd) + ' rec yds');
    if (stats.rec_td)   p.push(stats.rec_td + ' rec TD');
  } else if (pos === 'WR' || pos === 'TE') {
    if (stats.rec_tgt)  p.push(stats.rec_tgt + ' tgt');
    if (stats.rec)      p.push(stats.rec + ' rec');
    if (stats.rec_yd)   p.push(Math.round(stats.rec_yd) + ' rec yds');
    if (stats.rec_td)   p.push(stats.rec_td + ' TD');
    if (stats.rush_yd && stats.rush_yd > 0) p.push(Math.round(stats.rush_yd) + ' rush yds');
  }
  return p.join(' · ') || 'DNP';
}

function ptsKey(ppr) {
  if (ppr >= 1)   return 'pts_ppr';
  if (ppr >= 0.5) return 'pts_half_ppr';
  return 'pts_std';
}

function badge(rank) {
  const c = rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
  return `<span class="rank-num ${c}">${rank}</span>`;
}

function rankPill(rank, total) {
  const pct = rank/total;
  const bg = pct<=.25?'#14532d':pct<=.5?'#78350f':'#7f1d1d';
  const color = pct<=.25?'#4ade80':pct<=.5?'#fbbf24':'#fca5a5';
  return `<span class="rank-pill" style="background:${bg};color:${color}">${rank}</span>`;
}

function contenderTier(rank, total) {
  const p = rank/total;
  if (p<=.25) return { label:'Contender',       color:'#16a34a', bg:'rgba(22,163,74,.28)' };
  if (p<=.5)  return { label:'Frisky',           color:'#d97706', bg:'rgba(217,119,6,.28)' };
  if (p<=.75) return { label:'Rebuilding',       color:'#dc2626', bg:'rgba(220,38,38,.28)' };
  return        { label:'Trust the Process',      color:'#94a3b8', bg:'rgba(148,163,184,.2)' };
}

// ── LOAD ──────────────────────────────────────────────────────
function setLoadingMsg(msg) {
  const el = document.querySelector('#loading p');
  if (el) el.textContent = msg;
}

// ── FANTASY YEAR ─────────────────────────────────────────────
// Dynasty season rolls forward on March 15: Super Bowl is done,
// free agency / draft buzz begins. Keeps pick-year logic stable
// through January–February when the calendar year has flipped but
// the dynasty cycle hasn't.
function fantasyYear() {
  const now = new Date();
  const m = now.getMonth(), d = now.getDate(); // month is 0-indexed
  return (m > 2 || (m === 2 && d >= 15)) ? now.getFullYear() : now.getFullYear() - 1;
}

// ── NEW-SEASON AUTO-DETECT ────────────────────────────────────
// Banner state per source-league + target-year (scoped to localStorage):
//   fo_season_dismissed_{oldId}_{year}  = '1'       → user said "not now"
//   fo_season_accepted_{oldId}_{year}   = newId      → user already migrated
//
// Detection uses strict previous_league_id matching only — no fuzzy fallback.
async function detectNewSeason() {
  const league = S.leagues[S.currentLeagueId];
  if (!league) return;
  const fYear = fantasyYear();
  if (parseInt(league.season) >= fYear) return; // already on current season

  const srcId = S.currentLeagueId;
  const dismissKey = `fo_season_dismissed_${srcId}_${fYear}`;
  const acceptKey  = `fo_season_accepted_${srcId}_${fYear}`;

  // Skip if already dismissed or previously migrated
  if (localStorage.getItem(dismissKey) || localStorage.getItem(acceptKey)) return;

  const owners = [...new Set(
    Object.values(league.rosterMap).map(r => r.ownerId).filter(Boolean)
  )];

  console.log(`[rollforward] Checking ${owners.length} owners for a ${fYear} season league…`);

  let foundLeague = null;
  let checkedOwners = 0;
  for (const ownerId of owners.slice(0, 4)) {
    checkedOwners++;
    try {
      const userLeagues = await fetch(
        `${BASE}/user/${ownerId}/leagues/nfl/${fYear}`,
        { signal: AbortSignal.timeout(6000) }
      ).then(r => r.ok ? r.json() : null);
      if (!Array.isArray(userLeagues)) continue;
      // Strict match only — previous_league_id must equal the current league ID exactly
      const match = userLeagues.find(l => l.previous_league_id === srcId);
      if (match) { foundLeague = match; break; }
    } catch(e) { /* non-critical — skip this owner */ }
  }

  if (!foundLeague) {
    console.log(`[rollforward] Checked ${checkedOwners} owner(s) — no ${fYear} rollover found.`);
    return;
  }

  // Guard: don't offer to load a league that's already active
  if (foundLeague.league_id === srcId) return;

  const leagueName = foundLeague.name || `${fYear} League`;
  console.log(`[rollforward] Found: "${leagueName}" (${foundLeague.league_id}) after checking ${checkedOwners} owner(s).`);
  _showNewSeasonBanner(foundLeague.league_id, fYear, leagueName, srcId);
}

function _showNewSeasonBanner(newId, year, leagueName, srcId) {
  const el = document.getElementById('new-season-banner');
  if (!el) return;
  const btnStyle = 'padding:3px 10px;border-radius:5px;cursor:pointer;font-size:.75rem';
  el.innerHTML =
    `<span>📅 <strong>${year} season found:</strong> ${leagueName}</span>` +
    `<button onclick="_loadNewSeason('${newId}','${srcId}','${year}')" ` +
      `style="${btnStyle};margin-left:8px;background:rgba(56,189,248,.15);color:#7dd3fc;border:1px solid rgba(56,189,248,.3)">` +
      `Load ${year} League</button>` +
    `<button onclick="_dismissNewSeason('${srcId}','${year}')" ` +
      `style="${btnStyle};margin-left:4px;background:none;color:var(--muted);border:1px solid var(--border)">` +
      `Dismiss</button>`;
  el.style.display = 'flex';
}

async function _loadNewSeason(newId, srcId, year) {
  // Record the pending transition — fo_season_accepted is only written after
  // initLoad() succeeds so a network failure doesn't permanently hide the banner.
  _pendingRollforward = { srcId, year, newId };
  // Clear any dismissed state for the new league (fresh start)
  localStorage.removeItem(`fo_season_dismissed_${newId}_${year}`);
  document.getElementById('new-season-banner').style.display = 'none';
  document.getElementById('leagueInput').value = newId;
  localStorage.setItem('fo_league_id', newId);
  await initLoad();
}

function _dismissNewSeason(srcId, year) {
  localStorage.setItem(`fo_season_dismissed_${srcId}_${year}`, '1');
  document.getElementById('new-season-banner').style.display = 'none';
}

async function initLoad() {
  const id = document.getElementById('leagueInput').value.trim();
  if (!id) return;
  document.getElementById('new-season-banner').style.display = 'none';
  showLoading(true);
  try {
    setLoadingMsg('Connecting to Sleeper…');
    await loadChain(id);
    // Persist only after a successful load — never save a bad ID
    localStorage.setItem('fo_league_id', id);
    // Confirm a pending rollforward transition now that the load succeeded
    if (_pendingRollforward && _pendingRollforward.newId === id) {
      localStorage.setItem(`fo_season_accepted_${_pendingRollforward.srcId}_${_pendingRollforward.year}`, id);
      _pendingRollforward = null;
    }
    showLoading(false);
    renderAll();
    // Load matchup weeks and Sleeper player data in the background
    loadMatchupsBackground();
    loadSleeperPlayers();
    // Non-blocking: check if a newer season league exists
    detectNewSeason();
  } catch(e) {
    // If the saved ID caused the failure, clear it so the next visit starts fresh
    if (localStorage.getItem('fo_league_id') === id) {
      localStorage.removeItem('fo_league_id');
    }
    // Discard pending rollforward so the banner can re-appear on retry
    _pendingRollforward = null;
    showError(e.message || String(e));
  }
}

// Parses one Sleeper API response set into the rosterMap/userMap structure.
function _buildSeasonEntry(id, league, users, rosters) {
  const userMap = {};
  users.forEach(u => {
    userMap[u.user_id] = {
      teamName: (u.metadata && u.metadata.team_name) || u.display_name,
      displayName: u.display_name,
      avatar: u.avatar,
    };
  });
  const rosterMap = {};
  rosters.forEach(r => {
    const u = userMap[r.owner_id] || {};
    rosterMap[r.roster_id] = {
      rosterId: r.roster_id, ownerId: r.owner_id,
      teamName: u.teamName || ('Team ' + r.roster_id),
      displayName: u.displayName || '',
      avatar: u.avatar || null,
      wins:   (r.settings && r.settings.wins)           || 0,
      losses: (r.settings && r.settings.losses)         || 0,
      ties:   (r.settings && r.settings.ties)           || 0,
      fpts:   ((r.settings && r.settings.fpts)          || 0) + ((r.settings && r.settings.fpts_decimal)          || 0) / 100,
      fpts_against: ((r.settings && r.settings.fpts_against) || 0) + ((r.settings && r.settings.fpts_against_decimal) || 0) / 100,
      players: r.players || [],
    };
  });
  const psStart = (league.settings && league.settings.playoff_week_start) || 15;
  return { id, league, rosterMap, userMap, completedWeeks: [], playoffWeekStart: psStart, season: league.season };
}

async function loadChain(startId) {
  S.seasonChain = []; S.leagues = {};
  S.draftHistory = {}; draftHistoryLoaded = false; draftHistoryLoading = false; draftHistoryPromise = null;
  playoffsLoaded = false; playoffsLoading = false;

  // Load ONLY the current season before showing the UI — historical seasons load in background.
  setLoadingMsg('Loading league from Sleeper…');
  const [league, users, rosters] = await Promise.all([
    api('/league/' + startId),
    api('/league/' + startId + '/users'),
    api('/league/' + startId + '/rosters'),
  ]);
  S.leagues[startId] = _buildSeasonEntry(startId, league, users, rosters);
  S.seasonChain.push(startId);
  S.currentLeagueId = startId;

  // Kick off historical season loading in the background (non-blocking)
  if (league.previous_league_id) {
    _loadHistoricalSeasons(league.previous_league_id);
  }

  // FantasyCalc + traded picks + KTC — all fired in parallel
  setLoadingMsg('Loading player values…');
  const ld = S.leagues[S.currentLeagueId];
  const isSF = (ld.league.roster_positions||[]).includes('SUPER_FLEX');
  const rec   = (ld.league.scoring_settings && ld.league.scoring_settings.rec) || 0;
  const ppr   = rec >= 1 ? 1 : rec >= 0.5 ? 0.5 : 0;

  const [fcRes, tradedPicksRes, ktcRes] = await Promise.allSettled([
    fetch(`${FC_BASE}?isDynasty=true&numQbs=${isSF?2:1}&ppr=${ppr}`, { signal: AbortSignal.timeout(15000) }).then(r => r.json()),
    fetch(`${BASE}/league/${S.currentLeagueId}/traded_picks`, { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : []).catch(() => []),
    // Try local snapshot first (same-origin, no CORS); fall back to live KTC
    fetch(`./ktc-latest.json?d=${new Date().toISOString().slice(0,10)}`, { signal: AbortSignal.timeout(2000) })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(snap => {
        if (snap && Array.isArray(snap.data)) return snap.data;   // snapshot format
        if (Array.isArray(snap)) return snap;                      // raw array fallback
        return Promise.reject();
      })
      .catch(() =>
        fetch('https://keeptradecut.com/api/dynasty-rankings', {
          headers: { Accept: 'application/json' }, signal: AbortSignal.timeout(1500)
        }).then(r => r.ok ? r.json() : null).catch(() => null)
      ),
  ]);

  // Process FantasyCalc
  S.fcValues = fcRes.status === 'fulfilled' ? (fcRes.value || []) : [];
  if (fcRes.status === 'rejected') console.warn('FantasyCalc unavailable:', fcRes.reason);
  S.fcBySleeperId = {};
  S.fcValues.forEach(fc => {
    if (fc.player && fc.player.sleeperId) {
      const sid = String(fc.player.sleeperId);
      S.fcBySleeperId[sid] = fc;
      S.playersMeta[sid]   = { name: fc.player.name, pos: fc.player.position, team: fc.player.team || '', value: fc.value, age: fc.player.age || null };
    }
  });

  // Compute per-position value percentiles (used for Buy/Sell/Hold signals)
  S.posPercentiles = {};
  ['QB','RB','WR','TE'].forEach(pos => {
    const vals = S.fcValues
      .filter(fc => fc.player && fc.player.position === pos && (fc.value||0) > 0)
      .map(fc => fc.value)
      .sort((a,b) => a-b);
    if (!vals.length) { S.posPercentiles[pos] = { p25:0, p50:0, p75:0 }; return; }
    S.posPercentiles[pos] = {
      p25: vals[Math.floor(0.25*vals.length)] || 0,
      p50: vals[Math.floor(0.50*vals.length)] || 0,
      p75: vals[Math.floor(0.75*vals.length)] || 0,
    };
  });

  // Build FC pick value map from RDP entries
  S.fcPickValues = {};
  S.fcValues.forEach(fc => {
    if (!fc.player || fc.player.position !== 'RDP') return;
    const name = fc.player.name || '';
    const yearMatch = name.match(/(\d{4})/);
    if (!yearMatch) return;
    const yr = yearMatch[1];
    const lname = name.toLowerCase();
    if (!S.fcPickValues[yr]) S.fcPickValues[yr] = { 1: { early:0, mid:0, late:0, avg:0 }, 2:0, 3:0, 4:0 };
    if (lname.includes('1st') || /\b1\.\d/.test(name)) {
      if (lname.includes('early')) S.fcPickValues[yr][1].early = fc.value;
      else if (lname.includes('mid')) S.fcPickValues[yr][1].mid = fc.value;
      else if (lname.includes('late')) S.fcPickValues[yr][1].late = fc.value;
      else { S.fcPickValues[yr][1].early = S.fcPickValues[yr][1].mid = S.fcPickValues[yr][1].late = fc.value; }
    } else if (lname.includes('2nd') || /\b2\.\d/.test(name)) {
      S.fcPickValues[yr][2] = fc.value;
    } else if (lname.includes('3rd') || /\b3\.\d/.test(name)) {
      S.fcPickValues[yr][3] = fc.value;
    } else if (lname.includes('4th') || /\b4\.\d/.test(name)) {
      S.fcPickValues[yr][4] = fc.value;
    }
  });
  Object.values(S.fcPickValues).forEach(yv => {
    const { early, mid, late } = yv[1];
    const vals = [early, mid, late].filter(v => v > 0);
    yv[1].avg = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 5000;
    // When FC only provides a single undifferentiated value (early===mid===late),
    // spread the buckets using dynasty pick value multipliers:
    //   Early (top ~3 picks): +30%   Mid (picks ~4-8): base   Late (picks ~9-12): -28%
    if (vals.length > 0 && early === mid && mid === late && early > 0) {
      const base = mid;
      yv[1].early = Math.round(base * 1.30);
      yv[1].mid   = base;
      yv[1].late  = Math.round(base * 0.72);
    }
  });

  // Process traded picks
  try {
    const tradedPicks = tradedPicksRes.status === 'fulfilled' ? (tradedPicksRes.value || []) : [];
    S.pickOwnership = buildPickOwnership(S.leagues[S.currentLeagueId], tradedPicks);
  } catch(e) { console.warn('Pick ownership build failed:', e); S.pickOwnership = {}; }

  // Fetch upcoming draft order so known pick slots (e.g. 2026 1.04) can be displayed
  S.knownDraftSlots = {};
  S.knownDraftSeason = null;
  try {
    const lg = S.leagues[S.currentLeagueId];
    const isDraftDone = lg.league.status !== 'pre_draft';
    const draftSeason = String(parseInt(lg.season) + (isDraftDone ? 1 : 0));
    const upcomingDrafts = await fetch(`${BASE}/league/${S.currentLeagueId}/drafts`, { signal: AbortSignal.timeout(8000) })
      .then(r => r.ok ? r.json() : []).catch(() => []);
    const upcoming = (upcomingDrafts || []).find(d =>
      String(d.season) === draftSeason &&
      d.status !== 'complete' &&
      d.slot_to_roster_id &&
      Object.keys(d.slot_to_roster_id).length > 0
    );
    if (upcoming) {
      Object.entries(upcoming.slot_to_roster_id).forEach(([slot, rid]) => {
        S.knownDraftSlots[String(rid)] = parseInt(slot);
      });
      S.knownDraftSeason = upcoming.season;
      console.log(`[draft] Known ${draftSeason} draft order loaded: ${Object.keys(S.knownDraftSlots).length} teams`);
    }
  } catch(e) { /* non-critical — pick display degrades to Early/Mid/Late */ }

  // Process KTC (CORS usually blocks — 1.5s timeout, graceful fallback)
  S.ktcAvailable = false; S.ktcBySleeperId = {};
  try {
    const ktcData = ktcRes.status === 'fulfilled' ? ktcRes.value : null;
    if (Array.isArray(ktcData)) {
      ktcData.forEach(p => {
        if (!p.sleeperId) return;
        // Use SF value for superflex leagues when available; fall back to 1QB value
        const val = isSF ? (p.sfValue || p.sf_value || p.value || 0) : (p.value || 0);
        S.ktcBySleeperId[String(p.sleeperId)] = val;
      });
      S.ktcAvailable = Object.keys(S.ktcBySleeperId).length > 0;
    }
  } catch(e) { /* fallback to FC-only */ }

}

// Loads older seasons in the background after the UI is already visible.
async function _loadHistoricalSeasons(startId) {
  let id = startId, iterations = 0;
  while (id && iterations < 5) {
    iterations++;
    try {
      const [league, users, rosters] = await Promise.all([
        api('/league/' + id),
        api('/league/' + id + '/users'),
        api('/league/' + id + '/rosters'),
      ]);
      S.leagues[id] = _buildSeasonEntry(id, league, users, rosters);
      S.seasonChain.push(id);
      updateSidebarSeason();
      id = league.previous_league_id || null;
    } catch(e) { break; } // non-critical — stop silently on error
  }
}

// ── BACKGROUND SLEEPER PLAYERS LOADER ────────────────────────
// Fetches full NFL player list to back-fill team + age missing from FantasyCalc in offseason.
// Also populates K and DEF entries in playersMeta for players actually on rosters.
async function loadSleeperPlayers() {
  try {
    const data = await fetch(`${BASE}/players/nfl`, { signal: AbortSignal.timeout(25000) })
      .then(r => r.ok ? r.json() : null);
    if (!data) return;

    // Collect all player IDs currently on any roster so we can fill K/DEF meta
    const rosterPids = new Set();
    Object.values(S.leagues).forEach(lg => {
      Object.values(lg.rosterMap || {}).forEach(r => {
        (r.players || []).forEach(pid => rosterPids.add(String(pid)));
      });
    });

    const today = new Date();
    Object.entries(data).forEach(([pid, pl]) => {
      const existing = S.playersMeta[pid];
      if (existing) {
        // Back-fill team + age for FC players (original behaviour)
        if (pl.team) existing.team = pl.team;
        if (!existing.age && pl.birth_date) {
          const born = new Date(pl.birth_date);
          const age = today.getFullYear() - born.getFullYear() -
            (today < new Date(today.getFullYear(), born.getMonth(), born.getDate()) ? 1 : 0);
          if (age > 18 && age < 50) {
            existing.age = age;
            if (S.fcBySleeperId[pid]) S.fcBySleeperId[pid].player.age = age;
          }
        }
        // Back-fill years_exp from Sleeper (authoritative) so Rookie Board filter works
        if (pl.years_exp !== undefined) {
          existing.years_exp = pl.years_exp;
          if (S.fcBySleeperId[pid]) S.fcBySleeperId[pid].player.years_exp = pl.years_exp;
        }
      } else if (rosterPids.has(pid) && (pl.position === 'K' || pl.position === 'DEF')) {
        // Add K and DEF players that are on rosters but not in FC data
        S.playersMeta[pid] = {
          name: pl.full_name || pl.first_name || pl.last_name || pid,
          pos:  pl.position,
          team: pl.team || '',
          age:  null,
          value: 0,
        };
      }
    });

    // years_exp was just back-filled — invalidate the rookie board cache
    // (cache key is S.fcValues.length, which didn't change, so we force-bust it)
    _rbCache = null; _rbCacheLen = -1;

    if (currentTab === 'players') renderPlayersTab();
    if (currentTab === 'rosters') renderRosters();
    // Re-draw trade rosters so K/DEF show correctly as soon as meta is ready
    if (S.tradeA?.rosterId) drawRoster('A', S.tradeA.rosterId);
    if (S.tradeB?.rosterId) drawRoster('B', S.tradeB.rosterId);
    if (document.getElementById('trade-rookie-board')) renderRookieBoard();
  } catch(e) { console.warn('Sleeper players fetch failed:', e); }
}

// ── PICK OWNERSHIP & VALUATION ────────────────────────────────

function buildPickOwnership(league, tradedPicks) {
  const { rosterMap } = league;
  // Which seasons to track: current year forward if draft not done, else next year forward
  const isDraftDone = (league.league.status !== 'pre_draft');
  const baseYear = parseInt(league.season) + (isDraftDone ? 1 : 0);
  const seasons = [baseYear, baseYear+1, baseYear+2].map(String);
  const rounds = [1, 2, 3, 4];

  // Initialize: each team owns their own picks
  const ownership = {};
  Object.keys(rosterMap).forEach(rid => {
    seasons.forEach(season => {
      rounds.forEach(round => {
        const key = `${season}_${round}_${rid}`;
        ownership[key] = { currentOwner: parseInt(rid), originalOwner: parseInt(rid), season, round };
      });
    });
  });

  // Apply traded picks.
  // Sleeper may return multiple entries for the same pick (chain trades: A->B->C).
  // The array is chronological; later entries override earlier ones for the same pick key.
  // Build a deduplicated map first, keeping the entry with the most-recent owner.
  const latestByKey = {};
  (tradedPicks || []).forEach(tp => {
    if (!seasons.includes(String(tp.season))) return;
    const key = `${tp.season}_${tp.round}_${tp.roster_id}`;
    // Keep track — later entries in the array represent more recent transactions
    latestByKey[key] = tp;
  });
  Object.entries(latestByKey).forEach(([key, tp]) => {
    if (ownership[key]) {
      ownership[key].currentOwner = parseInt(tp.owner_id);
    } else {
      // Pick from a roster not currently in rosterMap (orphaned or expansion)
      ownership[key] = {
        currentOwner: parseInt(tp.owner_id),
        originalOwner: parseInt(tp.roster_id),
        season: String(tp.season),
        round: parseInt(tp.round),
      };
    }
  });
  return ownership;
}

function getTeamPickList(rosterId) {
  const rid = parseInt(rosterId);
  const picks = [];
  Object.entries(S.pickOwnership).forEach(([key, p]) => {
    if (p.currentOwner === rid) picks.push({ key, ...p });
  });
  return picks.sort((a,b) =>
    parseInt(a.season)-parseInt(b.season) || a.round-b.round || a.originalOwner-b.originalOwner
  );
}

// Interpolate a pick value from exact slot position within Early/Mid/Late range
function slotToPickValue(slot, n, season) {
  const pct = (slot - 1) / Math.max(n - 1, 1); // 0 = 1st pick, 1 = last pick
  const earlyVal = getPickValue(season, 1, 'Early');
  const midVal   = getPickValue(season, 1, 'Mid');
  const lateVal  = getPickValue(season, 1, 'Late');
  if (pct <= 0.5) return Math.round(earlyVal + (midVal - earlyVal) * (pct * 2));
  return Math.round(midVal + (lateVal - midVal) * ((pct - 0.5) * 2));
}

function pickDisplayName(pick) {
  const roundName = ['','1st','2nd','3rd','4th'][pick.round] || `Rd ${pick.round}`;
  const league = ld();
  const origTeam = league && league.rosterMap[pick.originalOwner];
  const via = pick.originalOwner !== pick.currentOwner
    ? ` (via ${origTeam ? origTeam.teamName : 'Team '+pick.originalOwner})`
    : '';
  // Show exact slot when draft order is known (e.g. "2026 1.04")
  if (pick.round === 1 && S.knownDraftSeason && String(pick.season) === String(S.knownDraftSeason)) {
    const slot = S.knownDraftSlots[String(pick.originalOwner)];
    if (slot) return `${pick.season} 1.${String(slot).padStart(2, '0')}${via}`;
  }
  return `${pick.season} ${roundName}${via}`;
}

// Tiered pick value: use FC RDP data when available; fall back to hardcoded tier defaults
// bucket param ('Early'|'Mid'|'Late') selects within 1st-round early/mid/late FC values
// Round 1 has bucket-differentiated fallbacks; other rounds are flat
const PICK_FALLBACK = { 1: { early: 8200, mid: 5500, late: 3200 }, 2: 2200, 3: 1100, 4: 500 };

// ── ROOKIE CLASS BANNERS ───────────────────────────────────────
// Human-readable Rookie Board banner labels. Separate from the pick-engine
// ROOKIE_CLASS_PROFILES const (defined earlier) which drives valuation math.
// Update each year. label: 'Elite'|'Strong'|'Average'|'Weak'|'Unknown'
const ROOKIE_CLASS_BANNERS = {
  2022: { label: 'Strong',  note: 'Deep WR class led by London, Wilson, St. Brown' },
  2023: { label: 'Weak',    note: 'Shallow class; QB-heavy, limited elite skill talent' },
  2024: { label: 'Strong',  note: 'Deep TE/WR class; Nabers, Odunze, Bowers headlined' },
  2025: { label: 'Average', note: 'Balanced across positions; several boom/bust prospects' },
  2026: { label: 'Unknown', note: 'Class TBD — update after NFL Draft' },
};
function getPickValue(season, round, bucket) {
  const pv = S.fcPickValues[String(season)];
  if (pv) {
    const rv = pv[parseInt(round)];
    if (rv && typeof rv === 'object') {
      // Use projected bucket when available for 1st-rounders
      if (bucket === 'Early' && rv.early > 0) return rv.early;
      if (bucket === 'Late'  && rv.late  > 0) return rv.late;
      return rv.mid || rv.avg || rv.early || rv.late || PICK_FALLBACK[1].mid;
    }
    if (rv && rv > 0) return rv;
  }
  // Try adjacent year if season not in FC (future year)
  const years = Object.keys(S.fcPickValues).sort();
  if (years.length) {
    const latest = S.fcPickValues[years[years.length-1]];
    const rv = latest[parseInt(round)];
    const gap = parseInt(season) - parseInt(years[years.length-1]);
    let base = 0;
    if (rv && typeof rv === 'object') {
      if (bucket === 'Early' && rv.early > 0) base = rv.early;
      else if (bucket === 'Late' && rv.late > 0) base = rv.late;
      else base = rv.mid || rv.avg || 0;
    } else { base = rv || 0; }
    if (base > 0) return Math.round(base * Math.pow(0.85, Math.max(gap, 0)));
  }
  // Bucket-differentiated fallback for round 1; flat for other rounds
  const fb = PICK_FALLBACK[parseInt(round)];
  if (fb && typeof fb === 'object') {
    if (bucket === 'Early') return fb.early;
    if (bucket === 'Late')  return fb.late;
    return fb.mid;
  }
  return fb || 300;
}

// ── PROJECTED PICK STRENGTH ENGINE ────────────────────────────
// TUNING KNOBS: weights for pick bucket projection model
const PICK_BUCKET_CFG = {
  classWeight:  0.50,   // franchise classification is the strongest signal
  svWeight:     0.30,   // normalized starter value
  ageWeight:    0.20,   // roster age (young = improving = later pick)
  svMin:       15000,   // lower bound for starter value normalization
  svMax:       65000,   // upper bound
  lateThreshold:  68,   // score >= this → Late pick
  earlyThreshold: 38,   // score <= this → Early pick
  futureGapPenalty: 2,  // years beyond current before confidence degrades
};

// Team strength score per classification label (0–100)
const CLASS_STRENGTH = {
  'Contender':         88,
  'Fringe':  64,
  'Mid-Tier': 50,
  'Retool':            32,
  'Rebuild':           15,
  'Rebuilding':        10,
};

function mveProjectedPickBucket(teamProfile, season) {
  const B = PICK_BUCKET_CFG;
  if (!teamProfile) return { bucket: 'Mid', confidence: 'low', source: 'fallback' };

  const cls        = (teamProfile.classification && teamProfile.classification.label) || 'Mid-Tier';
  const sv         = teamProfile.starterValue || 0;
  const age        = teamProfile.weightedAge  || 27;
  const classScore = CLASS_STRENGTH[cls] !== undefined ? CLASS_STRENGTH[cls] : 50;

  // Starter value normalized 0–100
  const svNorm  = Math.max(0, Math.min(1, (sv - B.svMin) / (B.svMax - B.svMin))) * 100;
  // Age: younger roster = more upside = team more likely to be strong in future = later pick
  const ageScore = age < 25 ? 65 : age < 27 ? 58 : age < 29 ? 48 : age < 31 ? 35 : 22;

  const score = classScore * B.classWeight + svNorm * B.svWeight + ageScore * B.ageWeight;

  let bucket, confidence;
  if (score >= B.lateThreshold) {
    bucket = 'Late'; confidence = score >= 80 ? 'high' : 'medium';
  } else if (score <= B.earlyThreshold) {
    bucket = 'Early'; confidence = score <= 22 ? 'high' : 'medium';
  } else {
    bucket = 'Mid'; confidence = (score > 46 && score < 62) ? 'medium' : 'low';
  }

  // Far-future picks are inherently less predictable
  const yearGap = Math.max(0, parseInt(season) - fantasyYear() - 1);
  if (yearGap >= B.futureGapPenalty) confidence = confidence === 'high' ? 'medium' : 'low';

  return { bucket, confidence, source: 'projected', score: Math.round(score) };
}

function pickBucketHtml(bucket, confidence) {
  if (!bucket || bucket === 'Mid') return '';
  let label = bucket, opacity = 1;
  if (confidence === 'medium') { label = '~' + bucket; opacity = 0.8; }
  else if (confidence === 'low') { label = bucket + '?'; opacity = 0.55; }
  const cls = `bucket-badge bucket-${bucket.toLowerCase()}`;
  return `<span class="${cls}" style="opacity:${opacity}" title="Projection confidence: ${confidence}">${label}</span>`;
}

function pickRoundColor(round) {
  return { 1:'#d29922', 2:'#8b949e', 3:'#b46f2e', 4:'#6b7280' }[parseInt(round)] || '#6b7280';
}

// ── BOARD-DRIVEN ROOKIE PICK VALUATION ────────────────────────
// Class-year sentiment profiles for future picks (no board exists yet)
// Manual overrides for FUTURE years whose classes don't exist yet in FC/KTC.
// Once a year becomes the current year, getClassProfile() ignores these and
// computes live from FantasyCalc + KTC data instead.
const ROOKIE_CLASS_PROFILES = {
  2027: { topEndStrength: 1.12, depthStrength: 1.06, overallStrength: 1.09 },
  2028: { topEndStrength: 1.05, depthStrength: 1.02, overallStrength: 1.03 },
};
const _RCLASS_DEFAULT = { topEndStrength: 1.00, depthStrength: 1.00, overallStrength: 1.00 };

// Calibrated from dynasty rookie class history: FC values at draft time for a neutral class.
// Slots 1-3 = "early" tier, 4-8 = "mid" tier, 9-12 = "depth" tier.
const _CLASS_BASELINE = { top3: 6000, mid5: 3500, late4: 2200 };

// Auto-compute class profile from live FC + KTC for a given year.
// For the current year rookies are actually in FC with years_exp=0.
// For future years, falls back to manual ROOKIE_CLASS_PROFILES overrides.
function getClassProfile(year) {
  const curYear = fantasyYear();
  if (parseInt(year) !== curYear) {
    return ROOKIE_CLASS_PROFILES[parseInt(year)] || _RCLASS_DEFAULT;
  }

  const rookies = S.fcValues
    .filter(fc => fc.player && ['QB','RB','WR','TE'].includes(fc.player.position)
      && fc.player.years_exp === 0 && fc.value > 0)
    .sort((a, b) => b.value - a.value);

  if (rookies.length < 6) return _RCLASS_DEFAULT;

  const avg = (arr) => arr.reduce((s, v) => s + v, 0) / arr.length;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  const top3Avg  = avg(rookies.slice(0, 3).map(fc => fc.value));
  const mid5Avg  = avg(rookies.slice(3, 8).map(fc => fc.value));
  const late4Avg = avg(rookies.slice(8, 12).map(fc => fc.value));

  let topEndStrength  = clamp(top3Avg  / _CLASS_BASELINE.top3,  0.75, 1.40);
  let overallStrength = clamp(mid5Avg  / _CLASS_BASELINE.mid5,  0.75, 1.40);
  let depthStrength   = clamp(late4Avg / _CLASS_BASELINE.late4, 0.75, 1.40);

  // Blend in KTC market sentiment if available: if the market is pricing
  // rookies above/below FC, shift all three multipliers slightly.
  if (S.ktcAvailable) {
    const ktcRookies = rookies.slice(0, 12).filter(fc => S.ktcBySleeperId[String(fc.player?.sleeperId)]);
    if (ktcRookies.length >= 4) {
      const divergence = avg(ktcRookies.map(fc => {
        const ktc = S.ktcBySleeperId[String(fc.player.sleeperId)];
        return (ktc - fc.value) / fc.value;
      }));
      // Small nudge: 20% weight on KTC sentiment, capped at +/-3%
      const nudge = 1 + clamp(divergence * 0.2, -0.03, 0.03);
      topEndStrength  *= nudge;
      overallStrength *= nudge;
      depthStrength   *= nudge;
    }
  }

  return {
    topEndStrength:  Math.round(topEndStrength  * 1000) / 1000,
    overallStrength: Math.round(overallStrength * 1000) / 1000,
    depthStrength:   Math.round(depthStrength   * 1000) / 1000,
  };
}

// Auto-generate the Rookie Board banner for any year.
// Historical years use static text; current year is computed live.
function getClassBanner(year) {
  if (parseInt(year) !== fantasyYear()) {
    return ROOKIE_CLASS_BANNERS[parseInt(year)] || null;
  }

  const rookies = S.fcValues
    .filter(fc => fc.player && ['QB','RB','WR','TE'].includes(fc.player.position)
      && fc.player.years_exp === 0 && fc.value > 0)
    .sort((a, b) => b.value - a.value);

  if (rookies.length < 4) return null;

  const profile = getClassProfile(year);
  const o = profile.overallStrength, t = profile.topEndStrength, d = profile.depthStrength;

  let label;
  if (t >= 1.15 && o >= 1.08) label = 'Elite';
  else if (t >= 1.08 || o >= 1.05) label = 'Strong';
  else if (o >= 0.97 && d >= 0.95) label = 'Average';
  else if (t >= 1.06 && d < 0.95) label = 'Top-Heavy';
  else label = 'Weak';

  // Top names
  const topNames = rookies.slice(0, 3).map(fc => `${fc.player.name} (${fc.player.position})`).join(', ');

  // Position breakdown across the first round (12 slots)
  const posCounts = {};
  rookies.slice(0, 12).forEach(fc => {
    const p = fc.player.position;
    posCounts[p] = (posCounts[p] || 0) + 1;
  });
  const topPos = Object.entries(posCounts).sort((a, b) => b[1] - a[1]);
  const posNote = topPos.length ? `${topPos[0][0]}-heavy` : '';

  // KTC sentiment note
  let ktcNote = '';
  if (S.ktcAvailable) {
    const r12 = rookies.slice(0, 12).filter(fc => S.ktcBySleeperId[String(fc.player?.sleeperId)]);
    if (r12.length >= 4) {
      const bullish = r12.filter(fc => S.ktcBySleeperId[String(fc.player.sleeperId)] > fc.value * 1.12).length;
      const bearish = r12.filter(fc => S.ktcBySleeperId[String(fc.player.sleeperId)] < fc.value * 0.88).length;
      if (bullish >= Math.ceil(r12.length * 0.4))  ktcNote = ' · KTC market bullish';
      else if (bearish >= Math.ceil(r12.length * 0.4)) ktcNote = ' · KTC market cautious';
    }
  }

  const note = `${topNames} headline the class${posNote ? ` · ${posNote}` : ''}${ktcNote}`;
  return { label, note };
}

// Cached rookie board slots (keyed by S.fcValues.length for cheap invalidation)
let _rbCache = null, _rbCacheLen = -1;
function getRookieBoardSlots() {
  if (_rbCache && _rbCacheLen === S.fcValues.length) return _rbCache;
  _rbCache = S.fcValues
    .filter(fc => fc.player && ['QB','RB','WR','TE'].includes(fc.player.position)
      && fc.player.years_exp === 0 && (fc.value || 0) > 0)
    .sort((a, b) => (b.value || 0) - (a.value || 0))
    .slice(0, 36)
    .map((fc, i) => ({
      index: i,
      round: i < 12 ? 1 : i < 24 ? 2 : 3,
      slotNum: i < 12 ? i + 1 : i < 24 ? i - 11 : i - 23,
      slot: i < 12 ? `1.${String(i+1).padStart(2,'0')}`
          : i < 24 ? `2.${String(i-11).padStart(2,'0')}`
          : `3.${String(i-23).padStart(2,'0')}`,
      value: fc.value, pid: fc.player && fc.player.sleeperId, fc,
    }));
  _rbCacheLen = S.fcValues.length;
  return _rbCache;
}

// Detect value tier cliffs in the first-round portion of the board.
// A cliff is a slot-to-slot drop of 8%+ (material tier break).
function detectRookieTierCliffs(boardSlots) {
  const r1 = boardSlots.filter(s => s.round === 1);
  const cliffs = [];
  for (let i = 0; i < r1.length - 1; i++) {
    const a = r1[i].value, b = r1[i + 1] && r1[i + 1].value;
    if (!a || !b) continue;
    const pct = (a - b) / a;
    if (pct >= 0.08) cliffs.push({
      afterSlotNum: i + 1,   // 1-based slot number of the last pick before the cliff
      afterSlot: r1[i].slot,
      pctDrop: pct,
      cliffSeverity: pct >= 0.18 ? 'major' : pct >= 0.12 ? 'moderate' : 'minor',
    });
  }
  return cliffs.sort((a, b) => b.pctDrop - a.pctDrop);
}

// Slot probability distribution for a given Early/Mid/Late bucket within a league
function _slotDist(bucket, confidence, n) {
  n = n || 12;
  const ea = Math.ceil(n / 3);          // top of early zone  (slots 1–4 for n=12)
  const ls = n - Math.floor(n / 3) + 1; // start of late zone (slots 9–12 for n=12)
  let slots, weights;
  if (bucket === 'Early') {
    slots = Array.from({ length: ea }, (_, i) => i + 1);
    const sp = confidence === 'high' ? 1.8 : confidence === 'medium' ? 1.4 : 1.0;
    weights = slots.map((_, i) => Math.pow(sp, slots.length - i)); // heavier toward slot 1
  } else if (bucket === 'Late') {
    slots = Array.from({ length: n - ls + 1 }, (_, i) => ls + i);
    const sp = confidence === 'high' ? 1.6 : confidence === 'medium' ? 1.3 : 1.0;
    weights = slots.map((_, i) => Math.pow(sp, i + 1)); // heavier toward last slot
  } else {
    slots = Array.from({ length: Math.max(1, ls - ea - 1) }, (_, i) => ea + 1 + i);
    if (!slots.length) slots = [Math.ceil(n / 2)];
    weights = slots.map(() => 1); // uniform for mid
  }
  const total = weights.reduce((s, w) => s + w, 0) || 1;
  return slots.map((s, i) => ({ slotNum: s, prob: weights[i] / total }));
}

// Core board-driven value computation (no league context needed).
// Applies neighbor smoothing, optionality premium, and cliff premium.
function _boardPickValue(bucket, confidence, boardSlots, n) {
  const r1 = boardSlots.filter(s => s.round === 1);
  if (r1.length < 4) return null;
  const dist = _slotDist(bucket, confidence, n);
  const cliffs = detectRookieTierCliffs(boardSlots);

  // Weighted expected value with 3-slot neighbor smoothing: 65/15/20
  let rawValue = 0;
  dist.forEach(({ slotNum, prob }) => {
    const s = r1[slotNum - 1]; if (!s) return;
    const prev = r1[slotNum - 2], next = r1[slotNum]; // prev = slotNum-1, next = slotNum+1
    const smoothed = s.value * 0.65
      + (prev ? prev.value : s.value) * 0.15
      + (next ? next.value : s.value) * 0.20;
    rawValue += prob * smoothed;
  });
  const boardValue = Math.round(rawValue);

  // Optionality premium: lower when pick is nearly locked to one elite player
  const topProb = dist.length ? Math.max(...dist.map(d => d.prob)) : 0;
  const optPct = topProb > 0.70 ? 0.02 : topProb > 0.50 ? 0.03 : 0.04;

  // Cliff premium: pick accesses zone containing or ending at a tier cliff
  let cliffPct = 0, cliffNote = '';
  const likelys = dist.filter(d => d.prob >= 0.15).map(d => d.slotNum);
  if (likelys.length) {
    const minS = Math.min(...likelys), maxS = Math.max(...likelys);
    const cliff = cliffs.find(c => c.afterSlotNum >= minS && c.afterSlotNum <= maxS);
    if (cliff) {
      cliffPct = cliff.cliffSeverity === 'major' ? 0.07 : cliff.cliffSeverity === 'moderate' ? 0.05 : 0.03;
      cliffNote = `Cliff after ${cliff.afterSlot}`;
    }
  }

  // Tier label: how many major cliffs fall before this pick's expected slot range?
  let tierLabel = '';
  const majorCliffs = cliffs.filter(c => c.cliffSeverity !== 'minor').sort((a, b) => a.afterSlotNum - b.afterSlotNum);
  if (majorCliffs.length && dist.length) {
    const minSlot = Math.min(...dist.map(d => d.slotNum));
    const tierIdx = majorCliffs.filter(c => c.afterSlotNum < minSlot).length + 1;
    if (tierIdx <= 4) tierLabel = `Tier ${tierIdx}`;
  }

  const totalMult = Math.min(1 + optPct + cliffPct, 1.18); // cap total premium
  return {
    boardValue, neutralValue: Math.round(boardValue * totalMult),
    optionalityPremiumPct: optPct, cliffPremiumPct: cliffPct,
    tierLabel, cliffNote, source: 'board-driven',
    notes: [tierLabel, cliffNote].filter(Boolean),
  };
}

// Small demand/tag modifier (UI display only — added on top in getPickContext)
function _tagMod(actionTag) {
  return { Cornerstone: 0.05, Buy: 0.03, Hold: 0, Shop: 0.01, Sell: -0.01 }[actionTag] || 0;
}

// Full pick context with rich metadata. Used for trade calculator UI rendering.
// Returns { neutralValue, source, notes, ... } — always a safe object.
function getPickContext(pickKey, league) {
  const pts = pickKey.split('_');
  if (pts.length < 3) return { neutralValue: 0, source: 'error', notes: [] };
  const season = String(pts[0]), round = parseInt(pts[1]);

  // Non-1st rounds: flat value, no board logic
  if (round !== 1) {
    return { neutralValue: getPickValue(season, round, null), round, season, source: 'flat', notes: [] };
  }

  const bkt = getPickBucketForKey(pickKey);
  const bucket = (bkt && bkt.bucket) || 'Mid';
  const conf   = (bkt && bkt.confidence) || 'low';
  const curYear = fantasyYear();
  const yearGap = Math.max(0, parseInt(season) - curYear);
  const n = league ? Object.keys(league.rosterMap).length : 12;

  // Current-year: board-driven valuation only — no class-sentiment overlay
  if (parseInt(season) === curYear) {
    const slots = getRookieBoardSlots();
    const base = slots.length >= 6 ? _boardPickValue(bucket, conf, slots, n) : null;
    if (base && base.neutralValue > 100) {
      // Add tag modifier from likely rookies in the expected zone (small signal)
      let tagMod = 0;
      if (league) {
        const dist = _slotDist(bucket, conf, n);
        const r1 = slots.filter(x => x.round === 1);
        dist.forEach(({ slotNum, prob }) => {
          const s = r1[slotNum - 1];
          if (!s || !s.pid) return;
          const mv = mvePlayer(s.pid, league);
          if (mv) tagMod += prob * _tagMod(mv.actionTag);
        });
        tagMod = Math.max(-0.02, Math.min(0.02, tagMod));
      }
      const finalValue = Math.abs(tagMod) >= 0.005
        ? Math.round(base.neutralValue * (1 + tagMod)) : base.neutralValue;
      return { ...base, neutralValue: finalValue, tagModPct: tagMod || 0, round, season, bucket, confidence: conf };
    }
    // Board not yet populated — return plain FC estimate, no class overlay
    return { neutralValue: getPickValue(season, round, bucket), source: 'flat', round, season, notes: [] };
  }

  // Future year only: class-sentiment model
  const cp = getClassProfile(season);
  const years = Object.keys(S.fcPickValues).sort();
  let fcBase = 0;
  if (years.length) {
    const pv = S.fcPickValues[years[years.length - 1]];
    if (pv && pv[1]) {
      fcBase = bucket === 'Early' && pv[1].early > 0 ? pv[1].early
             : bucket === 'Late'  && pv[1].late  > 0 ? pv[1].late
             : pv[1].mid || pv[1].avg || 0;
    }
  }
  if (!fcBase) { const fb = PICK_FALLBACK[1]; fcBase = bucket === 'Early' ? fb.early : bucket === 'Late' ? fb.late : fb.mid; }

  const gapDecay      = Math.pow(0.85, Math.max(yearGap, 0));
  const sentMult      = bucket === 'Early' ? cp.topEndStrength : bucket === 'Late' ? cp.depthStrength : cp.overallStrength;
  const uDiscount     = yearGap <= 0 ? 0 : conf === 'high' ? 0.03 : conf === 'medium' ? 0.04 : 0.07;
  const neutralValue  = Math.round(fcBase * gapDecay * sentMult * (1 - uDiscount));
  return {
    neutralValue, source: 'class-sentiment', round, season, bucket, confidence: conf,
    classStrengthPct: Math.round((sentMult - 1) * 100),
    uncertaintyDiscountPct: Math.round(uDiscount * 100),
    notes: [],
  };
}

// ── COMPUTATIONS ──────────────────────────────────────────────
function ld() { return S.leagues[S.currentLeagueId]; }
function rName(id) { const r = ld() && ld().rosterMap[id]; return r ? r.teamName : 'Team '+id; }

function computeAllPlay(league) {
  const { rosterMap, completedWeeks } = league;
  const ap = {};
  Object.keys(rosterMap).forEach(id => { ap[id] = { wins:0, losses:0, ties:0 }; });
  completedWeeks.forEach(({ data }) => {
    const sc = {};
    data.forEach(t => { sc[t.roster_id] = t.points || 0; });
    const ids = Object.keys(sc);
    ids.forEach(a => ids.forEach(b => {
      if (a===b) return;
      if (sc[a]>sc[b]) ap[a].wins++;
      else if (sc[a]<sc[b]) ap[a].losses++;
      else ap[a].ties++;
    }));
  });
  const nw = completedWeeks.length;
  return Object.values(rosterMap).map(r => {
    const a = ap[r.rosterId] || { wins:0, losses:0, ties:0 };
    const apG = a.wins+a.losses+a.ties;
    const apPct = apG>0 ? a.wins/apG : 0;
    const exp = apPct*nw;
    return { ...r, ap:a, apPct, expectedWins:exp, luck:(r.wins+r.ties*.5)-exp, avgPts:nw>0?r.fpts/nw:0, numWeeks:nw };
  });
}

function computePowerRankings(league) {
  const { rosterMap, completedWeeks } = league;
  const teams = Object.values(rosterMap);
  const posTotals = {};
  teams.forEach(t => {
    const pts = { QB:0, RB:0, WR:0, TE:0, OTH:0, total:0 };
    t.players.forEach(pid => {
      const fc = S.fcBySleeperId[String(pid)];
      if (!fc) return;
      const pos = fc.player.position;
      const val = fc.value||0;
      if (pts[pos]!==undefined) pts[pos]+=val; else pts.OTH+=val;
      pts.total+=val;
    });
    posTotals[t.rosterId] = pts;
  });
  const recentWks = completedWeeks.slice(-3);
  const recentPts = {};
  teams.forEach(t => { recentPts[t.rosterId]=0; });
  recentWks.forEach(({ data }) => { data.forEach(t => { recentPts[t.roster_id]=(recentPts[t.roster_id]||0)+(t.points||0); }); });
  const posRanks = {};
  ['QB','RB','WR','TE'].forEach(pos => {
    [...teams].sort((a,b)=>(posTotals[b.rosterId][pos]||0)-(posTotals[a.rosterId][pos]||0)).forEach((t,i) => {
      if (!posRanks[t.rosterId]) posRanks[t.rosterId]={};
      posRanks[t.rosterId][pos]=i+1;
    });
  });
  function norm(vals) {
    const mn=Math.min(...vals), mx=Math.max(...vals);
    if (mx===mn) return vals.map(()=>50);
    return vals.map(v=>(v-mn)/(mx-mn)*100);
  }
  const ids = teams.map(t=>t.rosterId);
  const hasFC = S.fcValues.length>0;
  const rvN = norm(ids.map(id=>posTotals[id].total));
  const rfN = norm(ids.map(id=>recentPts[id]));
  const result = ids.map((id,i) => ({
    ...rosterMap[id], posTotals:posTotals[id], posRanks:posRanks[id]||{},
    recentPts:recentPts[id], recentNorm:rfN[i], rosterNorm:rvN[i],
    powerScore: hasFC ? rvN[i]*.6+rfN[i]*.4 : rfN[i],
  }));
  result.sort((a,b)=>b.powerScore-a.powerScore);
  return result;
}

function computeScheduleMatrix(league) {
  const { rosterMap, completedWeeks } = league;
  const teams = Object.values(rosterMap);

  // Build weekly opponent data and league-average score per week
  const weeklyData = {};
  const weekAvg = {}; // week -> mean score across all teams
  teams.forEach(t => { weeklyData[t.rosterId] = {}; });

  completedWeeks.forEach(({ week, data }) => {
    const groups = {};
    data.forEach(t => { if (!groups[t.matchup_id]) groups[t.matchup_id]=[]; groups[t.matchup_id].push(t); });

    // League-average score for this week (used when a team would face itself)
    const scores = data.map(t => t.points || 0).filter(s => s > 0);
    weekAvg[week] = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;

    Object.values(groups).forEach(pair => {
      if (pair.length !== 2) return;
      const [a, b] = pair;
      weeklyData[a.roster_id][week] = { score: a.points||0, opponentScore: b.points||0, opponentId: b.roster_id };
      weeklyData[b.roster_id][week] = { score: b.points||0, opponentScore: a.points||0, opponentId: a.roster_id };
    });
  });

  const weeks = completedWeeks.map(w => w.week);

  // matrix[rowTeamId][colTeamId] = record if rowTeam played colTeam's schedule.
  // When TeamY's actual opponent was TeamX that week, substitute the league-average
  // score so W+L = total weeks in every cell (satisfying "8-5 = Wk 13" etc.).
  const matrix = {};
  teams.forEach(tx => {
    matrix[tx.rosterId] = {};
    teams.forEach(ty => {
      let wins=0, losses=0;
      weeks.forEach(w => {
        const xd = weeklyData[tx.rosterId][w];
        const yd = weeklyData[ty.rosterId][w];
        if (!xd || !yd) return;
        const oppScore = (yd.opponentId === tx.rosterId)
          ? weekAvg[w]           // substitute league avg for the head-to-head week
          : yd.opponentScore;
        if (xd.score > oppScore)      wins++;
        else if (xd.score < oppScore) losses++;
      });
      matrix[tx.rosterId][ty.rosterId] = { wins, losses };
    });
  });

  return { matrix, teams, weeks };
}

function renderScheduleMatrix(league) {
  const { matrix, teams, weeks } = computeScheduleMatrix(league);
  const nGames = weeks.length;

  // Sort by actual wins descending (same as standings)
  const sorted = [...teams].sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);

  let html = `<div class="section">
    <div class="section-title">Schedule Swap Matrix
      <span class="section-note">Row = team's actual scores &nbsp;·&nbsp; Column = schedule applied &nbsp;·&nbsp; <span style="color:var(--yellow)">■</span> = actual record &nbsp;·&nbsp; W+L = weeks played &nbsp;·&nbsp; head-to-head week uses league avg as substitute</span>
    </div>
    <div class="table-wrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="font-size:.72rem;width:max-content;min-width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="width:110px;min-width:90px;position:sticky;left:0;background:var(--surface);z-index:2;white-space:nowrap;text-align:left">Team</th>`;

  sorted.forEach(t => {
    html += `<th style="text-align:center;font-size:.63rem;white-space:nowrap;padding:4px 2px" title="${t.teamName}">${t.teamName}</th>`;
  });
  html += `<th style="text-align:center;color:var(--green);white-space:nowrap;width:44px">Best</th>
           <th style="text-align:center;color:var(--red);white-space:nowrap;width:44px">Worst</th>
           </tr></thead><tbody>`;

  sorted.forEach(rowTeam => {
    let bestW = -1, worstW = nGames + 1;
    // Pre-scan for best/worst (exclude diagonal; all cells share same nGames now)
    sorted.forEach(colTeam => {
      if (rowTeam.rosterId === colTeam.rosterId) return;
      const c = matrix[rowTeam.rosterId][colTeam.rosterId];
      if (c.wins > bestW)  bestW  = c.wins;
      if (c.wins < worstW) worstW = c.wins;
    });
    if (bestW  === -1)        bestW  = 0;
    if (worstW === nGames+1)  worstW = 0;

    html += `<tr><td class="bold" style="font-size:.75rem;position:sticky;left:0;background:var(--surface);z-index:1;white-space:nowrap;width:110px;padding:5px 6px">${rowTeam.teamName}</td>`;

    let bestShown = false, worstShown = false;
    sorted.forEach(colTeam => {
      const c = matrix[rowTeam.rosterId][colTeam.rosterId];
      const isActual = rowTeam.rosterId === colTeam.rosterId;
      const gp = c.wins + c.losses || 1;
      const winPct = c.wins / gp;
      const record = `${c.wins}-${c.losses}`;

      let bgStyle = '';
      if (winPct > 0.5) {
        const intensity = Math.min((winPct-.5)*2, 1);
        bgStyle = `background:rgba(63,185,80,${(intensity*.35).toFixed(2)})`;
      } else if (winPct < 0.5) {
        const intensity = Math.min((.5-winPct)*2, 1);
        bgStyle = `background:rgba(248,81,73,${(intensity*.35).toFixed(2)})`;
      }

      const borderStyle = isActual ? 'outline:2px solid #d29922;outline-offset:-2px' : '';
      const textStyle   = isActual
        ? 'color:var(--yellow);font-weight:700'
        : winPct>.5 ? 'color:var(--green)' : winPct<.5 ? 'color:var(--red)' : 'color:var(--muted)';
      const isBest  = !isActual && !bestShown  && c.wins === bestW;
      const isWorst = !isActual && !worstShown && c.wins === worstW;
      if (isBest)  bestShown  = true;
      if (isWorst) worstShown = true;

      html += `<td style="text-align:center;padding:7px 4px;${bgStyle};${borderStyle}">
        <span style="${textStyle}">${record}</span>
        ${isBest  ? '<div style="font-size:.55rem;color:var(--green);margin-top:1px">▲ BEST</div>'  : ''}
        ${isWorst ? '<div style="font-size:.55rem;color:var(--red);margin-top:1px">▼ WORST</div>' : ''}
      </td>`;
    });

    html += `<td style="text-align:center;color:var(--green);font-weight:700;font-size:.78rem">${bestW}-${nGames-bestW}</td>`;
    html += `<td style="text-align:center;color:var(--red);font-weight:700;font-size:.78rem">${worstW}-${nGames-worstW}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div></div>`;
  return html;
}

function computeWeeklyScores(league) {
  const scores = {};
  Object.keys(league.rosterMap).forEach(id => { scores[id]=[]; });
  league.completedWeeks.forEach(({ week, data }) => {
    data.forEach(t => {
      if (scores[t.roster_id]!==undefined)
        scores[t.roster_id].push({ week, points:t.points||0, starters:t.starters||[], players_points:t.players_points||{} });
    });
  });
  return scores;
}

function computeWrapped(league) {
  const { rosterMap, completedWeeks } = league;
  const weekly = computeWeeklyScores(league);
  const totals = {};
  Object.entries(weekly).forEach(([id,ws]) => { totals[id]=ws.reduce((s,w)=>s+w.points,0); });
  function stddev(arr) {
    if (arr.length<2) return 0;
    const m=arr.reduce((a,b)=>a+b,0)/arr.length;
    return Math.sqrt(arr.reduce((s,v)=>s+Math.pow(v-m,2),0)/arr.length);
  }
  const consistency={};
  Object.entries(weekly).forEach(([id,ws])=>{ consistency[id]=stddev(ws.map(w=>w.points)); });
  let bestWeek={points:0,rosterId:null,week:null}, worstWeek={points:Infinity,rosterId:null,week:null};
  completedWeeks.forEach(({ week, data }) => {
    data.forEach(t => {
      if (t.points>bestWeek.points) bestWeek={points:t.points,rosterId:t.roster_id,week};
      if (t.points<worstWeek.points&&t.points>0) worstWeek={points:t.points,rosterId:t.roster_id,week};
    });
  });
  let bigBlowout={margin:0}, closest={margin:Infinity};
  completedWeeks.forEach(({ week, data }) => {
    const g={};
    data.forEach(t=>{ if(!g[t.matchup_id])g[t.matchup_id]=[]; g[t.matchup_id].push(t); });
    Object.values(g).forEach(pair => {
      if (pair.length!==2) return;
      const margin=Math.abs((pair[0].points||0)-(pair[1].points||0));
      const win=(pair[0].points||0)>=(pair[1].points||0)?pair[0]:pair[1];
      const lose=win===pair[0]?pair[1]:pair[0];
      if (margin>bigBlowout.margin) bigBlowout={margin,winId:win.roster_id,loseId:lose.roster_id,winPts:win.points,losePts:lose.points,week};
      if (margin<closest.margin)    closest   ={margin,winId:win.roster_id,loseId:lose.roster_id,winPts:win.points,losePts:lose.points,week};
    });
  });
  const benchPts={};
  Object.keys(rosterMap).forEach(id=>{ benchPts[id]=0; });
  completedWeeks.forEach(({ data }) => {
    data.forEach(t => {
      if (!t.players_points||!t.starters) return;
      const ss=new Set(t.starters);
      let b=0;
      Object.entries(t.players_points).forEach(([pid,pts])=>{ if(!ss.has(pid)&&pts>0) b+=pts; });
      benchPts[t.roster_id]=(benchPts[t.roster_id]||0)+b;
    });
  });
  const apData=computeAllPlay(league);
  const luckiest  =[...apData].sort((a,b)=>b.luck-a.luck)[0];
  const unluckiest=[...apData].sort((a,b)=>a.luck-b.luck)[0];
  const mostBench =Object.entries(benchPts).sort((a,b)=>b[1]-a[1])[0];
  return { weekly, totals, consistency, bestWeek, worstWeek, bigBlowout, closest, luckiest, unluckiest, mostBench, benchPts,
           topScorer:Object.entries(totals).sort((a,b)=>b[1]-a[1])[0],
           mostConsistent:Object.entries(consistency).sort((a,b)=>a[1]-b[1])[0],
           glassCanon:Object.entries(consistency).sort((a,b)=>b[1]-a[1])[0] };
}

function computeStorylines(league) {
  const { rosterMap, completedWeeks } = league;
  if (completedWeeks.length < 3) return [];
  const teams = Object.values(rosterMap);

  // Detect completed season: status === 'complete' or all regular-season weeks done
  const isComplete = league.league.status === 'complete';

  // ── COMPLETED SEASON: end-of-year recap storylines ────────────
  if (isComplete) {
    const stories = [];

    // Champion/runner-up require playoff data — trigger lazy load if needed
    if (playoffsLoaded && S.playoffData) {
      const seasonId = league.id;
      const pd = S.playoffData[seasonId];
      if (pd && pd.bracket && pd.maxRound) {
        const champMatch = pd.bracket.find(b => b.p === 1 && b.w)
          || pd.bracket.find(b => b.r === pd.maxRound && b.m === 1 && b.w);
        const rm = pd.rosterMap;
        if (champMatch && champMatch.w) {
          const champ = rm[champMatch.w];
          const runer = rm[champMatch.l];
          if (champ) stories.push({icon:'🏆', text:`<strong>${champ.teamName}</strong> won the ${league.league.season} championship`});
          if (runer && stories.length < 3) stories.push({icon:'🥈', text:`<strong>${runer.teamName}</strong> finished as runner-up`});
        }
      }
    } else if (!playoffsLoading) {
      // Kick off background load; re-render overview once it resolves
      loadPlayoffData().then(() => renderOverview());
    }

    // Regular-season record + top scorer — available immediately, no playoff data needed
    const wins = {}, pts = {};
    teams.forEach(t => { wins[t.rosterId] = 0; pts[t.rosterId] = 0; });
    completedWeeks.forEach(({data}) => {
      const pairs = {};
      data.forEach(t => { if(t.matchup_id){if(!pairs[t.matchup_id])pairs[t.matchup_id]=[];pairs[t.matchup_id].push(t);} });
      Object.values(pairs).forEach(pair => {
        if(pair.length!==2) return;
        const [a,b]=pair; const aW=(a.points||0)>(b.points||0);
        if(wins[a.roster_id]!==undefined){ wins[a.roster_id]+=aW?1:0; pts[a.roster_id]+=a.points||0; }
        if(wins[b.roster_id]!==undefined){ wins[b.roster_id]+=aW?0:1; pts[b.roster_id]+=b.points||0; }
      });
    });
    const sorted = [...teams].sort((a,b) => wins[b.rosterId]!==wins[a.rosterId] ? wins[b.rosterId]-wins[a.rosterId] : pts[b.rosterId]-pts[a.rosterId]);
    const top = sorted[0];
    const totalWeeks = completedWeeks.length;
    if (top && stories.length < 3) {
      stories.push({icon:'📋', text:`<strong>${top.teamName}</strong> had the best regular-season record — ${wins[top.rosterId]}–${totalWeeks - wins[top.rosterId]}`});
    }
    const topScorer = [...teams].sort((a,b) => pts[b.rosterId]-pts[a.rosterId])[0];
    if (topScorer && topScorer.rosterId !== top?.rosterId && stories.length < 3) {
      stories.push({icon:'💯', text:`<strong>${topScorer.teamName}</strong> scored the most total points — ${fmtP(pts[topScorer.rosterId])} pts`});
    }

    if (stories.length) return stories.slice(0, 3);
  }

  // ── IN-SEASON: weekly narrative storylines ────────────────────

  // Build per-team weekly results
  const weekResults = {};
  teams.forEach(t => { weekResults[t.rosterId] = []; });
  completedWeeks.forEach(({week, data}) => {
    const pairs = {};
    data.forEach(t => { if (t.matchup_id) { if (!pairs[t.matchup_id]) pairs[t.matchup_id]=[]; pairs[t.matchup_id].push(t); } });
    Object.values(pairs).forEach(pair => {
      if (pair.length !== 2) return;
      const [a, b] = pair;
      const aWon = (a.points||0) > (b.points||0);
      if (weekResults[a.roster_id]) weekResults[a.roster_id].push({week, won:aWon,  pts:a.points||0});
      if (weekResults[b.roster_id]) weekResults[b.roster_id].push({week, won:!aWon, pts:b.points||0});
    });
  });
  teams.forEach(t => weekResults[t.rosterId].sort((a,b) => a.week - b.week));

  const stories = [];

  // Win/loss streaks
  const streakInfo = [];
  teams.forEach(t => {
    const res = weekResults[t.rosterId];
    if (!res.length) return;
    const isWin = res[res.length-1].won;
    let streak = 1;
    for (let i = res.length-2; i >= 0; i--) { if (res[i].won === isWin) streak++; else break; }
    streakInfo.push({teamName:t.teamName, streak, isWin});
  });
  const hotTeam  = streakInfo.filter(s => s.isWin  && s.streak >= 3).sort((a,b) => b.streak-a.streak)[0];
  const coldTeam = streakInfo.filter(s => !s.isWin && s.streak >= 3).sort((a,b) => b.streak-a.streak)[0];
  if (hotTeam)  stories.push({icon:'🔥', text:`<strong>${hotTeam.teamName}</strong> has won ${hotTeam.streak} straight and is on a hot streak`});
  if (coldTeam) stories.push({icon:'📉', text:`<strong>${coldTeam.teamName}</strong> has dropped ${coldTeam.streak} straight — searching for answers`});

  // Standing movement: compare actual cumulative standings 3 weeks ago vs now
  function standingsRank(upToWeekIndex) {
    const wins = {}, pts = {};
    teams.forEach(t => { wins[t.rosterId] = 0; pts[t.rosterId] = 0; });
    for (let i = 0; i <= upToWeekIndex; i++) {
      const {data} = completedWeeks[i];
      const pairs = {};
      data.forEach(t => { if(t.matchup_id){if(!pairs[t.matchup_id])pairs[t.matchup_id]=[];pairs[t.matchup_id].push(t);} });
      Object.values(pairs).forEach(pair => {
        if(pair.length!==2) return;
        const [a,b]=pair; const aW=(a.points||0)>(b.points||0);
        if(wins[a.roster_id]!==undefined){ wins[a.roster_id]+=aW?1:0; pts[a.roster_id]+=a.points||0; }
        if(wins[b.roster_id]!==undefined){ wins[b.roster_id]+=aW?0:1; pts[b.roster_id]+=b.points||0; }
      });
    }
    const ranked = [...teams].sort((a,b) => wins[b.rosterId]!==wins[a.rosterId] ? wins[b.rosterId]-wins[a.rosterId] : pts[b.rosterId]-pts[a.rosterId]);
    const map = {};
    ranked.forEach((t,i) => { map[t.rosterId] = i+1; });
    return map;
  }

  const lastIdx = completedWeeks.length - 1;
  const nowRank  = standingsRank(lastIdx);
  const thenRank = standingsRank(Math.max(0, lastIdx - 3));

  const movements = teams.map(t => ({
    teamName:t.teamName,
    move: thenRank[t.rosterId] - nowRank[t.rosterId],
  }));
  const climber = movements.filter(m=>m.move>=3).sort((a,b)=>b.move-a.move)[0];
  const faller  = movements.filter(m=>m.move<=-3).sort((a,b)=>a.move-b.move)[0];
  if (climber && !hotTeam)  stories.push({icon:'📈', text:`<strong>${climber.teamName}</strong> has climbed ${climber.move} spots in the standings over the last 3 weeks`});
  if (faller  && !coldTeam) stories.push({icon:'🧊', text:`<strong>${faller.teamName}</strong> has dropped ${Math.abs(faller.move)} spots in the standings over the last 3 weeks`});

  // Contender tier parity / rebuild wave — only meaningful in-season
  if (S.fcValues.length) {
    const rawProfs = teams.map(t => mveTeamProfile(t.rosterId,league)).filter(Boolean);
    const profiles = mveClassifyTeams(rawProfs);
    const contenders = profiles.filter(p=>p.classification.label==='Contender');
    const rebuilds   = profiles.filter(p=>p.classification.label.includes('Rebuild'));
    if (contenders.length >= 3 && stories.length < 3) stories.push({icon:'⚔️', text:`<strong>${contenders.length} teams</strong> are classified as Contenders — the title race is wide open`});
    else if (rebuilds.length >= 3 && stories.length < 2) stories.push({icon:'🏗️', text:`<strong>${rebuilds.length} teams</strong> are in full rebuild mode — a youth movement is underway`});
  }

  return stories.slice(0,3);
}

function computeRivalries(league) {
  const { rosterMap, completedWeeks } = league;
  const teams = Object.values(rosterMap);
  if (completedWeeks.length < 2 || teams.length < 2) return [];

  const h2h = {};
  completedWeeks.forEach(({data}) => {
    const pairs = {};
    data.forEach(t => { if(t.matchup_id){if(!pairs[t.matchup_id])pairs[t.matchup_id]=[];pairs[t.matchup_id].push(t);} });
    Object.values(pairs).forEach(pair => {
      if (pair.length !== 2) return;
      const [a, b] = pair;
      const idA = Math.min(a.roster_id, b.roster_id);
      const idB = Math.max(a.roster_id, b.roster_id);
      const key = `${idA}_${idB}`;
      if (!h2h[key]) h2h[key] = {idA, idB, games:0, aWins:0, bWins:0, margins:[]};
      h2h[key].games++;
      h2h[key].margins.push(Math.abs((a.points||0)-(b.points||0)));
      if ((a.points||0) > (b.points||0)) { if(a.roster_id===idA) h2h[key].aWins++; else h2h[key].bWins++; }
      else { if(b.roster_id===idA) h2h[key].aWins++; else h2h[key].bWins++; }
    });
  });

  return Object.values(h2h).map(r => {
    const tA = rosterMap[r.idA], tB = rosterMap[r.idB];
    if (!tA || !tB) return null;
    const avgMargin = r.margins.length ? r.margins.reduce((s,m)=>s+m,0)/r.margins.length : 999;
    const balance   = r.games > 0 ? 1 - Math.abs(r.aWins-r.bWins)/r.games : 0;
    const score     = r.games*10 + (1/(avgMargin+1))*500 + balance*15;
    return {
      teamA:tA.teamName, teamB:tB.teamName,
      games:r.games, aWins:r.aWins, bWins:r.bWins,
      avgMargin:Math.round(avgMargin*10)/10, score
    };
  }).filter(Boolean).sort((a,b)=>b.score-a.score).slice(0,6);
}

function renderWeeklyTable(league) {
  const weekly=computeWeeklyScores(league);
  const teams=Object.values(league.rosterMap).sort((a,b)=>a.rosterId-b.rosterId);
  const weeks=league.completedWeeks.map(w=>w.week);
  const weekMax={},weekMin={};
  weeks.forEach(w=>{
    let mx=0,mn=Infinity;
    Object.values(weekly).forEach(ws=>{ const e=ws.find(x=>x.week===w); const p=e?e.points:0; if(p>mx)mx=p; if(p>0&&p<mn)mn=p; });
    weekMax[w]=mx; weekMin[w]=mn;
  });
  let html=`<div class="section"><div class="section-title">Weekly Scores</div><div class="table-wrap"><table class="week-table"><thead><tr><th>Team</th>`;
  weeks.forEach(w=>{ html+=`<th>Wk ${w}</th>`; });
  html+=`</tr></thead><tbody>`;
  teams.forEach(t=>{
    html+=`<tr><td class="bold">${t.teamName}</td>`;
    weeks.forEach(w=>{
      const e=(weekly[t.rosterId]||[]).find(x=>x.week===w);
      const pts=e?e.points:null;
      const cls=pts!==null&&pts>0&&pts>=weekMax[w]?'week-high':pts!==null&&pts>0&&pts<=weekMin[w]?'week-low':'';
      html+=`<td class="${cls}">${pts!=null?fmtP(pts):'-'}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div></div>`;
  return html;
}

// Returns ordered slot labels matching league.roster_positions (non-bench only).
// e.g. ['QB','RB1','RB2','WR1','WR2','WR3','TE','FLEX','SF']
function getStarterSlots(league) {
  const rp = (league.league && league.league.roster_positions) || league.roster_positions || [];
  const counts = {};
  const slots = [];
  const BENCH = new Set(['BN','IR','TAXI']);
  rp.forEach(pos => {
    if (BENCH.has(pos)) return;
    const label = pos === 'SUPER_FLEX' ? 'SF' : pos;
    counts[label] = (counts[label] || 0) + 1;
    slots.push(counts[label] > 1 ? `${label}${counts[label]}` : label);
  });
  // If any slot appeared only once its count stays 1, but we only append a number
  // when count > 1, so single-instance slots stay as e.g. 'QB', 'TE', 'FLEX'.
  // Rebuild to add "1" suffix to positions that ultimately appear more than once.
  const totalCounts = {};
  slots.forEach(s => {
    const base = s.replace(/\d+$/, '');
    totalCounts[base] = (totalCounts[base] || 0) + 1;
  });
  const reCounts = {};
  return slots.map(s => {
    const base = s.replace(/\d+$/, '');
    if (totalCounts[base] <= 1) return base;
    reCounts[base] = (reCounts[base] || 0) + 1;
    return `${base}${reCounts[base]}`;
  });
}

// slotData[rosterId][slotLabel] = { scores:[], ddCount, appearances }
function computeSlotStats(league) {
  const { rosterMap, completedWeeks } = league;
  const slotLabels = getStarterSlots(league);
  const slotData = {};
  Object.keys(rosterMap).forEach(id => {
    slotData[id] = {};
    slotLabels.forEach(sl => { slotData[id][sl] = { scores: [], ddCount: 0, appearances: 0 }; });
  });

  completedWeeks.forEach(({ data }) => {
    data.forEach(t => {
      if (!slotData[t.roster_id] || !t.starters || !t.players_points) return;
      t.starters.forEach((pid, i) => {
        const label = slotLabels[i];
        if (!label) return;
        const pts = t.players_points[pid] || 0;
        slotData[t.roster_id][label].scores.push(pts);
        slotData[t.roster_id][label].appearances++;
        if (pts >= 10) slotData[t.roster_id][label].ddCount++;
      });
    });
  });

  const result = {};
  Object.entries(slotData).forEach(([id, slots]) => {
    result[id] = {};
    slotLabels.forEach(sl => {
      const d = slots[sl];
      const avg = d.scores.length > 0 ? d.scores.reduce((a,b)=>a+b,0)/d.scores.length : 0;
      result[id][sl] = { avg, ddCount: d.ddCount, appearances: d.appearances };
    });
  });
  return { result, slotLabels };
}

// benchData[rosterId][pos] = { scores:[], ddCount, appearances }

function buildPosStatsInner(league) {
  const teams = Object.values(league.rosterMap)
    .sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);

  function cellColor(val, avg) {
    if (!avg || val == null) return '';
    const diff = (val - avg) / avg;
    if (diff >  0.1) return 'color:var(--green);font-weight:600';
    if (diff < -0.1) return 'color:var(--red)';
    return 'color:var(--muted)';
  }

  function buildTable(columns, statsMap, noteText) {
    // Compute league averages
    const leagueAvg = {};
    const leagueDDRate = {};
    columns.forEach(col => {
      const avgs = teams.map(t => statsMap[t.rosterId]?.[col]?.avg || 0).filter(v=>v>0);
      leagueAvg[col] = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : 0;
      const rates = teams.map(t => {
        const d = statsMap[t.rosterId]?.[col];
        return d && d.appearances > 0 ? d.ddCount/d.appearances : null;
      }).filter(v=>v!==null);
      leagueDDRate[col] = rates.length ? rates.reduce((a,b)=>a+b,0)/rates.length : 0;
    });

    // ── Avg pts table ──
    let h = `<div class="section-note" style="margin-bottom:8px">${noteText}</div>

      </tr></thead><tbody>`;

    teams.forEach(t => {
      const stats = statsMap[t.rosterId] || {};
      const totalAvg = columns.reduce((s,c) => s+(stats[c]?.avg||0), 0);
      h += `<tr><td class="bold">${t.teamName}</td>`;
      columns.forEach(col => {
        const avg = stats[col]?.avg || 0;
        const style = cellColor(avg, leagueAvg[col]);
        h += `<td style="text-align:center;${style}">${avg>0?fmtP(avg):'-'}</td>`;
