<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Front Office</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
      --border: #21262d; --text: #e6edf3; --muted: #8b949e;
      --accent: #58a6ff; --green: #3fb950; --red: #f85149;
      --yellow: #d29922; --purple: #a371f7; --orange: #fb8500;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    /* Prevent iOS double-tap zoom on all interactive elements */
    button, a, select, input, [onclick] { touch-action: manipulation; }
    /* Stable text size on orientation change */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    /* Tap feedback for interactive cards */
    .franchise-card, .wrapped-card, .player-card { transition: transform .12s ease, opacity .1s; }
    .franchise-card:active, .wrapped-card:active, .player-card:active { transform: scale(.985); opacity: .88; }
    .card { transition: background .12s; }
    .card:active { background: var(--surface2); }

    /* SIDEBAR */
    header { position: fixed; left: 0; top: 0; width: 214px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 200; overflow: hidden; will-change: transform; }
    .logo { font-size: 1.05rem; font-weight: 700; color: var(--accent); padding: 4px 4px 0; border-bottom: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; }
    nav { display: flex; flex-direction: column; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 0; }
    nav button { background: none; border: none; border-left: 2px solid transparent; color: var(--muted); font-size: .85rem; padding: 10px 12px 10px 16px; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; transition: color .15s, background .15s, border-color .15s; white-space: nowrap; width: 100%; }
    nav button:hover { color: var(--text); background: rgba(255,255,255,.04); }
    nav button.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,.07); }
    .nav-shortcut { font-size: .62rem; color: var(--muted); opacity: .5; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; flex-shrink: 0; }
    .league-controls { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .league-controls input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: .8rem; width: 100%; }
    .league-controls input::placeholder { color: var(--muted); }
    .btn { background: var(--accent); color: #0d1117; border: none; border-radius: 6px; padding: 7px 14px; font-size: .8rem; font-weight: 600; cursor: pointer; transition: opacity .15s; width: 100%; text-align: center; }
    .btn:hover { opacity: .85; }

    /* MAIN */
    main { padding: 24px; margin-left: 214px; }

    /* LOADING */
    #loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    #error-msg { color: var(--red); display: none; text-align: center; padding: 40px 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TABS */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* SUB-TABS */
    .sub-tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .sub-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: .8rem;
      font-weight: 500;
      padding: 9px 18px;
      cursor: pointer;
      margin-bottom: -1px;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      border-radius: 0;
    }
    .sub-tab:hover { color: var(--text); }
    .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .sub-panel { display: none; }
    .sub-panel.active { display: block; }
    @media (max-width: 600px) {
      .sub-tabs { gap: 0; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
      .sub-tab  { padding: 9px 14px; font-size: .75rem; }
    }

    /* CARDS */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
    .card-value { font-size: 1.4rem; font-weight: 700; }
    .card-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }

    /* SECTIONS */
    .section { margin-bottom: 32px; }
    .section-title { font-size: .95rem; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .section-note { font-size: .75rem; color: var(--muted); margin-left: auto; font-weight: 400; }
    .capture-btn { cursor:pointer; background:transparent; border:1px solid var(--border); border-radius:4px; color:var(--muted); font-size:.7rem; padding:2px 8px; white-space:nowrap; flex-shrink:0; transition:color .15s,border-color .15s; line-height:1.6; touch-action:manipulation; -webkit-tap-highlight-color:transparent; user-select:none; }
    .capture-btn:hover { color:var(--text); border-color:var(--muted); }
    .capture-btn:disabled { opacity:.5; cursor:wait; }

    /* TABLE */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 9px 12px; text-align: left; font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
    thead th:hover { color: var(--text); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 9px 12px; font-size: .83rem; color: var(--text); white-space: nowrap; }
    td.bold { color: var(--text); font-weight: 600; }

    .rank-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: .7rem; font-weight: 700; background: var(--surface2); color: var(--muted); margin-right: 6px; }
    .rank-num.gold { background: #d29922; color: #000; }
    .rank-num.silver { background: #8b949e; color: #000; }
    .rank-num.bronze { background: #b46f2e; color: #fff; }

    .pos-c { color: var(--green); } .neg { color: var(--red); } .neutral { color: var(--muted); }

    /* CONTENDER TIER */
    .tier-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700; }

    /* RANK PILL */
    .rank-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 22px; border-radius: 4px; font-size: .7rem; font-weight: 700; padding: 0 6px; }

    /* CHART */
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .chart-wrap canvas { height: 380px !important; }

    /* BAR */
    .bar-wrap { min-width: 80px; }
    .bar-bg { background: var(--surface2); border-radius: 3px; height: 5px; }
    .bar-fill { height: 5px; border-radius: 3px; background: var(--accent); transition: width .4s; }

    /* ── HEADSHOTS ────────────────────────── */
    .hs {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; background: var(--surface2);
      flex-shrink: 0; border: 1.5px solid var(--border);
    }
    .hs-lg {
      width: 64px; height: 64px; border-radius: 50%;
      object-fit: cover; background: var(--surface2);
      flex-shrink: 0; border: 2px solid var(--border);
    }
    .hs-fallback {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; color: #fff; border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── PLAYER STAT CARDS ───────────────── */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      overflow: hidden;
      transition: border-color .15s;
    }
    .player-card:hover { border-color: var(--accent); }

    .player-card-img { position: relative; flex-shrink: 0; line-height: 0; }
    .player-card-img .hs-lg { border-color: transparent; display: block; }

    .player-card-body { flex: 1; min-width: 0; overflow: visible; }

    .player-card-meta {
      display: flex; align-items: center; gap: 5px; margin-bottom: 4px; flex-wrap: wrap;
    }

    .player-card-name {
      font-size: .9rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 1px;
    }

    .player-card-owner {
      font-size: .7rem; color: var(--muted); margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .player-card-stats {
      font-size: .75rem; color: var(--muted); line-height: 1.5;
      margin-bottom: 6px; word-break: break-word;
    }

    .player-card-pts {
      font-size: 1.15rem; font-weight: 800; color: var(--accent);
    }

    .player-card-pts.top { color: var(--yellow); }
    .player-card-pts.good { color: var(--green); }

    .nfl-team {
      font-size: .68rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
      white-space: nowrap; flex-shrink: 0;
    }

    /* PLAYERS TAB CONTROLS */
    .players-controls {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .players-controls select, .players-controls input {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 7px 12px;
      font-size: .83rem;
    }
    .pos-filter { display: flex; gap: 6px; flex-wrap: wrap; }
    .pos-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 20px; padding: 4px 12px;
      font-size: .75rem; font-weight: 600; cursor: pointer;
    }
    .pos-btn.active {
      background: rgba(88,166,255,.15); border-color: var(--accent);
      color: var(--accent);
    }

    /* PLAYER POS BADGES */
    .pos-badge {
      font-size: .62rem; font-weight: 700; padding: 2px 5px;
      border-radius: 3px; letter-spacing: .02em;
      white-space: nowrap; flex-shrink: 0;
    }
    .pos-QB { background: rgba(163,113,247,.2); color: #a371f7; }
    .pos-RB { background: rgba(63,185,80,.2);   color: #3fb950; }
    .pos-WR { background: rgba(88,166,255,.2);  color: #58a6ff; }
    .pos-TE { background: rgba(251,133,0,.2);   color: #fb8500; }
    .pos-K  { background: rgba(139,148,158,.2); color: #8b949e; }
    .pos-DEF { background: rgba(139,148,158,.2); color: #8b949e; }

    /* TRADE */
    .trade-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .trade-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .trade-panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .trade-panel-header select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: .8rem; flex: 1; min-width: 0; }
    .trade-panel-header label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    .trade-roster { max-height: 360px; overflow-y: auto; padding: 6px; }

    .player-row {
      display: flex; align-items: center; padding: 6px 8px;
      border-radius: 6px; cursor: pointer; transition: background .1s;
      gap: 8px; border: 1px solid transparent;
    }
    .player-row:hover { background: var(--surface2); }
    .player-row.selected { background: rgba(88,166,255,.1); border-color: rgba(88,166,255,.3); }
    .player-row .hs { width: 32px; height: 32px; }

    .player-name { flex: 1; font-size: .82rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; }
    .player-value { font-size: .78rem; font-weight: 600; color: var(--accent); min-width: 46px; text-align: right; }

    .trade-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .trade-sides { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: start; }
    .trade-side-title { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .trade-player-chip { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: 6px; padding: 6px 10px; margin-bottom: 5px; font-size: .8rem; }
    .trade-player-chip .remove { margin-left: auto; color: var(--muted); cursor: pointer; line-height: 1; }
    .trade-player-chip .remove:hover { color: var(--red); }
    .trade-divider { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 22px; font-size: 1.3rem; color: var(--muted); }
    .trade-verdict { text-align: center; padding: 12px; border-radius: 8px; margin-top: 14px; font-weight: 600; font-size: .88rem; }
    .verdict-fair { background: rgba(63,185,80,.1); color: var(--green); }
    .verdict-a { background: rgba(88,166,255,.1); color: var(--accent); }
    .verdict-b { background: rgba(210,153,34,.1); color: var(--yellow); }
    .value-total { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }

    /* PICK ROWS IN TRADE PANEL */
    .trade-panel-picks { border-top: 1px solid var(--border); padding: 4px 6px 6px; }
    .trade-panel-picks-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: 4px 8px 4px; }
    .pick-row { display: flex; align-items: center; padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: background .1s; gap: 8px; border: 1px solid transparent; }
    .pick-row:hover { background: var(--surface2); }
    .pick-row.selected { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.3); }
    .pick-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 4px; font-size: .68rem; font-weight: 800; flex-shrink: 0; }
    .pick-chip { display: flex; align-items: center; gap: 8px; background: rgba(210,153,34,.08); border: 1px solid rgba(210,153,34,.25); border-radius: 6px; padding: 6px 10px; margin-bottom: 5px; font-size: .8rem; }
    .picks-source-note { font-size: .7rem; color: var(--muted); text-align: center; margin-top: 6px; }
    .ktc-diverge-note { font-size: .72rem; color: var(--yellow); margin-top: 6px; text-align: center; }

    /* TRADE V2 — two-column checklist layout */
    .trade-v2-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .trade-v2-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .trade-v2-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .trade-v2-header-label { font-size: .6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
    .trade-v2-header select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: .78rem; flex: 1; min-width: 0; }
    .trade-v2-clear { font-size: .65rem; color: var(--muted); cursor: pointer; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
    .trade-v2-clear:hover { color: var(--red); background: rgba(248,81,73,.1); }
    .trade-v2-col-hdr { display: flex; align-items: center; padding: 4px 10px; font-size: .58rem; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02); flex-shrink: 0; }
    .trade-v2-list { overflow-y: auto; flex: 1; }
    .trade-v2-list-h { max-height: 420px; overflow-y: auto; }
    .trade-v2-row { display: flex; align-items: center; gap: 7px; padding: 5px 10px; cursor: pointer; transition: background .1s; }
    .trade-v2-row:hover { background: var(--surface2); }
    .trade-v2-row.selected { background: rgba(88,166,255,.08); }
    .trade-v2-cb { width: 15px; height: 15px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .55rem; color: transparent; transition: all .1s; }
    .trade-v2-row.selected .trade-v2-cb { background: var(--accent); border-color: var(--accent); color: #fff; }
    .trade-v2-pname { flex: 1; min-width: 0; }
    .trade-v2-pname-main { font-size: .8rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .trade-v2-pname-sub { font-size: .62rem; color: var(--muted); }
    .trade-v2-val { font-size: .72rem; font-weight: 600; color: var(--accent); min-width: 48px; text-align: right; }
    .trade-v2-picks-hdr { font-size: .62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: 5px 10px 3px; border-top: 1px solid var(--border); background: rgba(255,255,255,.02); flex-shrink: 0; }
    /* Bottom bar */
    .trade-v2-footer { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
    .trade-v2-footer-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 10px; }
    .trade-v2-t-side { text-align: center; }
    .trade-v2-t-name { font-size: .78rem; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trade-v2-t-pct { font-size: 1.35rem; font-weight: 800; line-height: 1.1; }
    .trade-v2-t-lbl { font-size: .6rem; color: var(--muted); }
    .trade-v2-favors-center { text-align: center; }
    .trade-v2-favors-arrows { font-size: .9rem; color: var(--muted); letter-spacing: -.05em; }
    .trade-v2-favors-label { font-size: .68rem; font-weight: 700; color: var(--text); white-space: nowrap; }
    .trade-v2-bar { height: 6px; border-radius: 3px; overflow: hidden; display: flex; background: var(--surface2); margin-bottom: 10px; }
    .trade-v2-bar-a { background: var(--green); height: 100%; transition: width .35s ease; }
    .trade-v2-bar-b { background: var(--red); height: 100%; transition: width .35s ease; }
    .trade-v2-detail { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 6px; }
    /* League Scouting tab */
    .scout-top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .scout-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .scout-box-hdr { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: .8rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .scout-player-row { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-bottom: 1px solid rgba(255,255,255,.04); }
    .scout-player-row:last-child { border-bottom: none; }
    .scout-player-name { font-size: .8rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scout-player-owner { font-size: .65rem; color: var(--muted); white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
    .scout-player-val { font-size: .72rem; font-weight: 600; color: var(--accent); min-width: 44px; text-align: right; }
    .scout-needs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .scout-team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .scout-team-name-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
    .scout-team-name { font-size: .78rem; font-weight: 700; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scout-needs-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .scout-need { font-size: .6rem; padding: 2px 6px; border-radius: 3px; font-weight: 700; }
    .scout-need-critical { background: rgba(248,81,73,.15); color: #f85149; }
    .scout-need-weak { background: rgba(210,153,34,.12); color: var(--yellow); }
    .scout-need-mod  { background: rgba(139,148,158,.1);  color: var(--muted); }

    /* WRAPPED */
    .wrapped-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .wrapped-card { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid rgba(88,166,255,.45); border-radius: 12px; padding: 18px; position: relative; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
    .wrapped-card::before { content: attr(data-emoji); position: absolute; top: -4px; right: 10px; font-size: 3.5rem; opacity: .22; pointer-events: none; }
    .wrapped-card.has-hs { display: flex; gap: 14px; align-items: center; }
    .wrapped-card.has-hs::before { display: none; }
    .wrapped-card-body { flex: 1; }
    .wrapped-title { font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; color: rgba(88,166,255,.75); margin-bottom: 7px; font-weight: 600; }
    .wrapped-name { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .wrapped-stat { font-size: .82rem; color: var(--muted); }
    .wrapped-big { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 3px; letter-spacing: -.01em; }

    /* WEEK TABLE */
    .week-table td, .week-table th { padding: 7px 9px; font-size: .78rem; }
    .week-high { color: var(--yellow); font-weight: 700; }
    .week-low { color: var(--red); }

    /* SEASON SWITCHER */
    .season-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 8px 16px; font-size: .82rem; cursor: pointer; min-height: 44px; touch-action: manipulation; font-weight: 500; transition: background .15s, color .15s, border-color .15s; }
    .season-btn.active { background: rgba(88,166,255,.15); border-color: var(--accent); color: var(--accent); font-weight: 700; }

    /* WARN */
    .warn-banner { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.3); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: .82rem; color: var(--yellow); }

    /* LOADING INLINE */
    .inline-loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: .88rem; }

    /* DYNASTY SIGNAL BADGE */
    .signal-badge { display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:.6rem;font-weight:700;letter-spacing:.04em;white-space:nowrap;flex-shrink:0; }
    .signal-cornerstone { background:rgba(245,158,11,.15); color:#f59e0b; border:1px solid rgba(245,158,11,.3); }
    .signal-buy  { background:rgba(63,185,80,.15); color:#3fb950; border:1px solid rgba(63,185,80,.3); }
    .signal-sell { background:rgba(248,81,73,.15);  color:#f85149; border:1px solid rgba(248,81,73,.3); }
    .signal-hold { background:rgba(210,153,34,.12); color:#d29922; border:1px solid rgba(210,153,34,.3); }
    .signal-stash{ background:rgba(163,113,247,.12);color:#a371f7; border:1px solid rgba(163,113,247,.3); }

    /* FRANCHISE CARDS */
    .franchise-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; margin-bottom:24px; }
    .franchise-grid.screenshot-mode { grid-template-columns:repeat(2,1fr); gap:12px; }
    .franchise-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; display:flex; flex-direction:column; gap:12px; position:relative; }
    .franchise-card.fc-hidden { display:none; }
    .fc-hide-btn { position:absolute;top:8px;right:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;font-size:.65rem;padding:1px 6px;cursor:pointer;line-height:1.6;transition:color .15s,border-color .15s,background .15s; }
    .fc-hide-btn:hover { color:var(--red);border-color:var(--red); }
    .fc-hide-btn.fc-hidden-toggle { color:var(--accent);border-color:var(--accent);background:rgba(88,166,255,.08); }
    .fc-ghost { background:var(--surface2);border:1px dashed var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:.78rem;color:var(--muted); }
    .fc-ghost button { background:transparent;border:1px solid var(--border);color:var(--accent);border-radius:4px;font-size:.65rem;padding:1px 8px;cursor:pointer;line-height:1.6; }
    .franchise-card-header { display:flex; align-items:center; gap:10px; }
    .franchise-card-avatar { width:40px;height:40px;border-radius:50%;object-fit:cover;background:var(--surface2);border:2px solid var(--border);flex-shrink:0; }
    .franchise-card-title { flex:1;min-width:0; }
    .franchise-card-name { font-size:.9rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .franchise-card-sub { font-size:.72rem;color:var(--muted);margin-top:2px; }
    .archetype-badge { display:inline-block;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.04em;white-space:nowrap; }

    .franchise-stat-row { display:flex;align-items:center;gap:8px;font-size:.78rem; }
    .franchise-stat-label { color:var(--muted);width:80px;flex-shrink:0; }
    .franchise-stat-val { color:var(--text);font-weight:600;min-width:50px; }

    .pos-bar-track { flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex; }
    .pos-bar-seg { height:100%; }

    .franchise-assets { display:flex;flex-direction:column;gap:4px; }
    .franchise-asset-row { display:flex;align-items:center;gap:8px;font-size:.78rem; }
    .franchise-asset-name { flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .franchise-asset-val { color:var(--accent);font-weight:600;font-size:.75rem; }

    .pick-capital-row { display:flex;flex-wrap:wrap;gap:5px;align-items:center; }
    .pick-cap-badge { display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:.72rem;white-space:nowrap; }

    /* LEAGUE INTEL TABLE */
    .intel-sort-indicator { font-size:.65rem;margin-left:3px;opacity:.5; }
    .intel-sort-active .intel-sort-indicator { opacity:1;color:var(--accent); }
    th.intel-sort-active { color:var(--accent); }
    .age-young { color:var(--green);font-weight:600; }
    .age-old   { color:var(--red); }
    .age-mid   { color:var(--muted); }

    /* ── PICK BUCKET BADGES ──────────────────────────────── */
    .bucket-badge { display:inline-flex;align-items:center;padding:1px 5px;border-radius:3px;font-size:.58rem;font-weight:700;letter-spacing:.03em; }
    .bucket-early { background:rgba(248,81,73,.15);  color:#f85149; border:1px solid rgba(248,81,73,.3); }
    .bucket-mid   { background:rgba(210,153,34,.15); color:#d29922; border:1px solid rgba(210,153,34,.3); }
    .bucket-late  { background:rgba(63,185,80,.15);  color:#3fb950; border:1px solid rgba(63,185,80,.3);  }
    .bucket-conf-low { opacity:.6; }

    /* ── TOOLTIPS ────────────────────────────────────────── */
    .tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: .6rem; font-weight: 700;
      cursor: default; flex-shrink: 0; vertical-align: middle;
      margin-left: 4px; line-height: 1;
    }
    #global-tip {
      position: fixed; z-index: 99999;
      background: #1c2333; color: #e6edf3; font-size: .72rem; font-weight: 400;
      border: 1px solid #21262d; border-radius: 6px;
      padding: 8px 11px; width: 240px; white-space: normal; line-height: 1.45;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); pointer-events: none;
      display: none;
    }

    /* ── EXPLAINABILITY CHIPS ─────────────────────────────── */
    .explain-chip { display:inline-flex;align-items:center;font-size:.63rem;color:var(--muted);background:var(--surface2);border-radius:3px;padding:1px 5px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis; }
    .explain-chips { display:flex;flex-wrap:wrap;gap:3px;margin-top:4px; }

    /* ── LINEUP DELTA ─────────────────────────────────────── */
    .lineup-delta-grid { display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0; }
    .lineup-delta-box { background:var(--surface2);border-radius:6px;padding:8px;font-size:.75rem; }
    .pos-delta-pill { display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;font-size:.68rem;margin:2px; }
    .pos-delta-up   { background:rgba(63,185,80,.12);color:var(--green); }
    .pos-delta-down { background:rgba(248,81,73,.12);color:var(--red); }
    .pos-delta-flat { background:var(--surface2);color:var(--muted); }

    /* ── TRADE PARTNER CARDS ──────────────────────────────── */
    .partner-card { background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px; }
    .partner-score-track { height:5px;background:var(--border);border-radius:3px;margin:5px 0; }
    .partner-score-fill  { height:5px;border-radius:3px;background:var(--accent); }

    /* ── STORYLINES ───────────────────────────────────────── */
    .storyline-panel { display:flex;flex-direction:column;gap:8px;margin-bottom:24px; }
    .storyline-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;animation:fadeSlideIn .3s ease both; }
    .storyline-card:nth-child(2) { animation-delay:.06s; }
    .storyline-card:nth-child(3) { animation-delay:.12s; }
    .storyline-icon { font-size:1.15rem;flex-shrink:0; }
    .storyline-text { font-size:.83rem;color:var(--text);line-height:1.4; }
    @keyframes fadeSlideIn { from { opacity:0;transform:translateY(5px); } to { opacity:1;transform:none; } }

    /* ── RIVALRIES ────────────────────────────────────────── */
    .rivalry-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:24px; }
    .rivalry-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .15s,transform .12s; }
    .rivalry-card:hover { border-color:rgba(139,92,246,.5);transform:translateY(-1px); }
    .rivalry-teams { font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .rivalry-vs { color:var(--muted);font-weight:400;padding:0 5px; }
    .rivalry-stat { font-size:.72rem;color:var(--muted);margin-top:3px;line-height:1.5; }
    .rivalry-badge { display:inline-flex;padding:2px 7px;border-radius:4px;font-size:.64rem;font-weight:700;background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25); }

    /* ── DISCORD SUMMARIES ────────────────────────────────── */
    .discord-box { background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:.73rem;color:var(--text);white-space:pre-wrap;max-height:200px;overflow-y:auto;line-height:1.5; }

    /* ── VALIDATION TABLE ─────────────────────────────────── */
    .val-table td,.val-table th { padding:6px 10px;font-size:.77rem; }
    .val-pass { color:var(--green);font-weight:600; }
    .val-warn { color:var(--yellow); }
    .val-fail { color:var(--red);font-weight:600; }

    /* ── PLAYOFFS TAB ─────────────────────────────────────── */
    .po-profile-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; margin-bottom:24px; }
    .po-mini-stat { background:var(--surface2); border-radius:6px; padding:7px 9px; }
    .po-mini-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:2px; }
    .po-mini-val { font-size:1rem; font-weight:700; color:var(--text); }
    .po-records-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:10px; margin-bottom:24px; }
    .po-record-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
    .po-record-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
    .po-record-val { font-size:1.05rem; font-weight:700; color:var(--text); }
    .po-record-sub { font-size:.72rem; color:var(--muted); margin-top:3px; }
    .bracket-wrap { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; align-items:start; }
    .bracket-round-label { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; font-weight:600; }
    .bracket-match { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 11px; margin-bottom:6px; }
    .bracket-team { display:flex; justify-content:space-between; align-items:center; padding:3px 0; font-size:.8rem; gap:8px; }
    .bracket-team.w  { color:var(--text); font-weight:700; }
    .bracket-team.l  { color:var(--muted); }
    .bracket-pts.w { color:var(--green); font-weight:700; font-size:.8rem; }
    .bracket-pts.l { color:var(--muted); font-size:.8rem; }
    .what-wins-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:12px; margin-bottom:16px; }
    .what-wins-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .what-wins-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
    .what-wins-val { font-size:1.1rem; font-weight:700; color:var(--text); }
    .what-wins-sub { font-size:.72rem; color:var(--muted); margin-top:4px; line-height:1.4; }
    .clutch-badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:.64rem; font-weight:700; margin-left:5px; }
    .po-season-header { font-size:.82rem; font-weight:700; color:var(--text); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
    @media (max-width:768px) {
      .po-profile-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
      .po-records-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
      .what-wins-grid  { grid-template-columns:repeat(2,1fr); gap:8px; }
      .bracket-wrap    { grid-template-columns:1fr; gap:6px; }
    }
    @media (max-width:480px) {
      .po-profile-grid { grid-template-columns:1fr; }
      .po-records-grid { grid-template-columns:1fr; }
      .what-wins-grid  { grid-template-columns:1fr; }
    }

    /* ── MOBILE TOPBAR (hidden on desktop) ───────────────────── */
    #mobile-topbar {
      display: none;
      align-items: center;
      position: sticky; top: 0; z-index: 195;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 14px;
      height: 50px;
      gap: 10px;
      flex-shrink: 0;
    }
    .m-logo { flex: 1; font-size: .95rem; font-weight: 700; color: var(--accent); display: flex; align-items: center; }
    #nav-hamburger {
      background: none; border: 1px solid var(--border);
      border-radius: 7px; padding: 5px 9px; cursor: pointer;
      color: var(--text); font-size: 1.05rem; line-height: 1; flex-shrink: 0;
      min-width: 38px; min-height: 38px; display: flex; align-items: center; justify-content: center;
    }
    #nav-close-btn {
      display: none;
      background: none; border: none; color: var(--muted);
      font-size: 1rem; cursor: pointer; padding: 2px 6px; margin-left: auto;
      flex-shrink: 0;
    }
    #mobile-overlay {
      display: none; position: fixed; inset: 0; z-index: 190;
      background: rgba(0,0,0,.55);
    }
    #mobile-overlay.active { display: block; }

    /* Data sources toggle — acts as a static label on desktop */
    #data-sources-toggle {
      background: none; border: none;
      color: var(--muted); font-size: .65rem;
      text-transform: uppercase; letter-spacing: .06em;
      width: 100%; text-align: left; padding: 0;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px; cursor: default;
    }
    .ds-arrow { font-size: .6rem; transition: transform .18s; }
    #data-sources-panel { overflow: hidden; transition: max-height .2s ease; }

    /* ── TABLET / MOBILE ≤ 768px ──────────────────────────────── */
    @media (max-width: 768px) {
      /* Show mobile topbar */
      #mobile-topbar { display: flex; }
      #nav-close-btn { display: block; }

      /* Sidebar becomes a slide-out drawer */
      header {
        position: fixed;
        left: 0; top: 0;
        width: 240px; height: 100vh;
        transform: translateX(-110%);
        transition: transform .22s ease;
        flex-direction: column;
        border-right: 1px solid var(--border);
        border-bottom: none;
        overflow-y: auto; overflow-x: hidden;
        padding: 0;
        z-index: 200;
      }
      header.nav-open {
        transform: translateX(0);
        box-shadow: 4px 0 28px rgba(0,0,0,.5);
      }

      /* Logo row with close btn */
      .logo {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
        font-size: 1rem; flex-shrink: 0;
      }

      /* Nav: vertical, full-width, touch-friendly */
      nav {
        flex-direction: column;
        overflow-x: hidden;
        padding: 6px 0; flex: none;
      }
      nav button {
        border-left: 2px solid transparent;
        border-bottom: none;
        padding: 13px 16px;
        font-size: .88rem;
        justify-content: flex-start;
        white-space: nowrap;
      }
      nav button.active {
        border-left-color: var(--accent);
        border-bottom-color: transparent;
        background: rgba(88,166,255,.07);
        color: var(--accent);
      }
      .nav-shortcut { display: none; }

      /* League controls inside drawer */
      .league-controls {
        flex-direction: column;
        border-top: 1px solid var(--border);
        padding: 12px 14px; gap: 6px;
      }
      .league-controls input { width: 100%; }
      .btn { width: 100%; }


      /* Data sources: collapsible on mobile, collapsed by default */
      #data-sources-toggle { cursor: pointer; }
      #data-sources-panel { max-height: 0; }
      #data-sources-panel.ds-open { max-height: 220px; }
      #data-sources-toggle .ds-arrow { transform: rotate(-90deg); }
      #data-sources-toggle.ds-open .ds-arrow { transform: rotate(0deg); }

      /* Main content — clear topbar, no sidebar margin */
      main { margin-left: 0; padding: 12px; }

      /* Metric summary cards: 2-column */
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px; margin-bottom: 14px;
      }
      .card { padding: 10px 12px; }
      .card-value { font-size: 1.15rem; }
      .card-sub { font-size: .7rem; }

      /* Section spacing */
      .section { margin-bottom: 20px; }
      .section-title { font-size: .88rem; margin-bottom: 8px; }

      /* Charts */
      .chart-wrap { padding: 12px; margin-bottom: 14px; }
      .chart-wrap canvas { height: 520px !important; }

      /* Tables: tighter cell padding */
      .table-wrap { -webkit-overflow-scrolling: touch; }
      thead th { padding: 7px 8px; font-size: .65rem; }
      td { padding: 7px 8px; font-size: .78rem; }

      /* Trade calculator */
      .trade-layout { grid-template-columns: 1fr; gap: 10px; margin-bottom: 14px; }
      .trade-sides { grid-template-columns: 1fr; gap: 10px; }
      .trade-divider { flex-direction: row; padding-top: 0; }
      .trade-roster { max-height: 260px; }
      .trade-summary { padding: 12px; }
      .trade-v2-layout { grid-template-columns: 1fr; }
      .trade-v2-list-h { max-height: 200px; }
      .trade-v2-footer-teams { grid-template-columns: 1fr auto 1fr; }
      .scout-top-grid { grid-template-columns: 1fr; }
      .scout-needs-grid { grid-template-columns: 1fr 1fr; }

      /* Franchise & player grids */
      .franchise-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .franchise-card { padding: 12px; gap: 8px; }
      .franchise-card-name { font-size: .78rem; }
      .franchise-stat-label { width: 60px; font-size: .68rem; }
      .franchise-stat-val { font-size: .72rem; min-width: 36px; }
      .franchise-stat-row { font-size: .68rem; gap: 5px; }
      .franchise-card-avatar { width: 32px; height: 32px; }
      .franchise-card-sub { font-size: .65rem; }
      .player-grid { grid-template-columns: 1fr; }

      /* ── Mobile quality of life ──────────────────────────── */
      /* Topbar: subtle elevation shadow */
      #mobile-topbar { box-shadow: 0 2px 14px rgba(0,0,0,.45); }
      /* Touch targets: 44px minimum */
      #nav-hamburger { min-width: 44px; min-height: 44px; }
      #nav-close-btn { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; padding: 0; border-radius: 6px; }
      nav button { min-height: 44px; }
      .btn { min-height: 44px; font-size: .88rem; }
      /* iOS: font-size ≥ 16px prevents viewport zoom on input focus */
      .league-controls input { font-size: 16px; min-height: 44px; padding: 0 10px; }
      /* Momentum scroll inside nav drawer */
      nav { -webkit-overflow-scrolling: touch; }
      /* Safe area: iPhone home indicator gap */
      main { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); }
      /* Horizontal table scroll stays contained — no accidental back-nav swipe */
      .table-wrap { overscroll-behavior-x: contain; }
      /* Capture/save buttons: slightly easier to tap */
      .capture-btn { padding: 5px 10px; min-height: 32px; font-size: .72rem; }
    }

    /* ── SMALL PHONES ≤ 480px ─────────────────────────────────── */
    @media (max-width: 480px) {
      #mobile-topbar { height: 46px; padding: 0 10px; }
      .m-logo { font-size: .88rem; }

      main { padding: 8px; }

      .card-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 10px; }
      .card { padding: 8px 10px; }
      .card-label { font-size: .62rem; }
      .card-value { font-size: .95rem; }
      .card-sub { font-size: .65rem; }

      .section { margin-bottom: 16px; }
      .section-title { font-size: .82rem; gap: 5px; }
      .section-note { font-size: .66rem; margin-left: 0; width: 100%; }

      .chart-wrap { padding: 8px; }
      .chart-wrap canvas { height: 480px !important; }

      /* Tables: minimal padding, slightly smaller text */
      thead th { padding: 5px 6px; font-size: .6rem; }
      td { padding: 5px 6px; font-size: .73rem; }

      /* Franchise cards: compact */
      .franchise-card { padding: 9px; gap: 6px; }
      .franchise-card-name { font-size: .72rem; }
      .franchise-stat-label { width: 54px; font-size: .62rem; }
      .franchise-stat-val { min-width: 32px; font-size: .65rem; }
      .franchise-card-avatar { width: 28px; height: 28px; }

      /* Trade chips */
      .trade-player-chip { padding: 5px 8px; font-size: .75rem; }
      .pick-cap-badge { font-size: .67rem; padding: 2px 5px; }

      /* Tighten section titles that wrap */
      .section-title { flex-wrap: wrap; }
      .capture-btn { font-size: .65rem; padding: 1px 6px; }
    }

    /* ── POSITIONAL ROOM GRID ─────────────────────────────── */
    .pos-room-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .pos-room-grid .table-wrap { overflow: visible; }
    .pos-room-grid table { table-layout: auto; width: 100%; }
    .pos-room-grid td, .pos-room-grid th { white-space: normal; word-break: break-word; }
    .depth-weak   { color: var(--red);    font-size: .7rem; font-weight: 600; }
    .depth-solid  { color: var(--yellow); font-size: .7rem; font-weight: 600; }
    .depth-strong { color: var(--green);  font-size: .7rem; font-weight: 600; }
    @media (max-width: 1050px) { .pos-room-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .pos-room-grid { grid-template-columns: 1fr; } }

    /* ══════════════════════════════════════════════════════════
       FRONT OFFICE — BRAND VISUAL SYSTEM
       Layered on top of base styles. No layout changes.
    ══════════════════════════════════════════════════════════ */

    /* ── Updated color tokens ─────────────────────────────── */
    :root {
      --bg:       #0B0E11;
      --surface:  #111827;
      --surface2: #192338;
      --border:   #1e2d42;
      --text:     #e8edf3;
      --muted:    #7a8a9e;
      --accent:   #4a9eff;
      --yellow:   #E8B63A;
      /* Brand additions */
      --accent-deep:  #2870cc;
      --gold:         #E8B63A;
      --gold-dim:     rgba(232,182,58,.12);
      --teal-line:    linear-gradient(90deg, transparent, rgba(74,158,255,.55), transparent);
      --card-sheen:   linear-gradient(180deg, rgba(74,158,255,.045) 0%, transparent 55%);
      --btn-grad:     linear-gradient(135deg, #4a9eff 0%, #2870cc 100%);
      --header-grad:  linear-gradient(180deg, #192338 0%, #111827 100%);
    }

    /* ── Global base ──────────────────────────────────────── */
    body { background: var(--bg); }

    /* ── Sidebar: deeper with subtle top gradient ─────────── */
    header {
      background: linear-gradient(180deg, #192338 0%, #111827 100%);
      border-right-color: #1e2d42;
    }

    /* ── Nav: refined active + hover states ──────────────── */
    nav button { color: #8fa8c4; font-size: .88rem; font-weight: 500; transition: color .15s, background .15s, border-color .15s; }
    nav button:hover { color: #c8daf0; background: rgba(74,158,255,.08); border-left-color: rgba(74,158,255,.3); }
    nav button.active {
      color: #4a9eff;
      border-left: 3px solid #4a9eff;
      background: linear-gradient(90deg, rgba(74,158,255,.15), rgba(74,158,255,.04));
      font-weight: 600;
      box-shadow: inset -2px 0 0 rgba(74,158,255,.2);
    }
    .nav-shortcut { color: #4a7aaa; border-color: rgba(74,158,255,.2); background: rgba(25,35,56,.8); }

    /* ── Load button: teal→blue gradient ─────────────────── */
    .btn {
      background: var(--btn-grad);
      color: #fff;
      letter-spacing: .03em;
      box-shadow: 0 2px 8px rgba(40,112,204,.3);
      transition: opacity .15s, box-shadow .15s;
    }
    .btn:hover { opacity: 1; box-shadow: 0 4px 16px rgba(40,112,204,.45); filter: brightness(1.08); }

    /* ── Metric cards: top accent line + subtle sheen ─────── */
    .card {
      background: var(--surface);
      border-color: var(--border);
      position: relative;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--teal-line);
      opacity: .9;
    }
    .card::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--card-sheen);
      pointer-events: none;
    }
    .card:hover { border-color: rgba(74,158,255,.35); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
    .card-value { color: var(--text); }
    .card-label { letter-spacing: .07em; }

    /* ── Section titles: left accent strip ───────────────── */
    .section-title {
      padding-left: 10px;
      border-left: 3px solid;
      border-image: linear-gradient(180deg, #4a9eff, #2870cc) 1;
      margin-bottom: 14px;
    }

    /* ── Table: elevated header + refined rows ────────────── */
    .table-wrap {
      background: var(--surface);
      border-color: var(--border);
      border-radius: 10px;
    }
    thead th {
      background: linear-gradient(180deg, #192338 0%, #162030 100%);
      border-bottom-color: #1e2d42;
      color: #5f7a99;
      letter-spacing: .06em;
    }
    thead th:hover { color: var(--text); }
    tbody tr { border-bottom-color: rgba(30,45,66,.8); }
    tbody tr:hover { background: rgba(74,158,255,.05); }
    tbody tr:first-child td:not(.week-high):not(.week-low):not(.sv-hi):not(.sv-lo):not(.sv-bad):not(.sv-na) { color: var(--text); }

    /* ── Chart containers: better frame ──────────────────── */
    .chart-wrap {
      background: linear-gradient(180deg, #192338 0%, #111827 100%);
      border-color: var(--border);
      position: relative;
      overflow: hidden;
    }
    .chart-wrap::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--teal-line);
    }

    /* ── Franchise cards: elevated module feel ────────────── */
    .franchise-card {
      background: linear-gradient(180deg, #192338 0%, #111827 100%);
      border-color: var(--border);
      transition: border-color .18s, box-shadow .18s;
      position: relative; overflow: hidden;
    }
    .franchise-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--teal-line); opacity: .7;
    }
    .franchise-card:hover {
      border-color: rgba(74,158,255,.3);
      box-shadow: 0 6px 24px rgba(0,0,0,.35);
    }

    /* ── Tier / archetype badges: depth + gradient fills ──── */
    .tier-badge, .archetype-badge {
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      letter-spacing: .05em;
    }

    /* ── Trade panels: distinct side contrast ─────────────── */
    .trade-panel {
      background: linear-gradient(180deg, #192338 0%, #111827 100%);
      border-color: var(--border);
    }
    .trade-panel-header {
      background: rgba(30,45,66,.5);
      border-bottom-color: var(--border);
    }
    .trade-summary {
      background: linear-gradient(180deg, #192338 0%, #111827 100%);
      border-color: var(--border);
    }
    .trade-verdict {
      border: 1px solid;
      font-size: .9rem;
      letter-spacing: .02em;
    }
    .verdict-fair {
      background: rgba(63,185,80,.1);
      border-color: rgba(63,185,80,.25);
      box-shadow: 0 0 20px rgba(63,185,80,.06);
    }
    .verdict-a {
      background: rgba(74,158,255,.1);
      border-color: rgba(74,158,255,.25);
      box-shadow: 0 0 20px rgba(74,158,255,.07);
    }
    .verdict-b {
      background: rgba(232,182,58,.1);
      border-color: rgba(232,182,58,.25);
      box-shadow: 0 0 20px rgba(232,182,58,.06);
    }
    .trade-player-chip {
      background: rgba(25,35,56,.8);
      border: 1px solid var(--border);
    }
    .pick-chip {
      border-color: rgba(232,182,58,.3);
      background: rgba(232,182,58,.07);
    }

    /* ── Rank num: gold/silver/bronze refined ─────────────── */
    .rank-num.gold   { background: linear-gradient(135deg,#E8B63A,#c49020); color:#0B0E11; box-shadow:0 0 8px rgba(232,182,58,.3); }
    .rank-num.silver { background: linear-gradient(135deg,#9eaabc,#6e7f96); color:#0B0E11; }
    .rank-num.bronze { background: linear-gradient(135deg,#c47a3a,#9a5a22); color:#fff; }

    /* ── Signal / buy-sell badges: inner highlight ────────── */
    .signal-cornerstone, .signal-buy, .signal-sell, .signal-hold, .signal-stash {
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }
    .signal-cornerstone { background: rgba(245,158,11,.12); }
    .signal-buy  { background: rgba(63,185,80,.12); }
    .signal-sell { background: rgba(248,81,73,.12); }
    .signal-hold { background: var(--gold-dim); border-color: rgba(232,182,58,.3); color: var(--gold); }
    .signal-stash{ background: rgba(163,113,247,.12); }

    /* ── Season buttons: cleaner active state ─────────────── */
    .season-btn { background: var(--surface2); border-color: var(--border); }
    .season-btn.active {
      background: linear-gradient(135deg, rgba(74,158,255,.18), rgba(40,112,204,.1));
      border-color: rgba(74,158,255,.5);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(74,158,255,.12);
    }

    /* ── Mobile topbar: match sidebar gradient ────────────── */
    #mobile-topbar {
      background: linear-gradient(90deg, #192338 0%, #111827 100%);
      border-bottom-color: var(--border);
    }

    /* ── Tooltips: slightly more premium ─────────────────── */
    #global-tip {
      background: #192338;
      border-color: #1e2d42;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }

    /* ── Wrapped cards ────────────────────────────────────── */
    .wrapped-card {
      background: linear-gradient(135deg, #1a2840 0%, #0f1923 100%);
      border-color: rgba(74,158,255,.2);
      border-top-color: rgba(74,158,255,.65);
      box-shadow: 0 4px 20px rgba(0,0,0,.5), inset 0 1px 0 rgba(74,158,255,.08);
    }
    .wrapped-big { color: #58a6ff; text-shadow: 0 0 20px rgba(88,166,255,.3); }

    /* ── Player cards ─────────────────────────────────────── */
    .player-card {
      background: linear-gradient(180deg, #192338 0%, #111827 100%);
      border-color: var(--border);
    }
    .player-card:hover { border-color: rgba(74,158,255,.4); box-shadow: 0 4px 20px rgba(0,0,0,.3); }

    /* ── Bracket / playoffs cards ─────────────────────────── */
    .bracket-match {
      background: var(--surface2);
      border-color: var(--border);
    }
    .po-record-card, .what-wins-card {
      background: linear-gradient(180deg, #192338 0%, #111827 100%);
      border-color: var(--border);
    }

    /* ── Bar fills: gradient ──────────────────────────────── */
    .bar-fill { background: linear-gradient(90deg, #4a9eff, #2870cc); }
    .partner-score-fill { background: linear-gradient(90deg, #4a9eff, #2870cc); }

    /* ── Depth quality labels: slightly stronger ──────────── */
    .depth-strong { color: #92B67B; }
    .depth-solid  { color: var(--gold); }
    .depth-weak   { color: #e05a52; }

    /* ── #1 ranked row subtle glow ───────────────────────── */
    tbody tr:first-child {
      background: rgba(74,158,255,.03);
    }

    /* ── Table wrap enhanced shadow ──────────────────────── */
    .table-wrap {
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    /* ── Section title typography upgrade ────────────────── */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .01em;
      color: #c8daf0;
    }

    /* ── Rank pill refinement ─────────────────────────────── */
    .rank-pill {
      font-size: .72rem;
      letter-spacing: .03em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }

    /* ── Input focus: steel-blue ring ────────────────────── */
    .league-controls input:focus,
    .players-controls input:focus,
    .players-controls select:focus {
      outline: none;
      border-color: rgba(74,158,255,.5);
      box-shadow: 0 0 0 2px rgba(74,158,255,.1);
    }

    /* ── Scrollbar styling ───────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #1e2d42; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a3d56; }

    /* ── Pos badges: inner highlight ─────────────────────── */
    .pos-QB, .pos-RB, .pos-WR, .pos-TE {
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
    }

    /* ── Pick cap badges ──────────────────────────────────── */
    .pick-cap-badge {
      background: rgba(25,35,56,.9);
      border-color: rgba(74,158,255,.2);
    }

    /* ── Franchise stat bars ─────────────────────────────── */
    .pos-bar-track { background: rgba(25,35,56,.8); }

    /* ── Mobile topbar hamburger ─────────────────────────── */
    #nav-hamburger {
      border-color: rgba(74,158,255,.25);
      color: #8fa8c4;
      border-radius: 8px;
    }
    #nav-hamburger:hover {
      border-color: rgba(74,158,255,.5);
      color: var(--accent);
    }

    /* ── Warn banner: gold-tinted ────────────────────────── */
    .warn-banner {
      background: rgba(232,182,58,.08);
      border-color: rgba(232,182,58,.25);
    }

    /* ── League controls input ───────────────────────────── */
    .league-controls input {
      background: rgba(25,35,56,.6);
      border-color: #1e2d42;
    }

    /* ── SEASON STATS TABLE ──────────────────────────────────── */
    .stats-tbl-wrap {
      overflow-x: auto; overflow-y: auto; max-height: 72vh;
      border: 1px solid var(--border); border-radius: 10px;
      overscroll-behavior: contain;
    }
    .stats-tbl { width:100%; border-collapse:collapse; font-size:.77rem; table-layout:fixed; }
    .stats-tbl thead th {
      padding:7px 9px; background:var(--surface2); color:var(--muted);
      font-size:.63rem; text-transform:uppercase; letter-spacing:.05em;
      cursor:pointer; white-space:nowrap; border-bottom:2px solid var(--border);
      position:sticky; top:0; z-index:2; user-select:none; transition:color .12s;
      overflow:hidden; text-overflow:ellipsis;
    }
    .stats-tbl thead th:hover { color:var(--text); }
    .stats-tbl thead th.srt-on { color:var(--accent); }
    .stats-tbl thead th.srt-on::after { content:' ▾'; font-size:.55rem; }
    .stats-tbl thead th.srt-asc::after { content:' ▴'; font-size:.55rem; }
    .stats-tbl thead .col-player { position:sticky; left:0; z-index:3; text-align:left; }
    .stats-tbl tbody td { padding:5px 9px; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; user-select:none; }
    .stats-tbl tbody tr:hover td { background:rgba(255,255,255,.025); }
    .stats-tbl .col-player-cell {
      position:sticky; left:0; background:var(--surface); z-index:1;
      padding:5px 9px;
    }
    .stats-tbl .pcell-inner { display:flex; align-items:center; gap:8px; }
    .stats-tbl .pcell-hs { width:28px; height:28px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--surface2); }
    .sv-hi  { color:#3fb950; font-weight:600; }
    .sv-mid { color:var(--text); }
    .sv-lo  { color:var(--muted); }
    .sv-na  { color:rgba(139,148,158,.3); }
    .sv-bad { color:#ef4444; font-weight:600; }

    /* ── ROSTER MODAL ─────────────────────────────────────────── */
    #roster-modal {
      position:fixed;inset:0;z-index:2000;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,0);
      pointer-events:none;
      transition:background .25s;
      /* backdrop-filter intentionally absent in closed state —
         even blur(0) forces a full-screen compositing node on every
         scroll frame, which is the primary cause of scroll jank. */
    }
    #roster-modal.open {
      background:rgba(0,0,0,.8);backdrop-filter:blur(10px);
      pointer-events:all;
    }
    .rm-inner {
      background:var(--surface1);border:1px solid var(--border);border-radius:20px;
      width:min(94vw,880px);max-height:90vh;overflow-y:auto;overflow-x:hidden;
      position:relative;box-shadow:0 32px 80px rgba(0,0,0,.7);
      transform:translateY(30px) scale(.96);opacity:0;
      transition:transform .3s cubic-bezier(.34,1.4,.64,1),opacity .22s;
      scrollbar-width:thin;scrollbar-color:var(--border) transparent;
    }
    #roster-modal.open .rm-inner { transform:none;opacity:1; }
    .rm-close-btn {
      position:absolute;top:14px;right:14px;z-index:10;
      width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
      background:var(--surface2);color:var(--muted);font-size:.85rem;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .15s,color .15s;
    }
    .rm-close-btn:hover { background:rgba(255,255,255,.1);color:var(--text); }
    .rm-header {
      padding:28px 28px 22px;
      background:linear-gradient(140deg,var(--surface2) 0%,rgba(25,35,55,.95) 100%);
      border-bottom:1px solid var(--border);position:relative;
    }
    .rm-hero { display:flex;align-items:center;gap:18px;margin-bottom:20px; }
    .rm-avatar-wrap {
      width:76px;height:76px;flex-shrink:0;border-radius:50%;
      border:2px solid var(--border);background:var(--surface2);
      overflow:hidden;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 20px rgba(0,0,0,.5);
    }
    .rm-avatar-wrap img { width:100%;height:100%;object-fit:cover; }
    .rm-title-block { flex:1;min-width:0; }
    .rm-team-name { font-size:1.45rem;font-weight:800;color:var(--text);line-height:1.1; }
    .rm-stat-row { display:flex;flex-wrap:wrap;gap:10px; }
    .rm-chip {
      background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:10px;padding:8px 14px;display:flex;flex-direction:column;
      align-items:center;min-width:82px;
    }
    .rm-chip-label { font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em; }
    .rm-chip-val { font-size:.95rem;font-weight:700;color:var(--text);margin-top:2px; }
    .rm-body { padding:22px 24px 30px; }
    .rm-pos-section { margin-bottom:24px; }
    .rm-pos-header { display:flex;align-items:center;gap:10px;margin-bottom:12px; }
    .rm-pos-label {
      font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
      padding:3px 10px;border-radius:5px;flex-shrink:0;
    }
    .rm-pos-divider { flex:1;height:1px;background:var(--border); }
    .rm-player-grid {
      display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:9px;
    }
    .rm-player-card {
      background:var(--surface2);border:1px solid var(--border);border-radius:12px;
      padding:10px 12px 10px 15px;display:flex;align-items:center;gap:11px;
      position:relative;overflow:hidden;transition:border-color .15s,transform .12s;
    }
    .rm-player-card:hover { border-color:rgba(255,255,255,.18);transform:translateY(-1px); }
    .rm-card-accent { position:absolute;left:0;top:0;bottom:0;width:3px; }
    .rm-hs {
      width:58px;height:58px;border-radius:9px;object-fit:cover;
      background:var(--surface1);flex-shrink:0;border:1.5px solid var(--border);
    }
    .rm-player-info { flex:1;min-width:0; }
    .rm-player-name {
      font-size:.83rem;font-weight:700;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .rm-player-meta { font-size:.67rem;color:var(--muted);margin-top:2px; }
    .rm-val-bar-wrap { height:2px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:6px; }
    .rm-val-bar { height:100%;border-radius:2px; }
    .rm-player-right { text-align:right;flex-shrink:0; }
    .rm-player-value { font-size:.88rem;font-weight:700; }
    .rm-tag {
      display:inline-block;font-size:.54rem;font-weight:700;letter-spacing:.04em;
      text-transform:uppercase;border-radius:4px;padding:1px 5px;margin-top:3px;
    }
    .rm-picks-grid { display:flex;flex-wrap:wrap;gap:7px;margin-top:10px; }
    .rm-pick-pill {
      display:flex;align-items:center;gap:6px;
      background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.25);
      border-radius:8px;padding:6px 11px;font-size:.75rem;
    }
    .franchise-card-name { cursor:pointer;transition:color .15s; }
    .franchise-card-name:hover { color:var(--accent); }

    /* ── ROSTERS TAB ──────────────────────────────────────────── */
    .rosters-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
    .roster-card { background:var(--surface1); border:1px solid var(--border); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .roster-card-hdr {
      padding:12px 14px 10px;
      background:linear-gradient(135deg,var(--surface2) 0%,rgba(20,30,50,.95) 100%);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:11px;
    }
    .roster-card-av {
      width:44px; height:44px; border-radius:50%; object-fit:cover;
      border:1.5px solid var(--border); flex-shrink:0; background:var(--surface2);
    }
    .roster-card-name {
      font-size:.95rem; font-weight:800; color:var(--text);
      cursor:pointer; transition:color .15s; line-height:1.1;
    }
    .roster-card-name:hover { color:var(--accent); }
    .roster-card-body { padding:10px 12px 12px; flex:1; }
    .rc-pos-section { margin-bottom:6px; }
    .rc-pos-hdr {
      display:flex; align-items:center; gap:6px; margin-bottom:3px;
    }
    .rc-pos-pill {
      font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
      padding:1px 7px; border-radius:4px; flex-shrink:0;
    }
    .rc-pos-line { flex:1; height:1px; background:var(--border); opacity:.6; }
    .rc-player-row {
      display:flex; align-items:center; gap:7px; padding:3px 0;
      border-bottom:1px solid rgba(255,255,255,.03);
    }
    .rc-player-row:last-child { border-bottom:none; }
    .rc-hs {
      width:26px; height:26px; border-radius:50%; object-fit:cover;
      flex-shrink:0; background:var(--surface2); border:1px solid var(--border);
    }
    .rc-name { flex:1; font-size:.77rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
    .rc-meta { font-size:.65rem; color:var(--muted); flex-shrink:0; }
    .rc-val  { font-size:.73rem; font-weight:600; text-align:right; flex-shrink:0; min-width:38px; }
    .rc-picks { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
    @media(max-width:600px) { .rosters-grid { grid-template-columns:1fr; } }
    @media(max-width:600px) {
      .rm-inner { border-radius:16px 16px 0 0;align-self:flex-end;max-height:92vh; }
      #roster-modal { align-items:flex-end; }
      .rm-header { padding:20px 18px 16px; }
      .rm-body { padding:16px 16px 24px; }
      .rm-team-name { font-size:1.15rem; }
      .rm-player-grid { grid-template-columns:1fr; }
    }

    /* ══════════════════════════════════════════════════════════
       UX POLISH LAYER — transitions · hover lift · table quality
    ══════════════════════════════════════════════════════════ */

    /* ── Tab / sub-panel entrance animation ──────────────────── */
    @keyframes panelFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tab-content.active { animation: panelFadeUp .22s cubic-bezier(.22,1,.36,1) both; }
    .sub-panel.active   { animation: panelFadeUp .18s cubic-bezier(.22,1,.36,1) both; }

    /* ── Card hover: lift + glow ──────────────────────────────── */
    .card {
      transition: border-color .15s, box-shadow .15s, transform .18s cubic-bezier(.22,1,.36,1);
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(74,158,255,.32);
      box-shadow: 0 8px 28px rgba(0,0,0,.5), 0 0 0 1px rgba(74,158,255,.18);
    }

    /* ── Franchise card hover: lift ──────────────────────────── */
    .franchise-card {
      transition: border-color .18s, box-shadow .18s, transform .18s cubic-bezier(.22,1,.36,1);
    }
    .franchise-card:hover {
      transform: translateY(-2px);
      border-color: rgba(74,158,255,.3);
      box-shadow: 0 10px 36px rgba(0,0,0,.55);
    }

    /* ── Player card hover: lift ──────────────────────────────── */
    .player-card {
      transition: border-color .15s, box-shadow .15s, transform .15s cubic-bezier(.22,1,.36,1);
    }
    .player-card:hover {
      transform: translateY(-1px);
      border-color: rgba(74,158,255,.42);
      box-shadow: 0 6px 22px rgba(0,0,0,.4);
    }

    /* ── Roster modal player card hover: lift + depth ─────────── */
    .rm-player-card {
      transition: border-color .15s, transform .14s cubic-bezier(.22,1,.36,1), box-shadow .15s;
    }
    .rm-player-card:hover {
      border-color: rgba(255,255,255,.2);
      box-shadow: 0 4px 18px rgba(0,0,0,.45);
      transform: translateY(-1px);
    }

    /* ── Bar fill: animate expand from left on render ─────────── */
    .bar-bg { overflow: hidden; }
    .bar-fill {
      animation: barSlideIn .6s cubic-bezier(.4,0,.2,1) both;
      transform-origin: left center;
    }
    @keyframes barSlideIn {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* ── Table: sticky header gets a shadow separator ─────────── */
    thead th {
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }

    /* ── Table: sorted column header highlight ────────────────── */
    thead th.srt-on {
      background: rgba(74,158,255,.07) !important;
    }

    /* ── Table: numeric cell classes ─────────────────────────── */
    .td-r {
      text-align: right !important;
      font-variant-numeric: tabular-nums;
      letter-spacing: .01em;
    }
    .th-r { text-align: right !important; }

    /* ── Table row hover: snappier transition ─────────────────── */
    tbody tr { transition: background .08s; }

    /* ── Weekly score table: high/low cell background tints ────── */
    td.week-high {
      background: rgba(232,182,58,.1) !important;
    }
    td.week-low {
      background: rgba(248,81,73,.07) !important;
    }

    /* ── Inline mini-bars for table cells ─────────────────────── */
    .cell-bar { display: inline-flex; align-items: center; gap: 7px; width: 100%; }
    .cell-bar-bg { flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; min-width: 36px; }
    .cell-bar-fill {
      height: 100%; border-radius: 2px;
      animation: barSlideIn .6s cubic-bezier(.4,0,.2,1) both;
      transform-origin: left center;
    }

    /* ── Skeleton shimmer for loading states ──────────────────── */
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    .skeleton {
      background: var(--surface2); border-radius: 4px;
      overflow: hidden; position: relative;
    }
    .skeleton::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.05) 50%, transparent 100%);
      animation: shimmer 1.6s infinite;
    }

    /* ── Wrapped cards: hover lift ────────────────────────────── */
    .wrapped-card {
      transition: border-color .15s, box-shadow .15s, transform .15s cubic-bezier(.22,1,.36,1);
    }
    .wrapped-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,.55), inset 0 1px 0 rgba(74,158,255,.1);
    }

    /* ── Playoff / record cards: hover lift ───────────────────── */
    .po-record-card, .what-wins-card {
      transition: border-color .15s, box-shadow .15s, transform .15s cubic-bezier(.22,1,.36,1);
    }
    .po-record-card:hover, .what-wins-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(0,0,0,.4);
    }

    /* ── Trade proposal cards ─────────────────────────────────── */
    .proposal-card {
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .14s cubic-bezier(.22,1,.36,1);
    }
    .proposal-card:hover {
      border-color: rgba(74,158,255,.45) !important;
      box-shadow: 0 4px 18px rgba(0,0,0,.4);
      transform: translateY(-1px);
    }
    .proposal-card.proposal-active {
      border-color: rgba(74,158,255,.65) !important;
      background: linear-gradient(180deg, rgba(74,158,255,.06) 0%, var(--surface) 60%) !important;
      box-shadow: 0 0 0 1px rgba(74,158,255,.22), 0 6px 22px rgba(0,0,0,.4) !important;
    }
    /* Fix: proposal team columns must not overflow their grid cells */
    .proposal-sides { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .proposal-side  {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 10px;
      min-width: 0; overflow: hidden;
    }

    /* ── Comparison footer: activated pulse ────────────────────── */
    @keyframes comparisonPulse {
      0%   { box-shadow: 0 0 0 0 rgba(74,158,255,.45), 0 4px 24px rgba(0,0,0,.4); }
      60%  { box-shadow: 0 0 0 8px rgba(74,158,255,.06), 0 6px 28px rgba(0,0,0,.45); }
      100% { box-shadow: 0 0 0 0 rgba(74,158,255,0),    0 4px 24px rgba(0,0,0,.4); }
    }
    .trade-v2-footer.comparison-active {
      border-color: rgba(74,158,255,.5);
      animation: comparisonPulse .7s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* ══════════════════════════════════════════════════════════
       PREMIUM UI LAYER — player cards, trade bar, rankings
    ══════════════════════════════════════════════════════════ */

    /* ── Weekly theme hook (injectable, no logic) ─────────── */
    :root {
      --weekly-gradient: none;
      --weekly-accent:   var(--accent);
    }
    /* .theme-weekly overrides go here */

    /* ── Player card: hover lift + refined transition ─────── */
    .player-card {
      position: relative;
      transition: transform .14s cubic-bezier(.22,1,.36,1),
                  box-shadow .15s,
                  border-color .15s,
                  opacity .1s;
    }
    .player-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
      border-color: rgba(74,158,255,.4);
    }
    .player-card:active { transform: scale(.985); opacity: .88; }

    /* ── Tier-based card styles ───────────────────────────── */
    .tier-1 {
      background: linear-gradient(180deg, #1d2640 0%, #111827 100%);
      border-color: rgba(232,182,58,.22);
    }
    .tier-1::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--gold); border-radius: 10px 0 0 10px;
    }
    .tier-2 { border-color: rgba(74,158,255,.2); }
    /* tier-3 = default, no override */
    .tier-4 { opacity: .85; }
    .tier-5 { opacity: .78; }

    /* ── Overlay modifier classes ─────────────────────────── */
    /* ov-cornerstone: gold strip (same as tier-1 but gold always) */
    .ov-cornerstone::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--gold); border-radius: 10px 0 0 10px;
    }
    /* ov-rising: faint green left-edge brightness nudge */
    .ov-rising {
      box-shadow: inset 2px 0 0 rgba(63,185,80,.35);
    }
    /* ov-falling: very faint red tint */
    .ov-falling {
      background: linear-gradient(180deg,
        rgba(248,81,73,.04) 0%,
        transparent 55%),
        linear-gradient(180deg, #192338 0%, #111827 100%);
    }
    /* ov-speculative: purple-tinted border */
    .ov-speculative { border-color: rgba(163,113,247,.25); }
    /* ov-aging: desaturation */
    .ov-aging { filter: saturate(.7); }

    /* ── Dynasty row: two-line layout ────────────────────── */
    .dynasty-line1 { display:flex; align-items:center; gap:5px; margin-top:5px; flex-wrap:wrap; }
    .dynasty-line2 { font-size:.63rem; margin-top:3px; font-weight:600; }

    /* ── Trade v2 bar: snappier transition + midpoint marker ─ */
    .trade-v2-bar { position: relative; overflow: hidden; }
    .trade-v2-bar-a { transition: width .2s cubic-bezier(0.4,0,0.2,1); }
    .trade-v2-bar-b { transition: width .2s cubic-bezier(0.4,0,0.2,1); }
    /* Midpoint marker — 1px vertical at 50% */
    .trade-v2-bar::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
      width: 1px; background: rgba(255,255,255,.28); z-index: 2;
      transform: translateX(-50%);
    }
    /* Fair trade: midpoint pulses green */
    .trade-bar-fair .trade-v2-bar::before {
      background: var(--green);
      animation: barFairPulse .45s ease forwards;
    }
    /* Lopsided: dominant side turns yellow */
    .trade-bar-lopsided-a .trade-v2-bar-a { background: var(--yellow); }
    .trade-bar-lopsided-b .trade-v2-bar-b { background: var(--yellow); }
    @keyframes barFairPulse {
      0%   { box-shadow: 0 0 0    rgba(63,185,80,0); }
      50%  { box-shadow: 0 0 10px rgba(63,185,80,.7); }
      100% { box-shadow: 0 0 6px  rgba(63,185,80,.5); }
    }

    /* ══════════════════════════════════════════════════════════
       RESPONSIVE LAYOUT SYSTEM v2
       Mobile-first → Tablet → Laptop → Desktop → Ultra-wide

       BREAKPOINTS
       ≤ 640px   Mobile      – drawer nav, stacked everything
         641–768 Small tablet – existing mobile block still covers this
        769–1024 Tablet       – drawer nav, 2-col cards, full-width trade
       1025–1440 Laptop       – fixed sidebar, fluid content, same density
       1441–1920 Desktop      – wider sidebar, centered 1440px content max
          1921+  Ultra-wide   – expands content cap to 1600px

       LAYOUT RULE (1025px+)
       main padding = max(24px, (100vw − sidebar − content-max) / 2)
       At narrow viewports: evaluates negative → clamped to 24px (no change).
       At wide viewports: grows symmetrically so content never exceeds
       --content-max, naturally centering the content column.
    ══════════════════════════════════════════════════════════ */

    /* ── Layout tokens ─────────────────────────────────────── */
    :root {
      --sidebar-w:   214px;
      --content-max: 1440px;
    }

    /* ── Fluid main: auto-centers content on wide screens ───── */
    @media (min-width: 1025px) {
      main {
        padding: 28px max(24px, calc((100vw - var(--sidebar-w) - var(--content-max)) / 2));
      }
      /* New-season rollforward banner aligns with content column */
      #new-season-banner {
        margin-left: var(--sidebar-w);
        padding-inline: max(24px, calc((100vw - var(--sidebar-w) - var(--content-max)) / 2));
      }
    }

    /* ══ TABLET  769px – 1024px ═══════════════════════════════
       Sidebar becomes a slide-out drawer (same as mobile).
       Component layout stays 2-column — not squeezed.
    ═══════════════════════════════════════════════════════════ */
    @media (min-width: 769px) and (max-width: 1024px) {

      /* Show mobile topbar / hamburger */
      #mobile-topbar { display: flex; }
      #nav-close-btn { display: block; }

      /* Sidebar: off-canvas drawer */
      header {
        position: fixed; left: 0; top: 0;
        width: 260px; height: 100vh;
        transform: translateX(-110%);
        transition: transform .22s ease;
        flex-direction: column;
        border-right: 1px solid var(--border);
        border-bottom: none;
        overflow-y: auto; overflow-x: hidden;
        padding: 0; z-index: 200;
        background: linear-gradient(180deg, #192338 0%, #111827 100%);
      }
      header.nav-open {
        transform: translateX(0);
        box-shadow: 4px 0 28px rgba(0,0,0,.5);
      }
