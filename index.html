<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynasty Analytics Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
      --border: #21262d; --text: #e6edf3; --muted: #8b949e;
      --accent: #58a6ff; --green: #3fb950; --red: #f85149;
      --yellow: #d29922; --purple: #a371f7; --orange: #fb8500;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* SIDEBAR */
    header { position: fixed; left: 0; top: 0; width: 214px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 200; overflow: hidden; }
    .logo { font-size: 1.05rem; font-weight: 700; color: var(--accent); padding: 18px 16px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; }
    nav { display: flex; flex-direction: column; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 0; }
    nav button { background: none; border: none; border-left: 2px solid transparent; color: var(--muted); font-size: .85rem; padding: 10px 12px 10px 16px; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; transition: color .15s, background .15s, border-color .15s; white-space: nowrap; width: 100%; }
    nav button:hover { color: var(--text); background: rgba(255,255,255,.04); }
    nav button.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,.07); }
    .nav-shortcut { font-size: .62rem; color: var(--muted); opacity: .5; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; flex-shrink: 0; }
    .league-controls { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .league-controls input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: .8rem; width: 100%; }
    .league-controls input::placeholder { color: var(--muted); }
    .btn { background: var(--accent); color: #0d1117; border: none; border-radius: 6px; padding: 7px 14px; font-size: .8rem; font-weight: 600; cursor: pointer; transition: opacity .15s; width: 100%; text-align: center; }
    .btn:hover { opacity: .85; }

    /* MAIN */
    main { padding: 24px; max-width: 1200px; margin: 0 auto 0 214px; }

    /* LOADING */
    #loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    #error-msg { color: var(--red); display: none; text-align: center; padding: 40px 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TABS */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* CARDS */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
    .card-value { font-size: 1.4rem; font-weight: 700; }
    .card-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }

    /* SECTIONS */
    .section { margin-bottom: 32px; }
    .section-title { font-size: .95rem; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .section-note { font-size: .75rem; color: var(--muted); margin-left: auto; font-weight: 400; }
    .capture-btn { cursor:pointer; background:transparent; border:1px solid var(--border); border-radius:4px; color:var(--muted); font-size:.7rem; padding:2px 8px; white-space:nowrap; flex-shrink:0; transition:color .15s,border-color .15s; line-height:1.6; }
    .capture-btn:hover { color:var(--text); border-color:var(--muted); }
    .capture-btn:disabled { opacity:.5; cursor:wait; }

    /* TABLE */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 9px 12px; text-align: left; font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
    thead th:hover { color: var(--text); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 9px 12px; font-size: .83rem; color: var(--muted); white-space: nowrap; }
    td.bold { color: var(--text); font-weight: 600; }

    .rank-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: .7rem; font-weight: 700; background: var(--surface2); color: var(--muted); margin-right: 6px; }
    .rank-num.gold { background: #d29922; color: #000; }
    .rank-num.silver { background: #8b949e; color: #000; }
    .rank-num.bronze { background: #b46f2e; color: #fff; }

    .pos-c { color: var(--green); } .neg { color: var(--red); } .neutral { color: var(--muted); }

    /* CONTENDER TIER */
    .tier-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700; }

    /* RANK PILL */
    .rank-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 22px; border-radius: 4px; font-size: .7rem; font-weight: 700; padding: 0 6px; }

    /* CHART */
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .chart-wrap canvas { max-height: 360px; }

    /* BAR */
    .bar-wrap { min-width: 80px; }
    .bar-bg { background: var(--surface2); border-radius: 3px; height: 5px; }
    .bar-fill { height: 5px; border-radius: 3px; background: var(--accent); transition: width .4s; }

    /* ── HEADSHOTS ────────────────────────── */
    .hs {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; background: var(--surface2);
      flex-shrink: 0; border: 1.5px solid var(--border);
    }
    .hs-lg {
      width: 64px; height: 64px; border-radius: 50%;
      object-fit: cover; background: var(--surface2);
      flex-shrink: 0; border: 2px solid var(--border);
    }
    .hs-fallback {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; color: #fff; border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── PLAYER STAT CARDS ───────────────── */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      overflow: hidden;
      transition: border-color .15s;
    }
    .player-card:hover { border-color: var(--accent); }

    .player-card-img { position: relative; flex-shrink: 0; line-height: 0; }
    .player-card-img .hs-lg { border-color: transparent; display: block; }

    .player-card-body { flex: 1; min-width: 0; overflow: hidden; }

    .player-card-meta {
      display: flex; align-items: center; gap: 5px; margin-bottom: 4px; flex-wrap: wrap;
    }

    .player-card-name {
      font-size: .9rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 1px;
    }

    .player-card-owner {
      font-size: .7rem; color: var(--muted); margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .player-card-stats {
      font-size: .75rem; color: var(--muted); line-height: 1.5;
      margin-bottom: 6px; word-break: break-word;
    }

    .player-card-pts {
      font-size: 1.15rem; font-weight: 800; color: var(--accent);
    }

    .player-card-pts.top { color: var(--yellow); }
    .player-card-pts.good { color: var(--green); }

    .nfl-team {
      font-size: .68rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
    }

    /* PLAYERS TAB CONTROLS */
    .players-controls {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .players-controls select, .players-controls input {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 7px 12px;
      font-size: .83rem;
    }
    .pos-filter { display: flex; gap: 6px; flex-wrap: wrap; }
    .pos-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 20px; padding: 4px 12px;
      font-size: .75rem; font-weight: 600; cursor: pointer;
    }
    .pos-btn.active {
      background: rgba(88,166,255,.15); border-color: var(--accent);
      color: var(--accent);
    }

    /* PLAYER POS BADGES */
    .pos-badge {
      font-size: .62rem; font-weight: 700; padding: 2px 5px;
      border-radius: 3px; letter-spacing: .02em;
    }
    .pos-QB { background: rgba(163,113,247,.2); color: #a371f7; }
    .pos-RB { background: rgba(63,185,80,.2);   color: #3fb950; }
    .pos-WR { background: rgba(88,166,255,.2);  color: #58a6ff; }
    .pos-TE { background: rgba(251,133,0,.2);   color: #fb8500; }
    .pos-K  { background: rgba(139,148,158,.2); color: #8b949e; }
    .pos-DEF { background: rgba(139,148,158,.2); color: #8b949e; }

    /* TRADE */
    .trade-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .trade-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .trade-panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .trade-panel-header select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: .8rem; flex: 1; min-width: 0; }
    .trade-panel-header label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    .trade-roster { max-height: 360px; overflow-y: auto; padding: 6px; }

    .player-row {
      display: flex; align-items: center; padding: 6px 8px;
      border-radius: 6px; cursor: pointer; transition: background .1s;
      gap: 8px; border: 1px solid transparent;
    }
    .player-row:hover { background: var(--surface2); }
    .player-row.selected { background: rgba(88,166,255,.1); border-color: rgba(88,166,255,.3); }
    .player-row .hs { width: 32px; height: 32px; }

    .player-name { flex: 1; font-size: .82rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; }
    .player-value { font-size: .78rem; font-weight: 600; color: var(--accent); min-width: 46px; text-align: right; }

    .trade-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .trade-sides { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: start; }
    .trade-side-title { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .trade-player-chip { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: 6px; padding: 6px 10px; margin-bottom: 5px; font-size: .8rem; }
    .trade-player-chip .remove { margin-left: auto; color: var(--muted); cursor: pointer; line-height: 1; }
    .trade-player-chip .remove:hover { color: var(--red); }
    .trade-divider { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 22px; font-size: 1.3rem; color: var(--muted); }
    .trade-verdict { text-align: center; padding: 12px; border-radius: 8px; margin-top: 14px; font-weight: 600; font-size: .88rem; }
    .verdict-fair { background: rgba(63,185,80,.1); color: var(--green); }
    .verdict-a { background: rgba(88,166,255,.1); color: var(--accent); }
    .verdict-b { background: rgba(210,153,34,.1); color: var(--yellow); }
    .value-total { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }

    /* PICK ROWS IN TRADE PANEL */
    .trade-panel-picks { border-top: 1px solid var(--border); padding: 4px 6px 6px; }
    .trade-panel-picks-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: 4px 8px 4px; }
    .pick-row { display: flex; align-items: center; padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: background .1s; gap: 8px; border: 1px solid transparent; }
    .pick-row:hover { background: var(--surface2); }
    .pick-row.selected { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.3); }
    .pick-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 4px; font-size: .68rem; font-weight: 800; flex-shrink: 0; }
    .pick-chip { display: flex; align-items: center; gap: 8px; background: rgba(210,153,34,.08); border: 1px solid rgba(210,153,34,.25); border-radius: 6px; padding: 6px 10px; margin-bottom: 5px; font-size: .8rem; }
    .picks-source-note { font-size: .7rem; color: var(--muted); text-align: center; margin-top: 6px; }
    .ktc-diverge-note { font-size: .72rem; color: var(--yellow); margin-top: 6px; text-align: center; }

    /* WRAPPED */
    .wrapped-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .wrapped-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; position: relative; overflow: hidden; }
    .wrapped-card::before { content: attr(data-emoji); position: absolute; top: -6px; right: 10px; font-size: 3rem; opacity: .1; }
    .wrapped-card.has-hs { display: flex; gap: 14px; align-items: center; }
    .wrapped-card.has-hs::before { display: none; }
    .wrapped-card-body { flex: 1; }
    .wrapped-title { font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 7px; }
    .wrapped-name { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .wrapped-stat { font-size: .82rem; color: var(--muted); }
    .wrapped-big { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 3px; }

    /* WEEK TABLE */
    .week-table td, .week-table th { padding: 7px 9px; font-size: .78rem; }
    .week-high { color: var(--yellow); font-weight: 700; }
    .week-low { color: var(--red); }

    /* SEASON SWITCHER */
    .season-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 11px; font-size: .78rem; cursor: pointer; }
    .season-btn.active { background: rgba(88,166,255,.15); border-color: var(--accent); color: var(--accent); }

    /* WARN */
    .warn-banner { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.3); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: .82rem; color: var(--yellow); }

    /* LOADING INLINE */
    .inline-loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: .88rem; }

    /* DYNASTY SIGNAL BADGE */
    .signal-badge { display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:.6rem;font-weight:700;letter-spacing:.04em;margin-left:auto; }
    .signal-buy  { background:rgba(63,185,80,.15); color:#3fb950; border:1px solid rgba(63,185,80,.3); }
    .signal-sell { background:rgba(248,81,73,.15);  color:#f85149; border:1px solid rgba(248,81,73,.3); }
    .signal-hold { background:rgba(210,153,34,.12); color:#d29922; border:1px solid rgba(210,153,34,.3); }
    .signal-stash{ background:rgba(163,113,247,.12);color:#a371f7; border:1px solid rgba(163,113,247,.3); }

    /* FRANCHISE CARDS */
    .franchise-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; margin-bottom:24px; }
    .franchise-grid.screenshot-mode { grid-template-columns:repeat(3,1fr); gap:12px; }
    .franchise-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; display:flex; flex-direction:column; gap:12px; position:relative; }
    .franchise-card.fc-hidden { display:none; }
    .fc-hide-btn { position:absolute;top:8px;right:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;font-size:.65rem;padding:1px 6px;cursor:pointer;line-height:1.6;transition:color .15s,border-color .15s,background .15s; }
    .fc-hide-btn:hover { color:var(--red);border-color:var(--red); }
    .fc-hide-btn.fc-hidden-toggle { color:var(--accent);border-color:var(--accent);background:rgba(88,166,255,.08); }
    .fc-ghost { background:var(--surface2);border:1px dashed var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:.78rem;color:var(--muted); }
    .fc-ghost button { background:transparent;border:1px solid var(--border);color:var(--accent);border-radius:4px;font-size:.65rem;padding:1px 8px;cursor:pointer;line-height:1.6; }
    .franchise-card-header { display:flex; align-items:center; gap:10px; }
    .franchise-card-avatar { width:40px;height:40px;border-radius:50%;object-fit:cover;background:var(--surface2);border:2px solid var(--border);flex-shrink:0; }
    .franchise-card-title { flex:1;min-width:0; }
    .franchise-card-name { font-size:.9rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .franchise-card-sub { font-size:.72rem;color:var(--muted);margin-top:2px; }
    .archetype-badge { display:inline-block;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.04em;white-space:nowrap; }

    .franchise-stat-row { display:flex;align-items:center;gap:8px;font-size:.78rem; }
    .franchise-stat-label { color:var(--muted);width:80px;flex-shrink:0; }
    .franchise-stat-val { color:var(--text);font-weight:600;min-width:50px; }

    .pos-bar-track { flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex; }
    .pos-bar-seg { height:100%; }

    .franchise-assets { display:flex;flex-direction:column;gap:4px; }
    .franchise-asset-row { display:flex;align-items:center;gap:8px;font-size:.78rem; }
    .franchise-asset-name { flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .franchise-asset-val { color:var(--accent);font-weight:600;font-size:.75rem; }

    .pick-capital-row { display:flex;flex-wrap:wrap;gap:5px;align-items:center; }
    .pick-cap-badge { display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:.72rem; }

    /* LEAGUE INTEL TABLE */
    .intel-sort-indicator { font-size:.65rem;margin-left:3px;opacity:.5; }
    .intel-sort-active .intel-sort-indicator { opacity:1;color:var(--accent); }
    th.intel-sort-active { color:var(--accent); }
    .age-young { color:var(--green);font-weight:600; }
    .age-old   { color:var(--red); }
    .age-mid   { color:var(--muted); }

    /* ── PICK BUCKET BADGES ──────────────────────────────── */
    .bucket-badge { display:inline-flex;align-items:center;padding:1px 5px;border-radius:3px;font-size:.58rem;font-weight:700;letter-spacing:.03em; }
    .bucket-early { background:rgba(248,81,73,.15);  color:#f85149; border:1px solid rgba(248,81,73,.3); }
    .bucket-mid   { background:rgba(210,153,34,.15); color:#d29922; border:1px solid rgba(210,153,34,.3); }
    .bucket-late  { background:rgba(63,185,80,.15);  color:#3fb950; border:1px solid rgba(63,185,80,.3);  }
    .bucket-conf-low { opacity:.6; }

    /* ── TOOLTIPS ────────────────────────────────────────── */
    .tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: .6rem; font-weight: 700;
      cursor: default; flex-shrink: 0; vertical-align: middle;
      margin-left: 4px; line-height: 1;
    }
    #global-tip {
      position: fixed; z-index: 99999;
      background: #1c2333; color: #e6edf3; font-size: .72rem; font-weight: 400;
      border: 1px solid #21262d; border-radius: 6px;
      padding: 8px 11px; width: 240px; white-space: normal; line-height: 1.45;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); pointer-events: none;
      display: none;
    }

    /* ── EXPLAINABILITY CHIPS ─────────────────────────────── */
    .explain-chip { display:inline-flex;align-items:center;font-size:.63rem;color:var(--muted);background:var(--surface2);border-radius:3px;padding:1px 5px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis; }
    .explain-chips { display:flex;flex-wrap:wrap;gap:3px;margin-top:4px; }

    .partner-score-fill  { height:5px;border-radius:3px;background:var(--accent); }

    /* ── DISCORD SUMMARIES ────────────────────────────────── */

  </style>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────
const BASE    = 'https://api.sleeper.app/v1';
const FC_BASE = 'https://api.fantasycalc.com/values/current';
const HS_URL  = pid => `https://sleepercdn.com/content/nfl/players/thumb/${pid}.jpg`;
const AV_URL  = av  => `https://sleepercdn.com/avatars/thumbs/${av}`;

const POS_COLORS = {
  QB: '#a371f7', RB: '#3fb950', WR: '#58a6ff', TE: '#fb8500', OTH: '#374151'
};
const POS_BG = {
  QB: '#3b1f6e', RB: '#4c0f1f', WR: '#6b1030', TE: '#5c2209', K: '#1f2937', DEF: '#1f2937'
};

// ── STATE ─────────────────────────────────────────────────────
let S = {
  currentLeagueId: null, leagues: {}, seasonChain: [],
  fcBySleeperId: {}, fcValues: [],
  fcPickValues: {},       // { year: { 1: {early,mid,late,avg}, 2: val, 3: val, 4: val } }
  ktcBySleeperId: {},     // ktc values keyed by sleeper ID (if CORS allows)
  ktcAvailable: false,    // whether KTC loaded successfully
  pickOwnership: {},      // { "season_round_origRosterId": { currentOwner, originalOwner, season, round } }
  tradeA: { rosterId: null, players: [], picks: [] },
  tradeB: { rosterId: null, players: [], picks: [] },
  powerChart: null,
  statsCache: {},         // `${season}_${week}` -> stats object
  playersMeta: {},        // sleeperId -> { name, pos, team, age } from FantasyCalc
  playersFilter: { pos: 'ALL', week: 1 },
  posPercentiles: {},     // { QB:{p25,p50,p75}, RB:{...}, WR:{...}, TE:{...} }
  draftHistory: {},       // { leagueId: { season, rosterMap, picks[] } }
  playoffData:  {},       // { leagueId: { bracket, matchupsByWeek, season, rosterMap, maxRound, regPPG } }
};
let draftHistoryLoaded  = false;
let draftHistoryLoading = false;
let playoffsLoaded  = false;
let playoffsLoading = false;

// ── HELPERS ───────────────────────────────────────────────────
async function api(path, timeoutMs = 10000) {
  const r = await fetch(BASE + path, { signal: AbortSignal.timeout(timeoutMs) });
  if (!r.ok) throw new Error('Sleeper API ' + r.status + ': ' + path);
  return r.json();
}

function imgSrc(pid) { return HS_URL(pid); }

function imgFallback(el, pos) {
  const colors = { QB:'#6d28d9', RB:'#166534', WR:'#1d4ed8', TE:'#92400e', K:'#374151', DEF:'#374151' };
  const c = colors[pos] || '#374151';
  el.outerHTML = `<span class="hs-fallback" style="width:${el.width||36}px;height:${el.height||36}px;background:${c};font-size:${Math.round((el.width||36)*0.3)}px">${pos||'?'}</span>`;
}

function posOrder(pos) { return { QB:0, RB:1, WR:2, TE:3, K:4, DEF:5 }[pos] ?? 6; }
function fmt(n, d=1)   { return Number(n).toFixed(d); }
function fmtP(n)       { return Number(n).toFixed(2); }

function statLine(stats, pos) {
  if (!stats) return '';
  const p = [];
  if (pos === 'QB') {
    if (stats.pass_yd)  p.push(Math.round(stats.pass_yd) + ' pass yds');
    if (stats.pass_td)  p.push(stats.pass_td + ' TD');
    if (stats.pass_int) p.push(stats.pass_int + ' INT');
    if (stats.rush_yd)  p.push(Math.round(stats.rush_yd) + ' rush yds');
    if (stats.rush_td)  p.push(stats.rush_td + ' rush TD');
  } else if (pos === 'RB') {
    if (stats.rush_att) p.push(stats.rush_att + ' att');
    if (stats.rush_yd)  p.push(Math.round(stats.rush_yd) + ' rush yds');
    if (stats.rush_td)  p.push(stats.rush_td + ' rush TD');
    if (stats.rec)      p.push(stats.rec + '/' + (stats.rec_tgt||'?') + ' rec');
    if (stats.rec_yd)   p.push(Math.round(stats.rec_yd) + ' rec yds');
    if (stats.rec_td)   p.push(stats.rec_td + ' rec TD');
  } else if (pos === 'WR' || pos === 'TE') {
    if (stats.rec_tgt)  p.push(stats.rec_tgt + ' tgt');
    if (stats.rec)      p.push(stats.rec + ' rec');
    if (stats.rec_yd)   p.push(Math.round(stats.rec_yd) + ' rec yds');
    if (stats.rec_td)   p.push(stats.rec_td + ' TD');
    if (stats.rush_yd && stats.rush_yd > 0) p.push(Math.round(stats.rush_yd) + ' rush yds');
  }
  return p.join(' · ') || 'DNP';
}

function ptsKey(ppr) {
  if (ppr >= 1)   return 'pts_ppr';
  if (ppr >= 0.5) return 'pts_half_ppr';
  return 'pts_std';
}

function badge(rank) {
  const c = rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
  return `<span class="rank-num ${c}">${rank}</span>`;
}

function rankPill(rank, total) {
  const pct = rank/total;
  const bg = pct<=.25?'#14532d':pct<=.5?'#78350f':'#7f1d1d';
  const color = pct<=.25?'#4ade80':pct<=.5?'#fbbf24':'#fca5a5';
  return `<span class="rank-pill" style="background:${bg};color:${color}">${rank}</span>`;
}

function contenderTier(rank, total) {
  const p = rank/total;
  if (p<=.25) return { label:'Contender',       color:'#16a34a', bg:'rgba(22,163,74,.15)' };
  if (p<=.5)  return { label:'Frisky',           color:'#d97706', bg:'rgba(217,119,6,.15)' };
  if (p<=.75) return { label:'Rebuilding',       color:'#dc2626', bg:'rgba(220,38,38,.15)' };
  return        { label:'Trust the Process',      color:'#94a3b8', bg:'rgba(148,163,184,.1)' };
}

async function loadChain(startId) {
  S.seasonChain = []; S.leagues = {};
  S.draftHistory = {}; draftHistoryLoaded = false; draftHistoryLoading = false;
  playoffsLoaded = false; playoffsLoading = false;
  let id = startId, iterations = 0;

  while (id && iterations < 6) {
    iterations++;
    const [league, users, rosters] = await Promise.all([
      api('/league/' + id),
      api('/league/' + id + '/users'),
      api('/league/' + id + '/rosters'),
    ]);
    const userMap = {};
    users.forEach(u => {
      userMap[u.user_id] = {
        teamName: (u.metadata && u.metadata.team_name) || u.display_name,
        displayName: u.display_name,
        avatar: u.avatar,
      };
    });
    const rosterMap = {};
    rosters.forEach(r => {
      const u = userMap[r.owner_id] || {};
      rosterMap[r.roster_id] = {
        rosterId: r.roster_id, ownerId: r.owner_id,
        teamName: u.teamName || ('Team ' + r.roster_id),
        displayName: u.displayName || '',
        avatar: u.avatar || null,
        wins:   (r.settings && r.settings.wins)           || 0,
        losses: (r.settings && r.settings.losses)         || 0,
        ties:   (r.settings && r.settings.ties)           || 0,
        fpts:   ((r.settings && r.settings.fpts)          || 0) + ((r.settings && r.settings.fpts_decimal)          || 0) / 100,
        fpts_against: ((r.settings && r.settings.fpts_against) || 0) + ((r.settings && r.settings.fpts_against_decimal) || 0) / 100,
        players: r.players || [],
      };
    });

    const psStart = (league.settings && league.settings.playoff_week_start) || 15;

    S.leagues[id] = { id, league, rosterMap, userMap, completedWeeks: [], playoffWeekStart: psStart, season: league.season };
    S.seasonChain.push(id);

    if (league.previous_league_id) {
      id = league.previous_league_id;
    } else { break; }
  }

  S.currentLeagueId = null;
  for (const sid of S.seasonChain) {
    if (S.leagues[sid].completedWeeks.length > 0) { S.currentLeagueId = sid; break; }
  }
  if (!S.currentLeagueId) S.currentLeagueId = S.seasonChain[0];

  // FantasyCalc + traded picks + KTC — all fired in parallel
  const ld = S.leagues[S.currentLeagueId];
  const isSF = (ld.league.roster_positions||[]).includes('SUPER_FLEX');
  const rec   = (ld.league.scoring_settings && ld.league.scoring_settings.rec) || 0;
  const ppr   = rec >= 1 ? 1 : rec >= 0.5 ? 0.5 : 0;

  const [fcRes, tradedPicksRes, ktcRes] = await Promise.allSettled([
    fetch(`${FC_BASE}?isDynasty=true&numQbs=${isSF?2:1}&ppr=${ppr}`).then(r => r.json()),
    fetch(`${BASE}/league/${S.currentLeagueId}/traded_picks`).then(r => r.ok ? r.json() : []).catch(() => []),
    fetch('https://keeptradecut.com/api/dynasty-rankings', {
      headers: { Accept: 'application/json' }, signal: AbortSignal.timeout(1500)
    }).then(r => r.ok ? r.json() : null).catch(() => null),
  ]);

  // Process FantasyCalc
  S.fcValues = fcRes.status === 'fulfilled' ? (fcRes.value || []) : [];
  if (fcRes.status === 'rejected') console.warn('FantasyCalc unavailable:', fcRes.reason);
  S.fcBySleeperId = {};
  S.fcValues.forEach(fc => {
    if (fc.player && fc.player.sleeperId) {
      const sid = String(fc.player.sleeperId);
      S.fcBySleeperId[sid] = fc;
      S.playersMeta[sid]   = { name: fc.player.name, pos: fc.player.position, team: fc.player.team || '', value: fc.value, age: fc.player.age || null };
    }
  });

  // Compute per-position value percentiles (used for Buy/Sell/Hold signals)
  S.posPercentiles = {};
  ['QB','RB','WR','TE'].forEach(pos => {
    const vals = S.fcValues
      .filter(fc => fc.player && fc.player.position === pos && (fc.value||0) > 0)
      .map(fc => fc.value)
      .sort((a,b) => a-b);
    if (!vals.length) { S.posPercentiles[pos] = { p25:0, p50:0, p75:0 }; return; }
    S.posPercentiles[pos] = {
      p25: vals[Math.floor(0.25*vals.length)] || 0,
      p50: vals[Math.floor(0.50*vals.length)] || 0,
      p75: vals[Math.floor(0.75*vals.length)] || 0,
    };
  });

  // Build FC pick value map from RDP entries
  S.fcPickValues = {};
  S.fcValues.forEach(fc => {
    if (!fc.player || fc.player.position !== 'RDP') return;
    const name = fc.player.name || '';
    const yearMatch = name.match(/(\d{4})/);
    if (!yearMatch) return;
    const yr = yearMatch[1];
    const lname = name.toLowerCase();
    if (!S.fcPickValues[yr]) S.fcPickValues[yr] = { 1: { early:0, mid:0, late:0, avg:0 }, 2:0, 3:0, 4:0 };
    if (lname.includes('1st') || /\b1\.\d/.test(name)) {
      if (lname.includes('early')) S.fcPickValues[yr][1].early = fc.value;
      else if (lname.includes('mid')) S.fcPickValues[yr][1].mid = fc.value;
      else if (lname.includes('late')) S.fcPickValues[yr][1].late = fc.value;
      else { S.fcPickValues[yr][1].early = S.fcPickValues[yr][1].mid = S.fcPickValues[yr][1].late = fc.value; }
    } else if (lname.includes('2nd') || /\b2\.\d/.test(name)) {
      S.fcPickValues[yr][2] = fc.value;
    } else if (lname.includes('3rd') || /\b3\.\d/.test(name)) {
      S.fcPickValues[yr][3] = fc.value;
    } else if (lname.includes('4th') || /\b4\.\d/.test(name)) {
      S.fcPickValues[yr][4] = fc.value;
    }
  });
  Object.values(S.fcPickValues).forEach(yv => {
    const { early, mid, late } = yv[1];
    const vals = [early, mid, late].filter(v => v > 0);
    yv[1].avg = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 5000;
    // When FC only provides a single undifferentiated value (early===mid===late),
    // spread the buckets using dynasty pick value multipliers:
    //   Early (top ~3 picks): +30%   Mid (picks ~4-8): base   Late (picks ~9-12): -28%
    if (vals.length > 0 && early === mid && mid === late && early > 0) {
      const base = mid;
      yv[1].early = Math.round(base * 1.30);
      yv[1].mid   = base;
      yv[1].late  = Math.round(base * 0.72);
    }
  });

  // Process traded picks
  try {
    const tradedPicks = tradedPicksRes.status === 'fulfilled' ? (tradedPicksRes.value || []) : [];
    S.pickOwnership = buildPickOwnership(S.leagues[S.currentLeagueId], tradedPicks);
  } catch(e) { console.warn('Pick ownership build failed:', e); S.pickOwnership = {}; }

  // Process KTC (CORS usually blocks — 1.5s timeout, graceful fallback)
  S.ktcAvailable = false; S.ktcBySleeperId = {};
  try {
    const ktcData = ktcRes.status === 'fulfilled' ? ktcRes.value : null;
    if (Array.isArray(ktcData)) {
      ktcData.forEach(p => { if (p.sleeperId) S.ktcBySleeperId[String(p.sleeperId)] = p.value || 0; });
      S.ktcAvailable = Object.keys(S.ktcBySleeperId).length > 0;
    }
  } catch(e) { /* fallback to FC-only */ }

}

// ── PICK OWNERSHIP & VALUATION ────────────────────────────────

function buildPickOwnership(league, tradedPicks) {
  const { rosterMap } = league;
  // Which seasons to track: current year forward if draft not done, else next year forward
  const isDraftDone = (league.league.status !== 'pre_draft');
  const baseYear = parseInt(league.season) + (isDraftDone ? 1 : 0);
  const seasons = [baseYear, baseYear+1, baseYear+2].map(String);
  const rounds = [1, 2, 3, 4];

  // Initialize: each team owns their own picks
  const ownership = {};
  Object.keys(rosterMap).forEach(rid => {
    seasons.forEach(season => {
      rounds.forEach(round => {
        const key = `${season}_${round}_${rid}`;
        ownership[key] = { currentOwner: parseInt(rid), originalOwner: parseInt(rid), season, round };
      });
    });
  });

  // Apply traded picks.
  // Sleeper may return multiple entries for the same pick (chain trades: A->B->C).
  // The array is chronological; later entries override earlier ones for the same pick key.
  // Build a deduplicated map first, keeping the entry with the most-recent owner.
  const latestByKey = {};
  (tradedPicks || []).forEach(tp => {
    if (!seasons.includes(String(tp.season))) return;
    const key = `${tp.season}_${tp.round}_${tp.roster_id}`;
    // Keep track — later entries in the array represent more recent transactions
    latestByKey[key] = tp;
  });
  Object.entries(latestByKey).forEach(([key, tp]) => {
    if (ownership[key]) {
      ownership[key].currentOwner = parseInt(tp.owner_id);
    } else {
      // Pick from a roster not currently in rosterMap (orphaned or expansion)
      ownership[key] = {
        currentOwner: parseInt(tp.owner_id),
        originalOwner: parseInt(tp.roster_id),
        season: String(tp.season),
        round: parseInt(tp.round),
      };
    }
  });
  return ownership;
}

function getTeamPickList(rosterId) {
  const rid = parseInt(rosterId);
  const picks = [];
  Object.entries(S.pickOwnership).forEach(([key, p]) => {
    if (p.currentOwner === rid) picks.push({ key, ...p });
  });
  return picks.sort((a,b) =>
    parseInt(a.season)-parseInt(b.season) || a.round-b.round || a.originalOwner-b.originalOwner
  );
}

function pickDisplayName(pick) {
  const roundName = ['','1st','2nd','3rd','4th'][pick.round] || `Rd ${pick.round}`;
  const league = ld();
  const origTeam = league && league.rosterMap[pick.originalOwner];
  const via = pick.originalOwner !== pick.currentOwner
    ? ` (via ${origTeam ? origTeam.teamName : 'Team '+pick.originalOwner})`
    : '';
  return `${pick.season} ${roundName}${via}`;
}

// Tiered pick value: use FC RDP data when available; fall back to hardcoded tier defaults
// bucket param ('Early'|'Mid'|'Late') selects within 1st-round early/mid/late FC values
// Round 1 has bucket-differentiated fallbacks; other rounds are flat
const PICK_FALLBACK = { 1: { early: 8200, mid: 5500, late: 3200 }, 2: 2200, 3: 1100, 4: 500 };
function getPickValue(season, round, bucket) {
  const pv = S.fcPickValues[String(season)];
  if (pv) {
    const rv = pv[parseInt(round)];
    if (rv && typeof rv === 'object') {
      // Use projected bucket when available for 1st-rounders
      if (bucket === 'Early' && rv.early > 0) return rv.early;
      if (bucket === 'Late'  && rv.late  > 0) return rv.late;
      return rv.mid || rv.avg || rv.early || rv.late || PICK_FALLBACK[1].mid;
    }
    if (rv && rv > 0) return rv;
  }
  // Try adjacent year if season not in FC (future year)
  const years = Object.keys(S.fcPickValues).sort();
  if (years.length) {
    const latest = S.fcPickValues[years[years.length-1]];
    const rv = latest[parseInt(round)];
    const gap = parseInt(season) - parseInt(years[years.length-1]);
    let base = 0;
    if (rv && typeof rv === 'object') {
      if (bucket === 'Early' && rv.early > 0) base = rv.early;
      else if (bucket === 'Late' && rv.late > 0) base = rv.late;
      else base = rv.mid || rv.avg || 0;
    } else { base = rv || 0; }
    if (base > 0) return Math.round(base * Math.pow(0.85, Math.max(gap, 0)));
  }
  // Bucket-differentiated fallback for round 1; flat for other rounds
  const fb = PICK_FALLBACK[parseInt(round)];
  if (fb && typeof fb === 'object') {
    if (bucket === 'Early') return fb.early;
    if (bucket === 'Late')  return fb.late;
    return fb.mid;
  }
  return fb || 300;
}

// ── PROJECTED PICK STRENGTH ENGINE ────────────────────────────
// TUNING KNOBS: weights for pick bucket projection model
const PICK_BUCKET_CFG = {
  classWeight:  0.50,   // franchise classification is the strongest signal
  svWeight:     0.30,   // normalized starter value
  ageWeight:    0.20,   // roster age (young = improving = later pick)
  svMin:       15000,   // lower bound for starter value normalization
  svMax:       65000,   // upper bound
  lateThreshold:  68,   // score >= this → Late pick
  earlyThreshold: 38,   // score <= this → Early pick
  futureGapPenalty: 2,  // years beyond current before confidence degrades
};

// Team strength score per classification label (0–100)
const CLASS_STRENGTH = {
  'Contender':         88,
  'Fringe Contender':  64,
  'Productive Middle': 50,
  'Retool':            32,
  'Rebuild':           15,
  'Rebuilding':        10,
};

function mveProjectedPickBucket(teamProfile, season) {
  const B = PICK_BUCKET_CFG;
  if (!teamProfile) return { bucket: 'Mid', confidence: 'low', source: 'fallback' };

  const cls        = (teamProfile.classification && teamProfile.classification.label) || 'Productive Middle';
  const sv         = teamProfile.starterValue || 0;
  const age        = teamProfile.weightedAge  || 27;
  const classScore = CLASS_STRENGTH[cls] !== undefined ? CLASS_STRENGTH[cls] : 50;

  // Starter value normalized 0–100
  const svNorm  = Math.max(0, Math.min(1, (sv - B.svMin) / (B.svMax - B.svMin))) * 100;
  // Age: younger roster = more upside = team more likely to be strong in future = later pick
  const ageScore = age < 25 ? 65 : age < 27 ? 58 : age < 29 ? 48 : age < 31 ? 35 : 22;

  const score = classScore * B.classWeight + svNorm * B.svWeight + ageScore * B.ageWeight;

  let bucket, confidence;
  if (score >= B.lateThreshold) {
    bucket = 'Late'; confidence = score >= 80 ? 'high' : 'medium';
  } else if (score <= B.earlyThreshold) {
    bucket = 'Early'; confidence = score <= 22 ? 'high' : 'medium';
  } else {
    bucket = 'Mid'; confidence = (score > 46 && score < 62) ? 'medium' : 'low';
  }

  // Far-future picks are inherently less predictable
  const yearGap = Math.max(0, parseInt(season) - new Date().getFullYear() - 1);
  if (yearGap >= B.futureGapPenalty) confidence = confidence === 'high' ? 'medium' : 'low';

  return { bucket, confidence, source: 'projected', score: Math.round(score) };
}

function pickBucketHtml(bucket, confidence) {
  if (!bucket || bucket === 'Mid') return '';
  const cls = `bucket-badge bucket-${bucket.toLowerCase()}${confidence === 'low' ? ' bucket-conf-low' : ''}`;
  const confLabel = confidence !== 'high' ? ` <span style="font-size:.52rem;opacity:.75">${confidence}</span>` : '';
  return `<span class="${cls}">${bucket}${confLabel}</span>`;
}

function pickRoundColor(round) {
  return { 1:'#d29922', 2:'#8b949e', 3:'#b46f2e', 4:'#6b7280' }[parseInt(round)] || '#6b7280';
}

// ── COMPUTATIONS ──────────────────────────────────────────────
function ld() { return S.leagues[S.currentLeagueId]; }
function rName(id) { const r = ld() && ld().rosterMap[id]; return r ? r.teamName : 'Team '+id; }

function computeAllPlay(league) {
  const { rosterMap, completedWeeks } = league;
  const ap = {};
  Object.keys(rosterMap).forEach(id => { ap[id] = { wins:0, losses:0, ties:0 }; });
  completedWeeks.forEach(({ data }) => {
    const sc = {};
    data.forEach(t => { sc[t.roster_id] = t.points || 0; });
    const ids = Object.keys(sc);
    ids.forEach(a => ids.forEach(b => {
      if (a===b) return;
      if (sc[a]>sc[b]) ap[a].wins++;
      else if (sc[a]<sc[b]) ap[a].losses++;
      else ap[a].ties++;
    }));
  });
  const nw = completedWeeks.length;
  return Object.values(rosterMap).map(r => {
    const a = ap[r.rosterId] || { wins:0, losses:0, ties:0 };
    const apG = a.wins+a.losses+a.ties;
    const apPct = apG>0 ? a.wins/apG : 0;
    const exp = apPct*nw;
    return { ...r, ap:a, apPct, expectedWins:exp, luck:(r.wins+r.ties*.5)-exp, avgPts:nw>0?r.fpts/nw:0, numWeeks:nw };
  });
}

function computePowerRankings(league) {
  const { rosterMap, completedWeeks } = league;
  const teams = Object.values(rosterMap);
  const posTotals = {};
  teams.forEach(t => {
    const pts = { QB:0, RB:0, WR:0, TE:0, OTH:0, total:0 };
    t.players.forEach(pid => {
      const fc = S.fcBySleeperId[String(pid)];
      if (!fc) return;
      const pos = fc.player.position;
      const val = fc.value||0;
      if (pts[pos]!==undefined) pts[pos]+=val; else pts.OTH+=val;
      pts.total+=val;
    });
    posTotals[t.rosterId] = pts;
  });
  const recentWks = completedWeeks.slice(-3);
  const recentPts = {};
  teams.forEach(t => { recentPts[t.rosterId]=0; });
  recentWks.forEach(({ data }) => { data.forEach(t => { recentPts[t.roster_id]=(recentPts[t.roster_id]||0)+(t.points||0); }); });
  const posRanks = {};
  ['QB','RB','WR','TE'].forEach(pos => {
    [...teams].sort((a,b)=>(posTotals[b.rosterId][pos]||0)-(posTotals[a.rosterId][pos]||0)).forEach((t,i) => {
      if (!posRanks[t.rosterId]) posRanks[t.rosterId]={};
      posRanks[t.rosterId][pos]=i+1;
    });
  });
  function norm(vals) {
    const mn=Math.min(...vals), mx=Math.max(...vals);
    if (mx===mn) return vals.map(()=>50);
    return vals.map(v=>(v-mn)/(mx-mn)*100);
  }
  const ids = teams.map(t=>t.rosterId);
  const hasFC = S.fcValues.length>0;
  const rvN = norm(ids.map(id=>posTotals[id].total));
  const rfN = norm(ids.map(id=>recentPts[id]));
  const result = ids.map((id,i) => ({
    ...rosterMap[id], posTotals:posTotals[id], posRanks:posRanks[id]||{},
    recentPts:recentPts[id], recentNorm:rfN[i], rosterNorm:rvN[i],
    powerScore: hasFC ? rvN[i]*.6+rfN[i]*.4 : rfN[i],
  }));
  result.sort((a,b)=>b.powerScore-a.powerScore);
  return result;
}

function computeScheduleMatrix(league) {
  const { rosterMap, completedWeeks } = league;
  const teams = Object.values(rosterMap);

  // Build weekly opponent data and league-average score per week
  const weeklyData = {};
  const weekAvg = {}; // week -> mean score across all teams
  teams.forEach(t => { weeklyData[t.rosterId] = {}; });

  completedWeeks.forEach(({ week, data }) => {
    const groups = {};
    data.forEach(t => { if (!groups[t.matchup_id]) groups[t.matchup_id]=[]; groups[t.matchup_id].push(t); });

    // League-average score for this week (used when a team would face itself)
    const scores = data.map(t => t.points || 0).filter(s => s > 0);
    weekAvg[week] = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;

    Object.values(groups).forEach(pair => {
      if (pair.length !== 2) return;
      const [a, b] = pair;
      weeklyData[a.roster_id][week] = { score: a.points||0, opponentScore: b.points||0, opponentId: b.roster_id };
      weeklyData[b.roster_id][week] = { score: b.points||0, opponentScore: a.points||0, opponentId: a.roster_id };
    });
  });

  const weeks = completedWeeks.map(w => w.week);

  // matrix[rowTeamId][colTeamId] = record if rowTeam played colTeam's schedule.
  // When TeamY's actual opponent was TeamX that week, substitute the league-average
  // score so W+L = total weeks in every cell (satisfying "8-5 = Wk 13" etc.).
  const matrix = {};
  teams.forEach(tx => {
    matrix[tx.rosterId] = {};
    teams.forEach(ty => {
      let wins=0, losses=0;
      weeks.forEach(w => {
        const xd = weeklyData[tx.rosterId][w];
        const yd = weeklyData[ty.rosterId][w];
        if (!xd || !yd) return;
        const oppScore = (yd.opponentId === tx.rosterId)
          ? weekAvg[w]           // substitute league avg for the head-to-head week
          : yd.opponentScore;
        if (xd.score > oppScore)      wins++;
        else if (xd.score < oppScore) losses++;
      });
      matrix[tx.rosterId][ty.rosterId] = { wins, losses };
    });
  });

  return { matrix, teams, weeks };
}

function renderScheduleMatrix(league) {
  const { matrix, teams, weeks } = computeScheduleMatrix(league);
  const nGames = weeks.length;

  // Sort by actual wins descending (same as standings)
  const sorted = [...teams].sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);

  const abbr = name => name.length > 11 ? name.substring(0,11)+'…' : name;

  let html = `<div class="section">
    <div class="section-title">Schedule Swap Matrix
      <span class="section-note">Row = team's actual scores &nbsp;·&nbsp; Column = schedule applied &nbsp;·&nbsp; <span style="color:var(--yellow)">■</span> = actual record &nbsp;·&nbsp; W+L = weeks played &nbsp;·&nbsp; head-to-head week uses league avg as substitute &nbsp;·&nbsp; <span style="color:var(--green)">▲ Best</span> = opponent you'd most want to face that week &nbsp;·&nbsp; <span style="color:var(--red)">▼ Worst</span> = toughest opponent</span>
    </div>
    <div class="table-wrap">
      <table style="font-size:.75rem">
        <thead><tr>
          <th style="min-width:130px;position:sticky;left:0;background:var(--surface);z-index:2">Team</th>`;

  sorted.forEach(t => {
    html += `<th style="text-align:center;min-width:68px;font-size:.68rem" title="${t.teamName}">${abbr(t.teamName)}</th>`;
  });
  html += `<th style="text-align:center;color:var(--green);min-width:60px">Best</th>
           <th style="text-align:center;color:var(--red);min-width:60px">Worst</th>
           </tr></thead><tbody>`;

  sorted.forEach(rowTeam => {
    let bestW = -1, worstW = nGames + 1;
    // Pre-scan for best/worst (exclude diagonal; all cells share same nGames now)
    sorted.forEach(colTeam => {
      if (rowTeam.rosterId === colTeam.rosterId) return;
      const c = matrix[rowTeam.rosterId][colTeam.rosterId];
      if (c.wins > bestW)  bestW  = c.wins;
      if (c.wins < worstW) worstW = c.wins;
    });
    if (bestW  === -1)        bestW  = 0;
    if (worstW === nGames+1)  worstW = 0;

    html += `<tr><td class="bold" style="font-size:.8rem;position:sticky;left:0;background:var(--surface);z-index:1">${rowTeam.teamName}</td>`;

    let bestShown = false, worstShown = false;
    sorted.forEach(colTeam => {
      const c = matrix[rowTeam.rosterId][colTeam.rosterId];
      const isActual = rowTeam.rosterId === colTeam.rosterId;
      const gp = c.wins + c.losses || 1;
      const winPct = c.wins / gp;
      const record = `${c.wins}-${c.losses}`;

      let bgStyle = '';
      if (winPct > 0.5) {
        const intensity = Math.min((winPct-.5)*2, 1);
        bgStyle = `background:rgba(63,185,80,${(intensity*.35).toFixed(2)})`;
      } else if (winPct < 0.5) {
        const intensity = Math.min((.5-winPct)*2, 1);
        bgStyle = `background:rgba(248,81,73,${(intensity*.35).toFixed(2)})`;
      }

      const borderStyle = isActual ? 'outline:2px solid #d29922;outline-offset:-2px' : '';
      const textStyle   = isActual
        ? 'color:var(--yellow);font-weight:700'
        : winPct>.5 ? 'color:var(--green)' : winPct<.5 ? 'color:var(--red)' : 'color:var(--muted)';
      const isBest  = !isActual && !bestShown  && c.wins === bestW;
      const isWorst = !isActual && !worstShown && c.wins === worstW;
      if (isBest)  bestShown  = true;
      if (isWorst) worstShown = true;

      html += `<td style="text-align:center;padding:7px 4px;${bgStyle};${borderStyle}">
        <span style="${textStyle}">${record}</span>
        ${isBest  ? '<div style="font-size:.55rem;color:var(--green);margin-top:1px">▲ BEST</div>'  : ''}
        ${isWorst ? '<div style="font-size:.55rem;color:var(--red);margin-top:1px">▼ WORST</div>' : ''}
      </td>`;
    });

    html += `<td style="text-align:center;color:var(--green);font-weight:700;font-size:.78rem">${bestW}-${nGames-bestW}</td>`;
    html += `<td style="text-align:center;color:var(--red);font-weight:700;font-size:.78rem">${worstW}-${nGames-worstW}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div></div>`;
  return html;
}

function computeWeeklyScores(league) {
  const scores = {};
  Object.keys(league.rosterMap).forEach(id => { scores[id]=[]; });
  league.completedWeeks.forEach(({ week, data }) => {
    data.forEach(t => {
      if (scores[t.roster_id]!==undefined)
        scores[t.roster_id].push({ week, points:t.points||0, starters:t.starters||[], players_points:t.players_points||{} });
    });
  });
  return scores;
}

function computeWrapped(league) {
  const { rosterMap, completedWeeks } = league;
  const weekly = computeWeeklyScores(league);
  const totals = {};
  Object.entries(weekly).forEach(([id,ws]) => { totals[id]=ws.reduce((s,w)=>s+w.points,0); });
  function stddev(arr) {
    if (arr.length<2) return 0;
    const m=arr.reduce((a,b)=>a+b,0)/arr.length;
    return Math.sqrt(arr.reduce((s,v)=>s+Math.pow(v-m,2),0)/arr.length);
  }
  const consistency={};
  Object.entries(weekly).forEach(([id,ws])=>{ consistency[id]=stddev(ws.map(w=>w.points)); });
  let bestWeek={points:0,rosterId:null,week:null}, worstWeek={points:Infinity,rosterId:null,week:null};
  completedWeeks.forEach(({ week, data }) => {
    data.forEach(t => {
      if (t.points>bestWeek.points) bestWeek={points:t.points,rosterId:t.roster_id,week};
      if (t.points<worstWeek.points&&t.points>0) worstWeek={points:t.points,rosterId:t.roster_id,week};
    });
  });
  let bigBlowout={margin:0}, closest={margin:Infinity};
  completedWeeks.forEach(({ week, data }) => {
    const g={};
    data.forEach(t=>{ if(!g[t.matchup_id])g[t.matchup_id]=[]; g[t.matchup_id].push(t); });
    Object.values(g).forEach(pair => {
      if (pair.length!==2) return;
      const margin=Math.abs((pair[0].points||0)-(pair[1].points||0));
      const win=(pair[0].points||0)>=(pair[1].points||0)?pair[0]:pair[1];
      const lose=win===pair[0]?pair[1]:pair[0];
      if (margin>bigBlowout.margin) bigBlowout={margin,winId:win.roster_id,loseId:lose.roster_id,winPts:win.points,losePts:lose.points,week};
      if (margin<closest.margin)    closest   ={margin,winId:win.roster_id,loseId:lose.roster_id,winPts:win.points,losePts:lose.points,week};
    });
  });
  const benchPts={};
  Object.keys(rosterMap).forEach(id=>{ benchPts[id]=0; });
  completedWeeks.forEach(({ data }) => {
    data.forEach(t => {
      if (!t.players_points||!t.starters) return;
      const ss=new Set(t.starters);
      let b=0;
      Object.entries(t.players_points).forEach(([pid,pts])=>{ if(!ss.has(pid)&&pts>0) b+=pts; });
      benchPts[t.roster_id]=(benchPts[t.roster_id]||0)+b;
    });
  });
  const apData=computeAllPlay(league);
  const luckiest  =[...apData].sort((a,b)=>b.luck-a.luck)[0];
  const unluckiest=[...apData].sort((a,b)=>a.luck-b.luck)[0];
  const mostBench =Object.entries(benchPts).sort((a,b)=>b[1]-a[1])[0];
  return { weekly, totals, consistency, bestWeek, worstWeek, bigBlowout, closest, luckiest, unluckiest, mostBench, benchPts,
           topScorer:Object.entries(totals).sort((a,b)=>b[1]-a[1])[0],
           mostConsistent:Object.entries(consistency).sort((a,b)=>a[1]-b[1])[0],
           glassCanon:Object.entries(consistency).sort((a,b)=>b[1]-a[1])[0] };
}

function renderWeeklyTable(league) {
  const weekly=computeWeeklyScores(league);
  const teams=Object.values(league.rosterMap).sort((a,b)=>a.rosterId-b.rosterId);
  const weeks=league.completedWeeks.map(w=>w.week);
  const weekMax={},weekMin={};
  weeks.forEach(w=>{
    let mx=0,mn=Infinity;
    Object.values(weekly).forEach(ws=>{ const e=ws.find(x=>x.week===w); const p=e?e.points:0; if(p>mx)mx=p; if(p>0&&p<mn)mn=p; });
    weekMax[w]=mx; weekMin[w]=mn;
  });
  let html=`<div class="section"><div class="section-title">Weekly Scores</div><div class="table-wrap"><table class="week-table"><thead><tr><th>Team</th>`;
  weeks.forEach(w=>{ html+=`<th>Wk ${w}</th>`; });
  html+=`</tr></thead><tbody>`;
  teams.forEach(t=>{
    html+=`<tr><td class="bold">${t.teamName}</td>`;
    weeks.forEach(w=>{
      const e=(weekly[t.rosterId]||[]).find(x=>x.week===w);
      const pts=e?e.points:null;
      const cls=pts===weekMax[w]?'week-high':pts===weekMin[w]&&pts>0?'week-low':'';
      html+=`<td class="${cls}">${pts!=null?fmtP(pts):'-'}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div></div>`;
  return html;
}

// Returns ordered slot labels matching league.roster_positions (non-bench only).
// e.g. ['QB','RB1','RB2','WR1','WR2','WR3','TE','FLEX','SF']
function getStarterSlots(league) {
  const rp = (league.league && league.league.roster_positions) || league.roster_positions || [];
  const counts = {};
  const slots = [];
  const BENCH = new Set(['BN','IR','TAXI']);
  rp.forEach(pos => {
    if (BENCH.has(pos)) return;
    const label = pos === 'SUPER_FLEX' ? 'SF' : pos;
    counts[label] = (counts[label] || 0) + 1;
    slots.push(counts[label] > 1 ? `${label}${counts[label]}` : label);
  });
  // If any slot appeared only once its count stays 1, but we only append a number
  // when count > 1, so single-instance slots stay as e.g. 'QB', 'TE', 'FLEX'.
  // Rebuild to add "1" suffix to positions that ultimately appear more than once.
  const totalCounts = {};
  slots.forEach(s => {
    const base = s.replace(/\d+$/, '');
    totalCounts[base] = (totalCounts[base] || 0) + 1;
  });
  const reCounts = {};
  return slots.map(s => {
    const base = s.replace(/\d+$/, '');
    if (totalCounts[base] <= 1) return base;
    reCounts[base] = (reCounts[base] || 0) + 1;
    return `${base}${reCounts[base]}`;
  });
}

// slotData[rosterId][slotLabel] = { scores:[], ddCount, appearances }
function computeSlotStats(league) {
  const { rosterMap, completedWeeks } = league;
  const slotLabels = getStarterSlots(league);
  const slotData = {};
  Object.keys(rosterMap).forEach(id => {
    slotData[id] = {};
    slotLabels.forEach(sl => { slotData[id][sl] = { scores: [], ddCount: 0, appearances: 0 }; });
  });

  completedWeeks.forEach(({ data }) => {
    data.forEach(t => {
      if (!slotData[t.roster_id] || !t.starters || !t.players_points) return;
      t.starters.forEach((pid, i) => {
        const label = slotLabels[i];
        if (!label) return;
        const pts = t.players_points[pid] || 0;
        slotData[t.roster_id][label].scores.push(pts);
        slotData[t.roster_id][label].appearances++;
        if (pts >= 10) slotData[t.roster_id][label].ddCount++;
      });
    });
  });

  const result = {};
  Object.entries(slotData).forEach(([id, slots]) => {
    result[id] = {};
    slotLabels.forEach(sl => {
      const d = slots[sl];
      const avg = d.scores.length > 0 ? d.scores.reduce((a,b)=>a+b,0)/d.scores.length : 0;
      result[id][sl] = { avg, ddCount: d.ddCount, appearances: d.appearances };
    });
  });
  return { result, slotLabels };
}

// posData[rosterId][pos] = { scores:[], ddCount, appearances }  (starters grouped by position)
function computePositionStats(league) {
  const { rosterMap, completedWeeks } = league;
  const POSITIONS = ['QB','RB','WR','TE'];
  const posData = {};
  Object.keys(rosterMap).forEach(id => {
    posData[id] = {};
    POSITIONS.forEach(p => { posData[id][p] = { scores: [], ddCount: 0, appearances: 0 }; });
  });

  completedWeeks.forEach(({ data }) => {
    data.forEach(t => {
      if (!posData[t.roster_id] || !t.starters || !t.players_points) return;
      t.starters.forEach(pid => {
        const meta = S.playersMeta[String(pid)];
        if (!meta || !posData[t.roster_id][meta.pos]) return;
        const pts = t.players_points[pid] || 0;
        posData[t.roster_id][meta.pos].scores.push(pts);
        posData[t.roster_id][meta.pos].appearances++;
        if (pts >= 10) posData[t.roster_id][meta.pos].ddCount++;
      });
    });
  });

  const result = {};
  Object.entries(posData).forEach(([id, positions]) => {
    result[id] = {};
    POSITIONS.forEach(pos => {
      const d = positions[pos];
      const avg = d.scores.length > 0 ? d.scores.reduce((a,b)=>a+b,0)/d.scores.length : 0;
      result[id][pos] = { avg, ddCount: d.ddCount, appearances: d.appearances };
    });
  });
  return { result, columns: POSITIONS };
}

// benchData[rosterId][pos] = { scores:[], ddCount, appearances }
function computeBenchStats(league) {
  const { rosterMap, completedWeeks } = league;
  const POSITIONS = ['QB','RB','WR','TE'];
  const benchData = {};
  Object.keys(rosterMap).forEach(id => {
    benchData[id] = {};
    POSITIONS.forEach(p => { benchData[id][p] = { scores: [], ddCount: 0, appearances: 0 }; });
  });

  completedWeeks.forEach(({ data }) => {
    data.forEach(t => {
      if (!benchData[t.roster_id] || !t.players_points) return;
      const starterSet = new Set((t.starters || []).map(String));
      Object.entries(t.players_points).forEach(([pid, pts]) => {
        if (starterSet.has(String(pid))) return;
        const meta = S.playersMeta[String(pid)];
        if (!meta || !benchData[t.roster_id][meta.pos]) return;
        benchData[t.roster_id][meta.pos].scores.push(pts);
        benchData[t.roster_id][meta.pos].appearances++;
        if (pts >= 10) benchData[t.roster_id][meta.pos].ddCount++;
      });
    });
  });

  const result = {};
  Object.entries(benchData).forEach(([id, positions]) => {
    result[id] = {};
    POSITIONS.forEach(pos => {
      const d = positions[pos];
      const avg = d.scores.length > 0 ? d.scores.reduce((a,b)=>a+b,0)/d.scores.length : 0;
      result[id][pos] = { avg, ddCount: d.ddCount, appearances: d.appearances };
    });
  });
  return { result, columns: POSITIONS };
}

function buildPosStatsInner(league) {
  const teams = Object.values(league.rosterMap)
    .sort((a,b) => (b.wins+b.ties*.5)-(a.wins+a.ties*.5) || b.fpts-a.fpts);

  function cellColor(val, avg) {
    if (!avg || val == null) return '';
    const diff = (val - avg) / avg;
    if (diff >  0.1) return 'color:var(--green);font-weight:600';
    if (diff < -0.1) return 'color:var(--red)';
    return 'color:var(--muted)';
  }

  function buildTable(columns, statsMap, noteText) {
    // Compute league averages
    const leagueAvg = {};
    const leagueDDRate = {};
    columns.forEach(col => {
      const avgs = teams.map(t => statsMap[t.rosterId]?.[col]?.avg || 0).filter(v=>v>0);
      leagueAvg[col] = avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : 0;
      const rates = teams.map(t => {
        const d = statsMap[t.rosterId]?.[col];
        return d && d.appearances > 0 ? d.ddCount/d.appearances : null;
      }).filter(v=>v!==null);
      leagueDDRate[col] = rates.length ? rates.reduce((a,b)=>a+b,0)/rates.length : 0;
    });

    // ── Avg pts table ──
    let h = `<div class="section-note" style="margin-bottom:8px">${noteText}</div>
    <div class="table-wrap" style="margin-bottom:16px"><table style="font-size:.8rem">
      <thead><tr>
        <th>Team</th>
        ${columns.map(c=>`<th style="text-align:center">${c} Avg</th>`).join('')}
        <th style="text-align:center">Total Avg</th>
      </tr></thead><tbody>`;

    teams.forEach(t => {
      const stats = statsMap[t.rosterId] || {};
      const totalAvg = columns.reduce((s,c) => s+(stats[c]?.avg||0), 0);
      h += `<tr><td class="bold">${t.teamName}</td>`;
      columns.forEach(col => {
        const avg = stats[col]?.avg || 0;
        const style = cellColor(avg, leagueAvg[col]);
        h += `<td style="text-align:center;${style}">${avg>0?fmtP(avg):'-'}</td>`;
      });
      h += `<td style="text-align:center;font-weight:600">${fmtP(totalAvg)}</td></tr>`;
    });

    h += `<tr style="border-top:2px solid var(--border)">
      <td style="font-size:.72rem;color:var(--muted);font-style:italic">League Avg</td>
