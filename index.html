// Resolve pick bucket from key (season_round_origOwner) — used for accurate valuation
function getPickBucketForKey(key) {
  const pts = key.split('_');
  const season = pts[0], round = parseInt(pts[1]), origOwner = parseInt(pts[2]);
  if (round !== 1 || !S.fcValues.length) return null;
  const league = ld();
  if (!league) return null;
  const prof = mveTeamProfile(origOwner, league);
  return prof ? mveProjectedPickBucket(prof, season) : null;
}

function getPickValueByKey(key) {
  const pts = key.split('_');
  const bkt = getPickBucketForKey(key);
  return getPickValue(pts[0], parseInt(pts[1]), bkt && bkt.bucket);
}

function drawPicks(side) {
  const el = document.getElementById('picks' + side);
  if (!el) return;
  const league = ld();
  const ts = side === 'A' ? S.tradeA : S.tradeB;
  const picks = getTeamPickList(ts.rosterId);
  if (!picks.length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:.75rem;padding:4px 8px">No future picks</div>`;
    return;
  }
  // Cache bucket projections per original owner to avoid re-computing
  const bktCache = {};
  function cachedBucket(origOwner, season, round) {
    if (round !== 1 || !S.fcValues.length) return null;
    const key = `${origOwner}_${season}`;
    if (!bktCache[key]) {
      const prof = league ? mveTeamProfile(origOwner, league) : null;
      bktCache[key] = prof ? mveProjectedPickBucket(prof, season) : { bucket: 'Mid', confidence: 'low', source: 'fallback' };
    }
    return bktCache[key];
  }

  el.innerHTML = picks.map(p => {
    const sel    = ts.picks.includes(p.key);
    const bkt    = cachedBucket(p.originalOwner, p.season, p.round);
    const val    = getPickValue(p.season, p.round, bkt && bkt.bucket);
    const rColor = pickRoundColor(p.round);
    const rdLabel= ['','1','2','3','4'][p.round] || p.round;
    const name   = pickDisplayName(p);
    const bktBadge = bkt ? pickBucketHtml(bkt.bucket, bkt.confidence) : '';
    const srcNote  = bkt && bkt.source === 'projected' && bkt.bucket !== 'Mid'
      ? `<span style="font-size:.52rem;color:var(--muted);margin-left:3px">proj</span>` : '';
    return `<div class="pick-row ${sel?'selected':''}" onclick="togglePick('${side}','${p.key}')">
      <span class="pick-badge" style="background:${rColor}22;color:${rColor}">${rdLabel}</span>
      <span class="player-name" style="font-size:.8rem;display:flex;align-items:center;gap:4px">${name}${bktBadge}${srcNote}</span>
      <span class="player-value" style="color:var(--yellow)">${val > 0 ? val.toLocaleString() : '-'}</span>
    </div>`;
  }).join('');
}

function togglePl(side,pid){ const ts=side==='A'?S.tradeA:S.tradeB; const idx=ts.players.indexOf(pid); if(idx>=0)ts.players.splice(idx,1);else ts.players.push(pid); drawRoster(side,ts.rosterId); updateProposal(); }
function togglePick(side,key){ const ts=side==='A'?S.tradeA:S.tradeB; const idx=ts.picks.indexOf(key); if(idx>=0)ts.picks.splice(idx,1);else ts.picks.push(key); drawPicks(side); updateProposal(); }
function onTradeTeam(side){ const id=parseInt(document.getElementById('tradeTeam'+side).value); const ts=side==='A'?S.tradeA:S.tradeB; ts.rosterId=id; ts.players=[]; ts.picks=[]; drawRoster(side,id); updateProposal(); renderScoutingReport(S.tradeA.rosterId, S.tradeB.rosterId); }

function updateProposal() {
  const league = ld();
  const rA = league.rosterMap[S.tradeA.rosterId], rB = league.rosterMap[S.tradeB.rosterId];
  if (rA) document.getElementById('labelA').textContent = rA.teamName + ' Sends';
  if (rB) document.getElementById('labelB').textContent = rB.teamName + ' Sends';

  function playerChips(pids, side) {
    return pids.map(pid => {
      const fc = S.fcBySleeperId[String(pid)];
      const name = fc ? fc.player.name : 'Player ' + pid;
      const val  = fc ? fc.value : 0;
      const pos  = fc ? fc.player.position : '?';
      // KTC delta indicator
      let ktcBadge = '';
      if (S.ktcAvailable && S.ktcBySleeperId[String(pid)] && val > 0) {
        const delta = (S.ktcBySleeperId[String(pid)] || 0) - val;
        const pct = Math.abs(delta) / val;
        if (pct > 0.12) {
          ktcBadge = delta > 0
            ? `<span title="KTC values higher by ${Math.abs(delta).toLocaleString()}" style="font-size:.6rem;color:var(--green);margin-left:2px">▲KTC</span>`
            : `<span title="KTC values lower by ${Math.abs(delta).toLocaleString()}" style="font-size:.6rem;color:var(--red);margin-left:2px">▼KTC</span>`;
        }
      }
      return `<div class="trade-player-chip">
        ${hsImg(pid,28,pos)}
        <span class="pos-badge pos-${pos}" style="font-size:.58rem">${pos}</span>
        <span style="flex:1;font-size:.8rem">${name}${ktcBadge}</span>
        <span style="color:var(--accent);font-size:.75rem">${val.toLocaleString()}</span>
        <span class="remove" onclick="togglePl('${side}','${pid}')">&#x2715;</span>
      </div>`;
    }).join('');
  }

  function pickChips(pickKeys, side) {
    return pickKeys.map(key => {
      const parts = key.split('_');
      const season = parts[0], round = parseInt(parts[1]), origOwner = parseInt(parts[2]);
      const bkt    = getPickBucketForKey(key);
      const val    = getPickValueByKey(key);
      const rColor = pickRoundColor(round);
      const rdName = ['','1st','2nd','3rd','4th'][round] || `Rd${round}`;
      const curTeamId = side === 'A' ? S.tradeA.rosterId : S.tradeB.rosterId;
      const via = origOwner !== parseInt(curTeamId) ? ` via ${rName(origOwner)}` : '';
      const bktBadge = bkt ? pickBucketHtml(bkt.bucket, bkt.confidence) : '';
      return `<div class="pick-chip">
        <span class="pick-badge" style="background:${rColor}22;color:${rColor}">${round}</span>
        <span style="flex:1;font-size:.8rem;display:flex;align-items:center;gap:5px">${season} ${rdName}${via}${bktBadge}</span>
        <span style="color:var(--yellow);font-size:.75rem">${val.toLocaleString()}</span>
        <span class="remove" onclick="togglePick('${side}','${key}')">&#x2715;</span>
      </div>`;
    }).join('');
  }

  function buildChipsHtml(pids, pickKeys, side) {
    if (!pids.length && !pickKeys.length)
      return `<div style="color:var(--muted);font-size:.8rem;padding:6px">No players or picks selected</div>`;
    return playerChips(pids, side) + pickChips(pickKeys, side);
  }

  const playerValA = S.tradeA.players.reduce((s,p)=>{ const fc=S.fcBySleeperId[String(p)]; return s+(fc?fc.value:0); }, 0);
  const playerValB = S.tradeB.players.reduce((s,p)=>{ const fc=S.fcBySleeperId[String(p)]; return s+(fc?fc.value:0); }, 0);
  // Use bucket-projected values for 1st-round picks
  const pickValA = S.tradeA.picks.reduce((s,k)=>s+getPickValueByKey(k), 0);
  const pickValB = S.tradeB.picks.reduce((s,k)=>s+getPickValueByKey(k), 0);
  const vA = playerValA + pickValA;
  const vB = playerValB + pickValB;

  document.getElementById('chipsA').innerHTML = buildChipsHtml(S.tradeA.players, S.tradeA.picks, 'A');
  document.getElementById('chipsB').innerHTML = buildChipsHtml(S.tradeB.players, S.tradeB.picks, 'B');

  // Value totals with player/pick breakdown when picks are involved
  function valHtml(playerVal, pickVal, total) {
    const breakdown = pickVal > 0
      ? `<div style="font-size:.72rem;color:var(--muted);margin-top:2px">Players: ${playerVal.toLocaleString()} &nbsp;·&nbsp; Picks: ${pickVal.toLocaleString()}</div>`
      : '';
    return `<div class="value-total">${total.toLocaleString()}</div>${breakdown}`;
  }
  document.getElementById('valA').innerHTML = valHtml(playerValA, pickValA, vA);
  document.getElementById('valB').innerHTML = valHtml(playerValB, pickValB, vB);

  const v = document.getElementById('verdict');
  const hasAny = S.tradeA.players.length || S.tradeA.picks.length || S.tradeB.players.length || S.tradeB.picks.length;
  if (!hasAny) { v.style.display = 'none'; return; }
  v.style.display = 'block';

  const diff = Math.abs(vA - vB), avg = (vA + vB) / 2 || 1, pct = diff / avg;

  // Verdict line
  let verdictText = '', verdictClass = '';
  if (pct < .08) {
    verdictText = 'Fair Trade (within 8%)'; verdictClass = 'verdict-fair';
  } else if (vA > vB) {
    verdictText = `Favors ${rA ? rA.teamName : 'Team A'} by ${diff.toLocaleString()} (${(pct*100).toFixed(0)}%)`; verdictClass = 'verdict-a';
  } else {
    verdictText = `Favors ${rB ? rB.teamName : 'Team B'} by ${diff.toLocaleString()} (${(pct*100).toFixed(0)}%)`; verdictClass = 'verdict-b';
  }

  // KTC sentiment divergence note
  let ktcNote = '';
  if (S.ktcAvailable && S.tradeA.players.length && S.tradeB.players.length) {
    const ktcA = S.tradeA.players.reduce((s,p) => s + (S.ktcBySleeperId[String(p)] || 0), 0);
    const ktcB = S.tradeB.players.reduce((s,p) => s + (S.ktcBySleeperId[String(p)] || 0), 0);
    if (Math.sign(ktcA - ktcB) !== Math.sign(playerValA - playerValB) && Math.abs(ktcA - ktcB) > 500) {
      ktcNote = `<div class="ktc-diverge-note">⚡ KTC market sentiment differs from FantasyCalc on this trade — verify before executing</div>`;
    }
  }

  // Pick value source note
  const pickCount = S.tradeA.picks.length + S.tradeB.picks.length;
  const pickSrc = pickCount > 0
    ? `<div class="picks-source-note">Pick values: ${Object.keys(S.fcPickValues).length > 0 ? 'FantasyCalc RDP (mid-round estimate)' : 'tier defaults — load league for precise values'}</div>`
    : '';

  // ── MVE layered analysis ──────────────────────────────────────
  let mveHtml = '';
  if (S.fcValues.length > 0 && (S.tradeA.players.length || S.tradeB.players.length)) {
    const league = ld();

    function mveSide(pids) {
      return pids.reduce((acc, pid) => {
        const mv = mvePlayer(pid, league);
        return {
          neutral:   acc.neutral   + (mv ? mv.neutral       : (S.fcBySleeperId[String(pid)]?.value||0)),
          contender: acc.contender + (mv ? mv.contenderValue : (S.fcBySleeperId[String(pid)]?.value||0)),
          rebuilder: acc.rebuilder + (mv ? mv.rebuilderValue : (S.fcBySleeperId[String(pid)]?.value||0)),
          tiers: [...acc.tiers, mv ? mv.tier : 4],
        };
      }, { neutral:0, contender:0, rebuilder:0, tiers:[] });
    }

    const mA = mveSide(S.tradeA.players);
    const mB = mveSide(S.tradeB.players);
    mA.neutral += pickValA; mA.contender += pickValA; mA.rebuilder += pickValA;
    mB.neutral += pickValB; mB.contender += pickValB; mB.rebuilder += pickValB;

    // MVE verdict
    const mveDiff = Math.abs(mA.neutral - mB.neutral);
    const mveAvg  = (mA.neutral + mB.neutral) / 2 || 1;
    const mvePct  = mveDiff / mveAvg;
    let mveVClass = 'verdict-fair', mveVText = 'MVE Neutral: Approximately Even';
    if (mvePct >= 0.08) {
      const winner = mA.neutral > mB.neutral ? (rA?rA.teamName:'Team A') : (rB?rB.teamName:'Team B');
      mveVClass = mA.neutral > mB.neutral ? 'verdict-a' : 'verdict-b';
      mveVText  = `MVE Neutral: Favors ${winner} by ${mveDiff.toLocaleString()} (${(mvePct*100).toFixed(0)}%)`;
    }

    // Tier consolidation note
    const avgTierA = mA.tiers.length ? mA.tiers.reduce((s,t)=>s+t,0)/mA.tiers.length : 4;
    const avgTierB = mB.tiers.length ? mB.tiers.reduce((s,t)=>s+t,0)/mB.tiers.length : 4;
    let tierNote = '';
    if (mA.tiers.length && mB.tiers.length) {
      const d = avgTierA - avgTierB;
      if (d < -0.5) tierNote = `<span style="color:var(--green)">↑ ${rA?rA.teamName:'Team A'} consolidates up in tier</span>`;
      else if (d > 0.5) tierNote = `<span style="color:var(--green)">↑ ${rB?rB.teamName:'Team B'} consolidates up in tier</span>`;
    }

    // ── Lineup impact ─────────────────────────────────────────────
    let lineupHtml = '';
    let lineupDelta = null;
    if (S.tradeA.players.length || S.tradeB.players.length) {
      lineupDelta = mveLineupDelta(S.tradeA.rosterId, S.tradeB.rosterId, S.tradeA.players, S.tradeB.players, league);
      lineupHtml  = lineupDeltaHtml(lineupDelta, rA?rA.teamName:'Team A', rB?rB.teamName:'Team B');
    }

    // ── Trade explain reasons ─────────────────────────────────────
    const tradeReasons = mveExplainTrade(S.tradeA, S.tradeB, mA, mB, lineupDelta, league);
    const explainHtml = tradeReasons.length
      ? `<div style="margin-top:10px"><div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Key Factors</div>
         <div class="explain-chips">${tradeReasons.map(r=>`<span class="explain-chip">· ${r}</span>`).join('')}</div></div>`
      : '';

    mveHtml = `
    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
      <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">MVE Analysis — Layered Valuation</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:var(--surface2);border-radius:6px;padding:8px">
          <div style="font-size:.68rem;color:var(--muted);margin-bottom:5px">${rA?rA.teamName:'Team A'} <em>receives</em></div>
          <div style="font-size:.82rem;color:var(--text);font-weight:600">Neutral: ${mB.neutral.toLocaleString()}</div>
          <div style="font-size:.72rem;color:var(--green);margin-top:2px">Contender: ${mB.contender.toLocaleString()}</div>
          <div style="font-size:.72rem;color:#a371f7">Rebuilder: ${mB.rebuilder.toLocaleString()}</div>
          ${mA.tiers.length ? `<div style="font-size:.68rem;color:var(--muted);margin-top:4px">Giving avg T${avgTierA.toFixed(1)}</div>` : ''}
        </div>
        <div style="background:var(--surface2);border-radius:6px;padding:8px">
          <div style="font-size:.68rem;color:var(--muted);margin-bottom:5px">${rB?rB.teamName:'Team B'} <em>receives</em></div>
          <div style="font-size:.82rem;color:var(--text);font-weight:600">Neutral: ${mA.neutral.toLocaleString()}</div>
          <div style="font-size:.72rem;color:var(--green);margin-top:2px">Contender: ${mA.contender.toLocaleString()}</div>
          <div style="font-size:.72rem;color:#a371f7">Rebuilder: ${mA.rebuilder.toLocaleString()}</div>
          ${mB.tiers.length ? `<div style="font-size:.68rem;color:var(--muted);margin-top:4px">Giving avg T${avgTierB.toFixed(1)}</div>` : ''}
        </div>
      </div>
      <div class="trade-verdict ${mveVClass}" style="font-size:.8rem">${mveVText}</div>
      ${tierNote ? `<div style="font-size:.72rem;text-align:center;margin-top:6px">${tierNote}</div>` : ''}
      ${explainHtml}
      ${lineupHtml}
    </div>`;
  }

  // Pick source note — now reflects projected bucket when used
  const hasBucketedPicks = [...S.tradeA.picks, ...S.tradeB.picks].some(k => {
    const bkt = getPickBucketForKey(k);
    return bkt && bkt.source === 'projected' && bkt.bucket !== 'Mid';
  });
  const pickSrcNote = pickCount > 0
    ? `<div class="picks-source-note">Pick values: ${Object.keys(S.fcPickValues).length > 0
        ? hasBucketedPicks ? 'FantasyCalc RDP · 1st-round buckets projected from team strength' : 'FantasyCalc RDP (mid estimate)'
        : 'tier defaults — load league for precise values'}</div>`
    : '';

  v.innerHTML = `<div class="trade-verdict ${verdictClass}">${verdictText}</div>${ktcNote}${pickSrcNote}${mveHtml}`;
}

// ── TRADE SCOUTING REPORT ─────────────────────────────────────
function renderScoutingReport(ridA, ridB) {
  const el = document.getElementById('trade-scouting');
  if (!el) return;
  const league = ld();
  if (!ridA || !ridB || !S.fcValues.length) { el.innerHTML = ''; return; }
  const rA = league.rosterMap[ridA], rB = league.rosterMap[ridB];
  if (!rA || !rB) { el.innerHTML = ''; return; }

  const sigCls = { Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };

  // Build MVE profiles for window/needs context
  const profA = mveTeamProfile(ridA, league);
  const profB = mveTeamProfile(ridB, league);
  const clsB  = profB?.classification?.label || 'Productive Middle';
  const isRebuildB   = clsB.includes('Rebuild') || clsB === 'Retool';
  const isContenderB = clsB === 'Contender' || clsB === 'Fringe Contender';

  // Team A positional need (0=solid,1=moderate,2=weak,3=critical)
  function posNeedA(pos) {
    const arr = profA?.byPos?.[pos] || [];
    if (!arr.length) return 3;
    if (arr[0].tier >= 4) return 2;
    if (!arr.some(p => p.tier <= 2)) return 1;
    return 0;
  }

  // Score how realistically tradeable a Team B player is.
  // Weighs: Sell Window, Age Curve, Strategic Fit, Positional Context,
  //         Production Alignment (Team A needs), Situation Score.
  function tradabilityScore(pid) {
    const mv = mvePlayer(pid, league);
    const fc = S.fcBySleeperId[String(pid)];
    if (!mv || !fc || mv.neutral <= 0) return null;
    const age = parseInt(fc.player.age) || 25;
    const pos = fc.player.position;
    if (!['QB','RB','WR','TE'].includes(pos)) return null;

    let score = 0;
    const reasons = [];

    // Sell Window
    if (mv.actionTag === 'Sell')      { score += 45; reasons.push('Sell window'); }
    else if (mv.actionTag === 'Shop') { score += 28; reasons.push('Being shopped'); }

    // Strategic Fit vs Team B's dynasty window
    const bPosArr   = profB?.byPos?.[pos] || [];
    const posCountB = bPosArr.length;
    const isOnlyStarter = posCountB === 1 && bPosArr[0] && bPosArr[0].neutral === mv.neutral;

    if (isRebuildB) {
      if (age >= 28 && mv.tier <= 3) { score += 25; reasons.push('Vet on rebuild'); }
      if (age >= 26 && mv.actionTag === 'Hold' && mv.tier >= 3) score += 10;
      if (mv.tier <= 2 && age <= 25) score -= 35; // young cornerstone, untouchable
    }
    if (isContenderB) {
      if (mv.tier >= 4)                  { score += 14; reasons.push('Roster depth'); }
      if (pos === 'RB' && age >= 29)     { score += 20; reasons.push('Aging RB'); }
      if (age >= 31 && mv.tier >= 3)     { score += 12; reasons.push('Closing window'); }
      if (mv.tier <= 2 && age < 29) score -= 40; // elite young core, not moving
    }

    // Positional Context: surplus depth
    if (isOnlyStarter) score -= 20;
    if (posCountB >= 3)                        { score += 20; reasons.push(`${pos} surplus`); }
    else if (posCountB >= 2 && mv.tier >= 3)   score += 8;

    // Age Curve: actively declining
    if (pos === 'RB' && age >= 29 && mv.actionTag !== 'Buy') score += 8;

    // Situation Score: elevated risk = more likely available
    if (mv.riskScore >= 65) { score += 10; reasons.push('High risk'); }

    // Production Alignment: Team A urgently needs this position
    score += posNeedA(pos) * 8;

    if (score < 14) return null;
    return { pid, mv, fc, score, reasons: reasons.slice(0, 2) };
  }

  // Team A sell candidates
  const sellA = (rA.players || [])
    .map(pid => { const mv = mvePlayer(pid, league); const fc = S.fcBySleeperId[String(pid)]; return (mv && fc) ? { pid, mv, fc } : null; })
    .filter(p => p && (p.mv.actionTag === 'Sell' || p.mv.actionTag === 'Shop'))
    .sort((a, b) => b.mv.neutral - a.mv.neutral)
    .slice(0, 5);

  // Context-aware targets from Team B
  const targets = (rB.players || [])
    .map(pid => tradabilityScore(pid))
    .filter(Boolean)
    .sort((a, b) => b.score - a.score || b.mv.neutral - a.mv.neutral)
    .slice(0, 5);

  function playerRow(pid, mv, fc, reasons) {
    const name = fc ? fc.player.name : 'Unknown';
    const pos  = fc ? fc.player.position : '?';
    const age  = fc && fc.player.age ? fc.player.age : '?';
    const chips = reasons && reasons.length
      ? `<div style="display:flex;gap:3px;margin-top:3px">${reasons.map(r => `<span style="font-size:.58rem;background:rgba(88,166,255,.07);color:var(--muted);border-radius:3px;padding:1px 5px">${r}</span>`).join('')}</div>`
      : '';
    return `<div style="padding:6px 10px;border-radius:6px;background:var(--surface2);margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:8px">
        ${hsImg(pid, 28, pos)}
        <span class="pos-badge pos-${pos}">${pos}</span>
        <span style="flex:1;font-size:.82rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
        <span style="font-size:.68rem;color:var(--muted);white-space:nowrap">age ${age}</span>
        <span style="font-size:.72rem;color:var(--accent);min-width:42px;text-align:right">${mv.neutral.toLocaleString()}</span>
        <span class="signal-badge ${sigCls[mv.actionTag]||'signal-hold'}" style="margin-left:0">${mv.actionTag}</span>
      </div>${chips}
    </div>`;
  }

  const sellHtml = sellA.length
    ? sellA.map(p => playerRow(p.pid, p.mv, p.fc, [])).join('')
    : `<div style="color:var(--muted);font-size:.8rem;padding:6px 0">No obvious sell candidates</div>`;

  const noTargetMsg = isContenderB
    ? `${rB.teamName} is in win-now mode — core pieces unlikely available`
    : isRebuildB ? `${rB.teamName} may be protective of young cornerstones`
    : 'No obvious trade candidates identified';
  const targHtml = targets.length
    ? targets.map(p => playerRow(p.pid, p.mv, p.fc, p.reasons)).join('')
    : `<div style="color:var(--muted);font-size:.8rem;padding:6px 0">${noTargetMsg}</div>`;

  const clsBadge = profB?.classification
    ? `<span style="font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:700;background:${profB.classification.bg};color:${profB.classification.color}">${clsB}</span>`
    : '';

  el.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none" onclick="toggleScouting()">
        <div style="font-size:.8rem;font-weight:700;color:var(--text)">Scouting Report</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:.7rem;color:var(--muted)">Sell candidates &amp; realistic trade targets</span>
          <span id="scouting-chevron" style="color:var(--muted);font-size:.75rem;transition:transform .15s">&#9660;</span>
        </div>
      </div>
      <div id="scouting-body" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px">
        <div>
          <div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">${rA.teamName} — Sell Candidates</div>
          ${sellHtml}
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <span style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">${rB.teamName} — Realistic Targets</span>
            ${clsBadge}
          </div>
          ${targHtml}
        </div>
      </div>
    </div>`;
}

function toggleScouting() {
  const body = document.getElementById('scouting-body');
  const chev = document.getElementById('scouting-chevron');
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'grid';
  if (chev) chev.style.transform = open ? 'rotate(-90deg)' : 'rotate(0deg)';
}

// ── RENDER: FANTASY WRAPPED ───────────────────────────────────
function renderFantasyWrapped() {
  const league = ld();
  if (!league.completedWeeks.length) {
    document.getElementById('wrapped-content').innerHTML=`<div style="text-align:center;padding:60px;color:var(--muted)">No completed weeks found.</div>`;
    return;
  }
  const w=computeWrapped(league);
  const [mvpId,mvpPts]=w.topScorer||[null,0];
  const [consistId]=w.mostConsistent||[null];
  const [gcId]=w.glassCanon||[null];
  const [benchId,benchVal]=w.mostBench||[null,0];

  // For best week player -- find the actual player from matchup starters
  const bestWeekMeta = mvpId ? (league.rosterMap[mvpId] || null) : null;
  // Top player by points in best week -- find from weekly data
  const bestWeekPlayerPid = (() => {
    const weekData = w.weekly[w.bestWeek.rosterId];
    if (!weekData) return null;
    const entry = weekData.find(x => x.week === w.bestWeek.week);
    if (!entry || !entry.players_points) return null;
    const starters = new Set(entry.starters);
    let best = { pid: null, pts: 0 };
    Object.entries(entry.players_points).forEach(([pid, pts]) => {
      if (starters.has(pid) && pts > best.pts) best = { pid, pts };
    });
    return best.pid;
  })();

  function wCard(emoji, title, bodyHtml, hasHs=false) {
    return `<div class="wrapped-card ${hasHs?'has-hs':''}" data-emoji="${emoji}"><div class="wrapped-card-body">${bodyHtml}</div></div>`;
  }

  function hsCard(emoji, title, rosterId, statText) {
    const r = league.rosterMap[rosterId];
    const av = r && r.avatar ? AV_URL(r.avatar) : null;
    const avImg = av
      ? `<img src="${av}" width="56" height="56" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0" onerror="this.style.display='none'">`
      : `<span class="hs-fallback" style="width:56px;height:56px;background:var(--surface2);font-size:1.2rem">&#127968;</span>`;
    return `<div class="wrapped-card has-hs" data-emoji="${emoji}">
      ${avImg}
      <div class="wrapped-card-body">
        <div class="wrapped-title">${title}</div>
        <div class="wrapped-name">${rName(rosterId)}</div>
        <div class="wrapped-stat">${statText}</div>
      </div>
    </div>`;
  }

  let html=`<div class="section-title" style="margin-bottom:18px">Fantasy Wrapped: ${league.season} Season</div><div class="wrapped-grid">`;

  // MVP with avatar
  html += hsCard('🏆','Season MVP', mvpId, fmtP(mvpPts)+' total points');
  html += hsCard('🍀','Luckiest Team', w.luckiest.rosterId, '+'+fmt(w.luckiest.luck)+' wins above expected');
  html += hsCard('😤','Most Robbed', w.unluckiest.rosterId, fmt(w.unluckiest.luck)+' wins below expected');
  html += wCard('🎯','Most Consistent',`<div class="wrapped-title">Most Consistent</div><div class="wrapped-name">${rName(consistId)}</div><div class="wrapped-stat">Lowest week-to-week variance</div>`);
  html += wCard('💥','Glass Cannon',`<div class="wrapped-title">Glass Cannon</div><div class="wrapped-name">${rName(gcId)}</div><div class="wrapped-stat">Highest week-to-week variance</div>`);

  // Best single week - with player headshot if we found the top starter
  if (bestWeekPlayerPid) {
    const pm = S.playersMeta[bestWeekPlayerPid];
    html += `<div class="wrapped-card has-hs" data-emoji="🚀">
      ${hsImg(bestWeekPlayerPid, 56, pm?.pos||'?')}
      <div class="wrapped-card-body">
        <div class="wrapped-title">Best Single Week</div>
        <div class="wrapped-big" style="font-size:1.4rem">${fmtP(w.bestWeek.points)}</div>
        <div class="wrapped-name">${rName(w.bestWeek.rosterId)}</div>
        <div class="wrapped-stat">Week ${w.bestWeek.week}${pm?' · Top: '+pm.name:''}</div>
      </div>
    </div>`;
  } else {
    html += wCard('🚀','Best Single Week',`<div class="wrapped-title">Best Single Week</div><div class="wrapped-big">${fmtP(w.bestWeek.points)}</div><div class="wrapped-name">${rName(w.bestWeek.rosterId)}</div><div class="wrapped-stat">Week ${w.bestWeek.week}</div>`);
  }

  html += wCard('💀','Worst Single Week',`<div class="wrapped-title">Worst Single Week</div><div class="wrapped-big" style="color:var(--red)">${w.worstWeek.points!==Infinity?fmtP(w.worstWeek.points):'-'}</div><div class="wrapped-name">${rName(w.worstWeek.rosterId)}</div><div class="wrapped-stat">Week ${w.worstWeek.week}</div>`);
  if (w.bigBlowout.margin>0) html+=wCard('🔥','Biggest Blowout',`<div class="wrapped-title">Biggest Blowout</div><div class="wrapped-big">${fmt(w.bigBlowout.margin,2)}</div><div class="wrapped-name">${rName(w.bigBlowout.winId)}</div><div class="wrapped-stat">${fmtP(w.bigBlowout.winPts)} vs ${fmtP(w.bigBlowout.losePts)} — Wk ${w.bigBlowout.week}</div>`);
  if (w.closest.margin<Infinity) html+=wCard('😰','Closest Game',`<div class="wrapped-title">Closest Game</div><div class="wrapped-big" style="color:var(--yellow)">${fmt(w.closest.margin,2)}</div><div class="wrapped-name">${rName(w.closest.winId)}</div><div class="wrapped-stat">${fmtP(w.closest.winPts)} vs ${fmtP(w.closest.losePts)} — Wk ${w.closest.week}</div>`);
  if (benchId&&benchVal>0) html+=wCard('🪑','Most Bench Pts',`<div class="wrapped-title">Most Bench Pts</div><div class="wrapped-big">${fmtP(benchVal)}</div><div class="wrapped-name">${rName(benchId)}</div><div class="wrapped-stat">Left on bench all season</div>`);

  html+=`</div><div class="section"><div class="section-title">Season Scoring Leaders</div><div class="table-wrap"><table><thead><tr><th>#</th><th>Team</th><th>Total Pts</th><th>Avg/Wk</th><th>Std Dev</th><th>Bench Pts</th></tr></thead><tbody>`;
  const nw=league.completedWeeks.length;
  Object.entries(w.totals).sort((a,b)=>b[1]-a[1]).forEach(([id,pts],i)=>{
    html+=`<tr><td>${badge(i+1)}</td><td class="bold">${rName(id)}</td><td>${fmtP(pts)}</td><td>${fmtP(nw>0?pts/nw:0)}</td><td>${fmtP(w.consistency[id]||0)}</td><td>${w.benchPts[id]>0?fmtP(w.benchPts[id]):'-'}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('wrapped-content').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════════
// MVE  —  MINIMUM VIABLE ELITE VALUATION ENGINE
// All weights configurable here. Formulas are inspectable below.
// ═══════════════════════════════════════════════════════════════
const MVE = {
  // Sentiment overlay weight by player archetype
  sentimentWeights: {
    rookie:    0.70,  // fresh rookies — KTC hype matters most
    yr12_WRQB: 0.57,  // year 1-2 WR/QB
    yr12_RB:   0.45,  // year 1-2 RB (more role-dependent)
    prime_WR:  0.40,
    prime_QB:  0.35,
    prime_RB:  0.30,
    prime_TE:  0.35,
    vet_WR:    0.20,
    vet_RB:    0.15,  // vet RBs: KTC matters least
    vet_TE:    0.20,
    default:   0.30,
  },
  sentimentCapPos:  0.20,  // KTC can add at most +20% of FC value
  sentimentCapNeg: -0.15,  // KTC can reduce at most -15% of FC value
  // Tier multipliers (fraction of base value added/removed)
  tierAdj: { 1: 0.12, 2: 0.06, 3: 0.00, 4: -0.08, 5: -0.15 },
  // Role-stability adjustments
  roleAdj: {
    'Elite Locked-In':    0.12,
    'Stable Starter':     0.06,
    'Likely Starter':     0.02,
    'Volatile/Committee': -0.08,
    'Backup/Stash':      -0.15,
    'Buried':            -0.20,
  },
  // Shallow-league (≤10 teams) modifiers
  shallowElite:    0.08,
  shallowDepth:   -0.07,
  shallowReplace: -0.14,
};

// Tier breakpoints: how many ranked players fall in each tier (per position)
const TIER_BREAKS = {
  QB: [2,  6, 12, 20],
  RB: [5, 14, 28, 44],
  WR: [6, 18, 36, 54],
  TE: [2,  6, 12, 18],
};

function mveGetTier(fc) {
  const pos = fc.player && fc.player.position;
  if (!TIER_BREAKS[pos]) return 5;
  const sorted = S.fcValues
    .filter(x => x.player && x.player.position === pos && (x.value||0) > 0)
    .sort((a,b) => (b.value||0) - (a.value||0));
  const rank = sorted.findIndex(x => x.player.sleeperId === fc.player.sleeperId) + 1;
  if (rank === 0) return 4;
  const [t1,t2,t3,t4] = TIER_BREAKS[pos];
  if (rank <= t1) return 1;
  if (rank <= t2) return 2;
  if (rank <= t3) return 3;
  if (rank <= t4) return 4;
  return 5;
}

function mveArchetype(fc) {
  const age  = parseInt(fc.player && fc.player.age) || 25;
  const pos  = fc.player && fc.player.position;
  const yExp = fc.player && fc.player.years_exp;
  if (yExp === 0) return 'rookie';
  if (age <= 23)  return pos === 'RB' ? 'yr12_RB' : 'yr12_WRQB';
  if (age <= 29)  return { QB:'prime_QB', RB:'prime_RB', TE:'prime_TE' }[pos] || 'prime_WR';
  return { RB:'vet_RB', TE:'vet_TE' }[pos] || 'vet_WR';
}

function mveRoleLabel(tier, pos) {
  if (tier === 1)               return 'Elite Locked-In';
  if (tier === 2)               return 'Stable Starter';
  if (tier === 3)               return 'Likely Starter';
  if (tier === 4 && pos==='RB') return 'Volatile/Committee';
  if (tier === 4)               return 'Likely Starter';
  return 'Backup/Stash';
}

function mveLiquidity(fc, tier) {
  const age = parseInt(fc.player && fc.player.age) || 25;
  const pos = fc.player && fc.player.position;
  let s = 0.50;
  if      (age <= 22) s += 0.25;
  else if (age <= 25) s += 0.15;
  else if (age >= 30) s -= 0.20;
  else if (age >= 28) s -= 0.10;
  if      (tier === 1) s += 0.20;
  else if (tier === 2) s += 0.10;
  else if (tier === 4) s -= 0.10;
  else if (tier === 5) s -= 0.20;
  s += pos === 'QB' ? 0.05 : pos === 'TE' ? -0.05 : 0;
  s = Math.max(0, Math.min(1, s));
  return { score: Math.round(s * 100), label: s >= 0.68 ? 'High' : s >= 0.38 ? 'Medium' : 'Low' };
}

function mveRisk(fc, tier) {
  const age = parseInt(fc.player && fc.player.age) || 25;
  const pos = fc.player && fc.player.position;
  let r = 0;
  if      (age >= 32) r += 0.22;
  else if (age >= 30) r += 0.14;
  else if (age >= 28 && pos === 'RB') r += 0.10;
  if (pos === 'RB') r += 0.07;
  else if (pos === 'QB') r += 0.04;
  // Injury shield: elite players do not collapse under age/injury penalties
  if (tier <= 2) r = Math.min(r, 0.18);
  return { score: Math.max(0, Math.min(0.35, r)), label: r >= 0.22 ? 'High' : r >= 0.10 ? 'Medium' : 'Low' };
}

function mveContenderRebuilder(neutral, fc, tier) {
  const age = parseInt(fc.player && fc.player.age) || 25;
  const pos = fc.player && fc.player.position;
  let cm = 1.0, rm = 1.0;
  if (pos === 'RB') {
    if      (age >= 28) { cm += 0.08; rm -= 0.15; }
    else if (age >= 26) { cm += 0.04; rm -= 0.08; }
    else if (age <= 23) { cm -= 0.05; rm += 0.12; }
  }
  if ((pos === 'WR' || pos === 'QB') && age <= 24) { cm -= 0.04; rm += 0.10; }
  if (tier === 1) cm += 0.05;
  return {
    contenderValue: Math.round(neutral * cm),
    rebuilderValue: Math.round(neutral * rm),
  };
}

function mveFormatMult(league, pos, tier) {
  const rp     = (league.league && league.league.roster_positions) || [];
  const sc     = (league.league && league.league.scoring_settings) || {};
  const isSF   = rp.includes('SUPER_FLEX');
  const isTEP  = (sc.rec || 0) >= 1.5 || (sc.bonus_rec_te || 0) > 0;
  const shallow = Object.keys(league.rosterMap).length <= 10;
  let m = 1.0;
  if (isSF && pos === 'QB')  m += tier<=2 ? 0.18 : tier===3 ? 0.12 : 0.06;
  if (isTEP && pos === 'TE') m += tier<=2 ? 0.15 : tier===3 ? 0.08 : 0.03;
  if (shallow) m += tier<=2 ? MVE.shallowElite : tier===3 ? MVE.shallowDepth : MVE.shallowReplace;
  return m;
}

function mveActionTag(fc, tier, neutral, base) {
  const age = parseInt(fc.player && fc.player.age) || 25;
  const pos = fc.player && fc.player.position;
  if (age >= 30 && pos === 'RB' && tier >= 3) return 'Sell';
  if (age >= 32 && tier >= 3)                 return 'Sell';
  if (tier >= 4 && age >= 29)                 return 'Sell';
  if (age <= 22 && tier <= 2)                 return 'Buy';
  if (base > 0 && (neutral-base)/base > 0.12 && tier <= 3) return 'Buy';
  if (age <= 23 && tier >= 3)                 return 'Speculative';
  if (tier === 3 && age >= 28 && pos !== 'QB') return 'Shop';
  if (tier <= 3 && age <= 29)                 return 'Hold';
  return 'Hold';
}

// ── Core MVE player object ─────────────────────────────────────
//
//  FinalNeutralValue =
//    BaseMarketValue (FC)
//    + SentimentAdjustment (KTC × archetype weight, capped)
//    + TierAdjustment
//    + RoleAdjustment
//    - RiskAdjustment (partial: × 0.5)
//    × FormatMultiplier (SF / TEP / shallow-league)
//
function mvePlayer(pid, league) {
  const fc  = S.fcBySleeperId[String(pid)];
  if (!fc || !(fc.value > 0)) return null;
  const pos = fc.player && fc.player.position;
  if (!['QB','RB','WR','TE'].includes(pos || '')) return null;

  const base = fc.value;
  const tier = mveGetTier(fc);
  const arch = mveArchetype(fc);
  const age  = fc.player.age;

  // 1. Sentiment adjustment (KTC overlay)
  let sentAdj = 0;
  const ktcVal = S.ktcAvailable ? (S.ktcBySleeperId[String(pid)] || 0) : 0;
  if (S.ktcAvailable && ktcVal > 0) {
    const w   = MVE.sentimentWeights[arch] || MVE.sentimentWeights.default;
    const raw = (ktcVal - base) * w;
    sentAdj   = Math.max(base * MVE.sentimentCapNeg, Math.min(base * MVE.sentimentCapPos, raw));
  }

  // 2. Tier adjustment
  const tierAdj = base * (MVE.tierAdj[tier] || 0);

  // 3. Role adjustment
  const roleLabel = mveRoleLabel(tier, pos);
  const roleAdj   = base * (MVE.roleAdj[roleLabel] || 0);

  // 4. Risk adjustment (partial penalty so elite players bend, not break)
  const { score: riskScore, label: riskLabel } = mveRisk(fc, tier);
  const riskAdj = -(base * riskScore * 0.5);

  // 5. Format multiplier
  const fmtMult = mveFormatMult(league, pos, tier);

  // 6. Neutral value
  const neutral = Math.round(Math.max(0, base + sentAdj + tierAdj + roleAdj + riskAdj) * fmtMult);

  // 7. Context-specific values
  const { contenderValue, rebuilderValue } = mveContenderRebuilder(neutral, fc, tier);

  // 8. Liquidity & action
  const liquidity = mveLiquidity(fc, tier);
  const actionTag = mveActionTag(fc, tier, neutral, base);

  return {
    pid: String(pid), name: fc.player.name, pos, age,
    team: fc.player.team || 'FA',
    fcValue: base, ktcValue: ktcVal, tier,
    neutral, contenderValue, rebuilderValue,
    sentAdj: Math.round(sentAdj),
    tierAdj: Math.round(tierAdj),
    roleAdj: Math.round(roleAdj),
    riskAdj: Math.round(riskAdj),
    riskScore, riskLabel, roleLabel, liquidity, actionTag,
  };
}

// ── Replacement-level baselines ────────────────────────────────
function mveReplacementLevels(league) {
  const rp = (league.league && league.league.roster_positions) || [];
  const n  = Object.keys(league.rosterMap).length;
  const isSF = rp.includes('SUPER_FLEX');
  let qb=0,rb=0,wr=0,te=0,flex=0,sf=0;
  rp.forEach(p=>{
    if(p==='QB')qb++; if(p==='RB')rb++; if(p==='WR')wr++;
    if(p==='TE')te++; if(p==='FLEX')flex++; if(p==='SUPER_FLEX')sf++;
  });
  const idx = {
    QB: Math.round((qb + (isSF ? sf*0.6 : 0)) * n) + 1,
    RB: Math.round((rb + flex*0.35) * n) + 2,
    WR: Math.round((wr + flex*0.55) * n) + 2,
    TE: Math.round(te * n) + 2,
  };
  function gv(pos, i) {
    const vals = S.fcValues
      .filter(x => x.player && x.player.position===pos && (x.value||0)>0)
      .sort((a,b) => (b.value||0)-(a.value||0));
    return (vals[Math.min(i, vals.length-1)]?.value) || 0;
  }
  return { QB:gv('QB',idx.QB), RB:gv('RB',idx.RB), WR:gv('WR',idx.WR), TE:gv('TE',idx.TE) };
}

// ── Full team profile (franchise + league intel backbone) ──────
function mveTeamProfile(rosterId, league) {
  const roster = league.rosterMap[rosterId];
  if (!roster) return null;
  const replLvl = mveReplacementLevels(league);
  const all = roster.players
    .map(pid => mvePlayer(pid, league)).filter(Boolean)
    .sort((a,b) => b.neutral - a.neutral);

  const byPos = { QB:[], RB:[], WR:[], TE:[] };
  all.forEach(p => { if (byPos[p.pos]) byPos[p.pos].push(p); });

  // Derive starter counts from league roster settings
  const rp = (league.league && league.league.roster_positions) || [];
  let nQB=0,nRB=0,nWR=0,nTE=0,nFlex=0;
  const isSF = rp.includes('SUPER_FLEX');
  rp.forEach(p=>{if(p==='QB')nQB++;if(p==='RB')nRB++;if(p==='WR')nWR++;if(p==='TE')nTE++;if(p==='FLEX')nFlex++;});
  const starters = [
    ...byPos.QB.slice(0, isSF ? nQB+1 : nQB || 1),
    ...byPos.RB.slice(0, nRB + Math.ceil(nFlex*0.35) || 2),
    ...byPos.WR.slice(0, nWR + Math.ceil(nFlex*0.55) || 3),
    ...byPos.TE.slice(0, nTE || 1),
  ];

  const totalValue   = all.reduce((s,p)=>s+p.neutral, 0);
  const starterValue = starters.reduce((s,p)=>s+p.neutral, 0);

  // Value above replacement by position
  const varByPos = {};
  ['QB','RB','WR','TE'].forEach(pos => {
    varByPos[pos] = starters
      .filter(p=>p.pos===pos)
      .reduce((s,p)=>s+Math.max(0, p.neutral-(replLvl[pos]||0)), 0);
  });
  const totalVAR = Object.values(varByPos).reduce((s,v)=>s+v, 0);

  // Weighted average age (by neutral value)
  const vW = all.filter(p=>p.age).reduce((s,p)=>s+p.neutral, 0);
  const weightedAge = vW > 0
    ? all.filter(p=>p.age).reduce((s,p)=>s+(parseInt(p.age)||25)*p.neutral,0)/vW : 0;

  const picks     = getTeamPickList(parseInt(rosterId));
  // Use starter value to estimate pick bucket for 1st-rounders (avoids circular recursion)
  // Own picks: strong teams project Late (less valuable), weak teams project Early (more valuable)
  // Acquired picks from another team use their original owner's starterValue via a quick lookup
  function quickBucket(origRosterId) {
    const origRoster = league && league.rosterMap[origRosterId];
    if (!origRoster) return 'Mid';
    const origPlayers = (origRoster.players || []);
    const origSV = origPlayers.reduce((s, pid) => {
      const fc = S.fcBySleeperId[String(pid)];
      return s + (fc ? fc.value : 0);
    }, 0);
    if (origSV >= 44000) return 'Late';
    if (origSV <= 18000) return 'Early';
    return 'Mid';
  }
  const pickValue = picks.reduce((s,p) => {
    const bucket = p.round === 1 ? quickBucket(p.originalOwner) : null;
    return s + getPickValue(p.season, p.round, bucket);
  }, 0);
  const avgLiq    = all.length > 0 ? all.reduce((s,p)=>s+p.liquidity.score,0)/all.length : 0;

  const classification = mveClassifyTeam(starterValue, weightedAge, pickValue, byPos, totalValue);
  const actions        = mveTeamActions(classification, byPos, weightedAge, pickValue);
  const cornerstones   = all.filter(p=>p.tier<=2 && parseInt(p.age||99)<=29).slice(0,5);
  const sellHighList   = all.filter(p=>p.actionTag==='Sell'||p.actionTag==='Shop');
  const speculativeList= all.filter(p=>p.actionTag==='Speculative'||p.actionTag==='Buy').slice(0,5);

  return {
    rosterId: parseInt(rosterId), teamName: roster.teamName, avatar: roster.avatar,
    all, byPos, starters,
    totalValue, starterValue, totalVAR, varByPos,
    weightedAge: Math.round(weightedAge*10)/10,
    pickValue, picks, avgLiq, replLvl,
    classification, actions,
    cornerstones, sellHighList, speculativeList,
  };
}

// ── CLASSIFICATION STYLES (single source of truth) ────────────
const CLASS_STYLES = {
  'Contender':         { color:'#16a34a', bg:'rgba(22,163,74,.15)'   },
  'Fringe Contender':  { color:'#d97706', bg:'rgba(217,119,6,.15)'   },
  'Productive Middle': { color:'#0ea5e9', bg:'rgba(14,165,233,.12)'  },
  'Retool':            { color:'#6366f1', bg:'rgba(99,102,241,.15)'  },
  'Rebuild':           { color:'#a855f7', bg:'rgba(168,85,247,.15)'  },
  'Rebuilding':        { color:'#dc2626', bg:'rgba(220,38,38,.15)'   },
};

// ── TUNING KNOBS for classification (adjust here) ─────────────
const CLASS_THRESHOLDS = {
  // Absolute starter value thresholds (in FC points)
  contenderSV:      44000,  // must exceed this for Contender consideration
  fringeContSV:     33000,  // raised: Fringe requires genuine starter strength
  solidSV:          23000,  // floor for Productive Middle
  bottomFloorSV:    16000,  // below this → Rebuild regardless of anything else
  // Age gates
  contenderMaxAge:  28.5,
  fringeMaxAge:     29.5,
  youngRosterAge:   26.5,
  oldRosterAge:     30.0,
  // Positional weakness: how many positions where best player is Tier 4+
  contenderMaxWeak: 1,
  fringeMaxWeak:    2,
  // Elite player requirement for top tiers
  contenderMinElites: 2,    // Contender must have ≥2 T1/T2 players
  // Roster shape: if starterVal/totalVal < this, it's "depth without starters"
  fakeStrengthRatio: 0.45,
  // Pick capital thresholds
  bigPicksThreshold:  10000,
  lowPicksThreshold:   4000,
  // Distribution sanity caps — set high so all qualifying teams keep their earned label
  maxTopTierFraction:   1.00,  // no cap on Contender + Fringe
  maxContenderFraction: 1.00,  // no cap on true Contenders
};

// ── mveClassifyTeam: single-team fallback (no league context) ──
// Prefer mveClassifyTeams() for the main UI — it uses league percentiles + distribution sanity.
// totalVal is optional; used for fake-strength detection.
function mveClassifyTeam(starterVal, weightedAge, pickVal, byPos, totalVal) {
  const T = CLASS_THRESHOLDS;
  let weakPos = 0;
  ['QB','RB','WR','TE'].forEach(pos => {
    const top = byPos[pos] && byPos[pos][0];
    if (!top || top.tier >= 4) weakPos++;
  });
  const numElites      = ['QB','RB','WR','TE'].reduce((n,pos) => n + (byPos[pos]||[]).filter(p=>p.tier<=2).length, 0);
  const hasCornerstone = numElites >= 1;
  const isYoung        = weightedAge < T.youngRosterAge;
  const isOld          = weightedAge > T.oldRosterAge;
  const hasBigPicks    = pickVal > T.bigPicksThreshold;
  // Fake-strength: deep roster but starters are actually weak
  const fakeStrength   = totalVal > 0 && (starterVal / totalVal) < T.fakeStrengthRatio;
  const isFloor        = starterVal < T.bottomFloorSV;

  // CONTENDER: elite starters, young enough, positional health, multiple cornerstones
  if (!isFloor && !fakeStrength &&
      starterVal >= T.contenderSV && weightedAge < T.contenderMaxAge &&
      weakPos <= T.contenderMaxWeak && hasCornerstone && numElites >= T.contenderMinElites)
    return { label:'Contender',         window:'1–3 yr', ...CLASS_STYLES['Contender'] };

  // FRINGE CONTENDER: real starter value, age gate, no floor, no fake strength
  if (!isFloor && !fakeStrength &&
      starterVal >= T.fringeContSV && weightedAge < T.fringeMaxAge && weakPos <= T.fringeMaxWeak)
    return { label:'Fringe Contender',  window:'2–4 yr', ...CLASS_STYLES['Fringe Contender'] };

  // INTENTIONAL REBUILD: young + picks accumulation + weak starters
  if (isYoung && hasBigPicks && starterVal < T.fringeContSV)
    return { label:'Rebuild',           window:'3–5 yr', ...CLASS_STYLES['Rebuild'] };

  // FLOOR / STRUCTURAL REBUILD: bottom-tier starter value or multi-position failure
  if (isFloor || (starterVal < T.solidSV && weakPos >= 3))
    return { label:'Rebuild',           window:'3–6 yr', ...CLASS_STYLES['Rebuild'] };

  // RETOOL: picks but not contending, or aging roster below fringe
  if ((hasBigPicks && starterVal < T.fringeContSV) || (isOld && starterVal < T.fringeContSV))
    return { label:'Retool',            window:'2–4 yr', ...CLASS_STYLES['Retool'] };

  // FAKE STRENGTH → Productive Middle at best
  if (fakeStrength)
    return { label:'Productive Middle', window:'2–4 yr', ...CLASS_STYLES['Productive Middle'] };

  // PRODUCTIVE MIDDLE: viable but not a title threat
  if (starterVal >= T.solidSV && weakPos <= 2)
    return { label:'Productive Middle', window:'2–4 yr', ...CLASS_STYLES['Productive Middle'] };

  return { label:'Rebuild',             window:'4–6 yr', ...CLASS_STYLES['Rebuild'] };
}

// ── mveClassifyTeams: LEAGUE-AWARE batch classification ─────────
// Uses relative percentile ranks + absolute thresholds + shape detection + distribution sanity.
// Always prefer this over mveClassifyTeam for the main UI.
function mveClassifyTeams(profiles) {
  if (!profiles || !profiles.length) return profiles;
  const T = CLASS_THRESHOLDS;
  const n = profiles.length;

  // Build league-relative rank maps
  const svSorted  = [...profiles].sort((a,b) => b.starterValue - a.starterValue);
  const varSorted = [...profiles].sort((a,b) => b.totalVAR     - a.totalVAR);
  const svRankMap = {}, varRankMap = {};
  svSorted.forEach( (p,i) => { svRankMap[p.rosterId]  = i; });
  varSorted.forEach((p,i) => { varRankMap[p.rosterId] = i; });

  const result = profiles.map(prof => {
    const sv    = prof.starterValue;
    const tv    = prof.totalValue;
    const age   = prof.weightedAge;
    const picks = prof.pickValue;
    const byPos = prof.byPos;

    // Percentile rank (1.0 = best in league, 0.0 = worst)
    const svPct  = 1 - (svRankMap[prof.rosterId]  || 0) / n;
    const varPct = 1 - (varRankMap[prof.rosterId] || 0) / n;

    // Positional weakness count (position where best player is T4 or absent)
    let weakPos = 0;
    ['QB','RB','WR','TE'].forEach(pos => {
      const top = byPos[pos]?.[0];
      if (!top || top.tier >= 4) weakPos++;
    });
    const numElites      = (prof.all || []).filter(p => p.tier <= 2).length;
    const hasCornerstone = numElites >= 1;

    // Roster shape flags
    const fakeStrength = tv > 0 && (sv / tv) < T.fakeStrengthRatio; // deep but starterless
    const isFloor      = sv < T.bottomFloorSV;

    // Relative position flags
    const isTopTier  = svPct >= 0.70;  // top 30% (top 3 of 10)
    const isTopHalf  = svPct >= 0.55;  // top 45% (stricter than 0.50)
    const isBottom   = svPct <= 0.30;  // bottom 30%
    const isYoung    = age < T.youngRosterAge;
    const isOld      = age > T.oldRosterAge;
    const hasBigPicks= picks > T.bigPicksThreshold;

    let label, window_;

    // CONTENDER: elite starters + age + positional health + no fake strength (purely score-based)
    if (!isFloor && !fakeStrength &&
        sv >= T.contenderSV && age < T.contenderMaxAge &&
        weakPos <= T.contenderMaxWeak && hasCornerstone &&
        numElites >= T.contenderMinElites) {
      label = 'Contender'; window_ = '1–3 yr';
    }
    // FRINGE CONTENDER: real starter value + age gate + no floor + no fake (purely score-based)
    else if (!isFloor && !fakeStrength &&
             sv >= T.fringeContSV && age < T.fringeMaxAge && weakPos <= T.fringeMaxWeak) {
      label = 'Fringe Contender'; window_ = '2–4 yr';
    }
    // INTENTIONAL REBUILD: young + picks accumulation + not top half
    else if (isYoung && hasBigPicks && !isTopHalf) {
      label = 'Rebuild'; window_ = '3–5 yr';
    }
    // FLOOR / STRUCTURAL REBUILD: bottom value or widespread weakness
    else if (isFloor || (isBottom && (isYoung || weakPos >= 3))) {
      label = 'Rebuild'; window_ = '3–6 yr';
    }
    // RETOOL: aging or pick-heavy but not a contender
    else if ((hasBigPicks && !isTopHalf) || (isOld && !isTopTier)) {
      label = 'Retool'; window_ = '2–4 yr';
    }
    // FAKE STRENGTH: depth without real starters → Productive Middle at best
    else if (fakeStrength && sv < T.fringeContSV) {
      label = 'Productive Middle'; window_ = '2–4 yr';
    }
    // PRODUCTIVE MIDDLE: viable but not a title threat
    else if (!isBottom && weakPos <= 2 && sv >= T.solidSV) {
      label = 'Productive Middle'; window_ = '2–4 yr';
    }
    // REBUILD: default for anything not caught above
    else {
      label = 'Rebuild'; window_ = '4–6 yr';
    }

    const style = CLASS_STYLES[label] || CLASS_STYLES['Rebuild'];
    return {
      ...prof,
      classification: {
        label, window: window_, ...style,
        svPct: Math.round(svPct * 100),
        weakPositions: weakPos,
        numElites,
        fakeStrength,
      },
      actions: mveTeamActions({ label }, byPos, age, picks),
    };
  });

  // ── Distribution sanity pass ─────────────────────────────────
  // Cap true Contenders at maxContenderFraction (e.g. 2 of 10)
  const maxContender = Math.max(1, Math.ceil(n * T.maxContenderFraction));
  const contenderList = result
    .filter(p => p.classification.label === 'Contender')
    .sort((a,b) => b.starterValue - a.starterValue);
  if (contenderList.length > maxContender) {
    const keepC = new Set(contenderList.slice(0, maxContender).map(p => p.rosterId));
    result.forEach(p => {
      if (!keepC.has(p.rosterId) && p.classification.label === 'Contender') {
        const dem = 'Fringe Contender';
        p.classification = { ...p.classification, label: dem, window:'2–4 yr', ...CLASS_STYLES[dem] };
        p.actions = mveTeamActions({ label: dem }, p.byPos, p.weightedAge, p.pickValue);
      }
    });
  }

  // Cap Contender + Fringe combined at maxTopTierFraction (e.g. 3 of 10)
  const maxTopTier = Math.max(2, Math.ceil(n * T.maxTopTierFraction));
  const topTierList = result
    .filter(p => ['Contender','Fringe Contender'].includes(p.classification.label))
    .sort((a,b) => b.starterValue - a.starterValue);
  if (topTierList.length > maxTopTier) {
    const keepT = new Set(topTierList.slice(0, maxTopTier).map(p => p.rosterId));
    result.forEach(p => {
      if (!keepT.has(p.rosterId) && ['Contender','Fringe Contender'].includes(p.classification.label)) {
        const dem = 'Productive Middle';
        p.classification = { ...p.classification, label: dem, window:'2–4 yr', ...CLASS_STYLES[dem] };
        p.actions = mveTeamActions({ label: dem }, p.byPos, p.weightedAge, p.pickValue);
      }
    });
  }

  return result;
}

function mveTeamActions(cls, byPos, weightedAge, pickValue) {
  const acts = [];
  const eliteQB  = byPos.QB && byPos.QB[0] && byPos.QB[0].tier <= 2;
  const eliteRB  = byPos.RB && byPos.RB[0] && byPos.RB[0].tier <= 2;
  const agingRBs = byPos.RB ? byPos.RB.filter(p=>p.actionTag==='Sell').length : 0;
  if (cls.label === 'Contender') {
    if (pickValue > 18000) acts.push('Strong pick capital — consider converting future picks into a win-now asset');
    if (!eliteRB)          acts.push('RB room lacks an elite option — top priority for upgrade');
    if (agingRBs > 0)      acts.push('Aging RBs on roster: sell before further value decay');
    acts.push('Protect the window — avoid rebuilder trades that sacrifice near-term depth');
  } else if (cls.label.includes('Rebuild')) {
    if (!eliteQB)          acts.push('No elite QB: target a young signal-caller as the cornerstone');
    acts.push('Liquidate aging veteran production into future picks or young talent');
    if (pickValue < 5000)  acts.push('Pick capital is low for rebuilding — sell veterans to build draft equity');
    acts.push('Prioritize players aged 25 or younger in every trade');
  } else if (cls.label === 'Fringe Contender') {
    acts.push('Identify one targeted upgrade that pushes you into true Contender territory');
    acts.push('Do not trade away all draft capital — not elite enough to go all-in yet');
    if (!eliteQB)          acts.push('QB upgrade is the highest-leverage move on this roster');
  } else if (cls.label === 'Retool') {
    acts.push('Use pick capital on proven young players, not aging veterans');
    acts.push('Avoid mortgaging future years for a roster that is not a true contender');
  } else {
    acts.push('Build through the draft — rookies and youth are the primary path forward');
    acts.push('Resist overpaying for veterans near the end of their dynasty window');
  }
  return acts;
}

// ── POSITIONAL ROOM SCORING ───────────────────────────────────
function computePositionalRooms(profiles) {
  // Positional relevance cutoffs — only players within top N dynasty ranks matter
  const CUTOFFS  = { QB: 24, RB: 40, WR: 60, TE: 24 };
  // Per-slot weights and max counted slots
  const SLOTS = {
    QB: { count: 2, weights: [0.70, 0.30] },
    RB: { count: 4, weights: [0.40, 0.30, 0.20, 0.10] },
    WR: { count: 6, weights: [0.30, 0.25, 0.20, 0.15, 0.07, 0.03] },
    TE: { count: 2, weights: [0.80, 0.20] },
  };

  // Compute minimum fcValue threshold per position
  const thresholds = {};
  ['QB','RB','WR','TE'].forEach(pos => {
    const byPos = S.fcValues
      .filter(fc => fc.player && fc.player.position === pos)
      .sort((a,b) => b.value - a.value);
    const n = CUTOFFS[pos];
    thresholds[pos] = byPos.length >= n ? byPos[n - 1].value : 0;
  });

  return profiles.map(p => {
    const rooms = {};
    ['QB','RB','WR','TE'].forEach(pos => {
      const { count, weights } = SLOTS[pos];
      const minVal = thresholds[pos];

      // Filter to relevant players only, sorted by MVE value desc
      const relevant = (p.byPos[pos] || [])
        .filter(pl => (pl.fcValue || 0) >= minVal)
        .sort((a,b) => b.neutral - a.neutral);

      const core  = relevant.slice(0, count);
      const extra = relevant.slice(count);

      // Weighted room score
      let score = core.reduce((s, pl, i) => s + (pl.neutral || 0) * weights[i], 0);

      // Depth bonus: up to +10% from meaningful extra depth
      if (extra.length > 0) {
        const rawBonus = extra.reduce((s,x) => s + (x.neutral || 0), 0) * 0.05;
        score += Math.min(score * 0.10, rawBonus);
      }
      score = Math.round(score);

      const coreAvg = core.length
        ? Math.round(core.reduce((s,x) => s + (x.neutral || 0), 0) / core.length)
        : 0;

      const depthLabel = extra.length >= 2 ? 'Strong' : extra.length === 1 ? 'Solid' : 'Thin';
      const topPlayer  = core.length ? core[0].name : (p.byPos[pos] && p.byPos[pos][0] ? p.byPos[pos][0].name : '-');

      rooms[pos] = { score, coreAvg, depthLabel, topPlayer };
    });

    return {
      ...p,
      qbRoom: rooms.QB, rbRoom: rooms.RB, wrRoom: rooms.WR, teRoom: rooms.TE,
      // keep backward compat for League Intel table sort columns
      qbVal: rooms.QB.score,
      rbVal: rooms.RB.score,
      wrVal: rooms.WR.score,
      teVal: rooms.TE.score,
    };
  });
}

      ${th('rbVal',        'RB')}
      ${th('wrVal',        'WR')}
      ${th('teVal',        'TE')}
      <th>Direction</th>
    </tr></thead><tbody>`;

  sorted.forEach((p, i) => {
    const cl = p.classification;
    html += `<tr>
      <td>${badge(i+1)}</td>
      <td class="bold">${p.teamName}</td>
      <td>${rankPill(i+1,total)} ${p.totalValue.toLocaleString()}</td>
      <td>${p.starterValue.toLocaleString()}</td>
      <td>${p.totalVAR.toLocaleString()}</td>
      <td class="${p.weightedAge<=25?'age-young':p.weightedAge>=29.5?'age-old':'age-mid'}">${p.weightedAge}</td>
      <td>${p.avgLiq.toFixed(0)}</td>
      <td style="color:var(--yellow)">${p.pickValue.toLocaleString()}</td>
      <td style="color:#a371f7">${p.qbVal.toLocaleString()}</td>
      <td style="color:#3fb950">${p.rbVal.toLocaleString()}</td>
      <td style="color:#58a6ff">${p.wrVal.toLocaleString()}</td>
      <td style="color:#fb8500">${p.teVal.toLocaleString()}</td>
      <td><span class="archetype-badge" style="background:${cl.bg};color:${cl.color};font-size:.62rem">${cl.label}</span></td>
    </tr>`;
  });

  html += `</tbody></table></div>`;

  // Archetype summary cards
  const best   = k => [...enriched].sort((a,b)=>b[k]-a[k])[0];
  const bestContender = [...enriched].sort((a,b)=>b.starterValue-a.starterValue)[0];
  const rebuilders    = enriched.filter(p=>p.classification.label.includes('Rebuild'));
  const bestRebuild   = rebuilders.length ? [...rebuilders].sort((a,b)=>b.pickValue-a.pickValue)[0] : null;
  const mostLiquid    = best('avgLiq');
  const mostPicks     = best('pickValue');
  const withAge       = enriched.filter(p => p.weightedAge > 0);
  const youngest      = withAge.length ? [...withAge].sort((a,b)=>a.weightedAge-b.weightedAge)[0] : enriched[0];
  const oldest        = withAge.length ? [...withAge].sort((a,b)=>b.weightedAge-a.weightedAge)[0] : enriched[0];
  const deepest       = best('totalValue');
  const topHeavy      = [...enriched].sort((a,b)=>{
    const rA = a.totalValue>0 ? a.starterValue/a.totalValue : 0;
    const rB = b.totalValue>0 ? b.starterValue/b.totalValue : 0;
    return rB - rA;
  })[0];

  function aCard(lbl, team, sub) {
    if (!team) return '';
    return `<div class="card"><div class="card-label">${lbl}</div><div class="card-value" style="font-size:.9rem">${team.teamName}</div><div class="card-sub">${sub}</div></div>`;
  }

  html += `<div class="section-title">League Archetypes</div>
  <div class="card-grid">
    ${aCard('Best Contender',    bestContender, `${bestContender.starterValue.toLocaleString()} starter val`)}
    ${bestRebuild ? aCard('Best Rebuild', bestRebuild, `${bestRebuild.pickValue.toLocaleString()} pick capital`) : ''}
    ${aCard('Most Liquid',       mostLiquid,  `Avg liq ${mostLiquid.avgLiq.toFixed(0)}`)}
    ${aCard('Most Pick Capital', mostPicks,   mostPicks.pickValue.toLocaleString()+' total')}
    ${aCard('Youngest Roster',   youngest,    `Avg age ${youngest.weightedAge}`)}
    ${aCard('Most Veteran',      oldest,      `Avg age ${oldest.weightedAge}`)}
    ${aCard('Most Total Depth',  deepest,     deepest.totalValue.toLocaleString()+' total val')}
    ${aCard('Most Top-Heavy',    topHeavy,    `${topHeavy.totalValue>0?(topHeavy.starterValue/topHeavy.totalValue*100).toFixed(0):0}% of value in starters`)}
  </div>`;

  // Positional room leaderboards — weighted top-N scoring
  const posColors  = { QB:'#a371f7', RB:'#3fb950', WR:'#58a6ff', TE:'#fb8500' };
  const roomKeys   = { QB:'qbRoom',  RB:'rbRoom',  WR:'wrRoom',  TE:'teRoom'  };

  html += `<div class="section-title" style="margin-top:24px">Positional Room Rankings ${tip('Ranks each team\'s positional room using a weighted top-N model. Only dynasty-relevant players count (QB top 24, RB top 40, WR top 60, TE top 24). Each slot is weighted differently — your WR1 counts far more than your WR6. Prevents teams from inflating scores by hoarding mediocre depth.')}
    <span class="section-note">Weighted top-N · relevance-filtered · depth-adjusted</span>
  </div>
  <div class="pos-room-grid">`;

  ['QB','RB','WR','TE'].forEach(pos => {
    const rk = roomKeys[pos];
    const pSorted = [...enriched].sort((a,b) => b[rk].score - a[rk].score);
    const color = posColors[pos];
    html += `<div class="table-wrap"><table>
      <thead>
        <tr><th colspan="5" style="color:${color};text-align:left;font-size:.8rem;padding-bottom:6px">${pos} Room</th></tr>
        <tr><th>#</th><th>Team</th><th>Top Player</th><th style="text-align:right">Room Score ${tip('Weighted sum of your top dynasty players at this position — each slot has a different weight (e.g. WR1=30%, WR2=25%…). Only players within the top dynasty relevance threshold count. Small depth bonus added for extra quality players beyond the core slots.')}</th><th style="text-align:right">Core Avg ${tip('Average MVE value across the counted core players at this position. Tells you the per-player quality of your room — a team with 4 solid starters vs. one elite and 3 scrubs will look different here vs. Room Score.')}</th></tr>
      </thead><tbody>`;
    pSorted.forEach((p, i) => {
      const room = p[rk];
      const depthCls = room.depthLabel === 'Strong' ? 'depth-strong' : room.depthLabel === 'Solid' ? 'depth-solid' : 'depth-thin';
      html += `<tr>
        <td>${badge(i+1)}</td>
        <td class="bold" style="font-size:.75rem">
          ${p.teamName}
          <br><span class="${depthCls}">${room.depthLabel}</span>
        </td>
        <td style="font-size:.75rem;color:var(--text)">${room.topPlayer}</td>
        <td style="text-align:right;font-size:.75rem;color:${color};font-weight:700">${room.score.toLocaleString()}</td>
        <td style="text-align:right;font-size:.75rem;color:var(--muted)">${room.coreAvg.toLocaleString()}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  html += `</div>`;
  document.getElementById('league-intel-content').innerHTML = html;
}

function mveExplainPlayer(mv, league) {
  if (!mv) return [];
  const reasons = [];
  const rp      = (league.league && league.league.roster_positions) || [];
  const sc      = (league.league && league.league.scoring_settings)  || {};
  const isSF    = rp.includes('SUPER_FLEX');
  const isTEP   = (sc.bonus_rec_te || 0) > 0;
  const shallow = Object.keys(league.rosterMap || {}).length <= 10;
  const age     = parseInt(mv.age || 25);

  if      (mv.tier === 1) reasons.push('Elite tier (T1) premium');
  else if (mv.tier === 2) reasons.push('Starter tier (T2) lift');
  else if (mv.tier >= 5) reasons.push('Depth tier — replacement-level discount');

  if (shallow && mv.tier <= 2)  reasons.push('Shallow-league elite premium');
  else if (shallow && mv.tier >= 4) reasons.push('Shallow-league depth discount');

  if (mv.sentAdj && Math.abs(mv.sentAdj) > (mv.fcValue || 1) * 0.05)
    reasons.push(mv.sentAdj > 0 ? `KTC market premium (+${mv.sentAdj.toLocaleString()})` : `KTC market discount (${mv.sentAdj.toLocaleString()})`);

  if      (age <= 22) reasons.push('Young age curve boost (≤22)');
  else if (age >= 32) reasons.push('Age penalty applied (32+)');
  else if (age >= 30) reasons.push('Age penalty applied (30+)');
  else if (age >= 28 && mv.pos === 'RB') reasons.push('Late-career RB position discount');

  if (mv.riskLabel === 'High') reasons.push('High risk cap applied (injury/age shield)');

  if      (mv.roleLabel === 'Elite Locked-In')   reasons.push('Locked-in elite starter role');
  else if (mv.roleLabel === 'Volatile/Committee') reasons.push('Committee/volatile role penalty');
  else if (mv.roleLabel === 'Backup/Stash')       reasons.push('Backup/stash role discount');

  if (isSF && mv.pos === 'QB' && mv.tier <= 2) reasons.push('SuperFlex QB premium');
  if (isTEP && mv.pos === 'TE' && mv.tier <= 2) reasons.push('TE premium format boost');

  if (mv.contenderValue > mv.neutral * 1.04) reasons.push('Contender lens premium (proven producer)');
  if (mv.rebuilderValue > mv.neutral * 1.04) reasons.push('Rebuilder lens premium (youth/upside)');

  return reasons.slice(0, 4);
}

function mveExplainTeam(prof) {
  if (!prof) return [];
  const T = CLASS_THRESHOLDS;
  const reasons = [];

  // Positional strengths
  ['QB','RB','WR','TE'].forEach(pos => {
    const top = prof.byPos[pos] && prof.byPos[pos][0];
    if      (top && top.tier === 1) reasons.push(`Elite ${pos}: ${top.name} (T1)`);
    else if (top && top.tier === 2) reasons.push(`Strong ${pos}: ${top.name} (T2)`);
  });

  // Positional weaknesses
  const weakPoses = ['QB','RB','WR','TE'].filter(pos => {
    const top = prof.byPos[pos] && prof.byPos[pos][0];
    return !top || top.tier >= 4;
  });
  if (weakPoses.length >= 3) reasons.push(`Multi-position weakness (${weakPoses.join(', ')})`);
  else if (weakPoses.length > 0) reasons.push(`Weak ${weakPoses.join('/')} room`);

  // Age profile
  if (prof.weightedAge < 25.5) reasons.push('Young roster — high upside');
  else if (prof.weightedAge > 29.5) reasons.push('Veteran roster — shrinking window');

  // Pick capital
  if (prof.pickValue > 20000)       reasons.push('Strong draft capital');
  else if (prof.pickValue < T.lowPicksThreshold) reasons.push('Low pick capital');

  // Roster shape
  const thRatio = prof.totalValue > 0 ? prof.starterValue / prof.totalValue : 0;
  if (thRatio > 0.75)              reasons.push('Top-heavy roster (starter concentrated)');
  else if (thRatio < T.fakeStrengthRatio) reasons.push('Depth-heavy — starters underperform total value');

  // VAR
  if (prof.totalVAR > 35000)  reasons.push('High value above replacement');
  else if (prof.totalVAR < 8000) reasons.push('Low value above replacement');

  // Classification-specific shape note
  const cls = prof.classification && prof.classification.label;
  if (cls === 'Contender' && prof.pickValue > 18000) reasons.push('Pick capital available to convert to win-now assets');
  if (cls && cls.includes('Rebuild') && prof.pickValue < T.lowPicksThreshold) reasons.push('Rebuilding with low pick capital — needs asset accumulation');

  return reasons.slice(0, 5);
}

function mveExplainTrade(tA, tB, mA, mB, lineupDelta, league) {
  const reasons = [];
  const rA = league.rosterMap[tA.rosterId];
  const rB = league.rosterMap[tB.rosterId];
  const nameA = rA ? rA.teamName : 'Team A';
  const nameB = rB ? rB.teamName : 'Team B';

  // Tier consolidation
  const avgTA = mA.tiers.length ? mA.tiers.reduce((s,t)=>s+t,0)/mA.tiers.length : 4;
  const avgTB = mB.tiers.length ? mB.tiers.reduce((s,t)=>s+t,0)/mB.tiers.length : 4;
  if (avgTA < avgTB - 0.6) reasons.push(`${nameA} consolidates into higher tier (avg T${avgTA.toFixed(1)})`);
  else if (avgTB < avgTA - 0.6) reasons.push(`${nameB} consolidates into higher tier (avg T${avgTB.toFixed(1)})`);

  // Pick vs player dynamics
  const picksA = tA.picks.length, picksB = tB.picks.length;
  if (picksA > picksB + 1 && tA.players.length === 0)
    reasons.push(`${nameA} sends pure pick package — future value trade`);
  else if (picksB > picksA + 1 && tB.players.length === 0)
    reasons.push(`${nameB} sends pure pick package — future value trade`);
  else if (picksA > 0 && tB.players.length > 0)
    reasons.push('Pick capital traded for proven player production');

  // Contender/rebuilder lens divergence
  const cTotal = mA.contender + mB.contender || 1;
  const rTotal = mA.rebuilder + mB.rebuilder || 1;
  const cDiff  = Math.abs(mA.contender - mB.contender) / cTotal;
  const rDiff  = Math.abs(mA.rebuilder - mB.rebuilder) / rTotal;
  if (cDiff > 0.10) reasons.push(`Contender lens favors ${mA.contender > mB.contender ? nameA : nameB} side`);
  if (rDiff > 0.10) reasons.push(`Rebuilder lens favors ${mA.rebuilder > mB.rebuilder ? nameA : nameB} side`);

  // Lineup impact
  if (lineupDelta) {
    if (lineupDelta.deltaA > 3000)  reasons.push(`${nameA} starting lineup improves (+${Math.round(lineupDelta.deltaA/1000)}k)`);
    else if (lineupDelta.deltaA < -3000) reasons.push(`${nameA} starting lineup weakens (${Math.round(lineupDelta.deltaA/1000)}k)`);
    if (lineupDelta.deltaB > 3000)  reasons.push(`${nameB} starting lineup improves (+${Math.round(lineupDelta.deltaB/1000)}k)`);
    else if (lineupDelta.deltaB < -3000) reasons.push(`${nameB} starting lineup weakens (${Math.round(lineupDelta.deltaB/1000)}k)`);
    if (lineupDelta.startersGainedA === 0 && lineupDelta.totalGainedA > 1)
      reasons.push(`${nameA} gains mostly bench depth, not starters`);
    if (lineupDelta.startersGainedB === 0 && lineupDelta.totalGainedB > 1)
      reasons.push(`${nameB} gains mostly bench depth, not starters`);
  }

  return reasons.slice(0, 5);
}

// STARTER / LINEUP IMPACT ENGINE
// ════════════════════════════════════════════════════════════════

function mveBestLineup(players, league) {
  const rp   = (league.league && league.league.roster_positions) || [];
  const isSF = rp.includes('SUPER_FLEX');
  let nQB=0, nRB=0, nWR=0, nTE=0, nFlex=0, nSF=0;
  rp.forEach(p => {
    if(p==='QB')nQB++; if(p==='RB')nRB++; if(p==='WR')nWR++;
    if(p==='TE')nTE++; if(p==='FLEX')nFlex++; if(p==='SUPER_FLEX')nSF++;
  });
  nQB=nQB||1; nRB=nRB||2; nWR=nWR||3; nTE=nTE||1;

  const byPos = { QB:[], RB:[], WR:[], TE:[] };
  players.filter(Boolean).forEach(p => { if(byPos[p.pos]) byPos[p.pos].push(p); });
  Object.keys(byPos).forEach(pos => byPos[pos].sort((a,b)=>b.neutral-a.neutral));

  const starters=[], used=new Set();
  function fill(pos,n) {
    let c=0;
    for(const p of(byPos[pos]||[])) {
      if(c>=n||used.has(p.pid)) continue;
      starters.push(p); used.add(p.pid); c++;
    }
  }
  fill('QB', nQB); fill('RB', nRB); fill('WR', nWR); fill('TE', nTE);

  // FLEX — best remaining RB/WR/TE
  if (nFlex > 0) {
    const pool = ['RB','WR','TE'].flatMap(pos=>byPos[pos]).filter(p=>!used.has(p.pid)).sort((a,b)=>b.neutral-a.neutral);
    for(let i=0;i<nFlex&&i<pool.length;i++) { starters.push(pool[i]); used.add(pool[i].pid); }
  }
  // SUPER_FLEX — best remaining any skill
  if (isSF && nSF > 0) {
    const pool = [...byPos.QB,...byPos.RB,...byPos.WR,...byPos.TE].filter(p=>!used.has(p.pid)).sort((a,b)=>b.neutral-a.neutral);
    for(let i=0;i<nSF&&i<pool.length;i++) { starters.push(pool[i]); used.add(pool[i].pid); }
  }

  const starterValue = starters.reduce((s,p)=>s+p.neutral,0);
  const posTotals = {};
  starters.forEach(p=>{ posTotals[p.pos]=(posTotals[p.pos]||0)+p.neutral; });
  return { starters, starterValue, posTotals };
}

function mveLineupDelta(sideAId, sideBId, playersAGiving, playersBGiving, league) {
  const rosterA = league.rosterMap[sideAId];
  const rosterB = league.rosterMap[sideBId];
  if (!rosterA || !rosterB) return null;

  const aSet  = new Set(playersAGiving);
  const bSet  = new Set(playersBGiving);
  const allA  = rosterA.players.map(pid=>mvePlayer(pid,league)).filter(Boolean);
  const allB  = rosterB.players.map(pid=>mvePlayer(pid,league)).filter(Boolean);
  const postA = [...allA.filter(p=>!aSet.has(p.pid)), ...allB.filter(p=>bSet.has(p.pid))];
  const postB = [...allB.filter(p=>!bSet.has(p.pid)), ...allA.filter(p=>aSet.has(p.pid))];

  const beforeA = mveBestLineup(allA,  league);
  const afterA  = mveBestLineup(postA, league);
  const beforeB = mveBestLineup(allB,  league);
  const afterB  = mveBestLineup(postB, league);

  const posImpA={}, posImpB={};
  ['QB','RB','WR','TE'].forEach(pos => {
    posImpA[pos] = (afterA.posTotals[pos]||0) - (beforeA.posTotals[pos]||0);
    posImpB[pos] = (afterB.posTotals[pos]||0) - (beforeB.posTotals[pos]||0);
  });

  const gainedA = allB.filter(p=>bSet.has(p.pid));
  const gainedB = allA.filter(p=>aSet.has(p.pid));
  const startersGainedA = gainedA.filter(p=>afterA.starters.some(s=>s.pid===p.pid)).length;
  const startersGainedB = gainedB.filter(p=>afterB.starters.some(s=>s.pid===p.pid)).length;

  return {
    beforeA, afterA, beforeB, afterB,
    deltaA: afterA.starterValue - beforeA.starterValue,
    deltaB: afterB.starterValue - beforeB.starterValue,
    posImpA, posImpB,
    startersGainedA, totalGainedA: gainedA.length,
    startersGainedB, totalGainedB: gainedB.length,
  };
}

function lineupDeltaHtml(delta, nameA, nameB) {
  if (!delta) return '';
  function side(name, d, posImp, stGained, totGained) {
    const dc = d > 0 ? 'var(--green)' : d < 0 ? 'var(--red)' : 'var(--muted)';
    const ds = d > 0 ? '+' : '';
    const verdict = d > 4000  ? 'Improves lineup meaningfully'
      : d < -4000 ? 'Lineup weakens'
      : Math.abs(d) < 1500 ? 'Minimal lineup change'
      : d > 0  ? 'Modest lineup improvement' : 'Modest lineup dip';
    const depthNote = totGained > 0 && stGained === 0
      ? `<div style="font-size:.65rem;color:var(--yellow);margin-top:2px">⚠ Gains are mostly bench depth</div>` : '';
    const fullStarters = totGained > 0 && stGained === totGained
      ? `<div style="font-size:.65rem;color:var(--green);margin-top:2px">All gains land in starting lineup</div>` : '';
    const chips = ['QB','RB','WR','TE'].map(pos => {
      const v = posImp[pos] || 0; if (Math.abs(v) < 800) return '';
      const pc = v > 0 ? 'pos-delta-up' : 'pos-delta-down';
      return `<span class="pos-delta-pill ${pc}">${pos} ${v>0?'+':''}${Math.round(v/100)/10}k</span>`;
    }).join('');
    return `<div class="lineup-delta-box">
      <div style="font-size:.68rem;color:var(--muted);margin-bottom:3px">${name} receives</div>
      <div style="font-size:.82rem;font-weight:700;color:${dc}">${ds}${d.toLocaleString()} starter val</div>
      <div style="font-size:.68rem;color:var(--muted)">${verdict}</div>
      ${chips ? `<div style="margin-top:4px">${chips}</div>` : ''}
      ${depthNote}${fullStarters}
    </div>`;
  }
  return `<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
    <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Lineup Impact</div>
    <div class="lineup-delta-grid">
      ${side(nameA, delta.deltaA, delta.posImpA, delta.startersGainedA, delta.totalGainedA)}
      ${side(nameB, delta.deltaB, delta.posImpB, delta.startersGainedB, delta.totalGainedB)}
    </div>
  </div>`;
}

function mveTradePartnerScore(myProf, theirProf) {
  if (!myProf || !theirProf) return { score:0, reasons:[], targetTypes:[] };
  let score = 0;
  const reasons = [], targetTypes = [];
  const myLabel   = myProf.classification.label;
  const thLabel   = theirProf.classification.label;
  const iAmCont   = ['Contender','Fringe Contender'].includes(myLabel);
  const iAmRebuild= myLabel.includes('Rebuild') || myLabel === 'Retool';
  const theyCont  = ['Contender','Fringe Contender'].includes(thLabel);
  const theyRebuild= thLabel.includes('Rebuild') || thLabel === 'Retool';

  if (iAmCont && theyRebuild) {
    score += 30; reasons.push('Contender vs rebuilder — natural deal structure'); targetTypes.push('Win-now player acquisition');
  } else if (iAmRebuild && theyCont) {
    score += 25; reasons.push('Rebuilder vs contender — sell vets for picks/youth'); targetTypes.push('Pick/youth acquisition');
  }

  ['QB','RB','WR','TE'].forEach(pos => {
    const myElites = (myProf.byPos[pos]||[]).filter(p=>p.tier<=2).length;
    const thElites = (theirProf.byPos[pos]||[]).filter(p=>p.tier<=2).length;
    const myWeak   = !myProf.byPos[pos]?.[0]   || myProf.byPos[pos][0].tier >= 4;
    const thWeak   = !theirProf.byPos[pos]?.[0] || theirProf.byPos[pos][0].tier >= 4;
    const thSurplus= thElites >= 2 || (theirProf.byPos[pos]||[]).length >= 4;
    const mySurplus= myElites >= 2 || (myProf.byPos[pos]||[]).length >= 4;

    if (myWeak && thSurplus) {
      score += 15; reasons.push(`I need ${pos} — they have depth`); targetTypes.push(`${pos} upgrade`);
    } else if (mySurplus && thWeak) {
      score += 8; reasons.push(`I can trade ${pos} surplus they need`);
    }
  });

  const myPicks = myProf.pickValue, thPicks = theirProf.pickValue;
  if (myPicks > 25000 && thPicks < 8000) {
    score += 15; reasons.push('I have pick capital they lack'); targetTypes.push('Pick-to-player move');
  } else if (thPicks > 25000 && myPicks < 8000) {
    score += 15; reasons.push('They have pick capital I can target'); targetTypes.push('Player-to-pick move');
  }

  const ageDiff = Math.abs(myProf.weightedAge - theirProf.weightedAge);
  if (ageDiff > 3) {
    score += 10; reasons.push(`Age window gap (${myProf.weightedAge} vs ${theirProf.weightedAge}) — deal opportunity`);
  }

  return { score: Math.min(100, score), reasons: reasons.slice(0,4), targetTypes: [...new Set(targetTypes)].slice(0,3) };
}

function renderTradePartners(myRosterId, profiles) {
  if (!myRosterId || !profiles || !profiles.length) return '';
  const myProf = profiles.find(p => p.rosterId === parseInt(myRosterId));
  if (!myProf) return '';
  const scored = profiles
    .filter(p => p.rosterId !== parseInt(myRosterId))
    .map(p => ({ ...mveTradePartnerScore(myProf, p), teamName: p.teamName, classification: p.classification, rosterId: p.rosterId }))
    .sort((a,b) => b.score - a.score)
    .slice(0, 3);
  if (!scored.length) return '';

  let html = `<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
    <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Best Trade Partners for ${myProf.teamName}</div>`;
  scored.forEach((p, i) => {
    const cl = p.classification || {};
    const targHtml = p.targetTypes.length
      ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${p.targetTypes.map(t=>`<span style="font-size:.62rem;background:rgba(88,166,255,.1);color:var(--accent);border-radius:3px;padding:1px 5px">${t}</span>`).join('')}</div>` : '';
    const rsns = p.reasons.slice(0,2).map(r=>`<div style="font-size:.67rem;color:var(--muted);margin-top:2px">· ${r}</div>`).join('');
    html += `<div class="partner-card">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:.7rem;font-weight:700;color:var(--muted);width:18px">#${i+1}</span>
        <span style="font-size:.82rem;font-weight:700;color:var(--text);flex:1">${p.teamName}</span>
        <span class="archetype-badge" style="background:${cl.bg||'var(--surface2)'};color:${cl.color||'var(--muted)'};font-size:.6rem">${cl.label||''}</span>
        <span style="font-size:.78rem;font-weight:700;color:var(--accent)">${p.score}</span>
      </div>
      <div class="partner-score-track"><div class="partner-score-fill" style="width:${p.score}%"></div></div>
      ${rsns}${targHtml}
    </div>`;
  });
  html += `</div>`;
  return html;
}
