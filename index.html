          <span style="display:inline-block;margin-top:3px;padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:700;background:rgba(255,255,255,.06);color:${label.c}">${label.t}</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="po-mini-stat"><div class="po-mini-label">Appearances</div><div class="po-mini-val">${m.app}</div></div>
        <div class="po-mini-stat"><div class="po-mini-label">Titles</div><div class="po-mini-val" style="color:${m.titles>0?'var(--yellow)':'var(--text)'}">${m.titles}</div></div>
        <div class="po-mini-stat"><div class="po-mini-label">W-L</div><div class="po-mini-val">${m.w}-${m.l}</div></div>
        <div class="po-mini-stat"><div class="po-mini-label">Win %</div><div class="po-mini-val" style="color:var(--accent)">${wPct}</div></div>
      </div>
      <div style="font-size:.72rem;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap">
        <span>Finals: <strong style="color:var(--text)">${m.finals}</strong></span>
        <span>Avg PPG: <strong style="color:var(--text)">${ppg}</strong></span>
        ${bestFinish?`<span>Best: <strong style="color:var(--text)">${poOrd(bestFinish)}</strong></span>`:''}
      </div>
    </div>`;
  }).join('');
  return `<div class="section"><div class="section-title">👤 Manager Playoff Profiles <span class="section-note">All-time · sorted by titles</span></div><div class="po-profile-grid">${cards}</div></div>`;
}

// ── Section 3: League Records ─────────────────────────────────
function poLeagueRecords(allScores, seasons) {
  if (!allScores.length) return '';
  const validPts = allScores.filter(s=>s.pts>0);
  if (!validPts.length) return '';
  const highest    = validPts.slice().sort((a,b)=>b.pts-a.pts)[0];
  const lowest     = validPts.slice().sort((a,b)=>a.pts-b.pts)[0];
  const biggestW   = validPts.filter(s=>s.isWin).slice().sort((a,b)=>(b.pts-b.oppPts)-(a.pts-a.oppPts))[0];
  const closestG   = validPts.filter(s=>s.isWin&&s.oppPts>0).slice().sort((a,b)=>Math.abs(a.pts-a.oppPts)-Math.abs(b.pts-b.oppPts))[0];
  const champScores= validPts.filter(s=>s.isFinal);
  const highestF   = champScores.length ? champScores.slice().sort((a,b)=>b.pts-a.pts)[0] : null;
  const clutch     = validPts.filter(s=>s.isWin&&s.pts>0); // highest winning score
  const rec = (label,val,sub) => `<div class="po-record-card"><div class="po-record-label">${label}</div><div class="po-record-val">${val}</div><div class="po-record-sub">${sub}</div></div>`;
  let html = `<div class="po-records-grid">`;
  if (highest)  html+=rec('Highest Playoff Score',highest.pts.toFixed(2),`${highest.teamName} · ${highest.season} R${highest.round}`);
  if (lowest)   html+=rec('Lowest Playoff Score',lowest.pts.toFixed(2),`${lowest.teamName} · ${lowest.season} R${lowest.round}`);
  if (biggestW) html+=rec('Biggest Blowout',`+${(biggestW.pts-biggestW.oppPts).toFixed(2)} pts`,`${biggestW.teamName} · ${biggestW.season}`);
  if (closestG) html+=rec('Closest Playoff Game',`${(closestG.pts-closestG.oppPts).toFixed(2)} margin`,`${closestG.teamName} def. · ${closestG.season}`);
  if (highestF) html+=rec('Best Championship Score',highestF.pts.toFixed(2),`${highestF.teamName} · ${highestF.season}`);
  html+=`</div>`;
  return `<div class="section"><div class="section-title">📊 League Playoff Records</div>${html}</div>`;
}

// ── Section 4: Bracket History ────────────────────────────────
function poBracketHistory(seasons) {
  if (!seasons.length) return '';
  const roundLabel = r => r===1?'Round 1':r===2?'Semis':'Championship';
  const seasonBlocks = seasons.map(s => {
    const rounds = [...new Set(s.bracket.map(b=>b.r))].sort((a,b)=>a-b);
    const cols = rounds.map(r => {
      const matchups = s.bracket.filter(b=>b.r===r && b.w && b.l).sort((a,b)=>a.m-b.m);
      const rm = s.rosterMap;
      const cards = matchups.map(b => {
        const sc   = poMatchScore({matchupsByWeek:s.matchupsByWeek,playoffWeekStart:s.playoffWeekStart},r);
        const wsc  = sc[b.w]||0, lsc = sc[b.l]||0;
        const wName= rm[b.w]?.teamName||'Team '+b.w;
        const lName= rm[b.l]?.teamName||'Team '+b.l;
        const isF  = r===s.maxRound&&b.m===1;
        const icon = isF?'🏆 ':'';
        return `<div class="bracket-match" style="${isF?'border-color:rgba(210,153,34,.4)':''}">
          <div class="bracket-team w"><span>${icon}${wName}</span><span class="bracket-pts w">${wsc?wsc.toFixed(1):'—'}</span></div>
          <div class="bracket-team l"><span>${lName}</span><span class="bracket-pts l">${lsc?lsc.toFixed(1):'—'}</span></div>
        </div>`;
      }).join('');
      return `<div><div class="bracket-round-label">${roundLabel(r)}</div>${cards}</div>`;
    }).join('');
    return `<div class="section" style="margin-bottom:18px">
      <div class="po-season-header"><span style="color:var(--yellow)">🏆 ${s.season} Playoffs</span><span style="font-size:.72rem;color:var(--muted);font-weight:400">${s.champion?.teamName} won the championship</span></div>
      <div class="bracket-wrap">${cols}</div>
    </div>`;
  }).join('');
  return `<div class="section"><div class="section-title">📋 Bracket History</div>${seasonBlocks}</div>`;
}

// ── Section 5: What Wins This League ─────────────────────────
function poWhatWins(seasons, managers, allScores) {
  if (!seasons.length) return '';
  // Average winning seed (did top seeds / bye teams win?)
  const byeWins  = seasons.filter(s=>s.champHadBye).length;
  const byePct   = seasons.length ? Math.round(byeWins/seasons.length*100) : 0;
  // Average champion regular season PPG
  const avgChampPPG = seasons.filter(s=>s.champRegPPG>0).reduce((s,c)=>s+c.champRegPPG,0) / (seasons.filter(s=>s.champRegPPG>0).length||1);
  // Clutch: playoff PPG vs regular season PPG for champions
  const champPPGs = seasons.filter(s=>s.champScore>0).map(s => {
    const pSt = s.pStats[s.champion?.rosterId];
    const plPPG = pSt && pSt.gp > 0 ? pSt.pts / pSt.gp : 0;
    return plPPG > 0 && s.champRegPPG > 0 ? plPPG / s.champRegPPG : null;
  }).filter(Boolean);
  const avgClutch = champPPGs.length ? champPPGs.reduce((a,b)=>a+b,0)/champPPGs.length : null;
  // Highest final scores
  const finalScores = allScores.filter(s=>s.isFinal&&s.pts>0);
  const avgFinalScore = finalScores.length ? finalScores.reduce((a,b)=>a+b.pts,0)/finalScores.length : 0;
  // Back-to-back appearances
  const managersWithRepeats = managers.filter(m => {
    const sortedSeasons = m.seasons.map(s=>s.season).sort();
    for (let i=1;i<sortedSeasons.length;i++) if(sortedSeasons[i]-sortedSeasons[i-1]===1) return true;
    return false;
  });
  // Most common finalist
  const finalistMap = {};
  managers.forEach(m=>{ if(m.finals>0) finalistMap[m.teamNames[m.teamNames.length-1]]=(finalistMap[m.teamNames[m.teamNames.length-1]]||0)+m.finals; });
  const topFinalist = Object.entries(finalistMap).sort((a,b)=>b[1]-a[1])[0];
  const wc = (label,val,sub) => `<div class="what-wins-card"><div class="what-wins-label">${label}</div><div class="what-wins-val">${val}</div><div class="what-wins-sub">${sub}</div></div>`;
  let cards = `<div class="what-wins-grid">`;
  cards += wc('Top Seeds Win',`${byePct}%`,`${byeWins} of ${seasons.length} champs had a first-round bye`);
  if (avgChampPPG>0) cards += wc('Champ Reg Season PPG',avgChampPPG.toFixed(1),'Average regular-season scoring of champions');
  if (avgFinalScore>0) cards += wc('Avg Championship Score',avgFinalScore.toFixed(1),'Points in the title game on average');
  if (avgClutch) cards += wc('Playoff Clutch Factor',avgClutch.toFixed(2)+'×',`Champions avg ${((avgClutch-1)*100).toFixed(0)}% ${avgClutch>=1?'more':'less'} in playoffs vs reg season`);
  if (managersWithRepeats.length) cards += wc('Repeat Contenders',managersWithRepeats.length,`Managers with back-to-back playoff appearances`);
  if (topFinalist) cards += wc('Most Finals Appearances',topFinalist[0],`${topFinalist[1]} championship game${topFinalist[1]!==1?'s':''}`);
  cards += `</div>`;
  // Narrative summary
  const dominant = byePct >= 70 ? 'Top seeds dominate — having a first-round bye is a massive advantage in this league.' : byePct <= 30 ? 'Lower seeds punch through regularly — the bye week is not a reliable edge here.' : 'The field is competitive — top seeds win often but upsets are common.';
  const repeatability = managersWithRepeats.length >= managers.length * 0.5 ? 'Most contenders make it back year over year — consistent rosters define the league.' : 'The playoff field rotates frequently — sustained contention is hard to maintain.';
  return `<div class="section"><div class="section-title">💡 What Wins This League <span class="section-note">Synthesized from ${seasons.length} seasons</span></div>
    ${cards}
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px">
      <div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Key Takeaways</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="font-size:.83rem;color:var(--text)">→ ${dominant}</div>
        <div style="font-size:.83rem;color:var(--text)">→ ${repeatability}</div>
        ${avgClutch?`<div style="font-size:.83rem;color:var(--text)">→ Championship teams score ${avgClutch>=1?`<strong style="color:var(--green)">${((avgClutch-1)*100).toFixed(0)}% above</strong>`:`<strong style="color:var(--red)">${((1-avgClutch)*100).toFixed(0)}% below</strong>`} their regular-season average in the playoffs.</div>`:''}
      </div>
    </div>
  </div>`;
}

// ── MARKET TRENDS TAB ────────────────────────────────────────
let trendsState = { adds: null, drops: null, lookback: 24, pos: 'ALL', loaded: false };

async function renderTrendsTab() {
  const el = document.getElementById('trends-content');
  if (!el) return;
  if (!S.currentLeagueId) {
    el.innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">Load a league first.</p>';
    return;
  }
  if (!S.fcValues.length) {
    el.innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">FantasyCalc values not loaded yet.</p>';
    return;
  }
  el.innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner"></div><p style="color:var(--muted);margin-top:12px">Fetching market data…</p></div>';
  try {
    const [addsRes, dropsRes] = await Promise.allSettled([
      fetch(`${BASE}/players/trending/nfl/add?lookback_hours=${trendsState.lookback}&limit=35`, { signal: AbortSignal.timeout(10000) }).then(r => r.ok ? r.json() : []),
      fetch(`${BASE}/players/trending/nfl/drop?lookback_hours=${trendsState.lookback}&limit=35`, { signal: AbortSignal.timeout(10000) }).then(r => r.ok ? r.json() : []),
    ]);
    trendsState.adds  = addsRes.status  === 'fulfilled' ? (addsRes.value  || []) : [];
    trendsState.drops = dropsRes.status === 'fulfilled' ? (dropsRes.value || []) : [];
    trendsState.loaded = true;
  } catch(e) {
    trendsState.adds = []; trendsState.drops = []; trendsState.loaded = true;
  }
  _renderTrendsContent(el);
}

function _renderTrendsContent(el) {
  if (!el) el = document.getElementById('trends-content');
  if (!el) return;
  const league = ld();
  const posColors = { QB:'#a371f7', RB:'#3fb950', WR:'#58a6ff', TE:'#fb8500' };
  const SKILL = new Set(['QB','RB','WR','TE']);

  // Build rostered set
  const rostered = new Set();
  Object.values(league.rosterMap).forEach(r => (r.players||[]).forEach(pid => rostered.add(String(pid))));

  // Enrich a trending entry
  function enrich(entry) {
    const pid = String(entry.player_id);
    const meta = S.playersMeta[pid];
    const fc   = S.fcBySleeperId[pid];
    if (!meta || !SKILL.has(meta.pos)) return null;
    if (trendsState.pos !== 'ALL' && meta.pos !== trendsState.pos) return null;
    return { pid, count: entry.count, name: meta.name, pos: meta.pos, team: meta.team || '', value: fc ? fc.value : 0, isFA: !rostered.has(pid) };
  }

  const adds  = (trendsState.adds  || []).map(enrich).filter(Boolean).slice(0,25);
  const drops = (trendsState.drops || []).map(enrich).filter(Boolean).slice(0,25);

  // FA Spotlight: FAs in the league above a value threshold
  const faSpot = Object.entries(S.playersMeta)
    .filter(([,m]) => SKILL.has(m.pos) && (trendsState.pos === 'ALL' || m.pos === trendsState.pos))
    .map(([pid, m]) => ({ pid, name: m.name, pos: m.pos, team: m.team||'', value: (S.fcBySleeperId[pid]||{}).value||0, isFA: !rostered.has(pid) }))
    .filter(p => p.isFA && p.value >= 1200)
    .sort((a,b) => b.value - a.value)
    .slice(0, 30);

  // Controls
  const lbBtns = [24,48,168].map(h => {
    const lbl = h===24?'24h':h===48?'48h':'7d';
    const on  = trendsState.lookback === h;
    return `<button onclick="setTrendsLookback(${h})" style="background:${on?'var(--accent)':'var(--surface2)'};color:${on?'#0d1117':'var(--muted)'};border:1px solid var(--border);border-radius:6px;padding:10px 16px;font-size:.8rem;cursor:pointer;font-weight:${on?700:400};min-height:44px;min-width:44px;touch-action:manipulation">${lbl}</button>`;
  }).join('');

  const posBtns = ['ALL','QB','RB','WR','TE'].map(p => {
    const on = trendsState.pos === p;
    const c  = posColors[p] || 'var(--accent)';
    return `<button onclick="setTrendsPos('${p}')" style="background:${on?'rgba(255,255,255,.07)':'var(--surface2)'};color:${on?c:'var(--muted)'};border:1px solid ${on?c:'var(--border)'};border-radius:20px;padding:10px 14px;font-size:.8rem;font-weight:600;cursor:pointer;min-height:44px;min-width:44px;touch-action:manipulation">${p}</button>`;
  }).join('');

  function playerRow(p, i, countLabel) {
    const pc = posColors[p.pos] || 'var(--muted)';
    const hs = `<img src="${HS_URL(p.pid)}" onerror="this.style.display='none'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface2)">`;
    const faBadge = p.isFA ? `<span style="background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3);border-radius:3px;font-size:.58rem;font-weight:700;padding:1px 4px">FA</span>` : '';
    const valColor = p.value > 6000 ? 'var(--green)' : p.value > 3000 ? 'var(--accent)' : 'var(--muted)';
    const countHtml = p.count != null
      ? `<span style="font-size:.72rem;color:${countLabel==='adds'?'var(--green)':'var(--red)'}">+${p.count.toLocaleString()}</span>`
      : '';
    return `<tr>
      <td style="padding:7px 10px;color:var(--muted);font-size:.72rem">${i+1}</td>
      <td style="padding:7px 4px">${hs}</td>
      <td style="padding:7px 10px">
        <div style="font-size:.82rem;font-weight:600;color:var(--text)">${p.name}</div>
        <div style="display:flex;align-items:center;gap:4px;margin-top:2px">
          <span style="font-size:.62rem;font-weight:700;color:${pc};background:rgba(255,255,255,.06);border-radius:3px;padding:1px 4px">${p.pos}</span>
          ${p.team ? `<span style="font-size:.62rem;color:var(--muted)">${p.team}</span>` : ''}
          ${faBadge}
        </div>
      </td>
      <td style="padding:7px 10px;font-size:.78rem;color:${valColor};font-weight:600;text-align:right">${p.value > 0 ? p.value.toLocaleString() : '—'}</td>
      <td style="padding:7px 10px;text-align:right">${countHtml}</td>
    </tr>`;
  }

  function tbl(title, rows, countLabel, noteHtml) {
    const body = rows.length ? rows.map((p,i) => playerRow(p,i,countLabel)).join('') : `<tr><td colspan="5" style="padding:20px;color:var(--muted);text-align:center">No data available</td></tr>`;
    return `<div class="section">
      <div class="section-title">${title}${noteHtml ? `<span class="section-note">${noteHtml}</span>` : ''}</div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>#</th><th></th><th>Player</th>
          <th style="text-align:right">Dynasty Val</th>
          <th style="text-align:right">${countLabel === 'adds' ? 'Adds' : countLabel === 'drops' ? 'Drops' : ''}</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table></div>
    </div>`;
  }

  const lbLabel = trendsState.lookback===24?'24h':trendsState.lookback===48?'48h':'7d';
  el.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px">
      <span style="font-size:.78rem;color:var(--muted)">Lookback:</span>
      <div style="display:flex;gap:4px">${lbBtns}</div>
      <div style="display:flex;gap:5px;margin-left:8px">${posBtns}</div>
      <span style="font-size:.72rem;color:var(--muted);flex-basis:100%;margin-top:2px">Data from Sleeper global trends · ${lbLabel} window</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      ${tbl('Trending Adds', adds, 'adds', 'most added across all Sleeper leagues')}
      ${tbl('Trending Drops', drops, 'drops', 'most dropped across all Sleeper leagues')}
    </div>
    ${tbl('Available FA Spotlight', faSpot, 'none', 'dynasty-relevant free agents in your league · sorted by value')}
  `;
}

function setTrendsLookback(h) {
  trendsState.lookback = h;
  trendsState.adds = null; trendsState.drops = null; trendsState.loaded = false;
  renderTrendsTab();
}

function setTrendsPos(p) {
  trendsState.pos = p;
  if (trendsState.loaded) _renderTrendsContent(document.getElementById('trends-content'));
  else renderTrendsTab();
}

// ── GLOBAL TOOLTIP (viewport-aware) ──────────────────────────
(function() {
  const tip = document.createElement('div');
  tip.id = 'global-tip';
  document.body.appendChild(tip);

  function show(el) {
    tip.textContent = el.dataset.tip;
    tip.style.display = 'block';
    const r   = el.getBoundingClientRect();
    const pad = 10, tw = 240;
    const th  = tip.offsetHeight;
    let left = r.left + r.width / 2 - tw / 2;
    left = Math.max(pad, Math.min(left, window.innerWidth - tw - pad));
    let top = r.top - th - 9;
    if (top < pad) top = r.bottom + 9;
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
  }

  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (el) show(el); else tip.style.display = 'none';
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('[data-tip]')) tip.style.display = 'none';
  });
  document.addEventListener('scroll', () => { tip.style.display = 'none'; }, true);
})();

  const tagStyles = {
    Sell:       'background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)',
    Shop:       'background:rgba(234,179,8,.15);color:#eab308;border:1px solid rgba(234,179,8,.3)',
    Cornerstone:'background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)',
    Buy:        'background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)',
    Speculative:'background:rgba(163,113,247,.15);color:#a371f7;border:1px solid rgba(163,113,247,.3)',
    Hold:       'background:rgba(139,148,158,.1);color:#8b949e;border:1px solid rgba(139,148,158,.2)',
  };

  const maxVal = Math.max(...prof.all.map(p => p.fcValue), 1);

  const av = prof.avatar
    ? `<img src="${AV_URL(prof.avatar)}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover">`
    : `<span style="font-size:1.8rem">🏠</span>`;

  const chips = [
    { label:'Total Val',   val: prof.totalValue.toLocaleString() },
    { label:'Starter Val', val: prof.starterValue.toLocaleString() },
    { label:'Wtd Age',     val: prof.weightedAge,
      style: prof.weightedAge<=25 ? 'color:var(--green)' : prof.weightedAge>=29.5 ? 'color:#ef4444' : 'color:var(--yellow)' },
    { label:'Pick Cap',    val: prof.pickValue.toLocaleString(), style:'color:var(--yellow)' },
  ].map(c => `<div class="rm-chip">
    <div class="rm-chip-label">${c.label}</div>
    <div class="rm-chip-val" style="${c.style||''}">${c.val}</div>
  </div>`).join('');

  let playerHtml = '';
  ['QB','RB','WR','TE'].forEach(pos => {
    const players = prof.byPos[pos];
    if (!players || !players.length) return;
    const pc = posColors[pos];

    const cards = players.map(p => {
      const barW  = Math.round(p.fcValue / maxVal * 100);
      const valColor = p.fcValue > 6000 ? 'var(--green)' : p.fcValue > 3000 ? 'var(--accent)' : p.fcValue > 1000 ? 'var(--yellow)' : 'var(--muted)';
      const tag   = p.actionTag
        ? `<span class="rm-tag" style="${tagStyles[p.actionTag]||tagStyles.Hold}">${p.actionTag}</span>` : '';
      const meta  = [p.team && p.team !== 'FA' ? p.team : null, p.age ? `Age ${p.age}` : ''].filter(Boolean).join(' · ');
      return `<div class="rm-player-card">
        <div class="rm-card-accent" style="background:${pc}"></div>
        <img class="rm-hs" src="${HS_URL(p.pid)}" onerror="imgFallback(this,'${pos}')" loading="lazy">
        <div class="rm-player-info">
          <div class="rm-player-name">${p.name}</div>
          <div class="rm-player-meta">${meta}</div>
          <div class="rm-val-bar-wrap"><div class="rm-val-bar" style="width:${barW}%;background:${pc}55"></div></div>
        </div>
        <div class="rm-player-right">
          <div class="rm-player-value" style="color:${valColor}">${p.fcValue > 0 ? p.fcValue.toLocaleString() : '—'}</div>
          ${tag}
        </div>
      </div>`;
    }).join('');

    playerHtml += `<div class="rm-pos-section">
      <div class="rm-pos-header">
        <span class="rm-pos-label" style="background:${hexA(pc,.13)};color:${pc};border:1px solid ${hexA(pc,.27)}">${pos}</span>
        <div class="rm-pos-divider"></div>
        <span style="font-size:.67rem;color:var(--muted)">${players.length} player${players.length>1?'s':''}</span>
      </div>
      <div class="rm-player-grid">${cards}</div>
    </div>`;
  });

  let picksHtml = '';
  if (prof.picks && prof.picks.length) {
    const rmN = Object.keys(league.rosterMap).length || 12;
    const pills = prof.picks.map(pk => {
      const rc  = pickRoundColor(pk.round);
      const knownSlot = pk.round === 1 && S.knownDraftSeason && String(pk.season) === String(S.knownDraftSeason)
        ? S.knownDraftSlots[String(pk.originalOwner)] : null;
      const label = knownSlot
        ? `1.${String(knownSlot).padStart(2,'0')}`
        : (['','1st','2nd','3rd','4th'][pk.round] || `Rd${pk.round}`);
      const val = knownSlot ? slotToPickValue(knownSlot, rmN, pk.season) : getPickValue(pk.season, pk.round, null);
      const via = pk.originalOwner !== prof.rosterId
        ? `<span style="color:var(--muted);font-size:.7rem">via ${rName(pk.originalOwner)}</span>` : '';
      return `<div class="rm-pick-pill">
        <span style="font-weight:800;color:${rc}">${label}</span>
        <span style="color:var(--muted)">'${pk.season.toString().slice(2)}</span>
        ${via}
        ${val > 0 ? `<span style="color:var(--yellow)">${val.toLocaleString()}</span>` : ''}
      </div>`;
    }).join('');
    picksHtml = `<div class="rm-pos-section">
      <div class="rm-pos-header">
        <span class="rm-pos-label" style="background:rgba(210,153,34,.12);color:#d29922;border:1px solid rgba(210,153,34,.3)">Draft Capital</span>
        <div class="rm-pos-divider"></div>
        <span style="font-size:.67rem;color:var(--yellow)">${prof.pickValue.toLocaleString()} total</span>
      </div>
      <div class="rm-picks-grid">${pills}</div>
    </div>`;
  }

  document.getElementById('roster-modal-content').innerHTML = `
    <div class="rm-header">
      <div class="rm-hero">
        <div class="rm-avatar-wrap">${av}</div>
        <div class="rm-title-block">
          <div class="rm-team-name">${prof.teamName}</div>
          <div style="margin-top:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="archetype-badge" style="background:${cl.bg};color:${cl.color};border:1px solid ${cl.border}">${cl.label}</span>
          </div>
        </div>
      </div>
      <div class="rm-stat-row">${chips}</div>
    </div>
    <div class="rm-body">${playerHtml}${picksHtml}</div>`;

  document.getElementById('roster-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeRosterModal() {
  document.getElementById('roster-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Restore saved league ID (overrides the hardcoded placeholder)
  const savedLeague = localStorage.getItem('fo_league_id');
  if (savedLeague) document.getElementById('leagueInput').value = savedLeague;

  const saved = localStorage.getItem('fo_tab');
  const validTabs = ['league','teams','players','trade','history'];
  if (saved && validTabs.includes(saved)) currentTab = saved;
  // Restore saved sub-tab selections
  Object.keys(subTabState).forEach(main => {
    let s = localStorage.getItem('fo_subtab_'+main);
    // Migrate legacy 'weekly' value to 'cards'
    if (main === 'players' && s === 'weekly') s = 'cards';
    if (s) {
      subTabState[main] = s;
      // Player Cards / Top N / Season Stats share the same panel
      const panelId = (main === 'players' && ['cards','topn','stats'].includes(s))
        ? 'sub-players-main' : 'sub-'+main+'-'+s;
      const panel = document.getElementById(panelId);
      const tabEl  = document.getElementById('tab-'+main);
      if (panel && tabEl) {
        tabEl.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
        panel.classList.add('active');
        tabEl.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b.dataset.sub === s));
      }
    }
  });
  document.getElementById('tab-'+currentTab).classList.add('active');
  document.querySelectorAll('#main-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  document.getElementById('loading').style.display = 'block';
  document.querySelectorAll('.tab-content').forEach(e => { e.style.display = 'none'; });
  initLoad();
});
</script>
</body>
</html>
