function runMveValidation(league) {
  if (!S.fcValues.length) return '<div class="warn-banner">FantasyCalc values required for validation.</div>';
  const results = [];
  function check(label, ok, note) { results.push({label, pass: ok?'pass':'fail', note}); }
  function warn(label,  ok, note) { results.push({label, pass: ok?'pass':'warn', note}); }

  // ── Top player sanity ─────────────────────────────────────────
  const topByPos = pos => S.fcValues.filter(fc=>fc.player&&fc.player.position===pos).sort((a,b)=>(b.value||0)-(a.value||0))[0];
  const topQB = topByPos('QB'), topRB = topByPos('RB'), topWR = topByPos('WR'), topTE = topByPos('TE');

  if (topQB) {
    const mv = mvePlayer(topQB.player.sleeperId, league);
    if (mv) {
      check(`Top QB (${mv.name}) is T1 or T2`, mv.tier <= 2, `Tier ${mv.tier}`);
      check(`Top QB injury shield holds (riskScore ≤ 18%)`, mv.riskScore <= 0.18, `${(mv.riskScore*100).toFixed(0)}%`);
      check(`Top QB MVE ≥ 90% of FC base`, mv.neutral >= topQB.value*0.9, `MVE ${mv.neutral.toLocaleString()} / FC ${topQB.value.toLocaleString()}`);
    }
  }
  if (topRB) {
    const mv = mvePlayer(topRB.player.sleeperId, league);
    if (mv) {
      check(`Top RB (${mv.name}) is T1 or T2`, mv.tier <= 2, `Tier ${mv.tier}`);
      warn(`Top RB age ${mv.age} — sell signal fires at 30`, parseInt(mv.age||0) < 31, `Age: ${mv.age}, tag: ${mv.actionTag}`);
    }
  }
  if (topWR) {
    const mv = mvePlayer(topWR.player.sleeperId, league);
    if (mv) {
      check(`Top WR (${mv.name}) is T1 or T2`, mv.tier <= 2, `Tier ${mv.tier}`);
      if (parseInt(mv.age||99) <= 23)
        warn(`Young WR (${mv.name}) rebuilder lens ≥ contender lens`, mv.rebuilderValue >= mv.contenderValue*0.95, `R:${mv.rebuilderValue.toLocaleString()} C:${mv.contenderValue.toLocaleString()}`);
    }
  }
  if (topTE) {
    const mv = mvePlayer(topTE.player.sleeperId, league);
    if (mv) {
      check(`Top TE (${mv.name}) is T1 or T2`, mv.tier <= 2, `Tier ${mv.tier}`);
      const isTEP = ((league.league.scoring_settings)||{}).bonus_rec_te > 0;
      if (isTEP) warn(`TE premium applied in TEP format`, mv.neutral > topTE.value, `MVE ${mv.neutral.toLocaleString()} vs FC ${topTE.value.toLocaleString()}`);
    }
  }

  // ── Pick valuation checks ─────────────────────────────────────
  const hasPicks = Object.keys(S.fcPickValues).length > 0;
  warn('FC pick RDP data loaded', hasPicks, hasPicks ? 'FantasyCalc RDP values present' : 'Using tier defaults only');
  if (hasPicks) {
    const yrs = Object.keys(S.fcPickValues).sort();
    const yr = yrs[yrs.length-1];
    const p1mid = S.fcPickValues[yr]?.[1]?.mid || 0;
    const p1early= S.fcPickValues[yr]?.[1]?.early || 0;
    const p2    = S.fcPickValues[yr]?.[2] || 0;
    check('1st round early > mid impossible to have mid > early', p1early === 0 || p1early >= p1mid*0.7, `early:${p1early} mid:${p1mid}`);
    check('1st round > 2nd round', p1mid > p2, `1st mid: ${p1mid.toLocaleString()} 2nd: ${p2.toLocaleString()}`);
    if (p1mid > 0 && p2 > 0) warn('1st/2nd pick ratio 1.5–4x', p1mid/p2>=1.5&&p1mid/p2<=4, `${(p1mid/p2).toFixed(2)}x`);
  }

  // ── Classification sanity ─────────────────────────────────────
  const rawProfs  = Object.keys(league.rosterMap).map(rid=>mveTeamProfile(rid,league)).filter(Boolean);
  const classified= mveClassifyTeams(rawProfs);
  const n = classified.length;
  const nCont   = classified.filter(p=>p.classification.label==='Contender').length;
  const nFringe = classified.filter(p=>p.classification.label==='Fringe').length;
  const nRebuild= classified.filter(p=>p.classification.label.includes('Rebuild')).length;
  const nMiddle = classified.filter(p=>p.classification.label==='Mid-Tier').length;

  check(`${n} teams classified`, n > 0, `${n} teams in league`);
  warn(`Contenders (${nCont}) ≤ ${Math.ceil(n*CLASS_THRESHOLDS.maxContenderFraction)}`, nCont <= Math.ceil(n*CLASS_THRESHOLDS.maxContenderFraction), `${nCont} of ${n}`);
  warn(`C+Fringe (${nCont+nFringe}) ≤ ${Math.ceil(n*CLASS_THRESHOLDS.maxTopTierFraction)}`, (nCont+nFringe) <= Math.ceil(n*CLASS_THRESHOLDS.maxTopTierFraction), `${nCont+nFringe} of ${n}`);
  warn(`At least 1 Rebuild team`, nRebuild >= 1, `${nRebuild} rebuild teams`);
  warn(`Distribution spread (has Middle or Retool)`, nMiddle > 0 || classified.some(p=>p.classification.label==='Retool'), `Middle: ${nMiddle}`);

  const bottom = [...classified].sort((a,b)=>a.starterValue-b.starterValue)[0];
  check('Bottom starter-value team not labeled Contender/Fringe',
    !['Contender','Fringe'].includes(bottom?.classification?.label||''),
    `${bottom?.teamName}: ${bottom?.classification?.label}`);

  const top = classified.find(p=>p.classification.label==='Contender') ||
              [...classified].sort((a,b)=>b.starterValue-a.starterValue)[0];
  check('Top team has at least 1 T1/T2 player', (top?.classification?.numElites||0)>=1, `${top?.teamName}: ${top?.classification?.numElites||0} elites`);

  // ── Build report table ────────────────────────────────────────
  const passed = results.filter(r=>r.pass==='pass').length;
  const warned = results.filter(r=>r.pass==='warn').length;
  const failed = results.filter(r=>r.pass==='fail').length;

  let html = `<div class="section-title" style="margin-bottom:10px">MVE Validation Report
    <span class="section-note"><span style="color:var(--green)">${passed} pass</span> · <span style="color:var(--yellow)">${warned} warn</span> · <span style="color:var(--red)">${failed} fail</span></span>
  </div>
  <div class="table-wrap"><table class="val-table">
    <thead><tr><th>Check</th><th>Status</th><th>Detail</th></tr></thead><tbody>`;
  results.forEach(r => {
    const cls = r.pass==='pass'?'val-pass':r.pass==='warn'?'val-warn':'val-fail';
    const icon= r.pass==='pass'?'✓':r.pass==='warn'?'⚠':'✗';
    html += `<tr><td>${r.label}</td><td class="${cls}">${icon}</td><td style="color:var(--muted)">${r.note}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

// ── RENDER ALL ────────────────────────────────────────────────
// ── SCREENSHOT / CAPTURE ──────────────────────────────────────
// Off-screen clone strategy: clone only the target section, render it in a
// hidden fixed container at desktop width, capture with html2canvas.
// No viewport constraints, no overlays, no popups. Identical on mobile + desktop.

// ── Download or share a PNG blob ──────────────────────────────
async function shareOrDownloadBlob(blob, filename) {
  const onMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (onMobile && navigator.canShare) {
    const file = new File([blob], filename, { type: 'image/png' });
    if (navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Front Office' });
      return;
    }
  }
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { download: filename, href: url });
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

// ── Core capture: clone → off-screen container → html2canvas → PNG ──
async function captureSectionAsPng(el, label) {
  if (typeof html2canvas === 'undefined') throw new Error('html2canvas not loaded');

  const clone = el.cloneNode(true);

  // Copy live Chart.js canvases → inline data: URL images in the clone
  const liveCanvases = Array.from(el.querySelectorAll('canvas'));
  Array.from(clone.querySelectorAll('canvas')).forEach((dst, i) => {
    const src = liveCanvases[i];
    if (!src) return;
    try {
      const img = document.createElement('img');
      img.src = src.toDataURL('image/png');
      img.style.cssText = `width:100%;max-width:${src.width}px;height:auto;display:block`;
      dst.parentNode.replaceChild(img, dst);
    } catch(e) {}
  });

  // Strip UI chrome — buttons, tooltips, overlays
  clone.querySelectorAll(
    '.capture-btn, .chart-share-btn, .tip, .fc-hide-btn, [data-ignore-capture], .no-capture'
  ).forEach(n => n.remove());

  // Neutralize sticky positioning — sticky cells reference viewport coords,
  // so in an off-screen container they jump to the wrong position
  clone.querySelectorAll('*').forEach(node => {
    const s = node.style;
    if (s.position === 'sticky' || s.position === '-webkit-sticky') {
      s.position = 'relative';
      s.left = ''; s.top = ''; s.right = ''; s.bottom = '';
    }
  });

  // Force table wrappers to show full content without scroll clipping
  clone.querySelectorAll('.table-wrap').forEach(tw => {
    tw.style.overflow = 'visible';
    tw.style.width    = 'auto';
    tw.style.maxWidth = 'none';
  });

  // html2canvas clips child backgrounds when a parent has overflow:hidden +
  // border-radius — badges inside franchise cards go invisible in PNGs.
  clone.querySelectorAll('.franchise-card').forEach(card => {
    card.style.overflow = 'visible';
  });

  // html2canvas renders inset box-shadows as banded overlays on pills,
  // producing a "darker middle / lighter ends" effect — strip them on the clone.
  clone.querySelectorAll('.tier-badge,.archetype-badge,.rank-pill,.rc-pos-pill,.rm-pos-label,.pick-badge').forEach(el => {
    el.style.boxShadow = 'none';
  });

  // Off-screen fixed container — bypasses all mobile viewport constraints.
  // Use absolute (not fixed) so sticky children don't reference the viewport.
  const container = document.createElement('div');
  container.style.cssText = [
    'position:absolute', 'left:-9999px', 'top:0',
    'width:max-content', 'min-width:1400px',
    'background:#0d1117', 'padding:16px',
    'box-sizing:border-box', 'overflow:visible', 'z-index:-1'
  ].join(';');
  container.appendChild(clone);
  document.body.appendChild(container);

  // One rAF so the browser lays out the clone before we measure
  await new Promise(r => requestAnimationFrame(r));
  const w = Math.max(container.scrollWidth, 1200);
  const h = container.scrollHeight;
  container.style.width = w + 'px';

  try {
    const canvas = await Promise.race([
      html2canvas(container, {
        backgroundColor: '#0d1117',
        scale: 2,
        useCORS: false,
        logging: false,
        width: w,
        height: h,
        // Skip all <img> elements — external avatars have no CORS headers and cause hangs
        ignoreElements: node => node.tagName === 'IMG'
      }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000))
    ]);
    const ts = new Date().toISOString().slice(0, 10);
    const slug = (label || 'section').replace(/[^a-z0-9]/gi, '-').toLowerCase();
    const blob = await new Promise((res, rej) =>
      canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob')), 'image/png')
    );
    await shareOrDownloadBlob(blob, `dynasty-${slug}-${ts}.png`);
  } finally {
    document.body.removeChild(container);
  }
}

// ── Share a Chart.js canvas directly as a PNG ─────────────────
async function shareChart(btn) {
  const wrap = btn.closest('.chart-wrap');
  if (!wrap) return;
  const canvas = wrap.querySelector('canvas');
  if (!canvas) return;
  const orig = btn.textContent;
  btn.textContent = '⏳'; btn.disabled = true;
  try {
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    await shareOrDownloadBlob(blob, `dynasty-chart-${new Date().toISOString().slice(0,10)}.png`);
  } catch(e) { if (e.name !== 'AbortError') alert('Share failed: ' + e.message); }
  finally { btn.textContent = orig; btn.disabled = false; }
}

// ── Section capture button handler ────────────────────────────
async function captureSection(btn) {
  const section = btn.closest('.section') || btn.closest('.section-title')?.parentElement;
  if (!section) return;
  const orig = btn.textContent;
  btn.textContent = '⏳'; btn.disabled = true;
  const label = btn.dataset.label || 'section';
  try {
    await captureSectionAsPng(section, label);
  } catch(e) {
    if (e.name !== 'AbortError') alert('Screenshot failed — please try again.');
  } finally { btn.textContent = orig; btn.disabled = false; }
}

function toggleFranchiseCard(rosterId, btn) {
  const card = document.getElementById('fc-card-' + rosterId);
  if (!card) return;
  const grid = document.getElementById('franchise-grid');
  const isHiding = !card.classList.contains('fc-hidden');
  card.classList.toggle('fc-hidden', isHiding);

  // In non-screenshot-mode, show a ghost placeholder so layout doesn't jump
  const ghostId = 'fc-ghost-' + rosterId;
  let ghost = document.getElementById(ghostId);
  if (!grid.classList.contains('screenshot-mode')) {
    if (isHiding) {
      if (!ghost) {
        ghost = document.createElement('div');
        ghost.className = 'fc-ghost';
        ghost.id = ghostId;
        ghost.innerHTML = `<span>${card.querySelector('.franchise-card-name')?.textContent || 'Team'} — hidden</span>
          <button onclick="toggleFranchiseCard(${rosterId}, null)">Show</button>`;
        card.parentNode.insertBefore(ghost, card.nextSibling);
      }
      ghost.style.display = '';
    } else {
      if (ghost) ghost.style.display = 'none';
    }
  } else {
    // In screenshot mode, no ghost — just hide/show cleanly
    if (ghost) ghost.style.display = 'none';
  }

  // Update the hide button state if passed
  if (btn) {
    btn.textContent = isHiding ? '👁' : '✕';
    btn.title = isHiding ? 'Show in screenshot' : 'Hide from screenshot';
    btn.classList.toggle('fc-hidden-toggle', isHiding);
  }
}

function toggleFranchiseScreenshotMode(btn) {
  const grid = document.getElementById('franchise-grid');
  if (!grid) return;
  const entering = !grid.classList.contains('screenshot-mode');
  grid.classList.toggle('screenshot-mode', entering);
  btn.textContent = entering ? '🖼 Exit Screenshot Mode' : '🖼 Screenshot Mode';
  btn.style.color = entering ? 'var(--accent)' : '';
  btn.style.borderColor = entering ? 'var(--accent)' : '';

  // Hide all ghost placeholders while in screenshot mode; restore on exit
  document.querySelectorAll('.fc-ghost').forEach(g => {
    g.style.display = entering ? 'none' : '';
  });
}

async function captureById(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const orig = btn.textContent;
  btn.textContent = '⏳'; btn.disabled = true;
  try {
    await captureSectionAsPng(el, id);
  } catch(e) {
    if (e.name !== 'AbortError') alert('Screenshot failed — please try again.');
  } finally { btn.textContent = orig; btn.disabled = false; }
}

// Inject a 📷 button into every .section-title that doesn't have one yet.
// Skips: titles inside a <details> element, titles with data-no-capture,
// and the Pick-by-Pick section (it adds its own button conditionally).
function addCaptureButtons() {
  document.querySelectorAll('.section-title').forEach(title => {
    if (title.querySelector('.capture-btn')) return;
    if (title.closest('details')) return;
    if (title.dataset.noCapture) return;
    const text = (title.childNodes[0]?.textContent || '').trim();
    if (text.startsWith('Pick-by-Pick')) return;
    const label = text.slice(0, 20) || 'section';
    const btn = document.createElement('button');
    btn.className = 'capture-btn';
    btn.textContent = '📸 Share';
    btn.title = 'Save section as image';
    btn.dataset.label = label.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    btn.onclick = () => captureSection(btn);
    title.appendChild(btn);
  });

  // Inject a 📊 Share button directly on each chart canvas wrap
  document.querySelectorAll('.chart-wrap').forEach(wrap => {
    if (wrap.querySelector('.chart-share-btn')) return;
    if (!wrap.querySelector('canvas')) return;
    const btn = document.createElement('button');
    btn.className = 'capture-btn chart-share-btn';
    btn.textContent = '📊 Share';
    btn.title = 'Share chart as PNG (full resolution)';
    btn.style.cssText = 'position:absolute;top:10px;right:10px;';
    btn.onclick = () => shareChart(btn);
    wrap.style.position = 'relative';
    wrap.appendChild(btn);
  });
}

// ── DRAFT HISTORY ─────────────────────────────────────────────
async function loadDraftHistory() {
  if (draftHistoryLoading) return;
  draftHistoryLoading = true;
  S.draftHistory = {};

  // Collect all known league IDs + walk back further through previous_league_id
  const allIds = [...S.seasonChain];
  let prevId = S.leagues[S.seasonChain[S.seasonChain.length - 1]]?.league?.previous_league_id;
  let steps = 0;
  while (prevId && steps < 6) {
    steps++;
    if (allIds.includes(prevId)) break;
    allIds.push(prevId);
    try {
      const lg = await fetch(`${BASE}/league/${prevId}`).then(r => r.ok ? r.json() : null);
      if (!lg) break;
      if (!S.leagues[prevId]) {
        const [users, rosters] = await Promise.all([
          fetch(`${BASE}/league/${prevId}/users`).then(r => r.ok ? r.json() : []).catch(() => []),
          fetch(`${BASE}/league/${prevId}/rosters`).then(r => r.ok ? r.json() : []).catch(() => []),
        ]);
        const userMap = {};
        (users || []).forEach(u => {
          userMap[u.user_id] = { teamName: (u.metadata && u.metadata.team_name) || u.display_name, displayName: u.display_name, avatar: u.avatar };
        });
        const rosterMap = {};
        (rosters || []).forEach(r => {
          const u = userMap[r.owner_id] || {};
          rosterMap[r.roster_id] = { rosterId: r.roster_id, ownerId: r.owner_id, teamName: u.teamName || ('Team ' + r.roster_id), displayName: u.displayName || '' };
        });
        S.leagues[prevId] = { id: prevId, league: lg, rosterMap, userMap, season: lg.season, completedWeeks: [] };
      }
      prevId = lg.previous_league_id;
    } catch(e) { break; }
  }

  // Fetch drafts + picks for every known league
  for (const lgId of allIds) {
    try {
      const drafts = await fetch(`${BASE}/league/${lgId}/drafts`).then(r => r.ok ? r.json() : []).catch(() => []);
      const done = (drafts || []).filter(d => d.status === 'complete');
      if (!done.length) continue;
      const lg = S.leagues[lgId];
      const season = lg?.league?.season || lgId;
      let allPicks = [];
      for (const draft of done) {
        const picks = await fetch(`${BASE}/draft/${draft.draft_id}/picks`).then(r => r.ok ? r.json() : []).catch(() => []);
        allPicks.push(...(picks || []).map(p => ({ ...p, draftId: draft.draft_id })));
      }
      S.draftHistory[lgId] = { season, leagueId: lgId, rosterMap: lg?.rosterMap || {}, picks: allPicks };
    } catch(e) { console.warn('Draft history fetch failed for', lgId, e); }
  }
  draftHistoryLoaded  = true;
  draftHistoryLoading = false;
}

function ensureDraftHistory() {
  if (draftHistoryLoaded) return Promise.resolve();
  if (!draftHistoryPromise) draftHistoryPromise = loadDraftHistory();
  return draftHistoryPromise;
}

function renderDraftHistory() {
  const el = document.getElementById('draft-history-content');
  if (!el) return;
  if (!S.currentLeagueId) { el.innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">Load a league first.</p>'; return; }

  if (!draftHistoryLoaded) {
    el.innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner"></div><p style="color:var(--muted);margin-top:12px">Loading draft history…</p></div>';
    ensureDraftHistory().then(() => renderDraftHistory());
    return;
  }

  const seasons = Object.keys(S.draftHistory).sort((a, b) => parseInt(S.draftHistory[b].season) - parseInt(S.draftHistory[a].season));
  if (!seasons.length) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">No completed drafts found in this league\'s history.</p>';
    return;
  }

  const selSeason = (() => { const v = document.getElementById('dh-season-sel')?.value; return (v && S.draftHistory[v]) ? v : seasons[0]; })();
  const selTeam   = document.getElementById('dh-team-sel')?.value || 'ALL';
  const dhData    = S.draftHistory[selSeason];
  const { picks, rosterMap } = dhData;

  // Grade each pick against expected value for its slot (exponential decay curve)
  const totalPicks = picks.length;
  const graded = picks.map(p => {
    const pickNo = p.pick_no || 1;
    const pct    = (pickNo - 1) / Math.max(totalPicks - 1, 1);
    const expected = Math.max(400, Math.round(6800 * Math.exp(-2.5 * pct)));
    const fc     = S.fcBySleeperId[String(p.player_id)];
    const value  = fc ? fc.value : 0;
    const realizationPct = value ? Math.round((value / expected) * 100) : null;
    let grade, gradeColor, gradeLabel, letterGrade;
    if (!value) {
      grade = 'na';      gradeColor = 'var(--muted)'; gradeLabel = 'N/A';           letterGrade = '—';
    } else if (realizationPct >= 140) {
      grade = 'elite';   gradeColor = '#ffd700';       gradeLabel = '⭐ Elite Hit';  letterGrade = 'A';
    } else if (realizationPct >= 110) {
      grade = 'hit';     gradeColor = 'var(--green)';  gradeLabel = '✅ Hit';        letterGrade = 'B';
    } else if (realizationPct >= 80) {
      grade = 'neutral'; gradeColor = 'var(--muted)';  gradeLabel = '⚖️ Solid';     letterGrade = 'C';
    } else {
      grade = 'bust';    gradeColor = 'var(--red)';    gradeLabel = '❌ Bust';       letterGrade = 'D';
    }
    return { ...p, pickNo, value, expected, realizationPct, grade, gradeColor, gradeLabel, letterGrade };
  }).sort((a, b) => a.pickNo - b.pickNo);

  const filtered = selTeam === 'ALL' ? graded : graded.filter(p => String(p.roster_id) === selTeam);

  // Per-team stats (over the full draft, regardless of filter)
  const currentLd = S.leagues[S.currentLeagueId];
  const teamStats = {};
  graded.forEach(p => {
    const rid = String(p.roster_id);
    if (!teamStats[rid]) {
      const rm = rosterMap[p.roster_id] || {};
      let name = rm.teamName || ('Team ' + rid);
      // Prefer the owner's current team name if they're still in the league
      if (currentLd && rm.ownerId) {
        const cur = Object.values(currentLd.rosterMap).find(r => r.ownerId === rm.ownerId);
        if (cur) name = cur.teamName;
      }
      teamStats[rid] = { name, elite: 0, hit: 0, neutral: 0, bust: 0, na: 0, total: 0, totalValue: 0 };
    }
    teamStats[rid].total++;
    teamStats[rid][p.grade]++;
    if (p.value) teamStats[rid].totalValue += p.value;
  });

  // Relative/percentile letter grades — rank all teams by avg dynasty value per graded pick
  const teamScoreList = Object.entries(teamStats)
    .map(([rid, st]) => {
      const graded = st.total - st.na;
      return { rid, score: graded > 0 ? st.totalValue / graded : 0 };
    })
    .sort((a, b) => b.score - a.score);
  const nTeams = teamScoreList.length;
  const teamRankMap = {};
  teamScoreList.forEach((t, i) => { teamRankMap[t.rid] = i; });

  function teamLetterGrade(rid) {
    const st = teamStats[rid];
    if (!st) return '—';
    const graded = st.total - st.na;
    if (!graded) return '—';
    const rank = teamRankMap[rid] ?? (nTeams - 1);
    const pct = nTeams > 1 ? rank / (nTeams - 1) : 0; // 0 = best, 1 = worst
    if (pct < 0.15) return 'A+';
    if (pct < 0.35) return 'A';
    if (pct < 0.55) return 'B+';
    if (pct < 0.75) return 'B';
    if (pct < 0.90) return 'C';
    return 'D';
  }

  const gradeColors = { 'A+': '#3fb950', A: 'var(--green)', 'B+': '#58a6ff', B: 'var(--accent)', C: 'var(--yellow)', D: 'var(--orange)', F: 'var(--red)', '—': 'var(--muted)' };

  const reportCards = Object.entries(teamStats)
    .sort((a, b) => (teamRankMap[a[0]] ?? 999) - (teamRankMap[b[0]] ?? 999))
    .map(([rid, st]) => {
      const lg = teamLetterGrade(rid);
      const gc = gradeColors[lg] || 'var(--muted)';
      const gradedPicks = st.total - st.na;
      const elitePct = gradedPicks ? Math.round((st.elite / gradedPicks) * 100) : 0;
      const hitPct   = gradedPicks ? Math.round(((st.elite + st.hit) / gradedPicks) * 100) : 0;
      const avgVal   = st.total ? Math.round(st.totalValue / st.total) : 0;
      return `<div class="card" style="min-width:160px">
        <div class="card-label" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${st.name}</div>
        <div style="font-size:2rem;font-weight:800;color:${gc};line-height:1">${lg}</div>
        <div style="font-size:.68rem;color:var(--muted);margin-bottom:8px">${hitPct}% hit · ${elitePct}% elite</div>
        <div style="font-size:.7rem;color:var(--muted)">
          <span style="color:#ffd700">⭐ ${st.elite}</span> &nbsp;
          <span style="color:var(--green)">✅ ${st.hit}</span> &nbsp;
          <span style="color:var(--red)">❌ ${st.bust}</span>
        </div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:3px">Avg value: <strong style="color:var(--text)">${avgVal.toLocaleString()}</strong></div>
      </div>`;
    }).join('');

  const tableRows = filtered.map(p => {
    const meta = p.metadata || {};
    const name = meta.name || (meta.first_name ? `${meta.first_name} ${meta.last_name}` : `Player ${p.player_id}`);
    const pos  = meta.position || '?';
    const rm   = rosterMap[p.roster_id] || {};
    let teamName = rm.teamName || `Team ${p.roster_id}`;
    if (currentLd && rm.ownerId) {
      const cur = Object.values(currentLd.rosterMap).find(r => r.ownerId === rm.ownerId);
      if (cur) teamName = cur.teamName;
    }
    const val = p.value ? p.value.toLocaleString() : '—';
    return `<tr>
      <td class="bold">#${p.pickNo}</td>
      <td>${p.round}</td>
      <td style="display:flex;align-items:center;gap:8px;padding-top:8px;padding-bottom:8px">
        <img class="hs" src="${HS_URL(p.player_id)}" onerror="imgFallback(this,'${pos}')" style="width:28px;height:28px;flex-shrink:0">
        <span style="color:var(--text);font-weight:600">${name}</span>
      </td>
      <td><span class="pos-badge pos-${pos}">${pos}</span></td>
      <td style="color:var(--text)">${teamName}</td>
      <td style="color:var(--accent);font-weight:600">${val}</td>
      <td><span style="font-weight:700;color:${p.gradeColor}">${p.gradeLabel}</span>${p.realizationPct != null ? `<span style="font-size:.68rem;color:var(--muted);margin-left:5px">${p.realizationPct}%</span>` : ''}</td>
    </tr>`;
  }).join('');

  const seasonOptions = seasons.map(s => `<option value="${s}" ${s === selSeason ? 'selected' : ''}>${S.draftHistory[s].season} Season</option>`).join('');
  const teamOptions   = ['<option value="ALL">All Teams</option>',
    ...Object.entries(rosterMap).map(([rid, rm]) => {
      let name = rm.teamName || `Team ${rid}`;
      if (currentLd && rm.ownerId) { const cur = Object.values(currentLd.rosterMap).find(r => r.ownerId === rm.ownerId); if (cur) name = cur.teamName; }
      return `<option value="${rid}" ${rid === selTeam ? 'selected' : ''}>${name}</option>`;
    })
  ].join('');

  const ctrl = `style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 12px;font-size:.83rem"`;

  el.innerHTML = `
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px">
      <select id="dh-season-sel" ${ctrl} onchange="renderDraftHistory()">${seasonOptions}</select>
      <select id="dh-team-sel"   ${ctrl} onchange="renderDraftHistory()">${teamOptions}</select>
      <span style="font-size:.78rem;color:var(--muted)">${filtered.length} picks</span>
      <span style="font-size:.72rem;color:var(--muted);margin-left:auto">Grades based on current dynasty value vs. expected value at pick slot</span>
    </div>
    <div class="section">
      <div class="section-title">Draft Report Cards — ${dhData.season} Season</div>
      <div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(170px,1fr))">${reportCards}</div>
    </div>
    <div class="section">
      <div class="section-title">Pick-by-Pick Breakdown
        ${selTeam !== 'ALL' ? '' : '<span style="font-size:.7rem;color:var(--muted);margin-left:8px;font-weight:400">— select a team to enable screenshot</span>'}
        ${selTeam !== 'ALL' ? '<button class="capture-btn" onclick="captureSection(this)" data-label="draft-picks">📸 Share</button>' : ''}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;font-size:.72rem">
        <span style="padding:2px 8px;border-radius:4px;background:rgba(255,215,0,.15);color:#ffd700;font-weight:700">⭐ Elite Hit</span><span style="color:var(--muted)">≥ 140% of expected slot value</span>
        <span style="padding:2px 8px;border-radius:4px;background:rgba(63,185,80,.15);color:var(--green);font-weight:700">✅ Hit</span><span style="color:var(--muted)">≥ 110% of expected</span>
        <span style="padding:2px 8px;border-radius:4px;background:rgba(125,133,144,.15);color:var(--muted);font-weight:700">⚖️ Solid</span><span style="color:var(--muted)">80% – 110% of expected</span>
        <span style="padding:2px 8px;border-radius:4px;background:rgba(248,81,73,.15);color:var(--red);font-weight:700">❌ Bust</span><span style="color:var(--muted)">&lt; 80% of expected</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Pick</th><th>Rd</th><th>Player</th><th>Pos</th>
            <th>Drafted By</th><th>Dynasty Value</th><th>Grade</th>
          </tr></thead>
          <tbody>${tableRows || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">No picks found</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

// ── RENDER: DRAFT GRADES ─────────────────────────────────────
// Leaderboard + Classes views across all historical drafts.
// Value+ = sum of (currentValue - expectedAtSlot) / 100 for graded picks.
let _dgView = 'rankings';
let _dgSeason = 'all';

function renderDraftGrades() {
  const el = document.getElementById('draft-grades-content');
  if (!el) return;
  if (!S.currentLeagueId) { el.innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">Load a league first.</p>'; return; }

  if (!draftHistoryLoaded) {
    el.innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner"></div><p style="color:var(--muted);margin-top:12px">Loading draft history...</p></div>';
    ensureDraftHistory().then(() => renderDraftGrades());
    return;
  }

  const allSeasons = Object.keys(S.draftHistory).sort((a, b) => parseInt(S.draftHistory[b].season) - parseInt(S.draftHistory[a].season));
  if (!allSeasons.length) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">No completed drafts found.</p>';
    return;
  }

  const currentLd = S.leagues[S.currentLeagueId];

  function ownerName(ownerId, rosterMap) {
    if (currentLd) {
      const cur = Object.values(currentLd.rosterMap).find(r => r.ownerId === ownerId);
      if (cur) return cur.teamName;
    }
    const rm = Object.values(rosterMap).find(r => r.ownerId === ownerId);
    return rm ? (rm.teamName || 'Unknown') : 'Unknown';
  }

  function ownerAvatar(ownerId) {
    const r = Object.values(currentLd?.rosterMap || {}).find(r => r.ownerId === ownerId);
    return r?.avatar ? `<img src="https://sleepercdn.com/avatars/thumbs/${r.avatar}" onerror="this.style.display='none'" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0">` : '';
  }

  function gradePick(p, totalPicks) {
    const pickNo   = p.pick_no || 1;
    const pct      = (pickNo - 1) / Math.max(totalPicks - 1, 1);
    const expected = Math.max(400, Math.round(6800 * Math.exp(-2.5 * pct)));
    const fc       = S.fcBySleeperId[String(p.player_id)];
    const value    = fc ? fc.value : 0;
    if (!value) return null;
    const surplus = (value - expected) / 100;
    const name = p.metadata?.name || (p.metadata?.first_name ? `${p.metadata.first_name} ${p.metadata.last_name}` : `Player ${p.player_id}`);
    return { surplus, isHit: value >= expected * 1.5, isBust: value < expected * 0.4, value, expected, name, pickNo, player_id: p.player_id, position: p.metadata?.position || '?' };
  }

  const seasonKeys = _dgSeason === 'all' ? allSeasons : [_dgSeason];
  const ownerStats = {};

  for (const lgKey of seasonKeys) {
    const dhData = S.draftHistory[lgKey];
    if (!dhData) continue;
    const { picks, rosterMap } = dhData;
    for (const p of picks) {
      const rm  = rosterMap[p.roster_id] || {};
      const oid = rm.ownerId || String(p.roster_id);
      const gp  = gradePick(p, picks.length);
      if (!gp) continue;
      if (!ownerStats[oid]) ownerStats[oid] = { oid, name: ownerName(oid, rosterMap), picks: 0, surplus: 0, hits: 0, busts: 0, topPicks: [] };
      const st = ownerStats[oid];
      st.picks++; st.surplus += gp.surplus;
      if (gp.isHit)  st.hits++;
      if (gp.isBust) st.busts++;
      st.topPicks.push({ ...gp, season: dhData.season });
    }
  }

  const seasonStats = {};
  for (const lgKey of allSeasons) {
    const dhData = S.draftHistory[lgKey];
    if (!dhData) continue;
    const { picks, rosterMap } = dhData;
    const mgrs = {};
    for (const p of picks) {
      const rm  = rosterMap[p.roster_id] || {};
      const oid = rm.ownerId || String(p.roster_id);
      const gp  = gradePick(p, picks.length);
      if (!gp) continue;
      if (!mgrs[oid]) mgrs[oid] = { oid, name: ownerName(oid, rosterMap), picks: 0, surplus: 0, hits: 0, busts: 0, topPicks: [] };
      const m = mgrs[oid];
      m.picks++; m.surplus += gp.surplus;
      if (gp.isHit)  m.hits++;
      if (gp.isBust) m.busts++;
      m.topPicks.push(gp);
    }
    seasonStats[lgKey] = { season: dhData.season, managers: Object.values(mgrs).filter(m => m.picks > 0).sort((a, b) => b.surplus - a.surplus) };
  }

  const gradeColors = { 'A+': '#3fb950', A: 'var(--green)', B: '#58a6ff', C: 'var(--yellow)', D: 'var(--orange)', F: 'var(--red)' };
  function letterGrade(rank, total) {
    const p = total > 1 ? rank / (total - 1) : 0;
    if (p < 0.10) return 'A+';
    if (p < 0.30) return 'A';
    if (p < 0.55) return 'B';
    if (p < 0.75) return 'C';
    if (p < 0.90) return 'D';
    return 'F';
  }

  const ctrl = `style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px;font-size:.8rem"`;
  const seasonOpts = ['<option value="all">All-Time</option>', ...allSeasons.map(k => `<option value="${k}" ${k===_dgSeason?'selected':''}>${S.draftHistory[k].season} Season</option>`)].join('');

  function rankingsHtml() {
    const ranked = Object.values(ownerStats).sort((a, b) => b.surplus - a.surplus);
    const n = ranked.length;
    const thS = `style="font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;font-weight:600;white-space:nowrap"`;
    const rows = ranked.map((st, i) => {
      const lg  = letterGrade(i, n);
      const gc  = gradeColors[lg] || 'var(--muted)';
      const avg = st.picks ? st.surplus / st.picks : 0;
      const hitPct  = st.picks ? Math.round(st.hits  / st.picks * 100) : 0;
      const bustPct = st.picks ? Math.round(st.busts / st.picks * 100) : 0;
      const sc  = st.surplus >= 0 ? 'var(--green)' : 'var(--red)';
      const ac  = avg        >= 0 ? 'var(--green)' : 'var(--red)';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:10px 12px;color:var(--muted);font-size:.75rem">${i+1}</td>
        <td style="padding:10px 8px"><div style="display:flex;align-items:center;gap:8px">${ownerAvatar(st.oid)}<span style="font-weight:600;color:var(--text)">${st.name}</span></div></td>
        <td style="padding:10px 12px;font-size:.92rem;font-weight:800;color:${gc}">${lg}</td>
        <td style="padding:10px 12px;font-size:.82rem;font-weight:700;color:${sc}">${st.surplus>=0?'+':''}${st.surplus.toFixed(1)}</td>
        <td style="padding:10px 12px;font-size:.82rem;color:var(--text)">${hitPct}%</td>
        <td style="padding:10px 12px;font-size:.82rem;color:${ac}">${avg>=0?'+':''}${avg.toFixed(1)}</td>
        <td style="padding:10px 12px;font-size:.82rem;color:${bustPct>=30?'var(--red)':'var(--muted)'}">${bustPct}%</td>
      </tr>`;
    }).join('');
    return `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-bottom:1px solid var(--border);background:var(--surface2)">
            <th ${thS}>#</th><th ${thS}>Manager</th><th ${thS}>Grade</th>
            <th ${thS}>Value+ ${tip('Total surplus: (current dynasty value - expected value at pick slot) / 100, summed across all graded picks')}</th>
            <th ${thS}>Hit% ${tip('% of picks that hit (current value >= 150% of expected at slot)')}  </th>
            <th ${thS}>Avg/Pick ${tip('Average surplus per graded pick')}</th>
            <th ${thS}>Bust% ${tip('% of picks that busted (current value < 40% of expected at slot)')}</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">No graded picks found</td></tr>'}</tbody>
        </table>
      </div>
      <div style="font-size:.65rem;color:var(--muted);margin-top:8px">Value+ = how much better/worse picks performed vs. average for that draft slot. Hit = value &gt;= 150% of expected; Bust = value &lt; 40% of expected.</div>`;
  }

  function classesHtml() {
    const allSeasonRows = Object.entries(seasonStats).sort((a, b) => parseInt(S.draftHistory[b[0]].season) - parseInt(S.draftHistory[a[0]].season));
    const medals = ['#f59e0b','#9ca3af','#cd7f32'];
    const top3 = allSeasonRows.flatMap(([lgKey, sd]) => sd.managers.map(m => ({ ...m, season: sd.season }))).sort((a, b) => (b.picks ? b.surplus/b.picks : 0) - (a.picks ? a.surplus/a.picks : 0)).slice(0, 3);
    const podium = top3.map((m, i) => {
      const avg = m.picks ? m.surplus / m.picks : 0;
      const topBadges = [...m.topPicks].sort((a,b)=>b.surplus-a.surplus).slice(0,3).map(pk =>
        `<span style="font-size:.68rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 7px;white-space:nowrap;color:var(--text)">${pk.name} <span style="color:var(--green)">(+${pk.surplus.toFixed(1)})</span></span>`
      ).join('');
      return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;flex:1;min-width:220px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:1.1rem">${['&#x1F947;','&#x1F948;','&#x1F949;'][i]}</span>
          <span style="font-weight:700;color:var(--text)">${m.name}</span>
          <span style="font-size:.65rem;color:var(--muted);margin-left:auto">${m.season}</span>
        </div>
        <div style="font-size:1.1rem;font-weight:800;color:var(--green);margin-bottom:6px">Avg +${avg.toFixed(1)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${topBadges}</div>
      </div>`;
    }).join('');
    const thS = `style="font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;font-weight:600"`;
    const rows = allSeasonRows.flatMap(([lgKey, sd]) => sd.managers.map((m, i) => {
      const avg = m.picks ? m.surplus / m.picks : 0;
      const hitPct  = m.picks ? Math.round(m.hits  / m.picks * 100) : 0;
      const bustPct = m.picks ? Math.round(m.busts / m.picks * 100) : 0;
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:9px 12px;color:var(--muted);font-size:.75rem">${i+1}</td>
        <td style="padding:9px 8px"><div style="display:flex;align-items:center;gap:8px">${ownerAvatar(m.oid)}<span style="font-weight:600;color:var(--text)">${m.name}</span></div></td>
        <td style="padding:9px 12px;color:var(--muted);font-size:.8rem">${sd.season}</td>
        <td style="padding:9px 12px;color:var(--muted);font-size:.8rem">${m.picks}</td>
        <td style="padding:9px 12px;font-weight:700;font-size:.82rem;color:${avg>=0?'var(--green)':'var(--red)'}">${avg>=0?'+':''}${avg.toFixed(1)}</td>
        <td style="padding:9px 12px;font-size:.82rem;color:var(--text)">${hitPct}%</td>
        <td style="padding:9px 12px;font-size:.82rem;color:${bustPct>=30?'var(--red)':'var(--muted)'}">${bustPct}%</td>
      </tr>`;
    })).join('');
    return `
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">${podium}</div>
      <div class="section-title" style="margin-bottom:10px">Best Draft Classes Ever</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-bottom:1px solid var(--border);background:var(--surface2)">
            <th ${thS}>#</th><th ${thS}>Manager</th><th ${thS}>Season</th><th ${thS}>Picks</th><th ${thS}>Avg Surplus</th><th ${thS}>Hit%</th><th ${thS}>Bust%</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">No data</td></tr>'}</tbody>
        </table>
      </div>`;
  }

  const tabBtn = (id, label) => {
    const active = _dgView === id;
    return `<button onclick="_dgView='${id}';renderDraftGrades()" style="padding:6px 16px;border-radius:6px;border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'rgba(88,166,255,.15)':'var(--surface2)'};color:${active?'var(--accent)':'var(--muted)'};font-size:.8rem;cursor:pointer;font-weight:${active?700:400}">${label}</button>`;
  };

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px">
      <div style="display:flex;gap:6px">${tabBtn('rankings','Rankings')}${tabBtn('classes','Classes')}</div>
      <select ${ctrl} onchange="_dgSeason=this.value;renderDraftGrades()">${seasonOpts}</select>
    </div>
    ${_dgView === 'rankings' ? rankingsHtml() : classesHtml()}`;
}

// ── RENDER: ROSTERS ───────────────────────────────────────────
function renderRosters() {
  const league = ld();
  if (!league) return;
  const el = document.getElementById('rosters-content');
  if (!el) return;

  const teams = Object.values(league.rosterMap).sort((a,b) => a.teamName.localeCompare(b.teamName));
  if (!S.rostersSelected || !league.rosterMap[S.rostersSelected]) {
    S.rostersSelected = teams[0]?.rosterId;
  }

  const opts = teams.map(t =>
    `<option value="${t.rosterId}" ${t.rosterId == S.rostersSelected ? 'selected' : ''}>${t.teamName}</option>`
  ).join('');

  const team = league.rosterMap[parseInt(S.rostersSelected)];
  const ppr  = (league.league.scoring_settings?.rec) || 0;
  const ptKey = ptsKey(ppr);

  // Build player objects grouped by position, then sort each group by dynasty value
  const SKILL = ['QB','RB','WR','TE'];
  const playersByPos = {};
  SKILL.forEach(p => playersByPos[p] = []);
  const other = [];

  (team?.players || []).forEach(pid => {
    const fc  = S.fcBySleeperId[String(pid)];
    const meta = S.playersMeta[String(pid)];
    const pos  = fc?.player?.position || meta?.pos || '?';
    const mv   = mvePlayer(pid, league);
    const obj  = { pid, fc, meta, pos, mv, value: mv?.neutral || 0 };
    if (SKILL.includes(pos)) playersByPos[pos].push(obj);
    else other.push(obj);
  });

  // Sort each position group by dynasty value descending
  SKILL.forEach(pos => playersByPos[pos].sort((a, b) => b.value - a.value));

  const sigCls = { Cornerstone:'signal-cornerstone', Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };

  const renderPlayerCard = ({ pid, fc, meta, pos, mv }) => {
    const name    = fc?.player?.name || meta?.name || `Player ${pid}`;
    const age     = fc?.player?.age  || meta?.age  || null;
    const nflTeam = fc?.player?.team || meta?.team || '';
    const isDEF   = pos === 'DEF';
    const isK     = pos === 'K';

    const avatar = isDEF && nflTeam
      ? `<img src="${NFL_LOGO(nflTeam)}" width="36" height="36"
            style="width:36px;height:36px;border-radius:6px;object-fit:contain;background:var(--surface2);border:1px solid var(--border);flex-shrink:0"
            onerror="this.style.display='none'">`
      : hsImg(pid, 36, pos);

    const displayName = isDEF
      ? `${nflTeam || name} D/ST`
      : name;

    return `<div class="player-row" style="cursor:pointer;gap:10px;padding:8px 10px" onclick="${isDEF||isK ? '' : `openPlayerModal('${pid}')`}">
      ${avatar}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:.84rem;font-weight:600;color:var(--text)">${displayName}</span>
          <span class="pos-badge pos-${isDEF?'DEF':isK?'K':pos}">${isDEF?'DEF':isK?'K':pos}</span>
          ${!isDEF && nflTeam ? `<span class="nfl-team">${nflTeam}</span>` : ''}
          ${age && !isDEF ? `<span style="font-size:.68rem;color:var(--muted)">Age ${age}</span>` : ''}
        </div>
        ${mv ? `<div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
          <span style="font-size:.7rem;color:var(--muted)">T${mv.tier}</span>
          <span style="font-size:.75rem;font-weight:700;color:var(--accent)">${mv.neutral.toLocaleString()}</span>
          <span class="signal-badge ${sigCls[mv.actionTag]||'signal-hold'}">${mv.actionTag}</span>
          <span style="font-size:.65rem;color:var(--muted)">${mv.roleLabel}</span>
        </div>` : (isDEF||isK) ? '' : `<div style="font-size:.7rem;color:var(--muted);margin-top:2px">No dynasty value</div>`}
      </div>
    </div>`;
  };

  // Pick capital section
  const teamPicks = Object.values(S.pickOwnership)
    .filter(p => p.currentOwner === parseInt(S.rostersSelected))
    .sort((a,b) => parseInt(a.season)-parseInt(b.season) || a.round-b.round);

  const pickItems = teamPicks.map(pk => {
    const rc = pickRoundColor(pk.round);
    const origTeam = pk.originalOwner !== pk.currentOwner
      ? (league.rosterMap[pk.originalOwner]?.teamName || `Team ${pk.originalOwner}`)
      : null;
    return `<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border)">
      <span class="pick-badge" style="background:rgba(210,153,34,.12);color:${rc};border:1px solid ${hexA(rc,.27)};width:22px;height:22px;font-size:.65rem;font-weight:800;border-radius:4px;display:inline-flex;align-items:center;justify-content:center">${pk.round}</span>
      <span style="font-size:.8rem;color:var(--text);font-weight:600">'${pk.season.toString().slice(2)} Round ${pk.round}</span>
      ${origTeam ? `<span style="font-size:.68rem;color:var(--muted)">(via ${origTeam})</span>` : ''}
    </div>`;
  }).join('');

  const posSection = pos => {
    const players = playersByPos[pos];
    if (!players.length) return '';
    return `<div style="margin-bottom:16px">
      <div style="font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:6px 10px;border-bottom:1px solid var(--border)">${pos} (${players.length})</div>
      ${players.map(renderPlayerCard).join('')}
    </div>`;
  };

  el.innerHTML = `
    <div class="section-title" style="margin-bottom:16px">Rosters</div>
    <div style="margin-bottom:20px">
      <select style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:.85rem;min-width:220px"
              onchange="S.rostersSelected=parseInt(this.value);renderRosters()">
        ${opts}
      </select>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
      <div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px">
          <div style="padding:10px 12px;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:700;color:var(--text)">Players</div>
          ${SKILL.map(posSection).join('')}
          ${other.length ? `<div style="margin-bottom:8px"><div style="font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:6px 10px;border-bottom:1px solid var(--border)">Other (${other.length})</div>${other.map(renderPlayerCard).join('')}</div>` : ''}
          ${!team?.players?.length ? `<div style="padding:20px;text-align:center;color:var(--muted);font-size:.82rem">No players on roster</div>` : ''}
        </div>
      </div>

      <div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">
          <div style="padding:10px 12px;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:700;color:var(--text)">Draft Capital</div>
          ${pickItems || `<div style="padding:14px;text-align:center;color:var(--muted);font-size:.82rem">No future picks</div>`}
        </div>
      </div>
    </div>

    <div style="font-size:.72rem;color:var(--muted);margin-top:10px">Click any player to see their stats by season.</div>
  `;
}

// ── PLAYER STATS MODAL ────────────────────────────────────────
async function openPlayerModal(pid) {
  const league = ld();
  const fc   = S.fcBySleeperId[String(pid)];
  const meta = S.playersMeta[String(pid)] || {};
  const name = fc?.player?.name     || meta.name || `Player ${pid}`;
  const pos  = fc?.player?.position || meta.pos  || '?';
  const team = fc?.player?.team     || meta.team || '';
  const age  = fc?.player?.age      || meta.age  || null;
  const mv   = league ? mvePlayer(pid, league) : null;
  const sigCls = { Cornerstone:'signal-cornerstone', Buy:'signal-buy', Sell:'signal-sell', Hold:'signal-hold', Speculative:'signal-stash', Shop:'signal-hold' };
  const mvReasons = mv && league ? mveExplainPlayer(mv, league) : [];

  document.getElementById('roster-modal-content').innerHTML = `
    <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:20px;padding-right:8px">
      ${hsLg(pid, pos)}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px">
          <span class="pos-badge pos-${pos}">${pos}</span>
          ${team ? `<span class="nfl-team">${team}</span>` : ''}
          ${age ? `<span style="font-size:.72rem;color:var(--muted)">Age ${age}</span>` : ''}
        </div>
        <div style="font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:6px">${name}</div>
        ${mv ? `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-size:.72rem;color:var(--muted);background:var(--surface2);border-radius:3px;padding:1px 5px">T${mv.tier}</span>
          <span style="font-size:.9rem;font-weight:700;color:var(--accent)">${mv.neutral.toLocaleString()}</span>
          <span class="signal-badge ${sigCls[mv.actionTag]||'signal-hold'}">${mv.actionTag}</span>
          <span style="font-size:.68rem;color:var(--muted)">${mv.roleLabel}</span>
        </div>` : ''}
        ${mvReasons.length ? `<div class="explain-chips">${mvReasons.slice(0,4).map(r=>`<span class="explain-chip">${r}</span>`).join('')}</div>` : ''}
      </div>
    </div>
    <div id="player-modal-stats">
      <div class="inline-loading" style="padding:20px 0">
        <div class="spinner" style="margin:0 auto 8px"></div>Loading season stats…
      </div>
    </div>
  `;

  document.getElementById('roster-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (!league) return;

  const ppr   = (league.league.scoring_settings?.rec) || 0;
  const ptKey = ptsKey(ppr);

  const chainYears = S.seasonChain.map(s => String(s.season || league.season)).filter(Boolean);
  const years = [...new Set([...chainYears, String(league.season)])].sort((a,b) => parseInt(b)-parseInt(a));

  const statsEl = document.getElementById('player-modal-stats');
  const rows = [];

  for (const year of years) {
    const key = `season_${year}`;
    if (!S.statsCache[key]) {
      try {
        const data = await api(`/stats/nfl/regular/${year}`);
        S.statsCache[key] = data || {};
      } catch(e) {
        S.statsCache[key] = {};
      }
    }
    const st = S.statsCache[key]?.[String(pid)];
    if (!st) continue;

    const pts = st[ptKey] || st.pts_ppr || st.pts_half_ppr || st.pts_std || 0;
    if (!pts) continue;
    const gp  = st.gp || st.games_played || '—';
    const avg = (pts && gp && gp !== '—') ? (pts / gp).toFixed(1) : '—';
    const sl  = statLine(st, pos);

    rows.push(`<tr>
      <td style="font-weight:600">${year}</td>
      <td>${gp}</td>
      <td style="color:var(--accent);font-weight:700">${fmtP(pts)}</td>
      <td>${avg}</td>
      <td style="font-size:.72rem;color:var(--muted);max-width:180px;white-space:normal">${sl || '—'}</td>
    </tr>`);
  }

  if (!rows.length) {
    statsEl.innerHTML = `<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:16px 0">No season stats available from Sleeper.</div>`;
    return;
  }

  statsEl.innerHTML = `
    <div style="font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Season Stats</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Year</th><th>GP</th><th>Total Pts</th><th>Avg/G</th><th>Stats</th>
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>`;
}

// ── SUB-TAB STATE ─────────────────────────────────────────────
const subTabState = {
  league:  'overview',
  teams:   'power',
  players: 'cards',
  history: 'wrapped',
};

function switchSubTab(mainTab, subId) {
  subTabState[mainTab] = subId;
  localStorage.setItem('fo_subtab_'+mainTab, subId);
  const tabEl = document.getElementById('tab-'+mainTab);
  if (!tabEl) return;
  tabEl.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
  // Player Cards / Top N / Season Stats all share the same panel
  const panelId = (mainTab === 'players' && ['cards','topn','stats'].includes(subId))
    ? 'sub-players-main' : 'sub-'+mainTab+'-'+subId;
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');
  tabEl.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b.dataset.sub === subId));

// ── Data loading ───────────────────────────────────────────────
async function loadPlayoffData() {
  if (playoffsLoading) return;
  playoffsLoading = true;
  S.playoffData = {};
  // All known league IDs (current season chain + any extended draft history seasons)
  const allIds = new Set([...S.seasonChain, ...Object.keys(S.draftHistory)]);
  for (const lgId of allIds) {
    const lg = S.leagues[lgId];
    if (!lg) continue;
    const psStart = lg.playoffWeekStart || 15;
    try {
      const rawBracket = await fetch(`${BASE}/league/${lgId}/winners_bracket`, { signal: AbortSignal.timeout(8000) })
        .then(r => r.ok ? r.json() : []).catch(() => []);
      // Normalize all numeric fields — Sleeper sometimes returns them as strings
      const bracket = (rawBracket || []).map(b => ({
        ...b,
        r:  b.r  != null ? parseInt(b.r)  : b.r,
        m:  b.m  != null ? parseInt(b.m)  : b.m,
        p:  b.p  != null ? parseInt(b.p)  : b.p,
        t1: b.t1 != null ? parseInt(b.t1) : b.t1,
        t2: b.t2 != null ? parseInt(b.t2) : b.t2,
        w:  b.w  != null ? parseInt(b.w)  : b.w,
        l:  b.l  != null ? parseInt(b.l)  : b.l,
      }));
      // Only count rounds that have a completed match (w set) — Sleeper pre-populates
      // placeholder entries for future rounds with w:null, which would inflate maxRound
      // and make the championship lookup fail.
      const completedBracket = bracket.filter(b => b.w);
      const maxRound = completedBracket.length ? Math.max(...completedBracket.map(b => b.r || 0)) : 0;
      // Fetch matchup data for each playoff round week
      const matchupsByWeek = {};
      for (let rnd = 1; rnd <= Math.max(maxRound, 3); rnd++) {
        const wk = psStart + (rnd - 1);
        const data = await fetch(`${BASE}/league/${lgId}/matchups/${wk}`, { signal: AbortSignal.timeout(8000) })
          .then(r => r.ok ? r.json() : []).catch(() => []);
        if (data && data.length && data.some(t => (t.points || 0) > 0)) matchupsByWeek[wk] = data;
      }
      // Regular season PPG per team
      const regPPG = {};
      const numReg = lg.completedWeeks?.length || 0;
      Object.values(lg.rosterMap).forEach(r => { regPPG[r.rosterId] = numReg > 0 ? r.fpts / numReg : 0; });
      S.playoffData[lgId] = { bracket: bracket || [], matchupsByWeek, season: lg.season, rosterMap: lg.rosterMap, playoffWeekStart: psStart, maxRound, regPPG };
    } catch(e) { console.warn('Playoff load failed for', lgId, e); }
  }
  playoffsLoaded  = true;
  playoffsLoading = false;
}

// ── Helper: scores for a playoff week ────────────────────────
// Returns { roster_id: points } for the entire week.
// We do NOT filter by matchup_id because Sleeper's matchup_id values
// in weekly data don't reliably match the bracket's m field.
// Callers already know b.w / b.l (roster IDs) so they can look up directly.
function poMatchScore(pd, round) {
  const week = pd.playoffWeekStart + (round - 1);
  const out  = {};
  (pd.matchupsByWeek[week] || []).forEach(t => { out[t.roster_id] = t.points || 0; });
  return out;
}

// ── Helper: per-season results (champion, runner-up, etc.) ────
function poSeasonResults() {
  const results = [];
  for (const [lgId, pd] of Object.entries(S.playoffData)) {
    if (!pd.bracket || !pd.bracket.length || !pd.maxRound) continue;
    const maxR = pd.maxRound;
    // Find championship by placement field (p=1) first; fall back to r=maxR,m=1
    const champMatch = pd.bracket.find(b => b.p === 1 && b.w)
      || pd.bracket.find(b => b.r === maxR && b.m === 1 && b.w);
    const thirdMatch = pd.bracket.find(b => b.p === 3 && b.w)
      || pd.bracket.find(b => b.r === maxR && b.m === 2 && b.w);
    if (!champMatch || !champMatch.w) continue;
    const rm  = pd.rosterMap;
    const get = id => rm[id] || { teamName: 'Team '+id, avatar: null, rosterId: id, ownerId: null };
    const cSc = poMatchScore(pd, maxR);
    const tSc = thirdMatch ? poMatchScore(pd, maxR) : {};
    // Seed detection: teams in r=1 didn't have byes; teams skipping r=1 had byes
    const r1teams = new Set();
    pd.bracket.filter(b => b.r === 1).forEach(b => { if (b.t1) r1teams.add(b.t1); if (b.t2) r1teams.add(b.t2); });
    const byeTeams = new Set(pd.bracket.filter(b => b.r === 2 && b.t1 && !r1teams.has(b.t1)).map(b=>b.t1)
      .concat(pd.bracket.filter(b => b.r === 2 && b.t2 && !r1teams.has(b.t2)).map(b=>b.t2)));
    const champ = get(champMatch.w);
    const champHadBye = byeTeams.has(champMatch.w);
    // Compute all playoff stats for this season
    const pStats = poComputeStats(pd);
    results.push({ season: pd.season, leagueId: lgId, champion: champ, runnerUp: get(champMatch.l), third: thirdMatch?.w ? get(thirdMatch.w) : null, fourth: thirdMatch?.l ? get(thirdMatch.l) : null, champScore: cSc[champMatch.w]||0, ruScore: cSc[champMatch.l]||0, thirdScore: tSc[thirdMatch?.w]||0, fourthScore: tSc[thirdMatch?.l]||0, champRecord: `${rm[champMatch.w]?.wins||0}-${rm[champMatch.w]?.losses||0}`, champHadBye, champRegPPG: pd.regPPG[champMatch.w]||0, pStats, bracket: pd.bracket, matchupsByWeek: pd.matchupsByWeek, rosterMap: rm, playoffWeekStart: pd.playoffWeekStart, maxRound: maxR });
  }
  return results.sort((a,b) => b.season - a.season);
}

// ── Helper: per-team playoff stats for one season ─────────────
function poComputeStats(pd) {
  const stats = {};
  const init  = id => { if (!stats[id]) stats[id] = { gp:0, w:0, l:0, pts:0, scores:[], isBye:false, finish:null }; };
  const maxR  = pd.maxRound;
  const r1ids = new Set();
  pd.bracket.filter(b=>b.r===1).forEach(b=>{ if(b.t1) r1ids.add(b.t1); if(b.t2) r1ids.add(b.t2); });
  // Use p (placement) field first — maxRound can be inflated by consolation/toilet-bowl
  // brackets that run longer than the main bracket, causing r===maxR to miss the real
  // championship game. Mirror the same lookup used in poSeasonResults.
  const champMatch = pd.bracket.find(b => b.p === 1 && b.w) || pd.bracket.find(b => b.r === maxR && b.m === 1 && b.w);
  const thirdMatch = pd.bracket.find(b => b.p === 3 && b.w) || pd.bracket.find(b => b.r === maxR && b.m === 2 && b.w);
  pd.bracket.forEach(b => {
    const { r, m, t1, t2, w, l } = b;
    if (!w || !l) return;
    init(w); init(l);
    const sc = poMatchScore(pd, r);
    const sw = sc[w]||0, sl = sc[l]||0;
    stats[w].gp++; stats[w].w++; stats[w].pts+=sw; stats[w].scores.push(sw);
    stats[l].gp++; stats[l].l++; stats[l].pts+=sl; stats[l].scores.push(sl);
    if      (champMatch && b === champMatch) { stats[w].finish=1; stats[l].finish=2; }
    else if (thirdMatch && b === thirdMatch) { stats[w].finish=3; stats[l].finish=4; }
    else if (!champMatch && r === maxR && m===1) { stats[w].finish=1; stats[l].finish=2; }
    else if (!thirdMatch && r === maxR && m===2) { stats[w].finish=3; stats[l].finish=4; }
  });
  // Mark bye teams
  Object.keys(stats).forEach(id => { if (!r1ids.has(parseInt(id))) stats[id].isBye=true; });
  return stats;
}

// ── Helper: all-time manager index ────────────────────────────
function poManagerIndex() {
  const idx = {};
  for (const [lgId, pd] of Object.entries(S.playoffData)) {
    if (!pd.bracket || !pd.maxRound) continue;
    const results = poSeasonResults().find(r => r.leagueId === lgId);
    if (!results) continue;
    const pStats = poComputeStats(pd);
    const rm     = pd.rosterMap;
    Object.entries(pStats).forEach(([ridStr, st]) => {
      const rid  = parseInt(ridStr);
      const team = rm[rid]; if (!team) return;
      const oid  = team.ownerId || 'roster_'+rid;
      if (!idx[oid]) idx[oid] = { oid, teamNames:[], avatar:team.avatar, app:0, w:0, l:0, titles:0, finals:0, pts:0, gp:0, bestScore:0, seasons:[] };
      const m = idx[oid];
      if (!m.teamNames.includes(team.teamName)) m.teamNames.push(team.teamName);
      if (!m.avatar && team.avatar) m.avatar = team.avatar;
      m.app++; m.w+=st.w; m.l+=st.l; m.pts+=st.pts; m.gp+=st.gp;
      if (st.scores.length) m.bestScore = Math.max(m.bestScore, ...st.scores);
      if (st.finish===1){m.titles++;m.finals++;} else if(st.finish===2) m.finals++;
      m.seasons.push({ season:pd.season, finish:st.finish });
    });
  }
  return Object.values(idx).sort((a,b) => b.titles-a.titles||b.finals-a.finals||b.app-a.app);
}

// ── Helper: flat list of all playoff scores ────────────────────
function poAllScores() {
  const out = [];
  for (const [lgId, pd] of Object.entries(S.playoffData)) {
    if (!pd.bracket || !pd.maxRound) continue;
    const rm = pd.rosterMap;
    pd.bracket.forEach(b => {
      const {r,m,t1,t2,w,l} = b; if(!w||!l) return;
      const sc   = poMatchScore(pd,r);
      const isF  = r===pd.maxRound && m===1;
      [[t1||w,t2||l],[t2||l,t1||w]].slice(0,1); // de-dup via both sides
      [t1,t2].forEach(rid => {
        if (!rid) return;
        const opp = rid===t1?t2:t1;
        out.push({ rid, teamName:(rm[rid]?.teamName||'Team '+rid), season:pd.season, round:r, pts:sc[rid]||0, oppPts:sc[opp]||0, isWin:w===rid, isFinal:isF, lgId });
      });
    });
  }
  return out;
}

// ── Helper: ordinal suffix ─────────────────────────────────────
function poOrd(n) { return n===1?'1st':n===2?'2nd':n===3?'3rd':n+'th'; }

// ── MAIN RENDER ───────────────────────────────────────────────
function renderPlayoffs() {
  const el = document.getElementById('playoffs-content');
  if (!el) return;
  if (!S.currentLeagueId) { el.innerHTML='<p style="color:var(--muted);padding:60px;text-align:center">Load a league first.</p>'; return; }
  if (!playoffsLoaded) {
    el.innerHTML='<div style="text-align:center;padding:60px"><div class="spinner"></div><p style="color:var(--muted);margin-top:12px;font-size:.88rem">Loading playoff history…</p></div>';
    if (!playoffsLoading) loadPlayoffData().then(()=>renderPlayoffs());
    return;
  }
  const seasons  = poSeasonResults();
  const managers = poManagerIndex();
  const allScores= poAllScores();
  if (!seasons.length) {
    // Build diagnostic info to help identify what's missing
    const chainIds = S.seasonChain || [];
    const diagRows = chainIds.map(lgId => {
      const pd = S.playoffData[lgId];
      const lg = S.leagues[lgId];
      if (!pd) return `<tr><td>${lgId}</td><td>${lg?.season||'?'}</td><td style="color:var(--red)">No bracket data fetched</td><td>—</td><td>—</td></tr>`;
      const total = pd.bracket?.length || 0;
      const completed = (pd.bracket||[]).filter(b=>b.w).length;
      const champMatch = pd.bracket?.find(b => b.p === 1 && b.w)
        || pd.bracket?.find(b => b.r === pd.maxRound && b.m === 1 && b.w);
      const r3entries = (pd.bracket||[]).filter(b=>b.r===pd.maxRound).map(b=>`m=${b.m} p=${b.p} w=${b.w}`).join('; ');
      const status = !total ? 'Empty bracket' : !completed ? 'Bracket has no winners set' : !pd.maxRound ? 'maxRound=0' : !champMatch ? `No champ (r${pd.maxRound}: ${r3entries||'none'})` : '✓ OK';
      const color = status.startsWith('✓') ? 'var(--green)' : 'var(--yellow)';
      return `<tr><td style="font-size:.7rem;color:var(--muted)">${lgId}</td><td>${lg?.season||'?'}</td><td style="color:${color}">${status}</td><td>${total} (${completed} done)</td><td>${pd.maxRound}</td></tr>`;
    });
    el.innerHTML = `<div style="padding:24px">
      <p style="color:var(--muted);margin-bottom:16px">No completed playoff data found. Diagnostic info:</p>
      <div class="table-wrap"><table style="font-size:.8rem">
        <thead><tr><th>League ID</th><th>Season</th><th>Status</th><th>Bracket entries</th><th>maxRound</th></tr></thead>
        <tbody>${diagRows.length ? diagRows.join('') : '<tr><td colspan="5" style="color:var(--red);padding:12px">S.seasonChain is empty — league may not have loaded</td></tr>'}</tbody>
      </table></div>
      <p style="color:var(--muted);font-size:.75rem;margin-top:12px">Chain has ${chainIds.length} league(s). playoffData has ${Object.keys(S.playoffData).length} entries. If the 2025 season league ID is missing above, enter it directly in the League ID field and hit Load.</p>
    </div>`;
    return;
  }

  // Year selector — consistent with draft history tab style
  const allYears = seasons.map(s => String(s.season)).sort((a, b) => b - a);
  const selYear  = (() => { const v = document.getElementById('po-season-sel')?.value; return (v && allYears.includes(v)) ? v : 'ALL'; })();
  const ctrl = `style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 12px;font-size:.83rem"`;
  const yearOptions = ['<option value="ALL">All Seasons</option>',
    ...allYears.map(y => `<option value="${y}" ${y === selYear ? 'selected' : ''}>${y} Season</option>`)
  ].join('');
  const selectorHtml = `<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px">
    <select id="po-season-sel" ${ctrl} onchange="renderPlayoffs()">${yearOptions}</select>
    <span style="font-size:.78rem;color:var(--muted)">${selYear === 'ALL' ? allYears.length + ' season' + (allYears.length !== 1 ? 's' : '') : selYear + ' season'}</span>
  </div>`;

  const filteredSeasons = selYear === 'ALL' ? seasons : seasons.filter(s => String(s.season) === selYear);
  el.innerHTML = selectorHtml + poChampHistory(filteredSeasons) + poManagerProfiles(managers) + poLeagueRecords(allScores, filteredSeasons) + poBracketHistory(filteredSeasons) + poWhatWins(filteredSeasons, managers, allScores);
}

// ── Section 1: Championship History ──────────────────────────
function poChampHistory(seasons) {
  let rows = seasons.map(s => {
    const margin = s.champScore && s.ruScore ? (s.champScore - s.ruScore) : null;
    return `<tr>
      <td class="bold">${s.season}</td>
      <td class="bold" style="color:var(--yellow)">🥇 ${s.champion?.teamName||'—'}</td>
      <td style="color:var(--green);font-weight:700">${s.champScore?s.champScore.toFixed(2):'—'}</td>
      <td>${s.runnerUp?.teamName||'—'}</td>
      <td style="color:var(--muted)">${s.ruScore?s.ruScore.toFixed(2):'—'}</td>
      <td style="color:var(--muted)">${s.third?.teamName||'—'}</td>
      <td style="color:var(--muted)">${s.champRecord}</td>
      <td style="color:var(--muted)">${margin!=null?(margin>0?'+':'')+margin.toFixed(2):'—'}</td>
    </tr>`;
  }).join('');
  // Superlative cards
  const withScores = seasons.filter(s=>s.champScore&&s.ruScore);
  const mostDom = withScores.length ? withScores.slice().sort((a,b)=>(b.champScore-b.ruScore)-(a.champScore-a.ruScore))[0] : null;
  const closest  = withScores.length ? withScores.slice().sort((a,b)=>Math.abs(a.champScore-a.ruScore)-Math.abs(b.champScore-b.ruScore))[0] : null;
  const titleMap = {}; seasons.forEach(s=>{ if(s.champion) titleMap[s.champion.teamName]=(titleMap[s.champion.teamName]||0)+1; });
  const dynastyEntry = Object.entries(titleMap).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1])[0];
  const byeWins = seasons.filter(s=>s.champHadBye).length;
  let cards = `<div class="card-grid" style="margin-top:14px">`;
  if (mostDom) cards+=`<div class="card"><div class="card-label">Most Dominant Win</div><div class="card-value" style="font-size:1rem">${mostDom.champion.teamName}</div><div class="card-sub">+${(mostDom.champScore-mostDom.ruScore).toFixed(1)} pts · ${mostDom.season}</div></div>`;
  if (closest) cards+=`<div class="card"><div class="card-label">Closest Final</div><div class="card-value" style="font-size:1rem">${closest.champion.teamName}</div><div class="card-sub">Won by ${(closest.champScore-closest.ruScore).toFixed(2)} pts · ${closest.season}</div></div>`;
  if (dynastyEntry) cards+=`<div class="card"><div class="card-label">Dynasty</div><div class="card-value" style="font-size:1rem">${dynastyEntry[0]}</div><div class="card-sub">${dynastyEntry[1]} titles</div></div>`;
  if (seasons.length) cards+=`<div class="card"><div class="card-label">Bye → Champion</div><div class="card-value">${byeWins}/${seasons.length}</div><div class="card-sub">Top seeds converting titles</div></div>`;
  cards += `</div>`;
  return `<div class="section"><div class="section-title">🏆 Championship History <span class="section-note">${seasons.length} season${seasons.length!==1?'s':''}</span></div>
    <div class="table-wrap"><table><thead><tr><th>Season</th><th>Champion</th><th>Score</th><th>Runner-Up</th><th>Score</th><th>3rd Place</th><th>Reg Record</th><th>Margin</th></tr></thead><tbody>${rows}</tbody></table></div>${cards}</div>`;
}

// ── Section 2: Manager Playoff Profiles ───────────────────────
function poManagerProfiles(managers) {
  if (!managers.length) return '';
  const cards = managers.map(m => {
    const wPct  = m.gp > 0 ? (m.w/m.gp*100).toFixed(0)+'%' : '—';
    const ppg   = m.gp > 0 ? (m.pts/m.gp).toFixed(1) : '—';
    const label = m.titles>=2?{t:'Dynasty',c:'var(--yellow)'}:m.titles>=1?{t:'Champion',c:'var(--green)'}:m.finals>0?{t:'Contender',c:'var(--accent)'}:m.app>=2?{t:'Regular',c:'var(--purple)'}:{t:'Occasional',c:'var(--muted)'};
    const av    = m.avatar?`<img src="${AV_URL(m.avatar)}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border);flex-shrink:0" onerror="this.style.display='none'">`:`<span style="width:34px;height:34px;border-radius:50%;background:var(--surface2);display:inline-block;flex-shrink:0"></span>`;
    const bestFinish = m.seasons.filter(s=>s.finish).map(s=>s.finish).sort((a,b)=>a-b)[0];
    return `<div class="card" style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:9px">
        ${av}
        <div style="flex:1;min-width:0">
